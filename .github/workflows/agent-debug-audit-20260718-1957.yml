name: Agent Open-Bug Debug Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: agent-open-bug-debug-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Run independent simulate-this audit 1
        run: |
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-complete-route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-audit-1.txt
      - name: Run independent simulate-this audit 2
        run: |
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Strict-JIT timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee trace-audit-2.txt
      - name: Run independent simulate-this audit 3
        run: |
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee trace-audit-3.txt
      - name: Capture four open-bug traces
        run: |
          # Issue 951 and Mysterious Treasure: https://github.com/FlareZ123/pokemon-sims/issues/951 https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-first --seed 13 | tee issue-951.txt
          # Issue 952 and Steven's Resolve: https://github.com/FlareZ123/pokemon-sims/issues/952 https://api.pokemontcg.io/v2/cards/sm7-145
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 58 | tee issue-952.txt
          # Issue 953 and Quick Ball: https://github.com/FlareZ123/pokemon-sims/issues/953 https://api.pokemontcg.io/v2/cards/swsh1-179
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 19 | tee issue-953.txt
          # Issue 954 and Earthen Vessel: https://github.com/FlareZ123/pokemon-sims/issues/954 https://api.pokemontcg.io/v2/cards/sv4-163
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 42 | tee issue-954.txt
      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Archive exact tested source
        run: |
          git rev-parse HEAD > tested-head.txt
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD
      - name: Upload exact audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-open-bug-debug-audit-${{ github.run_attempt }}
          path: |
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
            trace-audit-*.txt
            issue-*.txt
            t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
          if-no-files-found: error
