name: Agent Debug Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: agent-debug-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-ready policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee trace-3.txt
      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Archive exact tested source
        run: |
          git rev-parse HEAD > tested-head.txt
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD
      - name: Upload exact audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-audit-${{ github.run_attempt }}
          path: |
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
            trace-*.txt
            t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
          if-no-files-found: error
