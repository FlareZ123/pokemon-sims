name: Agent Debug Pass

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build all targets
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee trace-3.txt
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
        # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
        # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Archive exact tested source
        run: |
          git rev-parse HEAD > tested-head.txt
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD
        # Source audit contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
      - name: Upload release audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-release-${{ github.run_attempt }}
          path: |
            trace-*.txt
            t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
            build/Testing
            build/regidrago_sim
            build/regidrago_unified_tests
          if-no-files-found: warn

  sanitizer-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build sanitizer targets
        run: cmake --build build-sanitizers --parallel 2
      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitizers --parallel 2 --output-on-failure
      - name: Upload sanitizer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-debug-sanitizers-${{ github.run_attempt }}
          path: build-sanitizers/Testing
          if-no-files-found: warn
