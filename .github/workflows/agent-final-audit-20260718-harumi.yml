name: Agent Final Current-Main Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: agent-final-current-main-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this audits
        run: |
          set -euo pipefail
          # Trace contract and earliest-route policy:
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 2 | tee trace-audit-1.txt
          # Evolution, attachment, and strict-JIT timing:
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 3 | tee trace-audit-2.txt
          # Matchup-flex DCI contract:
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee trace-audit-3.txt
      - name: Validate all merged bug regressions
        run: |
          set -euo pipefail
          # Steven's Resolve: https://github.com/FlareZ123/pokemon-sims/issues/952 https://api.pokemontcg.io/v2/cards/sm7-145
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 58 --require-ready-by 3 | tee issue-952.txt
          # Quick Ball: https://github.com/FlareZ123/pokemon-sims/issues/953 https://api.pokemontcg.io/v2/cards/swsh1-179
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 19 --require-ready-by 3 | tee issue-953.txt
          # Earthen Vessel: https://github.com/FlareZ123/pokemon-sims/issues/954 https://api.pokemontcg.io/v2/cards/sv4-163
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 42 --require-ready-by 3 | tee issue-954.txt
      - name: Preserve approval-pending selector evidence
        run: |
          # Issue 962 remains unclaimed until two independent approvals:
          # https://github.com/FlareZ123/pokemon-sims/issues/962
          # Quick Ball, Tapu Lele-GX, Crispin, and Earthen Vessel:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/cel25c-60_A
          # https://api.pokemontcg.io/v2/cards/sv7-133
          # https://api.pokemontcg.io/v2/cards/sv4-163
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 104 | tee issue-962.txt
      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Archive exact tested source
        run: |
          git rev-parse HEAD > tested-head.txt
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD
      - name: Upload exact audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-final-current-main-audit-${{ github.run_attempt }}
          path: |
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
            trace-audit-*.txt
            issue-*.txt
            t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
          if-no-files-found: error
