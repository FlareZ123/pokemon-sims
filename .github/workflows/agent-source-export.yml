name: Agent Source Export

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/agent-source-export.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: agent-source-export
          path: |
            .
            !.git
          if-no-files-found: error
          retention-days: 1
