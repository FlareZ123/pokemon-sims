name: Apply issue 643 documentation fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/643-current-variant-docs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Correct current variant documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          assumptions = Path('docs/MODEL_ASSUMPTIONS.md')
          text = assumptions.read_text()
          text = text.replace('- Matched-seed deck swap comparisons.\n', '')
          text = text.replace(
              'The program uses a fixed 64-bit Mersenne Twister seed. Baseline scenarios use stable derived seeds. Variant rows use matched seeds for each scenario so percentage deltas are less noisy than independent-run deltas.',
              'The program uses a fixed 64-bit Mersenne Twister seed. Baseline scenarios use stable derived seeds. The current executable writes only the baseline scenarios from `all_scenarios()`; it does not generate matched-seed deck-swap rows: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_016.inc#L271-L283. The retired `variant_results.csv` must not be reused until a current variant generator, tests, and results are restored: https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md#L7.'
          )
          marker = '### Policy versus future-card oracle\n'
          section = (
              '### Card-swap variants\n\n'
              'Matched-seed card-swap comparisons are currently unavailable. The active CLI emits baseline scenario rows only, and the prior variant artifact was removed after the policy rewrite: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_016.inc#L271-L283 and https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md#L7. Any future deck-swap claim requires a restored variant builder, executable tests, and newly generated results.\n\n'
          )
          if section not in text:
              text = text.replace(marker, section + marker)
          assumptions.write_text(text)

          plan = Path('SIM-PLAN.md')
          text = plan.read_text()
          text = text.replace(
              'A variant-builder defect that rejected zero-copy comparison cards was corrected. CSV values are now quoted, so comma-bearing combo labels remain machine-readable. The final data was regenerated only after the new policy, schema check, and full CTest pass.',
              'Historical variant-builder work is retained here as design context. The current executable does not expose a variant builder or emit deck-swap rows; it writes baseline `all_scenarios()` rows only: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_016.inc#L271-L283. The prior `variant_results.csv` was removed and must not support current claims: https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md#L7.'
          )
          text = text.replace(
              '- Point deltas for card-swap variants against the baseline under matched seeds.',
              '- Baseline scenario probabilities. Matched-seed card-swap deltas remain a future extension until a current generator and result artifact are restored: https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md#L7.'
          )
          text = text.replace(
              '6. Smoke-test every scenario and every variant.',
              '6. Smoke-test every implemented baseline scenario. A future variant generator must add its own executable coverage before variant claims return: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_016.inc#L271-L283.'
          )
          plan.write_text(text)
          PY
          rm .github/workflows/apply-643.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/MODEL_ASSUMPTIONS.md SIM-PLAN.md .github/workflows/apply-643.yml
          git commit -m "Correct current variant documentation (#643)"
          git push origin HEAD:${{ github.head_ref }}
