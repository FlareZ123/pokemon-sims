name: Apply issue 653 opening policy fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/653-opening-dialga-multi-payload'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply and validate focused fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/trace_engine_v2/part_005.inc')
          text = source.read_text()
          old = '''    const bool dialga_is_unique_in_hand_payload =
              hand_count(Card::DialgaGX) == 1 && payloads_in_hand == 1;

              // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
              // preserve the unique in-hand payload when Crispin already covers the Supporter
              // connector and Tapu Lele-GX can legally start instead:
          '''
          new = '''    const bool dialga_is_unique_in_hand_payload =
              hand_count(Card::DialgaGX) == 1 && payloads_in_hand == 1;
              const bool held_turo_fss_recovery_graph =
              hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;
              const bool dialga_has_route_preservation_value =
              hand_count(Card::DialgaGX) == 1 &&
              (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph);

              // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
              // preserve it when Crispin already covers the Supporter connector and the public
              // hand either has no other payload or has Turo plus Forest Seal Stone redundancy:
          '''
          # Keep indentation from the include exactly; use direct shorter replacements below.
          text = text.replace(
              '    const bool dialga_is_unique_in_hand_payload =\n'
              '        hand_count(Card::DialgaGX) == 1 && payloads_in_hand == 1;\n\n'
              '    // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,\n'
              '    // preserve the unique in-hand payload when Crispin already covers the Supporter\n'
              '    // connector and Tapu Lele-GX can legally start instead:\n',
              '    const bool dialga_is_unique_in_hand_payload =\n'
              '        hand_count(Card::DialgaGX) == 1 && payloads_in_hand == 1;\n'
              '    const bool held_turo_fss_recovery_graph =\n'
              '        hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;\n'
              '    const bool dialga_has_route_preservation_value =\n'
              '        hand_count(Card::DialgaGX) == 1 &&\n'
              '        (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph);\n\n'
              '    // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,\n'
              '    // preserve it when Crispin already covers the Supporter connector and the public\n'
              '    // hand either has no other payload or has Turo plus Forest Seal Stone redundancy:\n',
              1,
          )
          text = text.replace(
              '    // https://api.pokemontcg.io/v2/cards/sv7-133\n'
              '    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment\n'
              '    if (tapu_dialga_are_only_opening_basics && strict_payload_timing() &&\n'
              '        dialga_is_unique_in_hand_payload && crispin_route_already_held &&\n',
              '    // https://api.pokemontcg.io/v2/cards/sv7-133\n'
              '    // https://api.pokemontcg.io/v2/cards/swsh12-156\n'
              '    // https://api.pokemontcg.io/v2/cards/sv4-171\n'
              '    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment\n'
              '    // https://github.com/FlareZ123/pokemon-sims/issues/653\n'
              '    if (tapu_dialga_are_only_opening_basics && strict_payload_timing() &&\n'
              '        dialga_has_route_preservation_value && crispin_route_already_held &&\n',
              1,
          )
          source.write_text(text)

          test = Path('tests/opening_active_dialga_payload_tests.cpp')
          text = test.read_text()
          insertion = r'''
          void test_opening_choice_preserves_dialga_with_redundant_payload_graph() {
            const sim::Scenario scenario{"opening-dialga-multiple-payloads", sim::DciProfile::StrictJit,
                                         sim::LockMode::None, false, 4};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{653};
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.hand = {sim::Card::DialgaGX, sim::Card::TapuLeleGX,
                          sim::Card::RegidragoVstar, sim::Card::Dragapult,
                          sim::Card::ProfessorTuro, sim::Card::ForestSealStone,
                          sim::Card::Crispin};
            sim::EngineTestAccess::set_state(engine, std::move(state));

            // Setup may choose either Basic. Crispin covers the immediate Supporter route,
            // Turo can recover the opening Tapu, and Forest Seal Stone supplies a later
            // unrestricted connector, so the additional Dragapult payload does not erase
            // Dialga-GX's DCI value:
            // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
            // https://api.pokemontcg.io/v2/cards/sm5-100
            // https://api.pokemontcg.io/v2/cards/cel25c-60_A
            // https://api.pokemontcg.io/v2/cards/sv4-171
            // https://api.pokemontcg.io/v2/cards/swsh12-156
            // https://api.pokemontcg.io/v2/cards/sv7-133
            // https://github.com/FlareZ123/pokemon-sims/issues/653
            sim::EngineTestAccess::choose_opening_active(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
                !contains(after.hand, sim::Card::DialgaGX) ||
                !contains(after.hand, sim::Card::Dragapult)) {
              throw std::runtime_error("Tapu Lele-GX should start while both Dragon payloads remain in hand.");
            }
          }

          void test_multiple_payloads_without_recovery_graph_keep_legacy_order() {
            const sim::Scenario scenario{"opening-dialga-multiple-payload-control", sim::DciProfile::StrictJit,
                                         sim::LockMode::None, false, 4};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{654};
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.hand = {sim::Card::DialgaGX, sim::Card::TapuLeleGX,
                          sim::Card::Dragapult, sim::Card::Crispin};
            sim::EngineTestAccess::set_state(engine, std::move(state));
            sim::EngineTestAccess::choose_opening_active(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            if (!after.active || after.active->card != sim::Card::DialgaGX ||
                !contains(after.hand, sim::Card::TapuLeleGX)) {
              throw std::runtime_error("Multiple payloads alone should preserve the legacy Wonder Tag route.");
            }
          }

          '''
          insertion = '\n'.join(line[10:] if line.startswith('          ') else line for line in insertion.splitlines())
          marker = '\n}  // namespace\n\nint main() {'
          if marker not in text:
              raise SystemExit('opening Dialga test insertion point not found')
          text = text.replace(marker, '\n' + insertion + '}  // namespace\n\nint main() {', 1)
          text = text.replace(
              '  test_opening_choice_keeps_legacy_order_without_crispin_signal();\n',
              '  test_opening_choice_keeps_legacy_order_without_crispin_signal();\n'
              '  test_opening_choice_preserves_dialga_with_redundant_payload_graph();\n'
              '  test_multiple_payloads_without_recovery_graph_keep_legacy_order();\n',
              1,
          )
          test.write_text(text)
          PY
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target regidrago_opening_dialga_payload_tests --parallel 2
          ./build/regidrago_opening_dialga_payload_tests
          rm .github/workflows/apply-653.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc tests/opening_active_dialga_payload_tests.cpp .github/workflows/apply-653.yml
          git commit -m "Preserve Dialga across redundant opening payloads (#653)"
          git push origin HEAD:${{ github.head_ref }}
