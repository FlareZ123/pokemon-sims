          ./opening-latias-bench-ubsan
''')
          PY

          g++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/opening_latias_bench_tests.cpp -o opening-latias-bench
          ./opening-latias-bench
          g++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/opening_latias_bench_tests.cpp -o opening-latias-bench-ubsan
          ./opening-latias-bench-ubsan

          rm .github/workflows/apply-657.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc tests/opening_latias_bench_tests.cpp .github/workflows/opening-latias-bench.yml .github/workflows/apply-657.yml
          git commit -m "Make opening Latias bench placement route-aware (#657)"
          git push origin HEAD:fix/657-opening-latias-bench-compression
