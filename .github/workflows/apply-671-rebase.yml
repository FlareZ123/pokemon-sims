name: Apply issue 671 after Latias merge

on:
  push:
    branches: [fix/671-opening-bench-tapu]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/671-opening-bench-tapu
      - name: Apply integrated opening Bench policy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/trace_engine_v2/part_005.inc')
          text = source.read_text()
          marker = '''  void choose_opening_bench() {
'''
          helper = '''  bool should_setup_bench_redundant_tapu() const {
    const int held_supporters = static_cast<int>(
        std::count_if(state_.hand.begin(), state_.hand.end(), is_supporter));
    const bool direct_supporter_and_recovery_graph =
        hand_count(Card::Crispin) > 0 && hand_count(Card::Gladion) > 0 &&
        held_supporters >= 3;
    const bool manual_energy_route_held =
        hand_count(Card::Grass) > 0 || hand_count(Card::Fire) > 0;
    const bool dragon_payload_held =
        std::any_of(state_.hand.begin(), state_.hand.end(), is_payload);
    const bool opening_route_unlocked = scenario_.locks == LockMode::None;

    // Setup may place an additional Basic Pokemon onto the Bench before Prize cards
    // are set. Tapu Lele-GX's Wonder Tag does not trigger during setup, so sacrifice
    // that later connector only when the public hand already has saturated Supporter,
    // Energy, Prize-recovery, and Dragon-payload routes behind Active Regidrago V:
    // Setup procedure: https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
    // Tapu Lele-GX / Wonder Tag: https://api.pokemontcg.io/v2/cards/cel25c-60_A
    // Crispin: https://api.pokemontcg.io/v2/cards/sv7-133
    // Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
    // Mega Dragonite ex payload: https://api.pokemontcg.io/v2/cards/me2pt5-152
    // Regidrago V / VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-135 https://api.pokemontcg.io/v2/cards/swsh12-136
    // Route priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
    // Lock scenarios: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#lock-scenarios
    // Regression: https://github.com/FlareZ123/pokemon-sims/issues/671
    return active_is_regi_v() && scenario_.dci == DciProfile::StrictJit &&
           opening_route_unlocked && direct_supporter_and_recovery_graph &&
           manual_energy_route_held && dragon_payload_held;
  }

'''
          if 'should_setup_bench_redundant_tapu' not in text:
              if marker not in text:
                  raise SystemExit('opening Bench insertion point missing')
              text = text.replace(marker, helper + marker, 1)

          latias_tail = '''      remove_one(state_.hand, Card::LatiasEx);
      state_.bench.push_back(Pokemon{Card::LatiasEx, 0});
    }
  }
'''
          integrated_tail = '''      remove_one(state_.hand, Card::LatiasEx);
      state_.bench.push_back(Pokemon{Card::LatiasEx, 0});
    }
    if (bench_space() > 0 && hand_count(Card::TapuLeleGX) > 0 &&
        !in_play(Card::TapuLeleGX) && should_setup_bench_redundant_tapu()) {
      remove_one(state_.hand, Card::TapuLeleGX);
      state_.bench.push_back(Pokemon{Card::TapuLeleGX, 0});
    }
  }
'''
          if 'should_setup_bench_redundant_tapu())' not in text:
              if latias_tail not in text:
                  raise SystemExit('Latias integration point missing')
              text = text.replace(latias_tail, integrated_tail, 1)
          source.write_text(text)

          cmake = Path('CMakeLists.txt')
          text = cmake.read_text()
          target_marker = '''add_executable(regidrago_opening_dialga_payload_tests tests/opening_active_dialga_payload_tests.cpp)
target_compile_options(regidrago_opening_dialga_payload_tests PRIVATE -Wall -Wextra -Wpedantic -Wconversion -Wshadow)
'''
          target_add = target_marker + '''
add_executable(regidrago_opening_bench_tapu_tests tests/opening_bench_tapu_route_tests.cpp)
target_compile_options(regidrago_opening_bench_tapu_tests PRIVATE -Wall -Wextra -Wpedantic -Wconversion -Wshadow)
'''
          if 'regidrago_opening_bench_tapu_tests' not in text:
              if target_marker not in text:
                  raise SystemExit('CMake target insertion point missing')
              text = text.replace(target_marker, target_add, 1)
          test_marker = 'add_test(NAME regidrago_opening_dialga_payload COMMAND regidrago_opening_dialga_payload_tests)\n'
          if 'add_test(NAME regidrago_opening_bench_tapu ' not in text:
              if test_marker not in text:
                  raise SystemExit('CTest insertion point missing')
              text = text.replace(
                  test_marker,
                  test_marker + 'add_test(NAME regidrago_opening_bench_tapu COMMAND regidrago_opening_bench_tapu_tests)\n',
                  1,
              )
          cmake.write_text(text)
          PY
          g++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/opening_bench_tapu_route_tests.cpp -o opening-bench-tapu
          ./opening-bench-tapu
          g++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=address,undefined -fno-omit-frame-pointer tests/opening_bench_tapu_route_tests.cpp -o opening-bench-tapu-sanitized
          ASAN_OPTIONS=detect_leaks=1 ./opening-bench-tapu-sanitized
          rm .github/workflows/apply-671-rebase.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc CMakeLists.txt .github/workflows/apply-671-rebase.yml
          git commit -m "Integrate Tapu Bench policy after Latias merge (#671)"
          git push origin HEAD:fix/671-opening-bench-tapu
