name: Apply issue 1117 patch

on:
  push:
    branches: [bug/1117-held-burnet-before-steven-agent]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1117-held-burnet-before-steven-agent
          fetch-depth: 0
      - name: Apply validated production patch
        run: |
          git apply --check .github/agent-patches/issue-1117.patch
          git apply .github/agent-patches/issue-1117.patch
          rm .github/agent-patches/issue-1117.patch
          rm .github/workflows/apply-issue-1117.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix held Burnet priority over late Steven (#1117)"
          git push origin HEAD:bug/1117-held-burnet-before-steven-agent
