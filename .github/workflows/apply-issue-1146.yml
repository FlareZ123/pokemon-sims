name: Apply and validate issue 1146

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issue-1146-quick-ball-surplus-energy'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply source-bound fix and tests
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, zlib
          qb_path = Path('src/trace_engine_v2/part_009b1.inc')
          qb = qb_path.read_text()
          helper_anchor = '  bool play_quick_ball(const bool permit_payload) {\n'
          helper = '  std::optional<Card> quick_ball_final_surplus_energy_cost() const {\n    if (scenario_.dci != DciProfile::MatchupFlexJit || item_locked() ||\n        !state_.manual_energy_used || !need_active_vstar() || need_energy() ||\n        !benched_vstar_promotion_ready() || !state_.active ||\n        !is_basic(state_.active->card) || state_.retreat_used ||\n        bench_space() == 0 || !ability_available_for_pokemon(Card::LatiasEx) ||\n        in_play(Card::LatiasEx) || hand_count(Card::LatiasEx) > 0 ||\n        !might_be_unseen(Card::LatiasEx) ||\n        hand_count(Card::BrilliantBlender) == 0 || !need_payload() ||\n        !payload_might_be_in_deck()) {\n      return std::nullopt;\n    }\n\n    // Once the selected Benched Regidrago VSTAR already has GGF, the final held\n    // Basic Energy advances no remaining setup axis. After ordinary lower-DCI\n    // costs fail, Quick Ball may spend that observable surplus to search Latias ex;\n    // Skyliner promotes the VSTAR and held Brilliant Blender supplies the same-turn\n    // matchup-flex-JIT payload. Keep this fallback confined to that complete route:\n    // Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179\n    // Latias ex / Skyliner: https://api.pokemontcg.io/v2/cards/sv8-76\n    // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164\n    // Regidrago VSTAR / Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136\n    // Core Item, discard, Bench, Ability, and retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules\n    // Dynamic DCI and earliest route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities\n    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1146\n    if (grass_needed() == 0 && hand_count(Card::Grass) == 1) return Card::Grass;\n    if (fire_needed() == 0 && hand_count(Card::Fire) == 1) return Card::Fire;\n    return std::nullopt;\n  }\n\n'
          old = '    auto cost = choose_discard(can_pay_payload_cost, true, true, Card::QuickBall);\n'
          new = '    auto cost = choose_discard(can_pay_payload_cost, true, true, Card::QuickBall);\n    if (!cost && want_latias) {\n      cost = quick_ball_final_surplus_energy_cost();\n    }\n'
          if helper not in qb:
              qb = qb.replace(helper_anchor, helper + helper_anchor)
          if old in qb:
              qb = qb.replace(old, new, 1)
          elif new not in qb:
              raise SystemExit('Issue 1146 Quick Ball source block no longer matches main')
          qb_path.write_text(qb)

          replay_path = Path('src/trace_engine_v2/part_014c_latias_bench_override.inc')
          replay = replay_path.read_text()
          old_replay = '    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1147\n    return choose_discard(false, true, true, Card::QuickBall).has_value();\n'
          new_replay = '    // Confirmed replay bug: https://github.com/FlareZ123/pokemon-sims/issues/1147\n    // Route-conditioned surplus Energy fallback: https://github.com/FlareZ123/pokemon-sims/issues/1146\n    return choose_discard(false, true, true, Card::QuickBall).has_value() ||\n           quick_ball_final_surplus_energy_cost().has_value();\n'
          if old_replay in replay:
              replay = replay.replace(old_replay, new_replay, 1)
          elif new_replay not in replay:
              raise SystemExit('Issue 1146 late replay source block no longer matches main')
          replay_path.write_text(replay)

          Path('tests/issue_1146_quick_ball_surplus_energy_tests.cpp').write_bytes(
              zlib.decompress(base64.b64decode('')))
          PY
      - name: Build and validate focused behavior
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ctest --test-dir build -R 'issue_1032|issue_1093|issue_1145|issue_1146|issue_1147' --output-on-failure
          build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 122 --require-ready-by 3
      - name: Refresh source-bound evidence
        run: |
          python3 scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
      - name: Commit final issue 1146 tree
        run: |
          rm .github/workflows/apply-issue-1146.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_009b1.inc src/trace_engine_v2/part_014c_latias_bench_override.inc tests/issue_1146_quick_ball_surplus_energy_tests.cpp results docs/REPORT.md .github/workflows/apply-issue-1146.yml
          git commit -m "Fix Quick Ball surplus Energy route (#1146)"
          git push origin HEAD:${{ github.head_ref }}
