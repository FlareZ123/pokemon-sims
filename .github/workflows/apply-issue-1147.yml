name: Apply and validate issue 1147

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/issue-1147-late-supporter-item-replay'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply source-bound fix and tests
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, zlib
          path = Path('src/trace_engine_v2/part_014c_latias_bench_override.inc')
          text = path.read_text()
          anchor = '  bool complete_late_steven_vstar_vessel_continuation() {\n'
          helper = "  bool late_supporter_quick_ball_latias_completion_available() const {\n    if (!state_.supporter_used || state_.turn_ended || item_locked() ||\n        hand_count(Card::QuickBall) == 0 || !need_active_vstar() ||\n        need_energy() || !benched_vstar_promotion_ready() || state_.retreat_used ||\n        !state_.active || !is_basic(state_.active->card) || bench_space() == 0 ||\n        !ability_available_for_pokemon(Card::LatiasEx) || in_play(Card::LatiasEx) ||\n        hand_count(Card::LatiasEx) > 0 || !might_be_unseen(Card::LatiasEx)) {\n      return false;\n    }\n\n    const bool payload_axis_completable = !need_payload() ||\n        (hand_count(Card::BrilliantBlender) > 0 && payload_might_be_in_deck() &&\n         can_play_payload_this_turn());\n    if (!payload_axis_completable) return false;\n\n    // A late Arven or Wonder Tag Supporter may make Quick Ball newly live after the\n    // turn's previous Item fixed point. Replay Items only when Quick Ball already\n    // has a legal ordinary cost, Latias ex is searchable, Skyliner solves the final\n    // Active axis, and any remaining payload is covered by held Brilliant Blender:\n    // Arven: https://api.pokemontcg.io/v2/cards/sv1-166\n    // Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179\n    // Latias ex / Skyliner: https://api.pokemontcg.io/v2/cards/sv8-76\n    // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164\n    // Regidrago VSTAR / Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136\n    // Core Supporter, Item, discard, Bench, Ability, and retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules\n    // Earliest complete route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities\n    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1147\n    return choose_discard(false, true, true, Card::QuickBall).has_value();\n  }\n\n"
          old = '    if (!state_.supporter_used && setup_axis_missing()) choose_supporter();\n    if (use_legacy_star()) {\n'
          new = '    const bool late_supporter_was_unused = !state_.supporter_used;\n    if (!state_.supporter_used && setup_axis_missing()) choose_supporter();\n    if (late_supporter_was_unused &&\n        late_supporter_quick_ball_latias_completion_available()) {\n      play_items_until_stable(true);\n      play_basics_from_hand();\n    }\n    if (use_legacy_star()) {\n'
          if helper not in text:
              text = text.replace(anchor, helper + anchor)
          if old in text:
              text = text.replace(old, new)
          elif new not in text:
              raise SystemExit('Issue 1147 source block no longer matches main')
          path.write_text(text)
          Path('tests/issue_1147_late_supporter_item_replay_tests.cpp').write_bytes(
              zlib.decompress(base64.b64decode('')))
          PY
      - name: Build and validate focused behavior
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ctest --test-dir build -R 'issue_1145|issue_1147|issue_1032' --output-on-failure
          build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 344 --require-ready-by 2
      - name: Refresh source-bound evidence
        run: |
          python3 scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
      - name: Commit final issue 1147 tree
        run: |
          rm .github/workflows/apply-issue-1147.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_014c_latias_bench_override.inc tests/issue_1147_late_supporter_item_replay_tests.cpp results docs/REPORT.md .github/workflows/apply-issue-1147.yml
          git commit -m "Fix late Supporter Item replay (#1147)"
          git push origin HEAD:${{ github.head_ref }}
