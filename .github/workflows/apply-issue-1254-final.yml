name: Apply issue 1254 final patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-issue-1254-final
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1254-ultra-continuations-final
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply production and regression
        run: python scripts/apply_issue_1254_final.py
      - name: Build and run focused regressions
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1254_ultra_ball_appletun_tests
          ./build/regidrago_unified_tests issue_1254_ultra_ball_appletun_continuation_tests
      - name: Run three simulate-this audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1254-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1254-trace-2.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1254-trace-3.txt
      - name: Regenerate source-bound evidence
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Commit completed patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f results/*.lock results/.*.lock issue-1254-trace-*.txt
          git add src/trace_engine_v2/part_empty_deck_search_override.inc src/trace_engine_v2/part_012_override.inc src/trace_engine_v2/part_forretress_ex_combo.inc tests/issue_1254_ultra_ball_appletun_continuation_tests.cpp docs/REPORT.md docs/MULTI_DECK_REPORT.md results/baseline_manifest.json results/simulation_results.csv results/multi_deck_comparison.csv results/multi_deck_manifest.json
          git add -u .github/workflows/apply-issue-1254-final.yml scripts/apply_issue_1254_final.py
          git diff --cached --check
          git commit -m "Complete Appletun Ultra Ball continuation routes"
          git push origin HEAD:fix/issue-1254-ultra-continuations-final
