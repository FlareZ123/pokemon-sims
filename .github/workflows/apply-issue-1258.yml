name: Apply issue 1258 patch

on:
  push:
    branches: [fix/issue-1258-late-steven-appletun]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply source and regression patch
        run: python scripts/apply_issue_1258_patch.py
      - name: Commit branch patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Include Appletun in late Steven-Treasure bridge"
          git push origin HEAD:${GITHUB_REF_NAME}
