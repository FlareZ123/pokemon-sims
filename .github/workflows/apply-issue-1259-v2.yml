name: Apply issue 1259 current-main patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1259-gladion-appletun-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Merge current main
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
      - name: Preserve temporary branch files
        run: >-
          python -c "from pathlib import Path; p=Path('scripts/apply_issue_1259_v2_patch.py'); s=p.read_text(); old='    SCRIPT.unlink()\n    WORKFLOW.unlink()\n'; assert s.count(old)==1; p.write_text(s.replace(old, '', 1))"
      - name: Apply production and focused regressions
        run: python scripts/apply_issue_1259_v2_patch.py
      - name: Commit and push generated tree
        id: publish
        continue-on-error: true
        run: |
          set -o pipefail
          {
            git status --short
            git add -A
            git diff --cached --check
            git commit -m "Recover prized Appletun through Gladion"
            git push origin HEAD:fix/issue-1259-gladion-appletun-v2
          } 2>&1 | tee commit.log
      - name: Upload Git diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1259-git-log
          path: commit.log
      - name: Enforce successful publish
        if: steps.publish.outcome != 'success'
        run: exit 1
