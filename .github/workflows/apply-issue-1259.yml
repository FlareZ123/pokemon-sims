name: Apply issue 1259 patch

on:
  push:
    branches: [fix/issue-1259-gladion-appletun]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply source and regression patch
        run: python scripts/apply_issue_1259_patch.py
      - name: Commit branch patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Recover prized Appletun through Gladion"
          git push origin HEAD:${GITHUB_REF_NAME}
