name: Apply issue 1304 fix and refresh evidence

on:
  push:
    branches: [fix/issue-1304-t1-treasure-fss]

permissions:
  contents: write

concurrency:
  group: apply-issue-1304-fix
  cancel-in-progress: false

jobs:
  apply-and-refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1304-t1-treasure-fss
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source fix and CLI regression
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          Path('issue-1304-source.patch').write_bytes(base64.b64decode(''))
          cmake = Path('CMakeLists.txt')
          text = cmake.read_text(encoding='utf-8')
          marker = 'add_test(NAME regidrago_sim_matrix_smoke COMMAND regidrago_sim --trials 100 --seed 20260705 --out ${CMAKE_CURRENT_BINARY_DIR}/smoke_results.csv)'
          block = """# The source-bound Pineco seed must use T1 Mysterious Treasure, preserve
          # Star Alchemy, and reach strict-JIT readiness on T2:
          # https://api.pokemontcg.io/v2/cards/sm6-113
          # https://api.pokemontcg.io/v2/cards/sv3pt5-160
          # https://api.pokemontcg.io/v2/cards/swsh12-156
          # https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # https://api.pokemontcg.io/v2/cards/swsh11-136
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/1304
          add_test(NAME trace_issue_1304_t1_treasure_fss
            COMMAND regidrago_sim --simulate-this --deck regidrago-pineco
              --scenario strict-jit/go-first --seed 31415 --require-ready-by 2)

          """
          if 'trace_issue_1304_t1_treasure_fss' not in text:
              if marker not in text:
                  raise SystemExit('CMake insertion marker missing')
              cmake.write_text(text.replace(marker, block + marker, 1), encoding='utf-8')
          PY
          git apply --check issue-1304-source.patch
          git apply issue-1304-source.patch
          rm issue-1304-source.patch
          git diff --check
      - name: Build Release simulator and tests
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Run focused issue 1304 regression
        run: ./build/regidrago_unified_tests issue_1304_t1_treasure_fss_tests
      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Exact corrected route: https://github.com/FlareZ123/pokemon-sims/issues/1304
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-first --seed 31415 --require-ready-by 2 | tee issue-1304-trace-1.txt
          grep -q "T1 | DISCARD.*Erika's Invitation" issue-1304-trace-1.txt
          grep -q "T1 | HOLD VSTAR POWER" issue-1304-trace-1.txt
          grep -q "T2 | READY" issue-1304-trace-1.txt
          # Independent shell route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1304-trace-2.txt
          grep -q "T2 | READY" issue-1304-trace-2.txt
          # Independent Pineco route: https://api.pokemontcg.io/v2/cards/sv6-163
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1304-trace-3.txt
          grep -q "T2 | READY" issue-1304-trace-3.txt
      - name: Regenerate source-bound matrices and reports
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Record tested source
        run: git rev-parse HEAD > issue-1304-tested-head.txt
      - name: Upload traces and T2-T3 matrices
        uses: actions/upload-artifact@v4
        with:
          name: issue-1304-validation
          path: |
            issue-1304-trace-*.txt
            issue-1304-tested-head.txt
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            docs/REPORT.md
            docs/MULTI_DECK_REPORT.md
          if-no-files-found: error
      - name: Commit fix and refreshed evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/apply-issue-1304.yml
          git add src tests CMakeLists.txt results docs
          git add -u .github/workflows/apply-issue-1304.yml
          git diff --cached --check
          git commit -m 'Fix Pineco T1 Treasure-FSS route'
          git push origin HEAD:fix/issue-1304-t1-treasure-fss
