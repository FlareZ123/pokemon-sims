name: Apply issue 1329 patch

on:
  push:
    branches:
      - fix/issue-1329-exploding-energy-preservation

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct verified files
        env:
          PROD_GZ_B64: 
          TEST_GZ_B64: 
          
        run: |
          python - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          files = {
              "src/trace_engine_v2/part_forretress_ex_combo.inc": "PROD_GZ_B64",
              "tests/forretress_ex_combo_tests.cpp": "TEST_GZ_B64",
          }
          for path, env_name in files.items():
              data = gzip.decompress(base64.b64decode(os.environ[env_name]))
              Path(path).write_bytes(data)
          PY
          rm .github/workflows/apply-issue-1329.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_forretress_ex_combo.inc tests/forretress_ex_combo_tests.cpp .github/workflows/apply-issue-1329.yml
          git commit -m "Preserve surplus Exploding Energy Grass (#1329)"
          git push origin "HEAD:${GITHUB_REF_NAME}"
