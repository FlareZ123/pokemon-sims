name: Apply issue 414 fixture

on:
  pull_request:
    paths:
      - '.github/patches/issue-414-fixture.patch'
      - '.github/workflows/apply-issue-414-fixture.yml'
      - 'tests/roseanne_energy_recovery_tests.cpp'

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and push fixture correction
        shell: bash
        run: |
          if [ ! -f .github/patches/issue-414-fixture.patch ]; then
            exit 0
          fi
          if git apply --reverse --check .github/patches/issue-414-fixture.patch; then
            exit 0
          fi
          git apply --check .github/patches/issue-414-fixture.patch
          git apply .github/patches/issue-414-fixture.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/roseanne_energy_recovery_tests.cpp
          git commit -m "Correct Roseanne strict-JIT regression fixture (#414)"
          git push origin HEAD:${{ github.head_ref }}
