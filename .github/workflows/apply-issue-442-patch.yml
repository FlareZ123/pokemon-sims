name: Apply issue 442 patch

on:
  pull_request:
    paths:
      - '.github/patches/issue-442.patch'
      - '.github/workflows/apply-issue-442-patch.yml'
      - 'src/trace_engine_v2/part_empty_deck_search_override.inc'
      - 'tests/evolution_incense_payload_tests.cpp'
      - 'tests/legacy_star_evolution_incense_payload_tests.cpp'

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and push patch
        shell: bash
        run: |
          if [ ! -f .github/patches/issue-442.patch ]; then
            exit 0
          fi
          if git apply --reverse --check .github/patches/issue-442.patch; then
            exit 0
          fi
          git apply --check .github/patches/issue-442.patch
          git apply .github/patches/issue-442.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_empty_deck_search_override.inc tests/evolution_incense_payload_tests.cpp tests/legacy_star_evolution_incense_payload_tests.cpp
          git commit -m "Preserve Incense before dead final-card payload outlet (#442)"
          git push origin HEAD:${{ github.head_ref }}
