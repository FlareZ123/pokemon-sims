name: Apply issue 511 patch

on:
  pull_request:
    paths:
      - '.github/patches/issue-511.patch'
      - '.github/workflows/apply-issue-511-patch.yml'
      - 'src/trace_engine_v2/part_tate_blender_tate_override.inc'
      - 'tests/tate_switch_blender_payload_tests.cpp'

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply and push patch
        shell: bash
        run: |
          if [ ! -f .github/patches/issue-511.patch ]; then
            exit 0
          fi
          if git apply --reverse --check .github/patches/issue-511.patch; then
            exit 0
          fi
          git apply --check .github/patches/issue-511.patch
          git apply .github/patches/issue-511.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_tate_blender_tate_override.inc tests/tate_switch_blender_payload_tests.cpp
          git commit -m "Fix Tate empty-deck held-payload routing (#511)"
          git push origin HEAD:${{ github.head_ref }}
