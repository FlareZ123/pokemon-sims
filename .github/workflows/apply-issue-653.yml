name: Apply issue 653 current-main fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-issue-653.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply focused source and regression changes
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          def replace_once(path_text: str, old: str, new: str) -> None:
              path = Path(path_text)
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"expected exactly one replacement target in {path_text}")
              updated = text.replace(old, new, 1)
              temporary = path.with_name(path.name + ".tmp")
              temporary.write_text(updated, encoding="utf-8")
              os.replace(temporary, path)

          source_old = '''    const bool held_turo_fss_recovery_graph =
              hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;
          const bool dialga_has_route_preservation_value =
              hand_count(Card::DialgaGX) == 1 &&
              (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph);

          // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
          // preserve it when Crispin already covers the Supporter connector and the public
          // hand either has no other payload or has Turo plus Forest Seal Stone redundancy:
          // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
          // https://api.pokemontcg.io/v2/cards/sm5-100
          // https://api.pokemontcg.io/v2/cards/swsh12-136
          // https://api.pokemontcg.io/v2/cards/sv7-133
          // https://api.pokemontcg.io/v2/cards/swsh12-156
          // https://api.pokemontcg.io/v2/cards/sv4-171
          // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          // https://github.com/FlareZ123/pokemon-sims/issues/653
'''
          source_new = '''    const bool held_turo_fss_recovery_graph =
              hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;
          const bool held_redundant_one_discard_regi_graph =
              !item_locked() && might_be_unseen(Card::RegidragoV) &&
              hand_count(Card::QuickBall) > 0 && hand_count(Card::MysteriousTreasure) > 0 &&
              payloads_in_hand > 1 && hand_count(Card::Crispin) == 1 &&
              hand_count(Card::BrilliantBlender) == 0;
          const bool dialga_has_route_preservation_value =
              hand_count(Card::DialgaGX) == 1 &&
              (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph ||
               held_redundant_one_discard_regi_graph);

          // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
          // preserve it when Crispin already covers the Supporter connector and the public
          // hand has either Tapu recovery or the approved redundant one-discard Regidrago
          // graph. Requiring both search Items and no held Blender avoids sacrificing
          // Wonder Tag when a stronger direct payload outlet already solves that axis:
          // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
          // https://api.pokemontcg.io/v2/cards/sm5-100
          // https://api.pokemontcg.io/v2/cards/swsh12-136
          // https://api.pokemontcg.io/v2/cards/sv7-133
          // https://api.pokemontcg.io/v2/cards/swsh12-156
          // https://api.pokemontcg.io/v2/cards/sv4-171
          // https://api.pokemontcg.io/v2/cards/swsh1-179
          // https://api.pokemontcg.io/v2/cards/sm6-113
          // https://api.pokemontcg.io/v2/cards/sv8-164
          // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          // https://github.com/FlareZ123/pokemon-sims/issues/653
'''
          replace_once("src/trace_engine_v2/part_005.inc", source_old, source_new)

          test_insert_at = '''}  // namespace

int main() {
'''
          test_functions = r'''void test_redundant_one_discard_graph_preserves_dialga() {
            const sim::Scenario scenario{"opening-dialga-redundant-items", sim::DciProfile::StrictJit,
                                         sim::LockMode::None, false, 4};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{65301};
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                          sim::Card::Crispin, sim::Card::MysteriousTreasure,
                          sim::Card::QuickBall, sim::Card::MegaDragonite,
                          sim::Card::ChaoticSwell};
            sim::EngineTestAccess::set_state(engine, std::move(state));

            // The two one-discard Items provide redundant public Regidrago access while
            // Mega Dragonite ex supplies a second strict-JIT payload. With one Crispin
            // and no direct Blender outlet, the approved route preserves Dialga-GX:
            // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
            // https://api.pokemontcg.io/v2/cards/sm5-100
            // https://api.pokemontcg.io/v2/cards/swsh1-179
            // https://api.pokemontcg.io/v2/cards/sm6-113
            // https://api.pokemontcg.io/v2/cards/me2pt5-152
            // https://api.pokemontcg.io/v2/cards/sv7-133
            // https://github.com/FlareZ123/pokemon-sims/issues/653
            sim::EngineTestAccess::choose_opening_active(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
                !contains(after.hand, sim::Card::DialgaGX) ||
                !contains(after.hand, sim::Card::MegaDragonite)) {
              throw std::runtime_error("The approved redundant Item graph should preserve Dialga-GX.");
            }
          }

          void test_full_item_lock_rejects_redundant_item_graph() {
            const sim::Scenario scenario{"opening-dialga-redundant-items-locked", sim::DciProfile::StrictJit,
                                         sim::LockMode::FullItem, false, 4};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{65302};
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                          sim::Card::Crispin, sim::Card::MysteriousTreasure,
                          sim::Card::QuickBall, sim::Card::MegaDragonite,
                          sim::Card::ChaoticSwell};
            sim::EngineTestAccess::set_state(engine, std::move(state));

            // Full Item lock removes both public search routes, so Wonder Tag remains
            // the stronger live connector:
            // https://api.pokemontcg.io/v2/cards/swsh1-179
            // https://api.pokemontcg.io/v2/cards/sm6-113
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment
            // https://github.com/FlareZ123/pokemon-sims/issues/653
            sim::EngineTestAccess::choose_opening_active(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            if (!after.active || after.active->card != sim::Card::DialgaGX ||
                !contains(after.hand, sim::Card::TapuLeleGX)) {
              throw std::runtime_error("Full Item lock should preserve Wonder Tag.");
            }
          }

          void test_blender_duplicate_crispin_preserves_wonder_tag() {
            const sim::Scenario scenario{"opening-dialga-blender-control", sim::DciProfile::StrictJit,
                                         sim::LockMode::None, false, 4};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{65303};
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                          sim::Card::Crispin, sim::Card::QuickBall,
                          sim::Card::MegaDragonite, sim::Card::BrilliantBlender,
                          sim::Card::Crispin};
            sim::EngineTestAccess::set_state(engine, std::move(state));

            // Brilliant Blender already supplies direct payload access and duplicate
            // Crispin saturates the held Energy-Supporter route. Wonder Tag therefore
            // retains greater marginal value than preserving Dialga-GX in hand:
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://api.pokemontcg.io/v2/cards/cel25c-60_A
            // https://api.pokemontcg.io/v2/cards/sv7-133
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // https://github.com/FlareZ123/pokemon-sims/issues/653
            sim::EngineTestAccess::choose_opening_active(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            if (!after.active || after.active->card != sim::Card::DialgaGX ||
                !contains(after.hand, sim::Card::TapuLeleGX)) {
              throw std::runtime_error("Blender plus duplicate Crispin should preserve Wonder Tag.");
            }
          }

          }  // namespace

          int main() {
'''
          replace_once("tests/opening_active_dialga_payload_tests.cpp", test_insert_at, test_functions)

          main_old = '''  test_multiple_payloads_without_recovery_graph_keep_legacy_order();
            return 0;
          }
'''
          main_new = '''  test_multiple_payloads_without_recovery_graph_keep_legacy_order();
            test_redundant_one_discard_graph_preserves_dialga();
            test_full_item_lock_rejects_redundant_item_graph();
            test_blender_duplicate_crispin_preserves_wonder_tag();
            return 0;
          }
'''
          replace_once("tests/opening_active_dialga_payload_tests.cpp", main_old, main_new)
          PY
          git rm .github/workflows/apply-issue-653.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc tests/opening_active_dialga_payload_tests.cpp
          git commit -m "Fix route-aware Dialga opening preservation (#653)"
          git push origin HEAD:${{ github.head_ref }}
