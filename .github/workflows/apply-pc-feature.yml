name: Apply Pokémon Communication feature cleanup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-pc-feature.yml
      - .github/pc-feature-trigger

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/701-pokemon-communication
          fetch-depth: 0

      - name: Apply verified hardened source bundle to feature branch
        shell: bash
        run: |
          set -euo pipefail
          echo "76563d3331ba4f6c9ad5fcc1de511046b8d06bddf568e21d69f9da3ed16f25c3  .github/pc3-payload/000" | sha256sum --check
          echo "6194cb41c46ffab18474b3849e5ac947f5f92802368389cf2e811bfbed1035b8  .github/pc3-payload/001" | sha256sum --check
          echo "47bea0a6fec406057b18305cb7ec356e8133459990e196eec76ad54aa2d46707  .github/pc3-payload/002" | sha256sum --check
          echo "89dc64ea72142694f748a747dd258356e4d95734adb5f7f71cf4dc30bf3033ee  .github/pc3-payload/003" | sha256sum --check
          echo "f4cbe875e53287b62a0744ad058e10c85041e6d673fc4de8d53e1c31be1d99c0  .github/pc3-payload/004" | sha256sum --check
          echo "60649fa1bf140fc03b0edaf568bf4f852b22c42002d5f6a4c59ddf91b040f047  .github/pc3-payload/005" | sha256sum --check
          echo "3e95cce488f910753a7ca2ce0db44d1bd83e57cf5d3a2b229f870d26cd16c056  .github/pc3-payload/006" | sha256sum --check
          echo "430637ccb7f95cbbfdb9d8ed70f2247df22a881671f47faa3f3a1ccae056ecb5  .github/pc3-payload/007" | sha256sum --check
          cat .github/pc3-payload/* | tr -d '\n' > /tmp/pokemon-communication-followup.b64
          base64 --decode /tmp/pokemon-communication-followup.b64 > /tmp/pokemon-communication-followup.tar.gz
          echo "e3bc38b3285ba7ac73106fb85b70d783b8e6c41d5d41d5208777b77cbd9d3d43  /tmp/pokemon-communication-followup.tar.gz" | sha256sum --check
          tar -xzf /tmp/pokemon-communication-followup.tar.gz -C "$GITHUB_WORKSPACE"
          rm -rf .github/pc2-payload .github/pc3-payload
          rm -f .github/workflows/apply-pokemon-communication-followup.yml
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Pokémon Communication planning (#701)"
          git push origin HEAD:feature/701-pokemon-communication
