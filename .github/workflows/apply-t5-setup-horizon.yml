name: Apply T5 Setup Horizon

on:
  pull_request:
    paths:
      - '.github/workflows/apply-t5-setup-horizon.yml'

permissions:
  contents: write

concurrency:
  group: apply-t5-setup-horizon-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.head_ref == 'feat/t5-setup-failure-horizon'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply T5 horizon and failure contract
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:80]!r}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          def replace_count(path: str, old: str, new: str, expected: int) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{path}: expected {expected} matches, found {count}: {old!r}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          def replace_between(path: str, start: str, end: str, replacement: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              start_index = text.index(start)
              end_index = text.index(end, start_index)
              file.write_text(text[:start_index] + replacement + text[end_index:], encoding='utf-8')

          replace_once(
              'src/trace_engine_v2/part_002.inc',
              '  int max_turn{4};',
              '  int max_turn{5};',
          )
          replace_once(
              'src/trace_engine_v2/part_002.inc',
              '''struct TrialOutcome {
            bool ready_by_2{false};
            bool ready_by_3{false};
            bool ready_by_4{false};
            int first_ready_turn{0};'''.replace('          ', ''),
              '''struct TrialOutcome {
            bool ready_by_2{false};
            bool ready_by_3{false};
            bool ready_by_4{false};
            bool ready_by_5{false};
            int first_ready_turn{0};
            bool setup_failed{false};'''.replace('          ', ''),
          )
          replace_once(
              'src/trace_engine_v2/part_002.inc',
              '''struct Aggregate {
            std::uint64_t trials{0};
            std::uint64_t by2{0};
            std::uint64_t by3{0};
            std::uint64_t by4{0};
            std::uint64_t started_regi{0};'''.replace('          ', ''),
              '''struct Aggregate {
            std::uint64_t trials{0};
            std::uint64_t by2{0};
            std::uint64_t by3{0};
            std::uint64_t by4{0};
            std::uint64_t by5{0};
            std::uint64_t ready_on5{0};
            std::uint64_t setup_failures{0};
            std::uint64_t started_regi{0};'''.replace('          ', ''),
          )

          replace_once(
              'src/trace_engine_v2/part_003.inc',
              '''      resolve_powerglass_end_turn();
            }
            return outcome_;
          }

          const State& state() const { return state_; }'''.replace('        ', ''),
              '''      resolve_powerglass_end_turn();
            }
            if (scenario_.max_turn >= 5) {
              outcome_.setup_failed = !outcome_.ready_by_4;
              if (outcome_.setup_failed) {
                const std::string detail = outcome_.first_ready_turn == 5
                    ? "First reached readiness on T5. T5 is diagnostic, so the game remains a setup loss."
                    : "Did not reach readiness by the end of T4. The game is classified as a setup loss.";
                trace("SETUP FAILURE", "P-T5-FAIL-01", detail);
              }
            }
            return outcome_;
          }

          const State& state() const { return state_; }'''.replace('        ', ''),
          )

          replace_once(
              'src/trace_engine_v2/part_014c.inc',
              '    if (state_.turn <= 4) outcome_.ready_by_4 = true;',
              '    if (state_.turn <= 4) outcome_.ready_by_4 = true;\n    if (state_.turn <= 5) outcome_.ready_by_5 = true;',
          )
          replace_count(
              'src/trace_engine_v2/part_014c.inc',
              'first, 4});',
              'first, 5});',
              7,
          )

          replace_once(
              'src/trace_engine_v2/part_015.inc',
              '''    aggregate.by2 += outcome.ready_by_2 ? 1U : 0U;
            aggregate.by3 += outcome.ready_by_3 ? 1U : 0U;
            aggregate.by4 += outcome.ready_by_4 ? 1U : 0U;
            aggregate.started_regi += outcome.started_regi ? 1U : 0U;'''.replace('          ', ''),
              '''    aggregate.by2 += outcome.ready_by_2 ? 1U : 0U;
            aggregate.by3 += outcome.ready_by_3 ? 1U : 0U;
            aggregate.by4 += outcome.ready_by_4 ? 1U : 0U;
            aggregate.by5 += outcome.ready_by_5 ? 1U : 0U;
            aggregate.ready_on5 += outcome.first_ready_turn == 5 ? 1U : 0U;
            aggregate.setup_failures += outcome.setup_failed ? 1U : 0U;
            aggregate.started_regi += outcome.started_regi ? 1U : 0U;'''.replace('          ', ''),
          )
          replace_once(
              'src/trace_engine_v2/part_015.inc',
              '''    // ready_by_t3 is cumulative and must include every ready_by_t2 trial.
            if (aggregate.by3 < aggregate.by2) return false;
            if (pct(aggregate.by3, aggregate.trials) < floor.minimum_ready_by_t3_pct) return false;'''.replace('          ', ''),
              '''    // Readiness columns are cumulative. T5 is diagnostic; setup success still ends at T4.
            if (aggregate.by3 < aggregate.by2 || aggregate.by4 < aggregate.by3 ||
                aggregate.by5 < aggregate.by4) return false;
            if (aggregate.ready_on5 != aggregate.by5 - aggregate.by4) return false;
            if (aggregate.setup_failures != aggregate.trials - aggregate.by4) return false;
            if (pct(aggregate.by3, aggregate.trials) < floor.minimum_ready_by_t3_pct) return false;'''.replace('          ', ''),
          )

          replace_once(
              'src/trace_engine_v2/part_016.inc',
              '''  // Trace scenarios model readiness only through turn 4. A deadline must select one
            // of those positive modeled turns instead of becoming a sentinel that disables
            // the later check:'''.replace('          ', ''),
              '''  // Trace scenarios model unresolved games through turn 5. A deadline must select one
            // of those positive modeled turns instead of becoming a sentinel that disables
            // the later check:'''.replace('          ', ''),
          )
          replace_once('src/trace_engine_v2/part_016.inc', '  if (!parsed || *parsed > 4) return std::nullopt;', '  if (!parsed || *parsed > 5) return std::nullopt;')
          replace_once('src/trace_engine_v2/part_016.inc', '--require-ready-by must be an integer from 1 through 4', '--require-ready-by must be an integer from 1 through 5')
          replace_once(
              'src/trace_engine_v2/part_016.inc',
              '''    const auto turn_one = parse_ready_deadline("1");
            const auto turn_four = parse_ready_deadline("4");
            const bool deadline_parser_ok = turn_one && *turn_one == 1 &&
                turn_four && *turn_four == 4 && !parse_ready_deadline("0") &&
                !parse_ready_deadline("-1") && !parse_ready_deadline("+1") &&
                !parse_ready_deadline("5") && !parse_ready_deadline("") &&'''.replace('          ', ''),
              '''    const auto turn_one = parse_ready_deadline("1");
            const auto turn_five = parse_ready_deadline("5");
            const bool deadline_parser_ok = turn_one && *turn_one == 1 &&
                turn_five && *turn_five == 5 && !parse_ready_deadline("0") &&
                !parse_ready_deadline("-1") && !parse_ready_deadline("+1") &&
                !parse_ready_deadline("6") && !parse_ready_deadline("") &&'''.replace('          ', ''),
          )
          replace_once(
              'src/trace_engine_v2/part_016.inc',
              '''          std::cout << "\\nSeed: " << candidate_seed << " | first-ready turn: " << (outcome.first_ready_turn == 0 ? std::string("not ready through T4") : std::to_string(outcome.first_ready_turn)) << '\\n';''',
              '''          const std::string ready_summary = outcome.first_ready_turn == 0
              ? "not ready through T5"
              : std::to_string(outcome.first_ready_turn);
          const std::string setup_result = outcome.setup_failed ? "failure" : "success";
          std::cout << "\\nSeed: " << candidate_seed << " | first-ready turn: "
                    << ready_summary << " | setup result: " << setup_result << '\\n';''',
          )
          replace_once(
              'src/trace_engine_v2/part_016.inc',
              '''    csv << "scenario,trials,ready_by_t2_pct,ready_by_t2_se_pp,ready_by_t3_pct,ready_by_t3_se_pp,ready_by_t4_pct,ready_by_t4_se_pp,started_regi_pct,fss_used_pct,legacy_star_used_pct,steven_used_pct,blender_used_pct,mean_mulligans\\n";
            const std::vector<sim::Scenario> scenarios = sim::all_scenarios();
            for (std::size_t index = 0; index < scenarios.size(); ++index) {
              const sim::Scenario& scenario = scenarios[index];
              const sim::Aggregate a = sim::simulate(scenario, deck, trials, seed + 104729ULL * index);
              csv << '\"' << scenario.label << "\"," << a.trials << ',' << sim::pct(a.by2, a.trials) << ',' << sim::standard_error_pp(a.by2, a.trials) << ','
                  << sim::pct(a.by3, a.trials) << ',' << sim::standard_error_pp(a.by3, a.trials) << ',' << sim::pct(a.by4, a.trials) << ','
                  << sim::standard_error_pp(a.by4, a.trials) << ',' << sim::pct(a.started_regi, a.trials) << ',' << sim::pct(a.fss, a.trials) << ','
                  << sim::pct(a.legacy, a.trials) << ',' << sim::pct(a.steven, a.trials) << ',' << sim::pct(a.blender, a.trials) << ','
                  << (a.total_mulligans / static_cast<double>(a.trials)) << '\\n';
            }'''.replace('          ', ''),
              '''    csv << "scenario,trials,ready_by_t2_pct,ready_by_t2_se_pp,ready_by_t3_pct,ready_by_t3_se_pp,ready_by_t4_pct,ready_by_t4_se_pp,ready_by_t5_pct,ready_by_t5_se_pp,ready_on_t5_pct,ready_on_t5_se_pp,setup_failure_pct,setup_failure_se_pp,started_regi_pct,fss_used_pct,legacy_star_used_pct,steven_used_pct,blender_used_pct,mean_mulligans\\n";
            const std::vector<sim::Scenario> scenarios = sim::all_scenarios();
            for (std::size_t index = 0; index < scenarios.size(); ++index) {
              const sim::Scenario& scenario = scenarios[index];
              const sim::Aggregate a = sim::simulate(scenario, deck, trials, seed + 104729ULL * index);
              csv << '\"' << scenario.label << "\"," << a.trials << ',' << sim::pct(a.by2, a.trials) << ',' << sim::standard_error_pp(a.by2, a.trials) << ','
                  << sim::pct(a.by3, a.trials) << ',' << sim::standard_error_pp(a.by3, a.trials) << ',' << sim::pct(a.by4, a.trials) << ','
                  << sim::standard_error_pp(a.by4, a.trials) << ',' << sim::pct(a.by5, a.trials) << ',' << sim::standard_error_pp(a.by5, a.trials) << ','
                  << sim::pct(a.ready_on5, a.trials) << ',' << sim::standard_error_pp(a.ready_on5, a.trials) << ','
                  << sim::pct(a.setup_failures, a.trials) << ',' << sim::standard_error_pp(a.setup_failures, a.trials) << ','
                  << sim::pct(a.started_regi, a.trials) << ',' << sim::pct(a.fss, a.trials) << ','
                  << sim::pct(a.legacy, a.trials) << ',' << sim::pct(a.steven, a.trials) << ',' << sim::pct(a.blender, a.trials) << ','
                  << (a.total_mulligans / static_cast<double>(a.trials)) << '\\n';
            }'''.replace('          ', ''),
          )

          report_function = '''def report_markdown(rows: list[dict[str, str]], fieldnames: list[str], manifest: dict[str, object]) -> str:
              scenario_column = "scenario" if "scenario" in fieldnames else fieldnames[0]
              t2_column = percent_column(fieldnames, 2)
              t3_column = percent_column(fieldnames, 3)
              t4_column = percent_column(fieldnames, 4)
              t5_column = percent_column(fieldnames, 5)
              ready_on_t5_column = "ready_on_t5_pct"
              failure_column = "setup_failure_pct"
              for required in (ready_on_t5_column, failure_column):
                  if required not in fieldnames:
                      raise KeyError(f"Missing T5 failure column {required}: {fieldnames}")

              baseline = []
              locks = []
              for row in rows:
                  scenario = row[scenario_column]
                  target = locks if "lock" in scenario else baseline
                  target.append(
                      (
                          SCENARIO_LABELS.get(scenario, scenario),
                          row[t2_column],
                          row[t3_column],
                          row[t4_column],
                          row[t5_column],
                          row[ready_on_t5_column],
                          row[failure_column],
                      )
                  )

              def table(entries: list[tuple[str, str, str, str, str, str, str]]) -> str:
                  lines = [
                      "| Scenario | T2 | T3 | T4 success | T5 ready | T5-only recovery (still loss) | Setup failure |",
                      "|---|---:|---:|---:|---:|---:|---:|",
                  ]
                  for label, t2, t3, t4, t5, on5, failure in entries:
                      lines.append(
                          f"| {label} | {t2}% | {t3}% | {t4}% | {t5}% | {on5}% | {failure}% |"
                      )
                  return "\\n".join(lines)

              return f"""# Regidrago VSTAR Setup Report: T5 Diagnostic Horizon

          ## Status

          This report is generated from the executable after removing the unsupported second shuffle between opening Active/Bench placement and Prize placement. The setup procedure source is https://www.pokemon.com/us/pokemon-tcg/rules. The exact generated trace manifest is [`../results/baseline_manifest.json`](../results/baseline_manifest.json), and the raw matrix is [`../results/simulation_results.csv`](../results/simulation_results.csv).

          ## Ready-state and failure definition

          The simulator counts a ready state only when Regidrago VSTAR is Active, has at least GGF attached, and has a modeled Dragon payload in discard. Strict and matchup-flex JIT require that payload to have entered discard in the ready turn. No-discard-control permits prior-turn payload banking.

          Standard scenarios play unresolved games through turn 5. Readiness by the end of T4 is the setup-success deadline. Any game that needs T5 is classified as a setup loss, even when it first becomes ready during T5. The T5 columns are diagnostic late-recovery measurements and do not reverse that failure classification.

          ## {manifest['trials']:,}-trial baseline

          Seed: `{manifest['matrix_seed']}`.

          {table(baseline)}

          ## Lock stress tests

          {table(locks)}

          ## Interpretation boundary

          Setup failure is a policy benchmark, not a match-loss percentage. These estimates do not model opponent damage, Knock Outs, Prize taking, hand disruption, gust, stadium sequencing, or full Expanded legality.
          """

          '''.replace('          ', '')
          replace_between(
              'scripts/update_setup_docs.py',
              'def report_markdown(',
              'def trace_audit_markdown',
              report_function,
          )

          replace_once(
              'README.md',
              '''## Scope
          '''.replace('          ', ''),
              '''## T5 horizon and setup-loss rule

          Standard scenarios stop early when they become ready through T4. Games still unresolved after T4 continue through T5 for diagnostic recovery data. Reaching T5 is classified as a setup loss even when the deck first becomes ready during that turn. Aggregate CSV output separates cumulative `ready_by_t5_pct`, T5-only `ready_on_t5_pct`, and the benchmark `setup_failure_pct`.

          ## Scope
          '''.replace('          ', ''),
          )
          replace_once(
              'docs/MODEL_ASSUMPTIONS.md',
              '''## Fully modeled parts
          '''.replace('          ', ''),
              '''## Turn horizon and failure classification

          Every standard aggregate scenario has a five-turn execution horizon. The benchmark success deadline remains the end of T4. A game that has not reached readiness by then is classified as a setup loss. The engine still plays T5 so the report can distinguish a late T5 recovery from a game that remains unresolved after T5. A T5 recovery remains inside `setup_failure_pct`; it is diagnostic rather than a successful setup.

          This classification is a setup-quality policy threshold. It is not a Pokémon TCG rules loss unless a separate game rule, such as failure to draw at the start of a turn, causes an actual loss.

          ## Fully modeled parts
          '''.replace('          ', ''),
          )
          replace_once(
              'docs/RULES_TRACEABILITY.md',
              '''| `P-JIT-01` | `strict_payload_timing`, `payload_ready`, `can_play_payload_this_turn` | Strict and matchup-flex profiles require a payload to enter discard in the turn that produces the ready state. No-discard-control permits earlier banking. |
          '''.replace('          ', ''),
              '''| `P-JIT-01` | `strict_payload_timing`, `payload_ready`, `can_play_payload_this_turn` | Strict and matchup-flex profiles require a payload to enter discard in the turn that produces the ready state. No-discard-control permits earlier banking. |
          | `P-T5-FAIL-01` | `Engine::run`, aggregate result writer | Readiness through T4 is setup success. An unresolved game continues through T5 for diagnosis, but any game that needs T5 remains classified as a setup loss, including a first-ready result on T5. |
          '''.replace('          ', ''),
          )

          Path('results/README.md').write_text(
              '''# Reproducible results and trace artifacts

          `simulation_results.csv` is the current 100,000-trial T5 diagnostic baseline produced with seed `20260705`. Readiness through T4 is setup success. `ready_by_t5_pct` and `ready_on_t5_pct` describe late recovery, while `setup_failure_pct` counts every game that was not ready by the end of T4, including games that recover during T5.

          `traces/` contains deterministic `--simulate-this` transcripts used for manual review. Each state-changing line includes the rule IDs documented in [`../docs/RULES_TRACEABILITY.md`](../docs/RULES_TRACEABILITY.md).

          The previous `variant_results.csv` screen was removed because it was produced before the trace-policy rewrite. It must not be reused until variants are regenerated by this engine.

          The C++ writer uses a destination lock and atomic replacement. CTest covers the trace matrix, core fixtures, Tier Two policy fixtures, and the aggregate smoke run.
          '''.replace('          ', ''),
              encoding='utf-8',
          )
          PY

      - name: Build simulator
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Regenerate T5 baseline and documentation
        run: |
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out results/simulation_results.csv
          python3 scripts/update_setup_docs.py --repo-root .

      - name: Validate engine and documentation
        run: |
          ./build/regidrago_sim --self-test
          ctest --test-dir build --output-on-failure
          python3 tests/setup_report_contract_tests.py
          git diff --check

      - name: Commit validated change
        run: |
          rm .github/workflows/apply-t5-setup-horizon.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Simulate T5 as diagnostic setup failure'
          git push origin HEAD:${{ github.head_ref }}
