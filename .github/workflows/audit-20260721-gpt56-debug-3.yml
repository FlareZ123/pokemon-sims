name: Audit current-main perfect-play traces

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Regidrago VSTAR must be Active with GGF and a Dragon payload in discard;
          # strict JIT additionally requires that payload to enter discard on the ready turn:
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#strict-jit-definition
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee audit-trace-1.txt
          grep -q "T3 | READY" audit-trace-1.txt

          # Matchup-flex may establish a legal payload earlier, while all public-information,
          # turn-order, attachment, Supporter, Ability, evolution, and Bench constraints remain binding:
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee audit-trace-2.txt
          grep -q "T2 | READY" audit-trace-2.txt

          # The registered Pineco recipe uses Secret Box, Pineco, Forretress ex, Dawn,
          # Forest of Vitality, Tapu Lele-GX, and Appletun under the same legal action limits:
          # https://api.pokemontcg.io/v2/cards/sv6-163
          # https://api.pokemontcg.io/v2/cards/sv4pt5-1
          # https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # https://api.pokemontcg.io/v2/cards/me2-87
          # https://api.pokemontcg.io/v2/cards/me1-117
          # https://api.pokemontcg.io/v2/cards/cel25c-60_A
          # https://api.pokemontcg.io/v2/cards/sv8-140
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee audit-trace-3.txt
          grep -q "T2 | READY" audit-trace-3.txt
      - name: Generate canonical T2 and T3 matrices
        run: |
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out audit-shell-matrix.csv
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260705 --out audit-all-decks-matrix.csv
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Record tested source
        run: git rev-parse HEAD | tee tested-head.txt
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-20260721-gpt56-debug-3
          path: |
            audit-trace-*.txt
            audit-shell-matrix.csv
            audit-all-decks-matrix.csv
            tested-head.txt
            build/Testing
          if-no-files-found: error
