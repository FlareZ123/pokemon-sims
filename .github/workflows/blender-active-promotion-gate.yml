name: Blender Active-Promotion Gate

on:
  pull_request:
    branches: [main]

jobs:
  validate-blender-active-promotion-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Run focused Release regression
        # Issue, card text, and policy evidence: https://github.com/FlareZ123/pokemon-sims/issues/725
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/blender_active_promotion_gate_tests.cpp -o build/blender_active_promotion_gate_tests && ./build/blender_active_promotion_gate_tests
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=address,undefined -fno-omit-frame-pointer tests/blender_active_promotion_gate_tests.cpp -o build/blender_active_promotion_gate_tests_san && ./build/blender_active_promotion_gate_tests_san
      - name: Simulate strict JIT going second
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 | tee blender-trace-strict-second-6.txt
      - name: Simulate matchup-flex JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 6 | tee blender-trace-flex-second-6.txt
      - name: Simulate no-discard-control going second
        run: ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 6 | tee blender-trace-ndc-second-6.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out blender-t2-t3-matrix.csv
      - name: Upload traces and matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender-active-promotion-validation
          path: |
            blender-trace-*.txt
            blender-t2-t3-matrix.csv
          if-no-files-found: error
