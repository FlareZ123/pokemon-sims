name: Blender Active Route

on:
  pull_request:
    branches: [main]

jobs:
  validate-blender-active-route:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Run focused Release regression
        # Issue and rule evidence: https://github.com/FlareZ123/pokemon-sims/issues/725
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/blender_active_route_tests.cpp -o build/blender_active_route_tests && ./build/blender_active_route_tests
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=address,undefined -fno-omit-frame-pointer tests/blender_active_route_tests.cpp -o build/blender_active_route_tests_san && ./build/blender_active_route_tests_san
      - name: Trace fixed Guzma route
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        # Reproduction: https://github.com/FlareZ123/pokemon-sims/issues/725
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 29 --require-ready-by 3 | tee blender-trace-seed-29.txt
      - name: Trace strict JIT control
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee blender-trace-seed-6.txt
      - name: Trace Rule Box Ability lock control
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee blender-trace-rulebox-seed-20.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out blender-t2-t3-matrix.csv
      - name: Package local-validation source
        run: tar -czf blender-active-route-source.tar.gz CMakeLists.txt src tests/blender_active_route_tests.cpp
      - name: Upload traces, matrix, source, and focused binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender-active-route-validation
          path: |
            blender-trace-*.txt
            blender-t2-t3-matrix.csv
            blender-active-route-source.tar.gz
            build/blender_active_route_tests
            build/blender_active_route_tests_san
            build/regidrago_sim
          if-no-files-found: error
