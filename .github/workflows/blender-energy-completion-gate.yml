name: Blender Energy-Completion Gate

on:
  pull_request:
    branches: [main]

jobs:
  validate-blender-energy-completion-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2 --target regidrago_sim
      - name: Run focused Release regression
        # Issue, rules, card data, and strict-JIT specification: https://github.com/FlareZ123/pokemon-sims/issues/737
        run: c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/blender_energy_completion_gate_tests.cpp -o build/blender_energy_completion_gate_tests && ./build/blender_energy_completion_gate_tests
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: c++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=address,undefined -fno-omit-frame-pointer tests/blender_energy_completion_gate_tests.cpp -o build/blender_energy_completion_gate_tests_san && ./build/blender_energy_completion_gate_tests_san
      - name: Trace strict JIT going first
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 13 --require-ready-by 2 | tee blender-energy-trace-strict-first-seed-13.txt
      - name: Trace Rule Box lock going second
        # Lock semantics: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 44 --require-ready-by 2 | tee blender-energy-trace-rulebox-second-seed-44.txt
      - name: Trace no-discard-control going second
        # DCI contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
        run: ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 19 --require-ready-by 2 | tee blender-energy-trace-no-control-second-seed-19.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out blender-energy-t2-t3-matrix.csv
      - name: Upload trace and matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blender-energy-completion-validation
          path: |
            blender-energy-trace-*.txt
            blender-energy-t2-t3-matrix.csv
          if-no-files-found: error
