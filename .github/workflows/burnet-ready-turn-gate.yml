name: Burnet Ready-Turn Gate

on:
  pull_request:
    branches: [main]

jobs:
  validate-burnet-ready-turn-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2
      - name: Run focused Release regression
        # Issue and rule evidence: https://github.com/FlareZ123/pokemon-sims/issues/719
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/burnet_ready_turn_gate_tests.cpp -o build/burnet_ready_turn_gate_tests && ./build/burnet_ready_turn_gate_tests
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=address,undefined -fno-omit-frame-pointer tests/burnet_ready_turn_gate_tests.cpp -o build/burnet_ready_turn_gate_tests_san && ./build/burnet_ready_turn_gate_tests_san
      - name: Trace strict JIT no lock
        # Documented trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 | tee burnet-trace-no-lock.txt
      - name: Trace turn-two Item lock
        # Reproduces the issue's CI-derived route: https://github.com/FlareZ123/pokemon-sims/issues/719
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 17 | tee burnet-trace-item-lock.txt
      - name: Trace Rule Box Ability lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-first --seed 29 | tee burnet-trace-rulebox-lock.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out burnet-t2-t3-matrix.csv
      - name: Upload traces and matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: burnet-ready-turn-validation
          path: |
            burnet-trace-*.txt
            burnet-t2-t3-matrix.csv
          if-no-files-found: error
