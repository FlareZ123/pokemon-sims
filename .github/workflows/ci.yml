name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  issue_1403_implementation:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'bug/issue-1403-seed23-t4-route'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/issue-1403-seed23-t4-route
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check implementation state
        id: implementation
        shell: bash
        run: |
          if test -f tests/issue_1403_seed23_t4_route_tests.cpp; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Apply confirmed issue 1403 patch
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Confirmed twice-approved bug: https://github.com/FlareZ123/pokemon-sims/issues/1403
          python scripts/apply_issue_1403.py
          git diff --check
      - name: Configure and build Release
        if: steps.implementation.outputs.present != 'true'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Run focused route regressions
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156
          # Crispin: https://api.pokemontcg.io/v2/cards/sv7-133
          # Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
          # Tate & Liza: https://api.pokemontcg.io/v2/cards/sm7-148
          # Latias ex: https://api.pokemontcg.io/v2/cards/sv8-76
          # Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Official rules: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_unified_tests issue_1403_seed23_t4_route_tests
          ./build/regidrago_unified_tests issue_1185_quick_ball_strict_surplus_energy_tests
          ./build/regidrago_sim --self-test
      - name: Review five source-bound simulate-this traces
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Ready-state contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#ready-state-and-t5-policy
          # Lock contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 23 --require-ready-by 4 | tee issue-1403-seed23.txt
          grep -Fq 'Searched any card: Grass Energy.' issue-1403-seed23.txt
          grep -Fq 'T3 | DISCARD | Tate & Liza (Quick Ball cost)' issue-1403-seed23.txt
          grep -Fq 'T4 | READY |' issue-1403-seed23.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1403-shell-second.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1403-pineco-second.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1403-item-lock.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 3 | tee issue-1403-rulebox-lock.txt
      - name: Regenerate canonical and paired matrices
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Run complete Release suite
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Configure and run ASan and UBSan
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitizers --parallel 2
          ctest --test-dir build-sanitizers --parallel 2 --output-on-failure
      - name: Upload implementation evidence
        if: always() && steps.implementation.outputs.present != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-1403-implementation
          path: |
            issue-1403-*.txt
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitizers/Testing
          if-no-files-found: warn
      - name: Commit validated implementation
        if: steps.implementation.outputs.present != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md src tests docs results
          git diff --cached --check
          git commit -m "Reach the legal seed 23 T4 route (#1403)"
          git push origin HEAD:bug/issue-1403-seed23-t4-route

  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Run eight independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee trace-3.txt
          # Steven may search up to three cards. Held Fire plus target-legal Quick Ball
          # already completes the T3 Energy and strict-JIT payload axes, so preserve
          # Crispin and the one-copy ACE SPEC after taking the missing VSTAR card:
          # https://api.pokemontcg.io/v2/cards/sm7-145
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/sv6-130
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://api.pokemontcg.io/v2/cards/sv8-164
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/952
          # https://github.com/FlareZ123/pokemon-sims/issues/978
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 58 --require-ready-by 3 | tee trace-4.txt
          grep -q "Searched up to 3 cards: Regidrago VSTAR. Turn ended." trace-4.txt
          grep -q "T3 | DISCARD.*Dragapult ex (Quick Ball cost)" trace-4.txt
          ! grep -q "Searched up to 3 cards: Regidrago VSTAR, Crispin" trace-4.txt
          ! grep -q "Searched up to 3 cards: Regidrago VSTAR, Brilliant Blender" trace-4.txt
          grep -q "T3 | READY" trace-4.txt
          # Quick Ball must preserve the strict-JIT Dragon until the VSTAR card axis is reachable:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/953
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 19 --require-ready-by 3 | tee trace-5.txt
          # Earthen Vessel must preserve its one-discard payload outlet until VSTAR is reachable:
          # https://api.pokemontcg.io/v2/cards/sv4-163
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/954
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 42 --require-ready-by 3 | tee trace-6.txt
          # Quick Ball must take the live Tapu Lele-GX -> Crispin connector before Vessel:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/sm2-60
          # https://api.pokemontcg.io/v2/cards/sv7-133
          # https://api.pokemontcg.io/v2/cards/sv4-163
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/962
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 104 --require-ready-by 3 | tee trace-7.txt
          grep -q "Searched a Basic Pokémon: Tapu Lele-GX" trace-7.txt
          grep -q "WONDER TAG.*Searched and revealed Crispin" trace-7.txt
          # The source-bounded seed-43 route spends one dynamically replaceable Grass
          # on T1, then preserves the T2 Supporter play while Mysterious Treasure
          # discards Dragapult ex and searches Tapu Lele-GX for Wonder Tag into Crispin:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/sm6-113
          # https://api.pokemontcg.io/v2/cards/sm2-60
          # https://api.pokemontcg.io/v2/cards/sv7-133
          # https://api.pokemontcg.io/v2/cards/sv6-130
          # https://api.pokemontcg.io/v2/cards/swsh12-135
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/1209
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 43 --require-ready-by 2 | tee trace-8.txt
          grep -q "T1 | DISCARD.*Grass Energy (Quick Ball cost)" trace-8.txt
          grep -q "searched a Basic Pokemon: Regidrago V" trace-8.txt
          grep -q "T2 | HOLD SUPPORTER.*Mysterious Treasure to Tapu Lele-GX to Crispin" trace-8.txt
          grep -q "T2 | DISCARD.*Dragapult ex (Mysterious Treasure cost)" trace-8.txt
          grep -q "T2 | WONDER TAG.*Crispin" trace-8.txt
          grep -q "T2 | PLAY SUPPORTER.*R-CRISPIN-01" trace-8.txt
          ! grep -q "STAR ALCHEMY" trace-8.txt
          grep -q "T2 | READY" trace-8.txt
      - name: Run three reviewed Pineco Secret Box audits
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee pineco-trace-35.txt
          grep -q "Secret Box discarded three other cards" pineco-trace-35.txt
          grep -q "T2 | READY" pineco-trace-35.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee pineco-trace-18.txt
          grep -q "Arven banked the next-turn Secret Box route" pineco-trace-18.txt
          grep -q "T2 | READY" pineco-trace-18.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 40 --require-ready-by 2 | tee pineco-trace-40.txt
          grep -q "Gladion recovered the legally known prized Secret Box" pineco-trace-40.txt
          grep -q "T2 | READY" pineco-trace-40.txt
      # The issue #718 PR refreshes and validates the source-bound matrix after the
      # Blender VSTAR-card-axis fix: https://github.com/FlareZ123/pokemon-sims/pull/931
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Verify canonical shell matrix
        run: cmp t2-t3-matrix.csv results/simulation_results.csv
      - name: Generate paired two-deck T2, T3, and T4 matrix
        run: ./build/regidrago_sim --all-decks --trials 100000 --seed 20260705 --out multi-deck-matrix.csv
      - name: Verify committed paired matrix
        run: cmp multi-deck-matrix.csv results/multi_deck_comparison.csv
      - name: Record simulator policy source digest
        run: >-
          python -c "from pathlib import Path; from scripts.baseline_provenance import simulator_policy_source_digest; print(simulator_policy_source_digest(Path('.').resolve()))"
          | tee simulator-policy-source-sha256.txt
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Record tested source
        run: git rev-parse HEAD > tested-head.txt
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ github.run_attempt }}
          path: |
            trace-*.txt
            pineco-trace-*.txt
            t2-t3-matrix.csv
            multi-deck-matrix.csv
            simulator-policy-source-sha256.txt
            tested-head.txt
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: warn

  sanitizers:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build sanitizer targets once
        run: cmake --build build-sanitizers --parallel 2
      - name: Run complete sanitizer suite
        env:
          # Detect the reference-parameter lifetime failure covered by issue #907:
          # https://eel.is/c++draft/class.temporary#6.10
          # https://github.com/FlareZ123/pokemon-sims/issues/907
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitizers --parallel 2 --output-on-failure
      - name: Upload sanitizer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-validation-${{ github.run_attempt }}
          path: build-sanitizers/Testing
          if-no-files-found: warn
