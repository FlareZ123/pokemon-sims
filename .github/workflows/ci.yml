name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  issue-663-apply-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/663-route-aware-oricorio-dialga-no-lock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/663-route-aware-oricorio-dialga-no-lock
          fetch-depth: 0

      - name: Apply focused issue 663 change
        run: python scripts/apply_issue_663.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused UBSan regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_oricorio_dialga_no_lock_tests.cpp -o build/issue_663_ubsan && ./build/issue_663_ubsan

      - name: Simulate pass 1
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 3 | tee build/issue-663-pass-1.txt
      - name: Simulate pass 2
        # Earliest-ready policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 2 --require-ready-by 3 | tee build/issue-663-pass-2.txt
      - name: Simulate pass 3
        # Oricorio remains live under Rule Box Ability lock: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 | tee build/issue-663-pass-3.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-663-matrix.csv

      - name: Package exact validated source
        run: |
          tar --exclude=.git --exclude=build -czf /tmp/issue-663-repository-source.tgz .
          cp /tmp/issue-663-repository-source.tgz build/issue-663-repository-source.tgz

      - name: Commit validated permanent fix
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/issue-663-apply.yml scripts/apply_issue_663.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_no_lock_tests.cpp .github/workflows/ci.yml .github/workflows/issue-663-apply.yml scripts/apply_issue_663.py
          git commit -m 'Fix route-aware no-lock Oricorio-Dialga openings (#663)'
          git push origin HEAD:fix/663-route-aware-oricorio-dialga-no-lock

      - name: Upload issue 663 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-663-validation
          path: |
            build/issue-663-pass-*.txt
            build/issue-663-matrix.csv
            build/issue-663-repository-source.tgz
            build/Testing
          if-no-files-found: warn
