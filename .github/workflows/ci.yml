name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: bash .github/scripts/capture-build.sh build build.log
      - name: Discover replacement trace seeds
        shell: bash
        run: |
          : > trace-seeds.log
          scan_seed() {
            scenario="$1"
            deadline="$2"
            for seed in $(seq 1 500); do
              if build/regidrago_sim --simulate-this --scenario "$scenario" --seed "$seed" --require-ready-by "$deadline" > candidate-trace.log 2>&1; then
                echo "$scenario,ready_by_t$deadline,seed=$seed" >> trace-seeds.log
                cat candidate-trace.log >> trace-seeds.log
                return 0
              fi
            done
            echo "No passing seed found for $scenario by turn $deadline" >> trace-seeds.log
            return 1
          }
          scan_seed strict-jit/go-first 4
          scan_seed matchup-flex-jit/go-second 2
          scan_seed strict-jit-rulebox-ability-lock/go-second 3
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure || {
            status=$?
            echo '===== CTest LastTest.log ====='
            find build/Testing -name LastTest.log -type f -print -exec cat {} \; || true
            exit "$status"
          }
      - name: Upload CTest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-ctest-diagnostics
          path: |
            build/Testing
            build.log
            trace-seeds.log
          if-no-files-found: warn

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure sanitizers
        run: cmake -S . -B build-sanitizers -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build sanitizers
        run: bash .github/scripts/capture-build.sh build-sanitizers sanitizer-build.log
      - name: Test sanitizers
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: |
          set -o pipefail
          ctest --test-dir build-sanitizers --output-on-failure || {
            status=$?
            echo '===== Sanitizer CTest LastTest.log ====='
            find build-sanitizers/Testing -name LastTest.log -type f -print -exec cat {} \; || true
            exit "$status"
          }
      - name: Upload sanitizer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-ctest-diagnostics
          path: |
            build-sanitizers/Testing
            sanitizer-build.log
          if-no-files-found: warn
