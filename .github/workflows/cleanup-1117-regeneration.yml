name: Clean issue 1117 regeneration artifacts

on:
  push:
    branches: [bug/1117-held-burnet-before-steven-agent]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1117-held-burnet-before-steven-agent
          fetch-depth: 0
      - name: Remove temporary build artifacts
        run: |
          rm -rf build-agent scripts/__pycache__
          rm -f results/.simulation_results.csv.*.tmp.lock
          rm .github/workflows/cleanup-1117-regeneration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove issue 1117 regeneration artifacts"
          git push origin HEAD:bug/1117-held-burnet-before-steven-agent
