name: Clean issue 942 generated artifacts

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  clean:
    if: github.head_ref == 'bug/942-redundant-burnet-direct-item'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Remove non-source build artifacts
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          rm -rf build scripts/__pycache__
          find results -maxdepth 1 -type f \( -name '*.lock' -o -name '.*.lock' \) -delete
          rm .github/workflows/cleanup-942-artifacts.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove generated build artifacts from issue 942"
          git push origin "HEAD:${HEAD_REF}"
