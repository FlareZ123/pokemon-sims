name: Commit issue 1235 simulation evidence

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  evidence:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run exact issue regression
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 211 --require-ready-by 2 | tee issue-1235-seed-211.txt
      - name: Regenerate canonical shell evidence
        run: python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
      - name: Regenerate paired deck evidence
        run: python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
      - name: Regenerate source-bound reports
        run: |
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs results
          git diff --cached --check
          git commit -m "Regenerate issue 1235 setup evidence on latest main"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
