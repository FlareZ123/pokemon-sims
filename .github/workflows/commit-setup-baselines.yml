name: Commit corrected setup baselines

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate-and-commit:
    if: github.head_ref == 'fix/setup-order-regenerate-baselines-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Regenerate traces and matrix
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir build/regenerated-baselines
      - name: Commit exact generated outputs
        shell: bash
        run: |
          set -euo pipefail
          rm -f results/traces/strict_jit_go_second_seed_*.txt
          rm -f results/traces/strict_jit_go_first_seed_*.txt
          rm -f results/traces/matchup_flex_go_second_seed_*.txt
          rm -f results/traces/strict_turn2_item_lock_go_second_seed_*.txt
          rm -f results/traces/strict_rulebox_lock_go_second_seed_*.txt
          rm -f results/traces/no_discard_control_go_first_seed_*.txt
          cp build/regenerated-baselines/traces/*.txt results/traces/
          cp build/regenerated-baselines/simulation_results.csv results/simulation_results.csv
          cp build/regenerated-baselines/baseline_manifest.json results/baseline_manifest.json
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/workflows/commit-setup-baselines.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt .github/workflows results scripts src/trace_engine_v2/part_005.inc
          git commit -m "Regenerate setup traces and probability matrix"
          git push origin HEAD:${{ github.head_ref }}
