name: Complete issue 1255 current-main patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: complete-issue-1255
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1255-evolution-incense-appletun
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Merge current main
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-commit origin/main || true
          git checkout --theirs -- docs results
          git add docs results
          test -z "$(git diff --name-only --diff-filter=U)"
          git commit --no-edit
      - name: Apply complete issue patch
        run: python scripts/complete_issue_1255_patch.py
      - name: Build and run focused regressions
        id: focused
        continue-on-error: true
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release > configure.log 2>&1 || exit 1
          cmake --build build --parallel 2 > build.log 2>&1 || exit 1
          ./build/regidrago_unified_tests issue_1255_evolution_incense_appletun_tests > primary-test.log 2>&1 || exit 1
          ./build/regidrago_unified_tests issue_1255_evolution_incense_appletun_continuation_tests > continuation-test.log 2>&1 || exit 1
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1255-focused-diagnostics
          path: |
            configure.log
            build.log
            primary-test.log
            continuation-test.log
          if-no-files-found: ignore
      - name: Enforce focused validation
        if: steps.focused.outcome != 'success'
        run: exit 1
      - name: Run three simulate-this audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1255-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1255-trace-2.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1255-trace-3.txt
      - name: Regenerate source-bound matrices
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Commit current-main patch
        run: |
          rm -f results/*.lock results/.*.lock
          git add src/trace_engine_v2/part_empty_deck_search_override.inc src/trace_engine_v2/part_013_legacy_star_override.inc src/trace_engine_v2/part_forretress_ex_combo.inc tests/issue_1255_evolution_incense_appletun_continuation_tests.cpp docs/REPORT.md docs/MULTI_DECK_REPORT.md results/baseline_manifest.json results/simulation_results.csv results/multi_deck_comparison.csv results/multi_deck_manifest.json
          git add -u .github/workflows/complete-issue-1255.yml scripts/complete_issue_1255_patch.py
          git diff --cached --check
          git commit -m "Complete Appletun Evolution Incense routes"
          git push --force-with-lease origin HEAD:fix/issue-1255-evolution-incense-appletun
