name: Counterfactual and Matrix Audit

on:
  pull_request:
    branches: [main]

jobs:
  crispin-counterfactual-going-second:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force Wonder Tag to choose Crispin for the exact seed-2 comparison
        run: python -c "from pathlib import Path; p=Path('src/trace_engine_v2/part_007.inc'); s=p.read_text(encoding='utf-8'); old='if (state_.turn == 1 && !scenario_.going_first && should_play_steven() &&\n        deck_count_after_search_started(Card::StevensResolve) > 0) return Card::StevensResolve;'; new='if (state_.turn == 1 && !scenario_.going_first && should_play_steven() &&\n        deck_count_after_search_started(Card::Crispin) > 0) return Card::Crispin; // Counterfactual only. Crispin: https://api.pokemontcg.io/v2/cards/sv7-133 Regidrago V: https://api.pokemontcg.io/v2/cards/swsh12-135'; assert old in s; p.write_text(s.replace(old,new,1),encoding='utf-8')"
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Run exact Crispin counterfactual
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 2 | tee strict-jit-go-second-seed-2-crispin-counterfactual.txt
      - uses: actions/upload-artifact@v4
        with:
          name: strict-jit-go-second-seed-2-crispin-counterfactual
          path: strict-jit-go-second-seed-2-crispin-counterfactual.txt

  current-main-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Generate 100000-trial seed-20260705 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out current-main-t2-t3-matrix.csv
      - uses: actions/upload-artifact@v4
        with:
          name: current-main-t2-t3-matrix
          path: current-main-t2-t3-matrix.csv
