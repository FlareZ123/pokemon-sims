name: Crobat CLI and Statistic Refinement

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refine-validate-and-publish:
    if: github.head_ref == 'enhancement/issue-1394-crobat-v-current-main'
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Check out validated Crobat branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Capture registered probability baselines
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          cp results/simulation_results.csv /tmp/simulation_results.before.csv
          cp results/multi_deck_comparison.csv /tmp/multi_deck_comparison.before.csv

      - name: Apply CLI defaults and precise statistic labels
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source_path = Path("src/trace_engine_v2/part_016.inc")
          source = source_path.read_text(encoding="utf-8")
          namespace_needle = "\n}  // namespace sim\n\n#ifndef REGIDRAGO_SIM_NO_MAIN\n"
          helpers = """
          constexpr std::string_view crobat_model_default_output() {
            return "results/crobat_variant_model.csv";  // Reproduction contract: https://github.com/FlareZ123/pokemon-sims/issues/1394
          }

          constexpr std::uint64_t crobat_model_default_seed() {
            return 20260723ULL;  // Reproduction contract: https://github.com/FlareZ123/pokemon-sims/issues/1394
          }

          }  // namespace sim

          #ifndef REGIDRAGO_SIM_NO_MAIN
          """
          if source.count(namespace_needle) != 1:
              raise RuntimeError("Crobat namespace insertion point changed")
          source = source.replace(namespace_needle, "\n" + helpers, 1)

          mode_needle = """  const CliMode mode = self_test ? CliMode::SelfTest :
              (model_crobat ? CliMode::CrobatModel :
               (find_ready_supplied ? CliMode::FindReady :
                (simulate_this ? CliMode::SingleTrace : CliMode::Aggregate)));
          """
          mode_replacement = mode_needle + """
            if (mode == CliMode::CrobatModel) {
              // Keep the modeling mode away from canonical output and reproduce its registered matrix seed:
              // https://github.com/FlareZ123/pokemon-sims/issues/1394
              // https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#model-crobat-v-swaps
              if (!output_supplied) output = std::string(sim::crobat_model_default_output());
              if (!seed_supplied) seed = sim::crobat_model_default_seed();
            }
          """
          if source.count(mode_needle) != 1:
              raise RuntimeError("CLI mode insertion point changed")
          source = source.replace(mode_needle, mode_replacement, 1)

          header_old = "dark_asset_use_pct,avg_dark_asset_draw\\n"
          header_new = "dark_asset_use_pct,avg_dark_asset_cards_drawn_per_game_using\\n"
          if source.count(header_old) != 1:
              raise RuntimeError("Crobat CSV header changed")
          source = source.replace(header_old, header_new, 1)
          average_needle = """      const double average_draw = aggregate.dark_asset == 0 ? 0.0 :
                  static_cast<double>(aggregate.dark_asset_cards_drawn) /
                  static_cast<double>(aggregate.dark_asset);
          """
          average_replacement = """      // aggregate.dark_asset counts games with one or more uses; cards may accumulate
              // across turns in two-copy variants: https://github.com/FlareZ123/pokemon-sims/issues/1394
              const double average_draw = aggregate.dark_asset == 0 ? 0.0 :
                  static_cast<double>(aggregate.dark_asset_cards_drawn) /
                  static_cast<double>(aggregate.dark_asset);
          """
          if source.count(average_needle) != 1:
              raise RuntimeError("Crobat average calculation changed")
          source = source.replace(average_needle, average_replacement, 1)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/issue_1394_crobat_v_model_tests.cpp")
          test = test_path.read_text(encoding="utf-8")
          test_needle = """  if (sim::deck_registry().size() != 2U ||
              sim::deck_by_id("crobat1-erika") != nullptr ||
              sim::crobat_modeling_deck_by_id("crobat1-erika") == nullptr) {
            throw std::runtime_error("Crobat modeling variants leaked into the named registry.");
          }
          """
          test_replacement = test_needle + """  // Safe defaults keep modeling output separate and reproduce the issue matrix:
            // https://github.com/FlareZ123/pokemon-sims/issues/1394
            if (sim::crobat_model_default_output() != "results/crobat_variant_model.csv" ||
                sim::crobat_model_default_seed() != 20260723ULL) {
              throw std::runtime_error("Crobat modeling defaults do not match the reproduction contract.");
            }
          """
          if test.count(test_needle) != 1:
              raise RuntimeError("Crobat identity test insertion point changed")
          test_path.write_text(test.replace(test_needle, test_replacement, 1), encoding="utf-8")

          script_path = Path("scripts/update_crobat_modeling_docs.py")
          script = script_path.read_text(encoding="utf-8")
          if script.count('row["avg_dark_asset_draw"]') != 1:
              raise RuntimeError("Crobat report field changed")
          script = script.replace(
              'row["avg_dark_asset_draw"]',
              'row["avg_dark_asset_cards_drawn_per_game_using"]',
              1,
          )
          old_table = "| Variant | Cuts | Crobat | Mean ΔT2 | Mean ΔT3 | Mean ΔT4 | T3 scenarios improved | Dark Asset use | Mean cards drawn |"
          new_table = "| Variant | Cuts | Crobat | Mean ΔT2 | Mean ΔT3 | Mean ΔT4 | T3 scenarios improved | Games using Dark Asset | Mean cards drawn per using game |"
          if script.count(old_table) != 1:
              raise RuntimeError("Crobat report table header changed")
          script = script.replace(old_table, new_table, 1)
          paragraph_needle = """            "Those discrete losses remain relevant even when a setup percentage is close.",
                  "",
                  "## Paired all-scenario summary",
          """
          paragraph_replacement = """            "Those discrete losses remain relevant even when a setup percentage is close.",
                  "",
                  "Dark Asset utilization is the percentage of games with at least one legal use. The draw figure is "
                  "the total cards drawn across all Dark Asset resolutions divided by games with at least one use, "
                  "so a two-copy variant may include uses on different turns: https://github.com/FlareZ123/pokemon-sims/issues/1394",
                  "",
                  "## Paired all-scenario summary",
          """
          if script.count(paragraph_needle) != 1:
              raise RuntimeError("Crobat report paragraph insertion point changed")
          script_path.write_text(script.replace(paragraph_needle, paragraph_replacement, 1), encoding="utf-8")

          csv_path = Path("results/crobat_variant_model.csv")
          csv_text = csv_path.read_text(encoding="utf-8")
          csv_old = "dark_asset_use_pct,avg_dark_asset_draw\n"
          csv_new = "dark_asset_use_pct,avg_dark_asset_cards_drawn_per_game_using\n"
          if csv_text.count(csv_old) != 1:
              raise RuntimeError("Committed Crobat CSV header changed")
          csv_path.write_text(csv_text.replace(csv_old, csv_new, 1), encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          marker = "\nDark Asset follows Crobat V `swsh3-104`:"
          insertion = (
              "\nWhen `--out` or `--seed` is omitted, `--model-crobat` defaults to "
              "`results/crobat_variant_model.csv` and seed `20260723`, preserving the canonical baseline: "
              "https://github.com/FlareZ123/pokemon-sims/issues/1394\n"
          )
          if readme.count(marker) != 1:
              raise RuntimeError("README Crobat insertion point changed")
          readme_path.write_text(readme.replace(marker, insertion + marker, 1), encoding="utf-8")
          PY

      - name: Build and validate focused behavior
        shell: bash
        run: |
          set -euo pipefail
          # Dark Asset card source: https://api.pokemontcg.io/v2/cards/swsh3-104
          # Modeling reproduction contract: https://github.com/FlareZ123/pokemon-sims/issues/1394
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1394_crobat_v_model_tests
          rm -rf build/crobat-cli-default-check
          mkdir -p build/crobat-cli-default-check
          pushd build/crobat-cli-default-check
          ../regidrago_sim --model-crobat --trials 1
          test -f results/crobat_variant_model.csv
          test ! -e results/simulation_results.csv
          ../regidrago_sim --model-crobat --trials 1 --seed 20260723 --out explicit.csv
          cmp results/crobat_variant_model.csv explicit.csv
          ../regidrago_sim --model-crobat --trials 1 --seed 7 --out custom.csv
          test -f custom.csv
          grep -q 'avg_dark_asset_cards_drawn_per_game_using' results/crobat_variant_model.csv
          popd

      - name: Regenerate report and source-bound metadata
        shell: bash
        run: |
          set -euo pipefail
          # Registered matrix contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          python scripts/update_crobat_modeling_docs.py --csv results/crobat_variant_model.csv --out docs/CROBAT_MODEL_REPORT.md
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .
          cmp /tmp/simulation_results.before.csv results/simulation_results.csv
          cmp /tmp/multi_deck_comparison.before.csv results/multi_deck_comparison.csv
          rm -f results/*.lock docs/*.lock .update-*.lock

      - name: Run complete Release suite
        shell: bash
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Publish validated refinement
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build
          git rm .github/workflows/crobat-cli-stat-refinement.yml
          rm -f results/*.lock docs/*.lock .update-*.lock
          find scripts -type f -name '*.pyc' -delete
          rm -rf scripts/__pycache__
          git add -A
          git commit -m 'Harden Crobat model defaults and metrics (#1394)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
