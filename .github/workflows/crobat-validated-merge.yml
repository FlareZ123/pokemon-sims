name: Crobat Validated Merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out merge branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pin current main and registered baselines
        id: base
        shell: bash
        run: |
          set -euo pipefail
          # Current repository source: https://github.com/FlareZ123/pokemon-sims/tree/main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main enhancement/issue-1394-crobat-v-final
          base_sha="$(git rev-parse origin/main)"
          test "$(git rev-parse HEAD^)" = "$base_sha"
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
          cp results/simulation_results.csv /tmp/simulation_results.before.csv
          cp results/multi_deck_comparison.csv /tmp/multi_deck_comparison.before.csv

      - name: Three-way apply Crobat implementation
        shell: bash
        run: |
          set -euo pipefail
          # Enhancement specification: https://github.com/FlareZ123/pokemon-sims/issues/1394
          git diff --binary 5ddbe15e048735d3eb6cc3fdbefdbf77a300f3a7..origin/enhancement/issue-1394-crobat-v-final -- \
            README.md \
            docs/CARD_AUDIT.md \
            docs/CROBAT_MODEL_REPORT.md \
            docs/MODEL_ASSUMPTIONS.md \
            docs/POLICY_DECISIONS.md \
            docs/RULES_TRACEABILITY.md \
            docs/RULE_SOURCES.md \
            results/crobat_variant_model.csv \
            scripts/update_crobat_modeling_docs.py \
            src/regidrago_sim.cpp \
            src/trace_engine_v2/part_000.inc \
            src/trace_engine_v2/part_001.inc \
            src/trace_engine_v2/part_002.inc \
            src/trace_engine_v2/part_005.inc \
            src/trace_engine_v2/part_006.inc \
            src/trace_engine_v2/part_007.inc \
            src/trace_engine_v2/part_008b.inc \
            src/trace_engine_v2/part_009b1.inc \
            src/trace_engine_v2/part_013.inc \
            src/trace_engine_v2/part_015.inc \
            src/trace_engine_v2/part_016.inc \
            src/trace_engine_v2/part_begin_turn_override.inc \
            src/trace_engine_v2/part_search_item_overrides.inc \
            tests/issue_1394_crobat_v_model_tests.cpp \
            > /tmp/crobat-validated-merge.patch
          test -s /tmp/crobat-validated-merge.patch
          git apply --3way --whitespace=nowarn /tmp/crobat-validated-merge.patch

      - name: Static source and registry audit
        shell: bash
        run: |
          set -euo pipefail
          # Crobat V and Dark Asset: https://api.pokemontcg.io/v2/cards/swsh3-104
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156
          # Pokémon V ruling: https://compendium.pokegym.net/category/7-gameplay/pokemon-v/
          # Named deck registry: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          test -f docs/CROBAT_MODEL_REPORT.md
          test -f results/crobat_variant_model.csv
          test -f scripts/update_crobat_modeling_docs.py
          test -f tests/issue_1394_crobat_v_model_tests.cpp
          ! grep -q 'CrobatV' src/trace_engine_v2/part_014c.inc
          test "$(grep -c '{\"regidrago-' src/trace_engine_v2/part_014c.inc)" -eq 2
          python -m compileall -q scripts
          find scripts -type f -name '*.pyc' -delete
          rm -rf scripts/__pycache__

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Crobat regressions
        shell: bash
        run: |
          set -euo pipefail
          # Dark Asset timing and once-per-turn limit: https://api.pokemontcg.io/v2/cards/swsh3-104
          # Official setup and Bench procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_unified_tests issue_1394_crobat_v_model_tests
          ./build/regidrago_sim --self-test

      - name: Simulate-this pass 1 going second
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit/go-second --seed 3 --require-ready-by 2 | tee crobat-pass-second-seed3.txt
          grep -Eq '^T2 \| DARK ASSET \|' crobat-pass-second-seed3.txt
          grep -Eq '^T2 \| READY \|' crobat-pass-second-seed3.txt

      - name: Simulate-this pass 2 going first
        shell: bash
        run: |
          set -euo pipefail
          # Turn and evolution procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit/go-first --seed 14 --require-ready-by 2 | tee crobat-pass-first-seed14.txt
          grep -Eq '^T1 \| DARK ASSET \|' crobat-pass-first-seed14.txt
          grep -Eq '^T2 \| READY \|' crobat-pass-first-seed14.txt

      - name: Simulate-this pass 3 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled Item lock: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit-turn2-item-lock/go-second --seed 71 --require-ready-by 3 | tee crobat-pass-item-lock-seed71.txt
          grep -Eq '^T1 \| DARK ASSET \|' crobat-pass-item-lock-seed71.txt
          grep -Eq '^T3 \| READY \|' crobat-pass-item-lock-seed71.txt

      - name: Generate paired 100000-trial Crobat matrix
        shell: bash
        run: |
          set -euo pipefail
          # Modeling-only variants: https://github.com/FlareZ123/pokemon-sims/issues/1394
          ./build/regidrago_sim --model-crobat --trials 100000 --seed 20260723 --out results/crobat_variant_model.csv
          test "$(wc -l < results/crobat_variant_model.csv)" -eq 209
          python scripts/update_crobat_modeling_docs.py --csv results/crobat_variant_model.csv --out docs/CROBAT_MODEL_REPORT.md
          rm -f results/crobat_variant_model.csv.lock docs/CROBAT_MODEL_REPORT.md.lock

      - name: Regenerate current metadata and preserve registered probabilities
        shell: bash
        run: |
          set -euo pipefail
          # Canonical and paired contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .
          cmp /tmp/simulation_results.before.csv results/simulation_results.csv
          cmp /tmp/multi_deck_comparison.before.csv results/multi_deck_comparison.csv
          rm -f results/*.lock docs/*.lock

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee issue-1394-release-suite.txt

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitizers --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitizers --parallel 2 --output-on-failure

      - name: Upload merge evidence
        uses: actions/upload-artifact@v4
        with:
          name: crobat-validated-merge
          path: |
            /tmp/crobat-validated-merge.patch
            crobat-pass-*.txt
            issue-1394-release-suite.txt
            results/crobat_variant_model.csv
            docs/CROBAT_MODEL_REPORT.md
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitizers/Testing
          if-no-files-found: error

      - name: Publish clean implementation and merge PR
        shell: bash
        run: |
          set -euo pipefail
          # Merge API contract: https://docs.github.com/en/rest/pulls/pulls#merge-a-pull-request
          git fetch origin main
          test "$(git rev-parse origin/main)" = "${{ steps.base.outputs.sha }}"
          rm -rf build build-sanitizers crobat-pass-*.txt issue-1394-release-suite.txt
          git rm .github/workflows/crobat-validated-merge.yml
          find scripts -type f -name '*.pyc' -delete
          rm -rf scripts/__pycache__
          rm -f results/*.lock docs/*.lock
          git add README.md CMakeLists.txt src tests scripts docs results
          git commit -m 'Model Crobat V and evaluate shell swaps (#1394)'
          head_sha="$(git rev-parse HEAD)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          for delay in 0 5 10 30; do
            if [ "$delay" -gt 0 ]; then sleep "$delay"; fi
            if gh api --method PUT "repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/merge" -f merge_method=merge -f sha="$head_sha"; then
              exit 0
            fi
          done
          exit 1
