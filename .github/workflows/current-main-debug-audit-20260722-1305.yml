name: Current Main Debug Audit 20260722 1305

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  current-main-debug-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build simulator and tests
        run: cmake --build build --parallel 2

      - name: Run complete repository tests
        run: ctest --test-dir build --output-on-failure

      - name: Simulate-this pass 1 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scenario contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Item, Supporter, search, attachment, evolution, Retreat, and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Regidrago VSTAR and Brilliant Blender data: https://api.pokemontcg.io/v2/cards/swsh12-136 https://api.pokemontcg.io/v2/cards/sv8-164
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 1 --require-ready-by 2 | tee debug-pass-item-lock.txt
          grep -q 'T2 | READY |' debug-pass-item-lock.txt

      - name: Simulate-this pass 2 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Lock policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment
          # Ability, attachment, evolution, Retreat, and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Regidrago VSTAR and Oricorio data: https://api.pokemontcg.io/v2/cards/swsh12-136 https://api.pokemontcg.io/v2/cards/sm2-55
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 2 | tee debug-pass-rulebox-lock.txt
          grep -q 'T2 | READY |' debug-pass-rulebox-lock.txt

      - name: Simulate-this pass 3 no-discard control
        shell: bash
        run: |
          set -euo pipefail
          # DCI and JIT contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          # Search, discard, attachment, evolution, Retreat, and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Regidrago VSTAR and Mysterious Treasure data: https://api.pokemontcg.io/v2/cards/swsh12-136 https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario no-discard-control/go-first --seed 1 --require-ready-by 4 | tee debug-pass-no-discard-control.txt
          grep -q 'T4 | READY |' debug-pass-no-discard-control.txt

      - name: Generate paired T2 and T3 setup matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out current-turn-matrix.csv

      - name: Static route and source scan
        shell: bash
        run: |
          set -euo pipefail
          # Repository decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          git grep -n -E 'TODO|FIXME|XXX|BUG|fallback|preflight|preferred|choose_|reserve|discardable|prize|lock|retreat|payload|Forretress|Appletun|Ultra Ball|Evolution Incense|Brilliant Blender|Arven|Burnet' -- src tests docs scripts CMakeLists.txt README.md > static-route-scan.txt || true
          find src tests docs scripts .github/workflows -type f -print | sort > source-file-list.txt

      - name: Package exact source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt
          # Archive only tracked files from the exact tested commit, avoiding recursive self-inclusion.
          # Git archive specification: https://git-scm.com/docs/git-archive
          git archive --format=tar.gz --output=source-snapshot.tar.gz HEAD

      - name: Package audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-main-debug-audit-20260722-1305
          path: |
            debug-pass-*.txt
            current-turn-matrix.csv
            static-route-scan.txt
            source-file-list.txt
            tested-head.txt
            source-snapshot.tar.gz
          if-no-files-found: error
