name: Current Main Debug Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug-audit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'audit/20260717-current-main-sim-matrix'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/20260717-current-main-sim-matrix
          fetch-depth: 0

      - name: Reconcile latest main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Archive exact source
        shell: bash
        run: |
          # Rerun marker: current-main audit after the #823 merge.
          mkdir -p audit-output
          tar --exclude=.git --exclude=build --exclude=audit-output -czf audit-output/current-main-source.tar.gz .

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build repository
        run: cmake --build build --parallel 2

      - name: Run complete Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee audit-output/trace-1-matchup-flex-seed-3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee audit-output/trace-2-turn2-item-lock-seed-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 | tee audit-output/trace-3-rulebox-lock-seed-20.txt

      - name: Generate canonical T2 and T3 matrix
        shell: bash
        run: |
          # Aggregate command: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out audit-output/t2_t3_matrix.csv
          cat audit-output/t2_t3_matrix.csv

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-main-debug-audit
          path: audit-output
          if-no-files-found: error
