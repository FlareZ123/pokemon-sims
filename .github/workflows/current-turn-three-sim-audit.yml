name: Current Turn Three Simulation Audit

on:
  pull_request:

permissions:
  contents: read

jobs:
  simulate-this-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out pull-request merge ref
        uses: actions/checkout@v4

      - name: Archive exact merge-ref source
        shell: bash
        run: |
          mkdir -p audit-output
          tar --exclude=.git --exclude=build --exclude=audit-output -czf /tmp/current-turn-source.tar.gz .
          mv /tmp/current-turn-source.tar.gz audit-output/current-turn-source.tar.gz

      - name: Configure Release build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build repository
        run: cmake --build build --parallel 2

      - name: Run full Release tests
        run: ctest --test-dir build --output-on-failure

      - name: Run three reviewed simulate-this passes
        shell: bash
        run: |
          # Reviewed trace inventory: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/TRACE_AUDIT.md#reviewed-traces
          # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee audit-output/matchup_flex_go_second_seed_3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee audit-output/strict_turn2_item_lock_go_second_seed_2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 | tee audit-output/strict_rulebox_lock_go_second_seed_20.txt

      - name: Generate canonical T2/T3 matrix
        shell: bash
        run: |
          # Aggregate command: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          # Fixed-seed probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out audit-output/t2_t3_matrix.csv
          cat audit-output/t2_t3_matrix.csv

      - name: Upload audit outputs
        uses: actions/upload-artifact@v4
        with:
          name: current-turn-three-sim-audit
          path: audit-output
          if-no-files-found: error
