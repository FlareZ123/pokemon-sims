name: Debug Audit 20260722 2335

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  source-bound-debug-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out exact PR source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record source and static inventory
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee audited-head.txt
          git ls-files | sort > tracked-files.txt
          git grep -nE 'TODO|FIXME|XXX|HACK' -- src tests docs scripts README.md > static-markers.txt || true
          git grep -nE 'simulate-this|ready_by_turn|Decision priority|DCI|K1|item lock|ability lock|supporter lock' -- src tests docs scripts README.md > policy-touchpoints.txt || true
          tar --exclude=.git --exclude=build --exclude=build-sanitizers --exclude=source-snapshot.tar.gz --exclude=audited-head.txt --exclude=tracked-files.txt --exclude=static-markers.txt --exclude=policy-touchpoints.txt -czf source-snapshot.tar.gz .

      - name: Configure and build Release
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: CI simulate-this pass 1 shell no-lock
        shell: bash
        run: |
          set -euo pipefail
          # Simulator contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Regidrago VSTAR identity and GGF attack cost: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Official rules and turn procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee audit-trace-1-shell.txt
          grep -Eq '^T[123] \| READY \|' audit-trace-1-shell.txt

      - name: CI simulate-this pass 2 Pineco Secret Box
        shell: bash
        run: |
          set -euo pipefail
          # Secret Box card data: https://api.pokemontcg.io/v2/cards/sv6-163
          # Pineco and Forretress ex card data: https://api.pokemontcg.io/v2/cards/sv4pt5-1 https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Repository named-deck specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee audit-trace-2-pineco.txt
          grep -q 'Secret Box discarded three other cards' audit-trace-2-pineco.txt
          grep -Eq '^T2 \| READY \|' audit-trace-2-pineco.txt

      - name: CI simulate-this pass 3 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Path to the Peak card data: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Field Blower card data: https://api.pokemontcg.io/v2/cards/sm2-125
          # Lock scenario specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee audit-trace-3-rulebox-lock.txt
          grep -Eq '^T[23] \| READY \|' audit-trace-3-rulebox-lock.txt

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure | tee release-suite.txt

      - name: Generate current-run paired T2 and T3 matrix
        run: |
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out audit-t2-t3-matrix.csv
          test "$(wc -l < audit-t2-t3-matrix.csv)" -eq 33

      - name: Upload source-bound audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-audit-20260722-2335
          path: |
            audited-head.txt
            tracked-files.txt
            static-markers.txt
            policy-touchpoints.txt
            source-snapshot.tar.gz
            audit-trace-*.txt
            release-suite.txt
            audit-t2-t3-matrix.csv
            build/Testing
          if-no-files-found: warn
