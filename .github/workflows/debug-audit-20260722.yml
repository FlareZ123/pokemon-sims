name: Debug Audit 20260722

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out audited branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record source identity and inventory
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee audit-head-sha.txt
          git status --short | tee audit-status.txt
          git ls-files | sort | tee audit-file-inventory.txt
          git grep -nE 'TODO|FIXME|XXX|HACK' -- src tests docs scripts README.md CMakeLists.txt > audit-static-markers.txt || true
          # Repository scope and validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          # Policy objective, DCI, K0/K1, locks, and resource priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          # Model bounds and probability interpretation: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run full Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee audit-release-suite.txt

      - name: Simulate-this pass 1 strict JIT baseline
        shell: bash
        run: |
          set -euo pipefail
          # First-turn, Supporter, evolution, attachment, Item, Tool, and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Regidrago V and Celestial Roar: https://api.pokemontcg.io/v2/cards/swsh12-135
          # Regidrago VSTAR and Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Trace policy contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 1 --require-ready-by 4 | tee audit-trace-1.txt
          grep -Eq '^T[234] \| READY \|' audit-trace-1.txt

      - name: Simulate-this pass 2 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled Item-lock scenario contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Forest Seal Stone is a Tool after the Tool errata: https://www.pokemon.com/us/pokemon-news/2023-pokemon-tcg-standard-format-rotation-and-pokemon-tool-errata
          # Forest Seal Stone card text: https://api.pokemontcg.io/v2/cards/swsh12-156
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 3 | tee audit-trace-2.txt
          grep -Eq '^T[23] \| READY \|' audit-trace-2.txt

      - name: Simulate-this pass 3 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Rule Box Ability-lock scenario contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Field Blower: https://api.pokemontcg.io/v2/cards/sm2-125
          # Current source-bound ready seed precedent: https://github.com/FlareZ123/pokemon-sims/commit/ff932f69f2743a307909313c95b6280ae9cb02e3
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 3 | tee audit-trace-3.txt
          grep -Eq '^T[23] \| READY \|' audit-trace-3.txt

      - name: Generate current T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Paired two-deck matrix specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out audit-t2-t3-matrix.csv
          test "$(wc -l < audit-t2-t3-matrix.csv)" -eq 33

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'
          cmake --build build-sanitize --parallel 2

      - name: Run full sanitizer suite
        shell: bash
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          set -o pipefail
          ctest --test-dir build-sanitize --parallel 2 --output-on-failure 2>&1 | tee audit-sanitizer-suite.txt

      - name: Package auditable source snapshot
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=audit-source.tar.gz HEAD
          sha256sum audit-source.tar.gz | tee audit-source.sha256

      - name: Upload audit evidence
        uses: actions/upload-artifact@v4
        with:
          name: debug-audit-20260722
          path: |
            audit-head-sha.txt
            audit-status.txt
            audit-file-inventory.txt
            audit-static-markers.txt
            audit-release-suite.txt
            audit-sanitizer-suite.txt
            audit-trace-1.txt
            audit-trace-2.txt
            audit-trace-3.txt
            audit-t2-t3-matrix.csv
            audit-source.tar.gz
            audit-source.sha256
          if-no-files-found: error
