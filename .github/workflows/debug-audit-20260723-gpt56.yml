name: Debug Audit 20260723 GPT56

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: debug-audit-20260723-gpt56-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python support files
        run: python -m compileall -q scripts tests

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build simulator
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --parallel 2 2>&1 | tee build-output.txt

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee release-suite.txt

      - name: Run three independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-ready and resource-preservation policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Official turn, Item, Supporter, attachment, evolution, Ability, and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 402 | tee audit-trace-shell-strict-first-402.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-supporter-lock/go-second --seed 57 | tee audit-trace-shell-supporter-lock-second-57.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit-rulebox-ability-lock/go-first --seed 211 | tee audit-trace-pineco-rulebox-first-211.txt

      - name: Generate paired T2 T3 matrix
        run: ./build/regidrago_sim --all-decks --trials 100000 --seed 20260705 --out audit-matrix.csv

      - name: Verify paired matrix is source-bound
        run: cmp audit-matrix.csv results/multi_deck_comparison.csv

      - name: Export exact tested source and binaries
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD | tee tested-head.txt
          git archive --format=tar HEAD | gzip -9 > current-tested-source.tar.gz
          cp build/regidrago_sim regidrago_sim-release
          cp build/regidrago_unified_tests regidrago_unified_tests-release

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-audit-20260723-gpt56-${{ github.run_attempt }}
          path: |
            audit-trace-*.txt
            audit-matrix.csv
            tested-head.txt
            build-output.txt
            release-suite.txt
            current-tested-source.tar.gz
            regidrago_sim-release
            regidrago_unified_tests-release
            build/Testing
          if-no-files-found: warn
