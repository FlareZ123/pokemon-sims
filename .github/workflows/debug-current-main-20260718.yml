name: Current Main Debug Validation 20260718

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  traces-and-matrix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'debug/20260718-current-main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: cmake --build build --parallel 2

      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          mkdir -p debug-output
          # Readable trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee debug-output/trace-strict-first-seed-3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 | tee debug-output/trace-turn2-item-lock-second-seed-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee debug-output/trace-matchup-flex-second-seed-11.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out debug-output/t2-t3-matrix.csv

      - name: Archive exact merge source
        run: git archive --format=zip HEAD -o debug-output/source.zip

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-main-debug-20260718
          path: |
            debug-output
            build/Testing
          if-no-files-found: warn
