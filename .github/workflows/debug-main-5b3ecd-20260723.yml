name: Debug Main 5b3ecd 20260723

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify audited main ancestry
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor 5b3ecd36efc5c103d251d3f6187669e3d695fc87 HEAD

      - name: Static repository audit
        shell: bash
        run: |
          set -euo pipefail
          # Repository scope and source contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          # Policy priorities and DCI/JIT rules: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          # Model boundaries and lock semantics: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Rules provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          test -f docs/RULE_SOURCES.md
          test -f docs/RULES_TRACEABILITY.md
          test -f docs/POLICY_DECISIONS.md
          test -f docs/MODEL_ASSUMPTIONS.md
          ! git grep -nE 'TODO|FIXME|XXX' -- src tests docs README.md
          python -m compileall -q scripts

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Simulate-this pass 1 shell strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Ready-state contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#ready-state-and-t5-policy
          # Regidrago VSTAR Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core turn and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-shell-strict-second-1.txt
          grep -Eq '^T[23] \| READY \|' trace-shell-strict-second-1.txt

      - name: Simulate-this pass 2 Pineco strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Registered Pineco deck specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          # Pineco and Forretress ex identities: https://api.pokemontcg.io/v2/cards/sv4pt5-1 https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Secret Box printed discard and search effect: https://api.pokemontcg.io/v2/cards/sv6-163
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee trace-pineco-strict-second-35.txt
          grep -Eq '^T2 \| READY \|' trace-pineco-strict-second-35.txt

      - name: Simulate-this pass 3 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled Item-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Forest Seal Stone Tool status: https://www.pokemon.com/us/pokemon-news/2023-pokemon-tcg-standard-format-rotation-and-pokemon-tool-errata
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee trace-shell-item-lock-25.txt
          grep -Eq '^T2 \| READY \|' trace-shell-item-lock-25.txt

      - name: Simulate-this pass 4 Rule Box Ability lock failure control
        shell: bash
        run: |
          set -euo pipefail
          # Rule Box Ability-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          # Strict JIT requires a payload to enter discard on the ready turn: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Mysterious Treasure searches a Dragon or Psychic Pokémon into hand after discarding its cost: https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 | tee trace-shell-rulebox-lock-20.txt
          grep -Fq 'first-ready turn: not ready through T5' trace-shell-rulebox-lock-20.txt
          grep -Fq 'T5 | SETUP FAILURE |' trace-shell-rulebox-lock-20.txt

      - name: Generate run-specific paired T2/T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Paired 32-row matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260723 --out debug-main-5b3ecd-matrix.csv
          test "$(wc -l < debug-main-5b3ecd-matrix.csv)" -eq 33

      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build sanitizer targets
        run: cmake --build build-sanitizers --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitizers --parallel 2 --output-on-failure

      - name: Upload audit evidence and source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-main-5b3ecd-20260723
          path: |
            trace-*.txt
            debug-main-5b3ecd-matrix.csv
            build/Testing
            build-sanitizers/Testing
            README.md
            CMakeLists.txt
            src
            tests
            scripts
            docs
            results
            .github/workflows
          if-no-files-found: warn
