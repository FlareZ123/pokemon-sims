name: Debug Main d586 20260723 v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify audited main ancestry
        shell: bash
        run: |
          set -euo pipefail
          # Current audited main commit: https://github.com/FlareZ123/pokemon-sims/commit/d58621bf8814e063a33be2a5e57b0aab46345ea5
          git merge-base --is-ancestor d58621bf8814e063a33be2a5e57b0aab46345ea5 HEAD

      - name: Static repository audit
        shell: bash
        run: |
          set -euo pipefail
          # Repository scope: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          # Earliest-ready, resource, K1, and DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          # Lock and simulator boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Rules provenance: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          test -f docs/RULE_SOURCES.md
          test -f docs/RULES_TRACEABILITY.md
          test -f docs/POLICY_DECISIONS.md
          test -f docs/MODEL_ASSUMPTIONS.md
          ! git grep -nE 'TODO|FIXME|XXX' -- src tests docs README.md
          python -m compileall -q scripts

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Simulate-this pass 1 shell strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Ready-state contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#ready-state-and-t5-policy
          # Apex Dragon and GGF cost: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core turn and attack procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-1-shell-strict-second-seed1.txt
          grep -Eq '^T[23] \| READY \|' trace-1-shell-strict-second-seed1.txt

      - name: Simulate-this pass 2 Pineco strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Registered Pineco recipe: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          # Secret Box effect: https://api.pokemontcg.io/v2/cards/sv6-163
          # Forretress ex Exploding Energy: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee trace-2-pineco-strict-second-seed35.txt
          grep -Eq '^T2 \| READY \|' trace-2-pineco-strict-second-seed35.txt

      - name: Simulate-this pass 3 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled Item-lock contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Forest Seal Stone Tool errata: https://www.pokemon.com/us/pokemon-news/2023-pokemon-tcg-standard-format-rotation-and-pokemon-tool-errata
          # Professor Burnet effect: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee trace-3-shell-item-lock-seed25.txt
          grep -Eq '^T2 \| READY \|' trace-3-shell-item-lock-seed25.txt

      - name: Simulate-this pass 4 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Rule Box Ability-lock contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Field Blower: https://api.pokemontcg.io/v2/cards/sm2-125
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 3 | tee trace-4-shell-rulebox-lock-seed13.txt
          grep -Eq '^T[23] \| READY \|' trace-4-shell-rulebox-lock-seed13.txt

      - name: Simulate-this pass 5 seed 23 baseline audit
        shell: bash
        run: |
          set -euo pipefail
          # Existing seed-23 T5 regression: https://github.com/FlareZ123/pokemon-sims/issues/1185
          # Forest Seal Stone can search any card: https://api.pokemontcg.io/v2/cards/swsh12-156
          # Crispin splits two differently typed Basic Energy between attachment and hand: https://api.pokemontcg.io/v2/cards/sv7-133
          # Quick Ball, Latias ex, and Professor Burnet route sources: https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/sv8-76 https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 23 | tee trace-5-shell-strict-first-seed23.txt
          grep -Fq 'first-ready turn: 5' trace-5-shell-strict-first-seed23.txt
          grep -Fq 'T3 | STAR ALCHEMY |' trace-5-shell-strict-first-seed23.txt
          grep -Fq 'Searched any card: Crispin.' trace-5-shell-strict-first-seed23.txt
          grep -Fq 'T5 | READY |' trace-5-shell-strict-first-seed23.txt

      - name: Generate current-run T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Paired two-deck matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260723 --out debug-main-d586-v2-t2-t3-matrix.csv
          test "$(wc -l < debug-main-d586-v2-t2-t3-matrix.csv)" -eq 33

      - name: Configure and run ASan and UBSan
        shell: bash
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitizers --parallel 2
          ctest --test-dir build-sanitizers --parallel 2 --output-on-failure

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-main-d586-20260723-v2
          path: |
            trace-*.txt
            debug-main-d586-v2-t2-t3-matrix.csv
            build/Testing
            build-sanitizers/Testing
          if-no-files-found: warn
