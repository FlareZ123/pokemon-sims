name: Repository-wide debug simulation audit

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  debug-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/20260716-debug-sim-pass
          fetch-depth: 0

      - name: Reconcile exact current main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: cmake --build build --parallel 2

      - name: Run complete Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run simulator self-test
        run: ./build/regidrago_sim --self-test

      - name: Perfect-play pass 1: strict JIT going first
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 13 --require-ready-by 2 | tee build/perfect-trace-1.txt

      - name: Perfect-play pass 2: Rule Box Ability lock
        # Lock contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 44 --require-ready-by 2 | tee build/perfect-trace-2.txt

      - name: Perfect-play pass 3: no-discard control
        # DCI contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
        run: ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 19 --require-ready-by 2 | tee build/perfect-trace-3.txt

      - name: Generate T2 and T3 probability matrix
        # Canonical aggregate command: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/perfect-t2-t3-matrix.csv

      - name: Archive exact source snapshot
        run: git archive --format=zip --output=build/perfect-source.zip HEAD

      - name: Upload perfect-play evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-main-perfect-play-audit
          path: |
            build/perfect-trace-*.txt
            build/perfect-t2-t3-matrix.csv
            build/perfect-source.zip
            build/Testing
          if-no-files-found: warn
