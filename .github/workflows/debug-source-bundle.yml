name: Debug Source Bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Record tested source
        run: git rev-parse HEAD > debug-tested-head.txt
      - name: Upload exact audit tree
        uses: actions/upload-artifact@v4
        with:
          name: debug-source-tree-${{ github.run_attempt }}
          path: |
            .
            !.git
          hidden-files: true
          if-no-files-found: error
