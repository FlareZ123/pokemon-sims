name: Debug Source Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run three targeted simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          # Quick Ball establishes Tapu Lele-GX, Wonder Tag selects Crispin, and
          # Crispin plus the manual attachments reaches the earliest legal GGF turn:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/cel25c-60_A
          # https://api.pokemontcg.io/v2/cards/sv7-133
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/issues/962
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 104 --require-ready-by 3 | tee audit-trace-104.txt
          grep -q "Searched a Basic Pokémon: Tapu Lele-GX" audit-trace-104.txt
          grep -q "WONDER TAG.*Searched and revealed Crispin" audit-trace-104.txt
          grep -q "T3 | READY" audit-trace-104.txt

          # Going second permits Celestial Roar on T1. Its Fire attachment and the
          # T2 Legacy Star payload hit leave only the necessary Grass manual attachment:
          # https://api.pokemontcg.io/v2/cards/swsh12-135
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 160 --require-ready-by 2 | tee audit-trace-160.txt
          grep -q "T1 | ATTACK.*Celestial Roar.*attached Energy: Fire Energy" audit-trace-160.txt
          grep -q "T2 | LEGACY STAR.*Mega Dragonite ex" audit-trace-160.txt
          grep -q "T2 | READY" audit-trace-160.txt

          # Turn-two Item lock makes the held search Items unusable. Celestial Roar
          # supplies Fire on T1, and T3 Legacy Star is the live strict-JIT payload route:
          # https://api.pokemontcg.io/v2/cards/swsh12-135
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 83 --require-ready-by 3 | tee audit-trace-83.txt
          grep -q "T1 | ATTACK.*Celestial Roar.*attached Energy: Fire Energy" audit-trace-83.txt
          grep -q "T3 | LEGACY STAR.*Mega Dragonite ex" audit-trace-83.txt
          grep -q "T3 | READY" audit-trace-83.txt
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Package checked-out source
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt
          git archive --format=tar.gz --output=source-tree.tar.gz HEAD
      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-source-scan-${{ github.run_attempt }}
          path: |
            audit-trace-*.txt
            tested-head.txt
            source-tree.tar.gz
            build/Testing
          if-no-files-found: error
