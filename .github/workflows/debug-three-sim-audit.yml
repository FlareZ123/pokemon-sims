name: Three Simulate-This Audit

on:
  pull_request:
    branches: [main]

jobs:
  audit-three-traces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run full deterministic test suite
        # Canonical policy fixtures and trace surface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
        run: ctest --test-dir build --output-on-failure
      - name: Simulate diagnostic trace 1, strict JIT going second
        # Documented trace interface and observable-information contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 | tee diagnostic-1-strict-jit-go-second-seed-6.txt
      - name: Simulate diagnostic trace 2, strict JIT going first
        # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 20 | tee diagnostic-2-strict-jit-go-first-seed-20.txt
      - name: Simulate diagnostic trace 3, Rule Box Ability lock
        # Lock semantics: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-first --seed 29 | tee diagnostic-3-rulebox-lock-go-first-seed-29.txt
      - name: Simulate clean-pass candidate 1, matchup-flex going second
        # Repository-reviewed trace scenario: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/TRACE_AUDIT.md#reviewed-traces
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 | tee clean-1-matchup-flex-go-second-seed-3.txt
      - name: Simulate clean-pass candidate 2, no-discard-control going first
        # Repository-reviewed trace scenario: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/TRACE_AUDIT.md#reviewed-traces
        run: ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 1 | tee clean-2-no-discard-control-go-first-seed-1.txt
      - name: Simulate clean-pass candidate 3, Rule Box Ability lock going second
        # Repository-reviewed trace scenario: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/TRACE_AUDIT.md#reviewed-traces
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 | tee clean-3-rulebox-lock-go-second-seed-20.txt
      - name: Generate current T2 and T3 matrix
        # Fixed-seed aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Upload trace and matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-simulate-this-audit
          path: |
            diagnostic-*.txt
            clean-*.txt
            t2-t3-matrix.csv
          if-no-files-found: error
