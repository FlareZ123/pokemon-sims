name: Diagnose issue 1049 build

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    if: github.head_ref == 'bug/1049-prefer-steven-over-duplicate-crispin'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Capture compiler diagnostics
        shell: bash
        run: |
          set +e
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release > configure.log 2>&1
          cmake --build build -j 2 > build.log 2>&1
          status=$?
          cat build.log
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-1049-build-diagnostics
          path: |
            configure.log
            build.log
