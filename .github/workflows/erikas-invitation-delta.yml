name: Erika's Invitation Delta

on:
  pull_request:
    paths:
      - 'src/trace_engine_v2/part_000.inc'
      - 'src/trace_engine_v2/part_001.inc'
      - 'src/trace_engine_v2/part_003.inc'
      - 'src/trace_engine_v2/part_016.inc'
      - 'data/decklist.json'
      - 'scripts/audit_card_data.py'
      - 'tests/**'
      - 'docs/CARD_AUDIT.md'
      - 'CMakeLists.txt'
      - 'tools/erikas_invitation_delta.cpp'
      - '.github/workflows/erikas-invitation-delta.yml'

concurrency:
  group: erikas-invitation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  delta-audit:
    runs-on: macos-latest
    steps:
      - name: Check out pull-request merge ref
        uses: actions/checkout@v4
      - name: Build paired delta audit
        run: |
          clang++ -std=c++20 -O3 -Wall -Wextra -Wpedantic -Werror \
            tools/erikas_invitation_delta.cpp \
            -o erikas_invitation_delta
      - name: Run paired Erika versus Mawile comparison
        run: |
          ./erikas_invitation_delta > erikas_invitation_delta.csv
          cat erikas_invitation_delta.csv
      - name: Upload delta statistics
        uses: actions/upload-artifact@v4
        with:
          name: erikas-invitation-delta
          path: erikas_invitation_delta.csv

  focused-regression:
    runs-on: macos-latest
    steps:
      - name: Check out pull-request merge ref
        uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 3
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure | tee ctest.log
      - name: Validate card audit contracts
        run: |
          python3 tests/card_audit_contract_tests.py
          python3 tests/card_audit_category_contract_tests.py
          python3 tests/setup_report_contract_tests.py
      - name: Upload regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erikas-invitation-regression-diagnostics
          path: |
            ctest.log
            build/Testing
          if-no-files-found: warn
