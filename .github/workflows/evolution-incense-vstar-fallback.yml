name: Evolution Incense VSTAR Fallback

on:
  pull_request:

jobs:
  focused-regression:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [release, sanitizers]
    steps:
      - uses: actions/checkout@v4
      - name: Build focused regression
        shell: bash
        run: |
          flags="-std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -UNDEBUG"
          if [[ "${{ matrix.mode }}" == "sanitizers" ]]; then
            flags="$flags -fsanitize=address,undefined -fno-omit-frame-pointer"
          else
            flags="$flags -O2"
          fi
          g++ $flags tests/evolution_incense_vstar_fallback_tests.cpp -o evolution_incense_vstar_fallback_tests
      - name: Run focused regression
        shell: bash
        run: |
          if [[ "${{ matrix.mode }}" == "sanitizers" ]]; then
            ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 ./evolution_incense_vstar_fallback_tests
          else
            ./evolution_incense_vstar_fallback_tests
          fi
