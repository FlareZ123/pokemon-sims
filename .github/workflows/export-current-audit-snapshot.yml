name: Export Current Audit Snapshot

on:
  pull_request:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-main-source-snapshot
          path: .
          include-hidden-files: true
          if-no-files-found: error
