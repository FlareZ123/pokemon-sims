name: Export issue 525 source

on:
  pull_request:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: issue-525-repo
          path: |
            CMakeLists.txt
            src
            tests
            docs
          if-no-files-found: error
