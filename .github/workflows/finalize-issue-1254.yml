name: Finalize issue 1254 on latest main

on:
  push:
    branches: [fix/issue-1254-ultra-continuations-final]

permissions:
  contents: write

concurrency:
  group: finalize-issue-1254
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1254-ultra-continuations-final
          fetch-depth: 0
      - name: Merge latest main
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-commit origin/main || true
          git checkout --theirs -- docs results
          git add docs results
          test -z "$(git diff --name-only --diff-filter=U)"
          git commit --no-edit
      - name: Build and run focused regressions
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1254_ultra_ball_appletun_tests
          ./build/regidrago_unified_tests issue_1254_ultra_ball_appletun_continuation_tests
      - name: Run three simulate-this audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1254-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1254-trace-2.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1254-trace-3.txt
      - name: Regenerate source-bound evidence
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Commit latest-main evidence
        run: |
          rm -f results/*.lock results/.*.lock issue-1254-trace-*.txt .github/workflows/apply-issue-1254-final.yml .github/workflows/finalize-issue-1254.yml scripts/apply_issue_1254_final.py
          git add docs/REPORT.md docs/MULTI_DECK_REPORT.md results/baseline_manifest.json results/simulation_results.csv results/multi_deck_comparison.csv results/multi_deck_manifest.json
          git add -u .github/workflows/apply-issue-1254-final.yml .github/workflows/finalize-issue-1254.yml scripts/apply_issue_1254_final.py
          git diff --cached --check
          git commit -m "Finalize Ultra Ball continuations on latest main"
          git push origin HEAD:fix/issue-1254-ultra-continuations-final
