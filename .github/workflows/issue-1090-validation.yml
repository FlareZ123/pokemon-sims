name: Issue 1090 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Run three independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          # Core procedure rules: https://www.pokemon.com/us/pokemon-tcg/rules
          # Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
          # Arven: https://api.pokemontcg.io/v2/cards/sv1-166
          # Confirmed issue and fix: https://github.com/FlareZ123/pokemon-sims/issues/1090 https://github.com/FlareZ123/pokemon-sims/pull/1095
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 862 --require-ready-by 3 | tee issue-1090-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1090-trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee issue-1090-trace-3.txt
      - name: Reproduce canonical T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-1090-t2-t3-matrix.csv
          cmp results/simulation_results.csv issue-1090-t2-t3-matrix.csv
      - name: Upload traces and matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1090-validation-${{ github.run_attempt }}
          path: |
            issue-1090-trace-*.txt
            issue-1090-t2-t3-matrix.csv
            build/Testing
          if-no-files-found: error
