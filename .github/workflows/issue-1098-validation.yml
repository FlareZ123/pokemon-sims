name: Issue 1098 Validation

# Temporary source-bound validation for https://github.com/FlareZ123/pokemon-sims/issues/1098
on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2

      - name: Run exact regression and four independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1098_late_steven_crispin_treasure_tests

          # Steven ends the turn after searching: https://api.pokemontcg.io/v2/cards/sm7-145
          # Strict-JIT policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 44 --require-ready-by 3 | tee issue-1098-trace-seed-44.txt
          grep -F 'Searched the late Crispin-Treasure route' issue-1098-trace-seed-44.txt
          if grep -F 'T2 | ATTACH |' issue-1098-trace-seed-44.txt; then exit 1; fi

          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 2 | tee audit-trace-unlocked.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee audit-trace-item-lock.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee audit-trace-rulebox-lock.txt

      - name: Run behavior suite before baseline refresh
        run: ctest --test-dir build --parallel 4 --output-on-failure -E setup_report_contract

      - name: Regenerate source-bound traces and 100000-trial matrix
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705

      - name: Refresh generated reports
        run: python scripts/update_setup_docs.py --repo-root .

      - name: Run complete suite against regenerated artifacts
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Commit regenerated source-bound artifacts
        shell: bash
        run: |
          set -euo pipefail
          git add README.md docs/REPORT.md docs/TRACE_AUDIT.md results
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m 'Refresh issue 1098 setup baselines'
            git push origin HEAD:${GITHUB_HEAD_REF}
          fi

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1098-validation-${{ github.run_attempt }}
          path: |
            README.md
            docs/REPORT.md
            docs/TRACE_AUDIT.md
            results
            issue-1098-trace-seed-44.txt
            audit-trace-*.txt
            build/Testing
          if-no-files-found: error
