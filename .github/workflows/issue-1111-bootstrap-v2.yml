name: Issue 1111 Bootstrap and Validation V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-validate-and-publish:
    if: github.head_ref == 'bug/1111-held-blender-before-steven'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1111-held-blender-before-steven
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source-bound patch
        shell: bash
        run: |
          base64 --decode .github/issue1111.patch.b64 > /tmp/issue1111.patch
          git apply --check /tmp/issue1111.patch
          git apply /tmp/issue1111.patch
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Validate focused regression and three simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1111_held_blender_preempts_steven_tests
          ./build/regidrago_unified_tests issue_1023_late_steven_payload_treasure_tests
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 7180 --require-ready-by 3 | tee issue-1111-fixed-seed-7180.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 861 | tee issue-1115-audit-seed-861.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 8697 | tee issue-1117-audit-seed-8697.txt
          # Core procedure rules: https://www.pokemon.com/us/pokemon-tcg/rules
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Run functional suite before baseline refresh
        run: ctest --test-dir build --parallel 4 --output-on-failure -E setup_report_contract
      - name: Regenerate canonical source-bound baselines
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Remove bootstrap files and publish validated changes
        shell: bash
        run: |
          rm .github/workflows/issue-1111-bootstrap.yml
          rm .github/workflows/issue-1111-bootstrap-v2.yml
          rm .github/issue1111.patch.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix held Blender priority over Steven (#1111)'
          git push origin HEAD:bug/1111-held-blender-before-steven
      - name: Upload exact validation snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-1111-validation-${{ github.run_attempt }}
          path: |
            issue-1111-fixed-seed-7180.txt
            issue-1115-audit-seed-861.txt
            issue-1117-audit-seed-8697.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            results/traces
            docs/REPORT.md
            build/Testing
          if-no-files-found: error
