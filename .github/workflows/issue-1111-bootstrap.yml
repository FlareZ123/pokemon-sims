name: Issue 1111 Bootstrap and Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-validate-and-publish:
    if: github.head_ref == 'bug/1111-held-blender-before-steven'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1111-held-blender-before-steven
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply the source-bound issue 1111 fix
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import tempfile
          from pathlib import Path

          root = Path.cwd()

          def atomic_write(path: Path, content: str) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with tempfile.NamedTemporaryFile(
                  mode='w', encoding='utf-8', newline='\n', dir=path.parent, delete=False
              ) as handle:
                  handle.write(content)
                  handle.flush()
                  os.fsync(handle.fileno())
                  temporary = Path(handle.name)
              os.replace(temporary, path)

          source_path = root / 'src/trace_engine_v2/part_010_steven_crispin_override.inc'
          source = source_path.read_text(encoding='utf-8')
          old = '''    const int treasure_targets = static_cast<int>(std::count_if(
              state_.deck.begin(), state_.deck.end(), is_dragon_or_psychic));
              if (treasure_targets < 2) return std::nullopt;

              // Steven may search a Dragon payload into hand, end the current turn, and leave
          '''
          new = '''    // A held Brilliant Blender is a legal current-turn deck-to-discard outlet in
              // this exact state: Active Regidrago VSTAR already pays GGF, Items are legal,
              // and payload is the only missing setup axis. Preserve the shorter one-action
              // completion instead of ending the turn for Steven's slower Treasure bridge:
              // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
              // Steven's Resolve: https://api.pokemontcg.io/v2/cards/sm7-145
              // Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
              // Core Item, Supporter, search, discard, and turn procedure: https://www.pokemon.com/us/pokemon-tcg/rules
              // Earliest-ready route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
              // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1111
              if (hand_count(Card::BrilliantBlender) > 0) return std::nullopt;

              const int treasure_targets = static_cast<int>(std::count_if(
                  state_.deck.begin(), state_.deck.end(), is_dragon_or_psychic));
              if (treasure_targets < 2) return std::nullopt;

              // Steven may search a Dragon payload into hand, end the current turn, and leave
          '''
          if old not in source:
              raise RuntimeError('Issue 1111 source anchor is missing')
          atomic_write(source_path, source.replace(old, new, 1))

          test_path = root / 'tests/issue_1111_held_blender_preempts_steven_tests.cpp'
          test = r'''#define REGIDRAGO_SIM_NO_MAIN
          #include "../src/regidrago_sim.cpp"

          #include <algorithm>
          #include <random>
          #include <stdexcept>
          #include <string>
          #include <utility>

          namespace sim {
          struct EngineTestAccess {
            static void set_state(Engine& engine, State state) {
              engine.state_ = std::move(state);
              engine.deck_seen_ = true;
            }
            static std::optional<Card> bridge_payload(const Engine& engine) {
              return engine.late_steven_payload_treasure_bridge_payload();
            }
            static void run_turn(Engine& engine) { engine.run_turn(); }
            static const State& state(const Engine& engine) { return engine.state_; }
            static const TrialOutcome& outcome(const Engine& engine) { return engine.outcome_; }
            static bool payload_ready(const Engine& engine) { return engine.payload_ready(); }
          };
          }  // namespace sim

          namespace {
          void expect(const bool condition, const char* message) {
            if (!condition) throw std::runtime_error(message);
          }

          bool trace_contains(const sim::TraceLog& trace, const std::string& needle) {
            return std::any_of(trace.lines.begin(), trace.lines.end(),
                               [&needle](const std::string& line) {
                                 return line.find(needle) != std::string::npos;
                               });
          }

          sim::State issue_1111_state(const bool include_blender) {
            sim::State state;
            state.turn = 3;
            state.active = sim::Pokemon{sim::Card::RegidragoVstar, 1, 2, 1,
                                        sim::Tool::None};
            state.hand = {sim::Card::StevensResolve, sim::Card::MysteriousTreasure};
            if (include_blender) state.hand.push_back(sim::Card::BrilliantBlender);
            state.deck = {sim::Card::MegaDragonite, sim::Card::RegidragoV,
                          sim::Card::Grass};
            return state;
          }

          sim::Scenario issue_1111_scenario() {
            return sim::Scenario{"issue-1111-held-blender", sim::DciProfile::StrictJit,
                                 sim::LockMode::None, false, 5};
          }

          void test_held_blender_blocks_late_steven_bridge() {
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{1111};
            sim::Engine engine(issue_1111_scenario(), recipe, rng);
            sim::EngineTestAccess::set_state(engine, issue_1111_state(true));

            // Brilliant Blender directly searches and discards a Dragon payload this turn.
            // Steven's Resolve would end the turn before the already-held Item can resolve:
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://api.pokemontcg.io/v2/cards/sm7-145
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://www.pokemon.com/us/pokemon-tcg/rules
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // https://github.com/FlareZ123/pokemon-sims/issues/1111
            expect(!sim::EngineTestAccess::bridge_payload(engine),
                   "A live held Blender must suppress the slower late Steven bridge.");
          }

          void test_turn_policy_plays_blender_and_reaches_ready_state() {
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{1112};
            sim::TraceLog trace;
            trace.enabled = true;
            sim::Engine engine(issue_1111_scenario(), recipe, rng, &trace);
            sim::EngineTestAccess::set_state(engine, issue_1111_state(true));

            sim::EngineTestAccess::run_turn(engine);
            const sim::State& after = sim::EngineTestAccess::state(engine);
            const sim::TrialOutcome& outcome = sim::EngineTestAccess::outcome(engine);

            // The one-action Item route preserves the Supporter play and establishes the
            // strict-JIT payload on the current ready turn:
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
            // https://github.com/FlareZ123/pokemon-sims/issues/1111
            expect(outcome.used_blender, "The exact state must use Brilliant Blender.");
            expect(!outcome.used_steven, "The exact state must not use Steven's Resolve.");
            expect(!after.supporter_used,
                   "The direct Blender route must leave the Supporter play unused.");
            expect(sim::EngineTestAccess::payload_ready(engine),
                   "Blender must establish the current-turn strict-JIT payload.");
            expect(trace_contains(trace, "T3 | PLAY ITEM | rules: R-BLENDER-01"),
                   "The exact trace must record the T3 Blender play.");
          }

          void test_bridge_remains_available_without_blender() {
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            std::mt19937_64 rng{1113};
            sim::Engine engine(issue_1111_scenario(), recipe, rng);
            sim::EngineTestAccess::set_state(engine, issue_1111_state(false));

            // Preserve the confirmed payload-to-Mysterious-Treasure continuation when the
            // faster Blender outlet is absent:
            // https://api.pokemontcg.io/v2/cards/sm7-145
            // https://api.pokemontcg.io/v2/cards/sm6-113
            // https://github.com/FlareZ123/pokemon-sims/issues/1023
            // https://github.com/FlareZ123/pokemon-sims/issues/1111
            expect(sim::EngineTestAccess::bridge_payload(engine) ==
                       sim::Card::MegaDragonite,
                   "The late Steven bridge must remain live when Blender is absent.");
          }
          }  // namespace

          int main() {
            test_held_blender_blocks_late_steven_bridge();
            test_turn_policy_plays_blender_and_reaches_ready_state();
            test_bridge_remains_available_without_blender();
            return 0;
          }
          '''
          test = '\n'.join(line[10:] if line.startswith('          ') else line for line in test.splitlines()) + '\n'
          atomic_write(test_path, test)

          cmake_path = root / 'CMakeLists.txt'
          cmake = cmake_path.read_text(encoding='utf-8')
          anchor = 'add_test(NAME regidrago_sim_matrix_smoke COMMAND regidrago_sim --trials 100 --seed 20260705 --out ${CMAKE_CURRENT_BINARY_DIR}/smoke_results.csv)\n'
          insert = '''# A held Brilliant Blender must establish the current-turn payload before the
          # turn-ending late Steven-to-Mysterious-Treasure bridge is considered:
          # https://api.pokemontcg.io/v2/cards/sv8-164
          # https://api.pokemontcg.io/v2/cards/sm7-145
          # https://api.pokemontcg.io/v2/cards/sm6-113
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # https://github.com/FlareZ123/pokemon-sims/issues/1111
          add_test(NAME trace_issue_1111_held_blender_preempts_steven
            COMMAND regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 7180 --require-ready-by 3)

          '''
          insert = '\n'.join(line[10:] if line.startswith('          ') else line for line in insert.splitlines()) + '\n'
          if anchor not in cmake:
              raise RuntimeError('Issue 1111 CMake anchor is missing')
          atomic_write(cmake_path, cmake.replace(anchor, insert + anchor, 1))
          PY
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2
      - name: Validate focused regression and seed
        shell: bash
        run: |
          ./build/regidrago_unified_tests issue_1111_held_blender_preempts_steven_tests
          ./build/regidrago_unified_tests issue_1023_late_steven_payload_treasure_tests
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 7180 --require-ready-by 3 | tee issue-1111-fixed-seed-7180.txt
      - name: Run functional suite before baseline refresh
        run: ctest --test-dir build --parallel 4 --output-on-failure -E setup_report_contract
      - name: Regenerate canonical source-bound baselines
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Remove bootstrap and publish validated changes
        shell: bash
        run: |
          rm .github/workflows/issue-1111-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Fix held Blender priority over Steven (#1111)'
          git push origin HEAD:bug/1111-held-blender-before-steven
      - name: Upload exact validation snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-1111-validation-${{ github.run_attempt }}
          path: |
            issue-1111-fixed-seed-7180.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            results/traces
            docs/REPORT.md
            build/Testing
          if-no-files-found: error
