name: Issue 1111 Clean Tree Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  clean-validate-and-publish:
    if: github.head_ref == 'bug/1111-held-blender-before-steven'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1111-held-blender-before-steven
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Remove generated files from the branch
        shell: bash
        run: |
          git rm -r -f --ignore-unmatch build scripts/__pycache__
          git rm -f --ignore-unmatch issue-1111-fixed-seed-7180.txt issue-1115-audit-seed-861.txt issue-1117-audit-seed-8697.txt
          git rm -f --ignore-unmatch results/.simulation_results.csv.*.tmp.lock
      - name: Configure clean out-of-tree Release build
        run: cmake -S . -B /tmp/issue1111-build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build clean tree
        run: cmake --build /tmp/issue1111-build --parallel 2
      - name: Validate exact regression and fixed seed
        shell: bash
        run: |
          /tmp/issue1111-build/regidrago_unified_tests issue_1111_held_blender_preempts_steven_tests
          /tmp/issue1111-build/regidrago_unified_tests issue_1023_late_steven_payload_treasure_tests
          /tmp/issue1111-build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 7180 --require-ready-by 3 | tee /tmp/issue-1111-clean-trace.txt
      - name: Run complete clean-tree Release suite
        run: ctest --test-dir /tmp/issue1111-build --parallel 4 --output-on-failure
      - name: Remove cleanup workflow and publish clean commit
        shell: bash
        run: |
          rm .github/workflows/issue-1111-cleanup.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Remove generated CI artifacts from issue 1111 branch'
          git push origin HEAD:bug/1111-held-blender-before-steven
      - name: Upload clean validation trace and matrix
        uses: actions/upload-artifact@v4
        with:
          name: issue-1111-clean-validation-${{ github.run_attempt }}
          path: |
            /tmp/issue-1111-clean-trace.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            docs/REPORT.md
            /tmp/issue1111-build/Testing
          if-no-files-found: error
