name: Issue 1117 Bootstrap and Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-validate-and-publish:
    if: github.head_ref == 'bug/1117-held-burnet-before-steven'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1117-held-burnet-before-steven
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source-bound patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/issue1117.patch.b64 > /tmp/issue1117.patch
          git apply --check /tmp/issue1117.patch
          git apply /tmp/issue1117.patch
      - name: Configure out-of-tree Release build
        run: cmake -S . -B /tmp/issue1117-build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and unified tests
        run: cmake --build /tmp/issue1117-build --parallel 2
      - name: Validate focused controls and three simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          /tmp/issue1117-build/regidrago_unified_tests issue_1117_held_burnet_preempts_steven_tests
          /tmp/issue1117-build/regidrago_unified_tests issue_1023_late_steven_payload_treasure_tests
          /tmp/issue1117-build/regidrago_unified_tests issue_1111_held_blender_preempts_steven_tests
          /tmp/issue1117-build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 8697 --require-ready-by 4 | tee /tmp/issue-1117-fixed-seed-8697.txt # https://github.com/FlareZ123/pokemon-sims/issues/1117
          /tmp/issue1117-build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 7180 --require-ready-by 3 | tee /tmp/issue-1111-control-seed-7180.txt # https://github.com/FlareZ123/pokemon-sims/issues/1111
          /tmp/issue1117-build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 861 | tee /tmp/issue-1115-audit-seed-861.txt # https://github.com/FlareZ123/pokemon-sims/issues/1115
          # Core procedure rules: https://www.pokemon.com/us/pokemon-tcg/rules
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Run functional suite before baseline refresh
        run: ctest --test-dir /tmp/issue1117-build --parallel 4 --output-on-failure -E setup_report_contract
      - name: Regenerate canonical source-bound baselines
        run: |
          python scripts/regenerate_setup_baselines.py --exe /tmp/issue1117-build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Run complete Release suite
        run: ctest --test-dir /tmp/issue1117-build --parallel 4 --output-on-failure
      - name: Remove bootstrap files and publish validated changes
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/issue-1117-bootstrap.yml
          rm .github/issue1117.patch.b64
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt src/trace_engine_v2/part_010_steven_crispin_override.inc tests/issue_1117_held_burnet_preempts_steven_tests.cpp results/simulation_results.csv results/baseline_manifest.json docs/REPORT.md
          git add -u .github/workflows/issue-1117-bootstrap.yml .github/issue1117.patch.b64
          git commit -m 'Fix held Burnet priority over Steven (#1117)'
          git push origin HEAD:bug/1117-held-burnet-before-steven
      - name: Upload exact validation snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1117-validation-${{ github.run_attempt }}
          path: |
            /tmp/issue-1117-fixed-seed-8697.txt
            /tmp/issue-1111-control-seed-7180.txt
            /tmp/issue-1115-audit-seed-861.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            docs/REPORT.md
            /tmp/issue1117-build/Testing
          if-no-files-found: error
