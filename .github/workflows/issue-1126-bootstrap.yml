name: Issue 1126 Bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validate-and-push:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed issue 1126 patch
        run: python scripts/apply_issue_1126_patch.py # https://github.com/FlareZ123/pokemon-sims/issues/1126
      - name: Configure and build Release
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          cmake --build build --parallel 2 # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Regenerate source-bound baseline
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 100 --trials 100000 --matrix-seed 20260705 # https://github.com/FlareZ123/pokemon-sims/blob/main/results/baseline_manifest.json
          python scripts/update_setup_docs.py --repo-root . # https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
      - name: Run exact regression and three certified traces
        shell: bash
        run: |
          set -euo pipefail
          # Core Bench, Ability, Supporter, discard, attachment, and retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-first --seed 16189 --require-ready-by 5 | tee issue-1126-fixed-seed-16189.txt # https://github.com/FlareZ123/pokemon-sims/issues/1126
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 | tee certified-1-strict-second-seed-1.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 | tee certified-2-strict-first-seed-2.txt # https://github.com/FlareZ123/pokemon-sims/issues/919
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 3 | tee certified-3-full-item-lock-second-seed-3.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1126-validation
          path: |
            issue-1126-fixed-seed-16189.txt
            certified-*.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            docs/REPORT.md
            build/Testing
          if-no-files-found: error
      - name: Replace bootstrap with validated implementation
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git rm scripts/apply_issue_1126_patch.py .github/workflows/issue-1126-bootstrap.yml
          git config user.name "pokemon-sims CI"
          git config user.email "actions@users.noreply.github.com"
          git add CMakeLists.txt src/trace_engine_v2/part_004.inc src/trace_engine_v2/part_012.inc src/trace_engine_v2/part_014b.inc tests/issue_1126_latias_serena_preempts_gladion_tests.cpp results docs/REPORT.md
          git commit -m "Fix Latias Serena priority over Gladion (#1126)"
          git push origin "HEAD:${HEAD_BRANCH}"
