name: Materialize Issue 1154 Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply the confirmed payload-axis fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/trace_engine_v2/part_009b1.inc')
          source = path.read_text(encoding='utf-8')
          old = '''  std::optional<Card> quick_ball_final_surplus_energy_cost() const {
            if (scenario_.dci != DciProfile::MatchupFlexJit || item_locked() ||
                !state_.manual_energy_used || !need_active_vstar() || need_energy() ||
                !benched_vstar_promotion_ready() || !state_.active ||
                !is_basic(state_.active->card) || state_.retreat_used ||
                bench_space() == 0 || !ability_available_for_pokemon(Card::LatiasEx) ||
                in_play(Card::LatiasEx) || hand_count(Card::LatiasEx) > 0 ||
                !might_be_unseen(Card::LatiasEx) ||
                hand_count(Card::BrilliantBlender) == 0 || !need_payload() ||
                !payload_might_be_in_deck()) {
              return std::nullopt;
            }

            // Once the selected Benched Regidrago VSTAR already has GGF, the final held
            // Basic Energy advances no remaining setup axis. After ordinary lower-DCI
            // costs fail, Quick Ball may spend that observable surplus to search Latias ex;
            // Skyliner promotes the VSTAR and held Brilliant Blender supplies the same-turn
            // matchup-flex-JIT payload. Keep this fallback confined to that complete route:
            // Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
            // Latias ex / Skyliner: https://api.pokemontcg.io/v2/cards/sv8-76
            // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
            // Regidrago VSTAR / Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136
            // Core Item, discard, Bench, Ability, and retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules
            // Dynamic DCI and earliest route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1146
            if (grass_needed() == 0 && hand_count(Card::Grass) == 1) return Card::Grass;
            if (fire_needed() == 0 && hand_count(Card::Fire) == 1) return Card::Fire;
            return std::nullopt;
          }
          '''
          new = '''  std::optional<Card> quick_ball_final_surplus_energy_cost() const {
            const bool payload_already_ready = payload_ready();
            const bool blender_payload_route =
                hand_count(Card::BrilliantBlender) > 0 && can_play_payload_this_turn() &&
                payload_might_be_in_deck();
            const bool burnet_payload_route =
                supporter_allowed() && hand_count(Card::ProfessorBurnet) > 0 &&
                can_play_payload_this_turn() && payload_might_be_in_deck();
            if (scenario_.dci != DciProfile::MatchupFlexJit || item_locked() ||
                !state_.manual_energy_used || !need_active_vstar() || need_energy() ||
                !benched_vstar_promotion_ready() || !state_.active ||
                !is_basic(state_.active->card) || state_.retreat_used ||
                bench_space() == 0 || !ability_available_for_pokemon(Card::LatiasEx) ||
                in_play(Card::LatiasEx) || hand_count(Card::LatiasEx) > 0 ||
                !might_be_unseen(Card::LatiasEx) ||
                (!payload_already_ready && !blender_payload_route &&
                 !burnet_payload_route)) {
              return std::nullopt;
            }

            // Once the selected Benched Regidrago VSTAR already has GGF, the final held
            // Basic Energy advances no remaining setup axis. After ordinary lower-DCI
            // costs fail, Quick Ball may spend that observable surplus to search Latias ex.
            // The payload axis may already be complete this turn, or the remaining legal
            // action sequence may complete it through held Brilliant Blender or Professor
            // Burnet. Keep this fallback confined to those complete observable routes:
            // Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
            // Latias ex / Skyliner: https://api.pokemontcg.io/v2/cards/sv8-76
            // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
            // Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
            // Regidrago VSTAR / Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136
            // Core Item, discard, Bench, Ability, and retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules
            // Dynamic DCI and earliest route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // Confirmed bugs: https://github.com/FlareZ123/pokemon-sims/issues/1146 https://github.com/FlareZ123/pokemon-sims/issues/1154
            if (grass_needed() == 0 && hand_count(Card::Grass) == 1) return Card::Grass;
            if (fire_needed() == 0 && hand_count(Card::Fire) == 1) return Card::Fire;
            return std::nullopt;
          }
          '''
          if source.count(old) != 1:
              raise SystemExit('Expected exactly one current-main helper block.')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY
          # Quick Ball, Latias ex, Burnet, Blender, Apex Dragon, and core procedure:
          # https://api.pokemontcg.io/v2/cards/swsh1-179
          # https://api.pokemontcg.io/v2/cards/sv8-76
          # https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          # https://api.pokemontcg.io/v2/cards/sv8-164
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://www.pokemon.com/us/pokemon-tcg/rules
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1154
      - name: Build and run focused regressions
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ctest --test-dir build -R 'issue_1154|issue_1146' --output-on-failure | tee issue-1154-focused-tests.txt
          # Exact-state test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Regenerate source-bound evidence
        shell: bash
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          # Canonical generation contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
      - name: Run complete validation
        shell: bash
        run: |
          ctest --test-dir build --parallel 4 --output-on-failure | tee issue-1154-complete-tests.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 35 | tee issue-1154-trace-control.txt
          # Validation and trace contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Commit the tested tree to the issue branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/issue-1154-materialize.yml
          git add src tests results docs README.md
          git commit -m 'Fix Quick Ball payload-axis surplus routing (#1154)'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload exact validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1154-materialized-validation
          path: |
            issue-1154-focused-tests.txt
            issue-1154-complete-tests.txt
            issue-1154-trace-control.txt
            results/baseline_manifest.json
            results/simulation_results.csv
            results/traces
            docs/REPORT.md
            docs/TRACE_AUDIT.md
          if-no-files-found: warn
