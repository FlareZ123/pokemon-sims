name: Materialize Issue 1166 Evidence

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'bug/1166-wonder-tag-future-gladion'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Build the exact branch
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run focused issue regression
        shell: bash
        run: |
          ctest --test-dir build -R 'issue_1166' --output-on-failure | tee issue-1166-focused-tests.txt
          # Wonder Tag: https://api.pokemontcg.io/v2/cards/cel25c-60_A
          # Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1166
      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          # Canonical generators: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
      - name: Run complete validation and three trace audits
        shell: bash
        run: |
          ctest --test-dir build --parallel 4 --output-on-failure | tee issue-1166-complete-tests.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 7 | tee issue-1166-trace-seed7.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 143 | tee issue-1166-trace-seed143.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 63 | tee issue-1166-trace-seed63.txt
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest legal route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
      - name: Commit tested generated evidence
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/issue-1166-materialize.yml
          git add results docs
          git commit -m 'Refresh issue 1166 source-bound evidence'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload exact validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1166-materialized-validation
          path: |
            issue-1166-focused-tests.txt
            issue-1166-complete-tests.txt
            issue-1166-trace-seed7.txt
            issue-1166-trace-seed143.txt
            issue-1166-trace-seed63.txt
            results/baseline_manifest.json
            results/simulation_results.csv
            results/traces
            docs/REPORT.md
            docs/TRACE_AUDIT.md
          if-no-files-found: warn
