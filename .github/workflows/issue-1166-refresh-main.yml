name: Refresh Issue 1166 On Main

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'bug/1166-wonder-tag-future-gladion'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Merge current main and resolve generated evidence
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          set +e
          git merge --no-edit origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            unresolved="$(git diff --name-only --diff-filter=U)"
            printf '%s\n' "$unresolved"
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              case "$path" in
                docs/REPORT.md|docs/TRACE_AUDIT.md|results/baseline_manifest.json|results/simulation_results.csv)
                  git checkout --theirs -- "$path"
                  git add "$path"
                  ;;
                *)
                  echo "Unexpected merge conflict: $path" >&2
                  exit 1
                  ;;
              esac
            done <<< "$unresolved"
            git commit --no-edit
          fi
          # Main integration: https://github.com/FlareZ123/pokemon-sims/tree/main
      - name: Build and regenerate combined evidence
        shell: bash
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ctest --test-dir build -R 'issue_1165|issue_1166' --output-on-failure | tee issue-1166-combined-focused-tests.txt
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          ctest --test-dir build --parallel 4 --output-on-failure | tee issue-1166-combined-complete-tests.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 7 | tee issue-1166-combined-seed7.txt
          # Wonder Tag: https://api.pokemontcg.io/v2/cards/cel25c-60_A
          # Professor Turo's Scenario: https://api.pokemontcg.io/v2/cards/sv4-171
          # Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Confirmed bugs: https://github.com/FlareZ123/pokemon-sims/issues/1165 https://github.com/FlareZ123/pokemon-sims/issues/1166
      - name: Commit the tested integrated tree
        shell: bash
        run: |
          git rm .github/workflows/issue-1166-refresh-main.yml
          git add results docs
          git commit -m 'Integrate issue 1166 with current main evidence'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload combined validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1166-current-main-validation
          path: |
            issue-1166-combined-focused-tests.txt
            issue-1166-combined-complete-tests.txt
            issue-1166-combined-seed7.txt
            results/baseline_manifest.json
            results/simulation_results.csv
            docs/REPORT.md
            docs/TRACE_AUDIT.md
          if-no-files-found: warn
