namespace sim {

struct EngineTestAccess {
  static void set_known_state(Engine& engine, State state,
                              const bool prizes_revealed = true) {
    engine.state_ = std::move(state);
    engine.deck_seen_ = false;
    engine.prizes_revealed_ = prizes_revealed;
  }
  static std::optional<Card> first_cost(const Engine& engine) {
    return engine.treasure_vessel_first_redundant_payload_cost();
  }
  static std::optional<Card> second_cost(const Engine& engine) {
    return engine.treasure_vessel_second_redundant_payload_cost();
  }
  static bool play_treasure(Engine& engine) {
    return engine.play_mysterious_treasure(false);
  }
  static void play_basics(Engine& engine) { engine.play_basics_from_hand(); }
  static bool play_vessel(Engine& engine) {
    return engine.play_earthen_vessel(false);
  }
  static bool attach_manual(Engine& engine) { return engine.attach_manual(); }
};

}  // namespace sim

namespace {

void expect(const bool condition, const std::string_view message) {
  if (!condition) throw std::runtime_error(std::string(message));
}

struct Fixture {
  explicit Fixture(const sim::LockMode locks = sim::LockMode::None,
                   const int max_turn = 5)
      : scenario{"issue-1167", sim::DciProfile::StrictJit, locks, true,
                 max_turn},
        recipe{sim::baseline_recipe()},
        rng{1167},
        engine{scenario, recipe, rng} {}

  sim::Scenario scenario;
  sim::DeckRecipe recipe;
  std::mt19937_64 rng;
  sim::Engine engine;
};

sim::State route_state() {
  sim::State state;
  state.turn = 2;
  state.supporter_used = true;
  state.active = sim::Pokemon{sim::Card::TapuLeleGX, 1, 0, 0,
                              sim::Tool::None};
  state.hand = {sim::Card::EarthenVessel, sim::Card::MysteriousTreasure,
                sim::Card::MegaDragonite, sim::Card::MegaDragonite,
                sim::Card::GoodraVstar, sim::Card::Lusamine,
                sim::Card::Fire, sim::Card::ProfessorTuro};
  state.deck = {sim::Card::RegidragoV, sim::Card::RegidragoVstar,
                sim::Card::Gladion, sim::Card::Grass, sim::Card::Grass,
                sim::Card::Dragapult, sim::Card::Channeler};
  state.prizes = {sim::Card::Gladion, sim::Card::MysteriousTreasure,
                  sim::Card::QuickBall, sim::Card::QuickBall,
                  sim::Card::Arven, sim::Card::Oricorio};
  return state;
}

int count(const std::vector<sim::Card>& cards, const sim::Card card) {
  return static_cast<int>(std::count(cards.begin(), cards.end(), card));
}

void test_exact_paid_search_chain() {
  Fixture fixture;
  sim::EngineTestAccess::set_known_state(fixture.engine, route_state());

  // Two identical Mega Dragonite ex copies may pay the two one-card costs while
  // Goodra remains protected for the later strict-JIT ready turn:
  // Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
  // Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
  // Mega Dragonite ex: https://api.pokemontcg.io/v2/cards/me2pt5-152
  // Hisuian Goodra VSTAR: https://api.pokemontcg.io/v2/cards/swsh11-136
  // Regidrago V: https://api.pokemontcg.io/v2/cards/swsh12-135
  // Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
  // Dynamic DCI: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
  // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1167
  expect(sim::EngineTestAccess::first_cost(fixture.engine) ==
             sim::Card::MegaDragonite,
         "Treasure did not recognize the first redundant payload cost.");
  expect(sim::EngineTestAccess::play_treasure(fixture.engine),
         "Mysterious Treasure did not resolve the first source-bounded step.");
  expect(count(fixture.engine.state().discard, sim::Card::MegaDragonite) == 1,
         "Treasure did not discard exactly one Mega Dragonite ex.");
  expect(count(fixture.engine.state().hand, sim::Card::RegidragoV) == 1,
         "Treasure did not search Regidrago V.");
  expect(count(fixture.engine.state().hand, sim::Card::GoodraVstar) == 1,
         "The distinct strict-JIT payload was not protected.");

  sim::EngineTestAccess::play_basics(fixture.engine);
  expect(fixture.engine.state().bench.size() == 1 &&
             fixture.engine.state().bench.front().card == sim::Card::RegidragoV,
         "The searched Regidrago V was not Benched.");
  expect(sim::EngineTestAccess::second_cost(fixture.engine) ==
             sim::Card::MegaDragonite,
         "Vessel did not recognize the matching second payload cost.");
  expect(sim::EngineTestAccess::play_vessel(fixture.engine),
         "Earthen Vessel did not resolve the second source-bounded step.");
  expect(count(fixture.engine.state().discard, sim::Card::MegaDragonite) == 2,
         "The two paid searches did not spend both redundant copies.");
  expect(count(fixture.engine.state().hand, sim::Card::GoodraVstar) == 1,
         "Vessel consumed the distinct protected payload.");
  expect(count(fixture.engine.state().hand, sim::Card::Grass) == 2,
         "Vessel did not search both Grass Energy.");
  expect(sim::EngineTestAccess::attach_manual(fixture.engine),
         "The first searched Grass Energy was not manually attached.");
  expect(fixture.engine.state().bench.front().grass == 1,
         "The searched Regidrago V did not receive the Grass attachment.");
}

void expect_first_rejected(sim::State state, const std::string_view label,
                           const sim::LockMode locks = sim::LockMode::None,
                           const int max_turn = 5,
                           const bool prizes_revealed = true) {
  Fixture fixture{locks, max_turn};
  sim::EngineTestAccess::set_known_state(
      fixture.engine, std::move(state), prizes_revealed);
  expect(!sim::EngineTestAccess::first_cost(fixture.engine).has_value(), label);
}

void test_projection_boundaries() {
  sim::State state = route_state();
  state.hand.erase(std::find(state.hand.begin(), state.hand.end(),
                             sim::Card::MegaDragonite));
  expect_first_rejected(std::move(state), "One redundant copy must be insufficient.");

  state = route_state();
  state.hand.erase(std::find(state.hand.begin(), state.hand.end(),
                             sim::Card::GoodraVstar));
  expect_first_rejected(std::move(state), "A distinct protected payload is required.");

  state = route_state();
  state.deck.erase(std::find(state.deck.begin(), state.deck.end(),
                             sim::Card::RegidragoV));
  expect_first_rejected(std::move(state), "An absent Regidrago V target must reject.");

  state = route_state();
  state.deck.erase(std::find(state.deck.begin(), state.deck.end(),
                             sim::Card::Grass));
  expect_first_rejected(std::move(state), "Two searchable Grass Energy are required.");

  state = route_state();
  state.prizes.erase(std::find(state.prizes.begin(), state.prizes.end(),
                               sim::Card::MysteriousTreasure));
  expect_first_rejected(std::move(state), "The known prized Treasure is required.");

  state = route_state();
  state.bench.assign(5, sim::Pokemon{sim::Card::RegidragoV, 1, 0, 0,
                                     sim::Tool::None});
  expect_first_rejected(std::move(state), "A full Bench must reject the route.");

  expect_first_rejected(route_state(), "Item lock must reject the route.",
                        sim::LockMode::FullItem);
  expect_first_rejected(route_state(), "The T5 horizon is required.",
                        sim::LockMode::None, 4);
  expect_first_rejected(route_state(), "Unknown Prize locations must reject.",
                        sim::LockMode::None, 5, false);

  state = route_state();
  state.deck.erase(std::find(state.deck.begin(), state.deck.end(),
                             sim::Card::Gladion));
  expect_first_rejected(std::move(state), "The downstream Gladion is required.");

  state = route_state();
  state.deck.erase(std::find(state.deck.begin(), state.deck.end(),
                             sim::Card::RegidragoVstar));
  expect_first_rejected(std::move(state), "The downstream VSTAR is required.");
}

void test_lower_dci_cost_stays_first() {
  sim::State state = route_state();
  state.hand.push_back(sim::Card::EarthenVessel);
  Fixture fixture;
  sim::EngineTestAccess::set_known_state(fixture.engine, std::move(state));
  expect(sim::EngineTestAccess::play_treasure(fixture.engine),
         "Treasure did not resolve with lower-DCI fodder.");
  expect(count(fixture.engine.state().discard, sim::Card::EarthenVessel) == 1,
         "The duplicated ordinary Item was not preferred as the cost.");
  expect(count(fixture.engine.state().hand, sim::Card::MegaDragonite) == 2,
         "A payload was spent before lower-DCI fodder.");
}

void test_second_cost_requires_first_paid_step() {
  sim::State state = route_state();
  state.hand.erase(std::find(state.hand.begin(), state.hand.end(),
                             sim::Card::MysteriousTreasure));
  state.hand.erase(std::find(state.hand.begin(), state.hand.end(),
                             sim::Card::MegaDragonite));
  state.bench = {sim::Pokemon{sim::Card::RegidragoV, 2, 0, 0,
                              sim::Tool::None}};
  Fixture fixture;
  sim::EngineTestAccess::set_known_state(fixture.engine, std::move(state));
  expect(!sim::EngineTestAccess::second_cost(fixture.engine).has_value(),
         "Vessel must require the matching first paid step.");
}

void test_seed_7_source_bounded_finish() {
  const auto scenario = sim::scenario_by_label("strict-jit/go-first");
  expect(scenario.has_value(), "The strict go-first scenario is missing.");
  sim::DeckRecipe recipe{sim::baseline_recipe()};
  std::mt19937_64 rng{7};
  sim::TraceLog trace{true, {}};
  sim::Engine engine{*scenario, recipe, rng, &trace};
  const sim::TrialOutcome outcome = engine.run();

  const auto has_line = [&trace](const std::string_view text) {
    return std::any_of(trace.lines.begin(), trace.lines.end(),
                       [text](const std::string& line) {
      return line.find(text) != std::string::npos;
    });
  };

  // This full seed uses K1 or held cards across both real shuffles. The protected
  // Goodra is discarded by the T5 Treasure on the actual ready turn:
  // https://api.pokemontcg.io/v2/cards/sm6-113
  // https://api.pokemontcg.io/v2/cards/sv4-163
  // https://api.pokemontcg.io/v2/cards/sv4-171
  // https://api.pokemontcg.io/v2/cards/cel25c-60_A
  // https://api.pokemontcg.io/v2/cards/sm4-95
  // https://api.pokemontcg.io/v2/cards/swsh12-136
  // Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
  // Confirmed bugs: https://github.com/FlareZ123/pokemon-sims/issues/1165
  // https://github.com/FlareZ123/pokemon-sims/issues/1166
  // https://github.com/FlareZ123/pokemon-sims/issues/1167
  expect(outcome.first_ready_turn == 5,
         "Seed 7 did not reach the source-bounded T5 ready state.");
  expect(has_line("Mega Dragonite ex (Mysterious Treasure cost)"),
         "Seed 7 omitted the first paid payload.");
  expect(has_line("Mega Dragonite ex (Earthen Vessel cost)"),
         "Seed 7 omitted the second paid payload.");
  expect(has_line("Professor Turo") && has_line("Wonder Tag"),
         "Seed 7 omitted the Turo and Wonder Tag connector chain.");
  expect(has_line("Hisuian Goodra VSTAR (Mysterious Treasure cost)"),
         "Seed 7 did not discard the protected payload on T5.");
  expect(has_line("T5 | READY"), "Seed 7 did not record T5 readiness.");
}

}  // namespace

int main() {
  test_exact_paid_search_chain();
  test_projection_boundaries();
  test_lower_dci_cost_stays_first();
  test_second_cost_requires_first_paid_step();
  test_seed_7_source_bounded_finish();
  return 0;
}
