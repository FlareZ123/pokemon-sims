  bool treasure_vessel_source_bounded_route_common() const {
    // Gladion's Prize reveal establishes K1 for this fixed-list model. No future
    // draw after either mandatory shuffle is consulted by this projection:
    // Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
    // Dynamic DCI: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
    // Hidden information and shuffle boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#hidden-information-policy
    // Earliest source-bounded route: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
    // Strict-JIT timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1167
    return scenario_.dci == DciProfile::StrictJit &&
        scenario_.locks == LockMode::None && scenario_.going_first &&
        state_.turn == 2 && state_.turn + 3 <= scenario_.max_turn &&
        state_.supporter_used && !state_.manual_energy_used && state_.active &&
        state_.active->card == Card::TapuLeleGX &&
        state_.active->grass == 0 && state_.active->fire == 0 &&
        state_.active->tool == Tool::None && prizes_known() &&
        hand_count(Card::Fire) > 0 && hand_count(Card::ProfessorTuro) > 0 &&
        deck_count_after_search_started(Card::RegidragoVstar) > 0 &&
        deck_count_after_search_started(Card::Gladion) > 0 &&
        deck_count_after_search_started(Card::Grass) >= 2 &&
        prize_count_after_reveal(Card::MysteriousTreasure) > 0 &&
        need_payload();
  }

  std::optional<Card> treasure_vessel_first_redundant_payload_cost() const {
    if (!treasure_vessel_source_bounded_route_common() || item_locked() ||
        !need_regi() || bench_space() == 0 ||
        hand_count(Card::MysteriousTreasure) == 0 ||
        hand_count(Card::EarthenVessel) == 0 ||
        deck_count_after_search_started(Card::RegidragoV) == 0) {
      return std::nullopt;
    }

    // Mysterious Treasure discards one other hand card and searches a Dragon or
    // Psychic Pokemon. Spend one copy only when a second identical payload and a
    // distinct later strict-JIT payload remain protected:
    // Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
    // Mega Dragonite ex: https://api.pokemontcg.io/v2/cards/me2pt5-152
    // Hisuian Goodra VSTAR: https://api.pokemontcg.io/v2/cards/swsh11-136
    // Regidrago V: https://api.pokemontcg.io/v2/cards/swsh12-135
    // Core discard, search, shuffle, and Bench procedure: https://www.pokemon.com/us/pokemon-tcg/rules
    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1167
    for (const Card candidate : {Card::MegaDragonite, Card::Dragapult,
                                 Card::GoodraVstar, Card::DialgaGX}) {
      if (hand_count(candidate) < 2) continue;
      const bool distinct_payload_remains = std::any_of(
          state_.hand.begin(), state_.hand.end(), [candidate](const Card card) {
            return card != candidate && is_payload(card);
          });
      if (distinct_payload_remains) return candidate;
    }
    return std::nullopt;
  }

  std::optional<Card> treasure_vessel_second_redundant_payload_cost() const {
    const bool current_turn_regi = std::any_of(
        state_.bench.begin(), state_.bench.end(), [this](const Pokemon& pokemon) {
          return pokemon.card == Card::RegidragoV &&
              pokemon.entered_turn == state_.turn;
        });
    if (!treasure_vessel_source_bounded_route_common() || item_locked() ||
        !current_turn_regi || !need_vstar() || !need_energy() ||
        hand_count(Card::EarthenVessel) == 0 ||
        count_of(state_.discard, Card::MysteriousTreasure) == 0) {
      return std::nullopt;
    }

    // Earthen Vessel discards another card before searching up to two Basic Energy.
    // Require the matching first paid payload in this turn's public discard history,
    // then spend its second held copy while a different payload stays protected:
    // Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
    // Mega Dragonite ex: https://api.pokemontcg.io/v2/cards/me2pt5-152
    // Hisuian Goodra VSTAR: https://api.pokemontcg.io/v2/cards/swsh11-136
    // Regidrago VSTAR / Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136
    // Core discard, search, shuffle, and attachment procedure: https://www.pokemon.com/us/pokemon-tcg/rules
    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1167
    for (const Card candidate : {Card::MegaDragonite, Card::Dragapult,
                                 Card::GoodraVstar, Card::DialgaGX}) {
      if (hand_count(candidate) == 0 ||
          count_of(state_.discarded_this_turn, candidate) == 0) {
        continue;
      }
      const bool distinct_payload_remains = std::any_of(
          state_.hand.begin(), state_.hand.end(), [candidate](const Card card) {
            return card != candidate && is_payload(card);
          });
      if (distinct_payload_remains) return candidate;
    }
    return std::nullopt;
  }

