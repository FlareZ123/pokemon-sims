name: Issue 1167 Source Export

on:
  push:
    branches: [bug/1167-strict-dci-treasure-vessel-chain]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1167-strict-dci-treasure-vessel-chain
      - name: Export exact branch source
        run: git archive --format=tar.gz --output=issue-1167-source.tar.gz HEAD # Repository traceability: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: issue-1167-source-${{ github.sha }}
          path: issue-1167-source.tar.gz
          if-no-files-found: error
