name: Issue 1185 Materialize and Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize-and-validate:
    if: github.event.pull_request.head.ref == 'fix/1185-strict-jit-surplus-energy'
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize the confirmed route fix and focused regressions
        shell: bash
        run: |
          python .github/scripts/materialize_issue_1185.py
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 23 | tee issue-1185-seed-23.txt # https://github.com/FlareZ123/pokemon-sims/issues/1185
          grep -q "T5 | READY" issue-1185-seed-23.txt
          grep -q "T5 | PLAY SUPPORTER.*R-BURNET-01" issue-1185-seed-23.txt # https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 2 --require-ready-by 3 | tee pass-2.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 73 --require-ready-by 2 | tee pass-3.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Regenerate source-bound setup baselines
        run: |
          rm -f .results.lock
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results
          python scripts/update_setup_docs.py
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit materialized source, tests, and baselines
        shell: bash
        run: |
          rm -f .issue-1185-materializer.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_009b1.inc tests/issue_1146_quick_ball_surplus_energy_tests.cpp tests/issue_1185_quick_ball_strict_surplus_energy_tests.cpp results docs
          if ! git diff --cached --quiet; then
            git commit -m "Fix strict-JIT surplus Energy recovery (#1185)"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Upload matrix and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1185-validation-${{ github.run_attempt }}
          path: |
            issue-1185-seed-23.txt
            pass-2.txt
            pass-3.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            build/Testing
          if-no-files-found: warn
