name: Issue 1185 Materialize and Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-1185-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Materialize the confirmed route fix and focused regressions
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import fcntl
          import os
          import tempfile
          from pathlib import Path

          ROOT = Path.cwd()

          def atomic_write(path: Path, text: str) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with tempfile.NamedTemporaryFile(
                  mode="w", encoding="utf-8", newline="\n", dir=path.parent, delete=False
              ) as handle:
                  handle.write(text)
                  temporary = Path(handle.name)
              os.replace(temporary, path)

          with (ROOT / ".issue-1185-materializer.lock").open("w") as lock:
              fcntl.flock(lock, fcntl.LOCK_EX)

              source_path = ROOT / "src/trace_engine_v2/part_009b1.inc"
              source = source_path.read_text(encoding="utf-8")
              old_gate = """    if (scenario_.dci != DciProfile::MatchupFlexJit || item_locked() ||
"""
              new_gate = """    const bool route_allows_surplus_energy =
        scenario_.dci == DciProfile::MatchupFlexJit ||
        scenario_.dci == DciProfile::StrictJit;  // Confirmed strict-JIT route: https://github.com/FlareZ123/pokemon-sims/issues/1185
    if (!route_allows_surplus_energy || item_locked() ||
"""
              if old_gate in source:
                  source = source.replace(old_gate, new_gate, 1)
              elif new_gate not in source:
                  raise RuntimeError("Issue 1185 profile gate was not found.")
              source = source.replace(
                  "https://github.com/FlareZ123/pokemon-sims/issues/1155\n    if (grass_needed()",
                  "https://github.com/FlareZ123/pokemon-sims/issues/1155 https://github.com/FlareZ123/pokemon-sims/issues/1185\n    if (grass_needed()",
                  1,
              )
              atomic_write(source_path, source)

              prior_test_path = ROOT / "tests/issue_1146_quick_ball_surplus_energy_tests.cpp"
              prior_test = prior_test_path.read_text(encoding="utf-8")
              old_expectation = """  const sim::Scenario strict{\"issue-1146-strict\", sim::DciProfile::StrictJit,
                             sim::LockMode::None, false, 5};
  blocked(route_state(), strict, 114606,
          \"Strict DCI must keep the singleton Energy protected.\");
"""
              new_expectation = """  const sim::Scenario strict{\"issue-1146-strict\", sim::DciProfile::StrictJit,
                             sim::LockMode::None, false, 5};
  std::mt19937_64 strict_rng{114606};
  sim::Engine strict_engine = make_engine(strict, strict_rng, route_state());
  // Strict JIT may spend the final Energy after GGF is complete only when
  // Latias ex plus the held payload outlet completes the observable ready turn:
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/sv8-76
  // https://api.pokemontcg.io/v2/cards/sv8-164
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
  // https://github.com/FlareZ123/pokemon-sims/issues/1185
  expect(sim::EngineTestAccess::final_surplus_cost(strict_engine) ==
             sim::Card::Grass,
         \"Strict JIT must admit the complete route-conditioned surplus Energy.\");

  sim::State strict_no_blender = route_state();
  strict_no_blender.hand.erase(
      std::find(strict_no_blender.hand.begin(), strict_no_blender.hand.end(),
                sim::Card::BrilliantBlender));
  blocked(strict_no_blender, strict, 114609,
          \"Strict JIT must protect Energy without a ready-turn payload route.\");
"""
              if old_expectation in prior_test:
                  prior_test = prior_test.replace(old_expectation, new_expectation, 1)
              elif new_expectation not in prior_test:
                  raise RuntimeError("Issue 1146 strict-JIT control was not found.")
              atomic_write(prior_test_path, prior_test)

              focused_test = r'''#define REGIDRAGO_SIM_NO_MAIN
#include "../src/regidrago_sim.cpp"

#include <algorithm>
#include <iostream>
#include <random>
#include <stdexcept>
#include <string>
#include <string_view>
#include <utility>

namespace sim {
struct EngineTestAccess {
  static void set_state(Engine& engine, State state) {
    engine.state_ = std::move(state);
    engine.deck_seen_ = true;
  }
  static std::optional<Card> final_surplus_cost(const Engine& engine) {
    return engine.quick_ball_final_surplus_energy_cost();
  }
};
}  // namespace sim

namespace {
void expect(const bool condition, const char* message) {
  if (!condition) throw std::runtime_error(message);
}

bool trace_contains(const sim::TraceLog& trace, const std::string_view first,
                    const std::string_view second = {}) {
  return std::any_of(trace.lines.begin(), trace.lines.end(),
                     [first, second](const std::string& line) {
                       return line.find(first) != std::string::npos &&
                           (second.empty() || line.find(second) != std::string::npos);
                     });
}

sim::State route_state() {
  sim::State state;
  state.turn = 5;
  state.manual_energy_used = true;
  state.active = sim::Pokemon{sim::Card::Oricorio, 1};
  state.bench = {sim::Pokemon{sim::Card::RegidragoVstar, 1, 2, 1,
                              sim::Tool::ForestSealStone}};
  state.hand = {sim::Card::QuickBall, sim::Card::Fire,
                sim::Card::ProfessorBurnet};
  state.deck = {sim::Card::LatiasEx, sim::Card::MegaDragonite,
                sim::Card::Dragapult};
  return state;
}

sim::Engine make_engine(const sim::Scenario& scenario, std::mt19937_64& rng,
                        sim::State state) {
  static const sim::DeckRecipe recipe = sim::baseline_recipe();
  sim::Engine engine(scenario, recipe, rng);
  sim::EngineTestAccess::set_state(engine, std::move(state));
  return engine;
}

void test_route_and_controls() {
  const sim::Scenario strict{"issue-1185", sim::DciProfile::StrictJit,
                             sim::LockMode::None, true, 5};
  std::mt19937_64 rng{118500};
  sim::Engine engine = make_engine(strict, rng, route_state());

  // The selected Regidrago VSTAR already has GGF. Quick Ball may therefore use
  // the final Fire only when Latias ex plus Burnet completes the Active and
  // strict-JIT payload axes on this turn:
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/sv8-76
  // https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
  // https://api.pokemontcg.io/v2/cards/swsh12-136
  // https://www.pokemon.com/us/pokemon-tcg/rules
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
  // https://github.com/FlareZ123/pokemon-sims/issues/1185
  expect(sim::EngineTestAccess::final_surplus_cost(engine) == sim::Card::Fire,
         "Strict JIT must admit the route-conditioned surplus Fire.");

  const auto blocked = [&](sim::State state, const sim::Scenario& scenario,
                           const std::uint64_t seed, const char* message) {
    std::mt19937_64 local_rng{seed};
    sim::Engine blocked_engine = make_engine(scenario, local_rng, std::move(state));
    expect(!sim::EngineTestAccess::final_surplus_cost(blocked_engine), message);
  };

  sim::State missing_energy = route_state();
  missing_energy.bench.front().fire = 0;
  blocked(missing_energy, strict, 118501, "Incomplete GGF must protect Energy.");

  sim::State no_burnet = route_state();
  no_burnet.hand.erase(std::find(no_burnet.hand.begin(), no_burnet.hand.end(),
                                 sim::Card::ProfessorBurnet));
  blocked(no_burnet, strict, 118502, "Strict JIT must require a payload route.");

  sim::State no_latias = route_state();
  no_latias.deck.erase(std::find(no_latias.deck.begin(), no_latias.deck.end(),
                                 sim::Card::LatiasEx));
  blocked(no_latias, strict, 118503, "The route must require Latias ex.");

  const sim::Scenario item_lock{"issue-1185-item-lock", sim::DciProfile::StrictJit,
                                sim::LockMode::FullItem, true, 5};
  blocked(route_state(), item_lock, 118504, "Item lock must block Quick Ball.");

  const sim::Scenario ability_lock{"issue-1185-ability-lock",
                                   sim::DciProfile::StrictJit,
                                   sim::LockMode::FullRuleBoxAbility, true, 5};
  blocked(route_state(), ability_lock, 118505,
          "Rule Box Ability lock must block Skyliner.");
}

void test_seed_23_recovery() {
  const auto scenario = sim::scenario_by_label("strict-jit/go-first");
  if (!scenario) throw std::runtime_error("Missing strict-jit/go-first scenario");
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{23};
  sim::TraceLog trace;
  trace.enabled = true;
  sim::Engine engine(*scenario, recipe, rng, &trace);
  const sim::TrialOutcome outcome = engine.run();

  // This exact current-main state must use the printed Quick Ball, Skyliner,
  // Burnet, and retreat sequence, while T5 remains a setup loss:
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/sv8-76
  // https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/T5_FAILURE_POLICY.md
  // https://github.com/FlareZ123/pokemon-sims/issues/1185
  expect(outcome.first_ready_turn == 5, "Seed 23 must record T5 readiness.");
  expect(outcome.setup_failed, "T5 readiness must remain a setup loss.");
  expect(trace_contains(trace, "T5 | DISCARD", "Fire Energy"),
         "Quick Ball must spend the surplus Fire.");
  expect(trace_contains(trace, "T5 | PLAY ITEM", "Latias ex"),
         "Quick Ball must search Latias ex.");
  expect(trace_contains(trace, "T5 | PLAY SUPPORTER", "R-BURNET-01"),
         "The ready turn must use Professor Burnet.");
  expect(trace_contains(trace, "T5 | RETREAT", "R-LATIAS-01"),
         "Skyliner must enable the retreat.");
  expect(trace_contains(trace, "T5 | READY"), "Seed 23 must emit readiness.");
  expect(!trace_contains(trace, "T5 | PLAY SUPPORTER", "Tate & Liza draw mode"),
         "Blind Tate draw must not preempt the deterministic route.");
}
}  // namespace

int main() {
  try {
    test_route_and_controls();
    test_seed_23_recovery();
    std::cout << "Issue 1185 tests passed\n";
    return 0;
  } catch (const std::exception& error) {
    std::cerr << error.what() << '\n';
    return 1;
  }
}
'''
              atomic_write(
                  ROOT / "tests/issue_1185_quick_ball_strict_surplus_energy_tests.cpp",
                  focused_test,
              )
          PY
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 23 | tee issue-1185-seed-23.txt # Confirmed route: https://github.com/FlareZ123/pokemon-sims/issues/1185
          grep -q "T5 | READY" issue-1185-seed-23.txt
          grep -q "T5 | PLAY SUPPORTER.*R-BURNET-01" issue-1185-seed-23.txt # Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 2 --require-ready-by 3 | tee pass-2.txt # Repository trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 73 --require-ready-by 2 | tee pass-3.txt # DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Regenerate source-bound setup baselines
        run: |
          rm -f .results.lock
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results
          python scripts/update_setup_docs.py
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit materialized source, tests, and baselines
        shell: bash
        run: |
          rm -f .issue-1185-materializer.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_009b1.inc tests/issue_1146_quick_ball_surplus_energy_tests.cpp tests/issue_1185_quick_ball_strict_surplus_energy_tests.cpp results docs
          if ! git diff --cached --quiet; then
            git commit -m "Fix strict-JIT surplus Energy recovery (#1185)"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Upload exact traces and T2/T3 matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1185-validation-${{ github.run_attempt }}
          path: |
            issue-1185-seed-23.txt
            pass-2.txt
            pass-3.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            build/Testing
          if-no-files-found: warn
