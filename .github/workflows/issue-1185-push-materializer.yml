name: Issue 1185 Push Materializer

on:
  push:
    branches: [fix/1185-strict-jit-surplus-energy]

permissions:
  contents: write

concurrency:
  group: issue-1185-push
  cancel-in-progress: true

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract and run the source-bound materializer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = Path('.github/workflows/issue-1185-materialize-and-validate.yml').read_text(encoding='utf-8')
          start_marker = '      - name: Materialize the confirmed route fix and focused regressions\n        shell: bash\n        run: |\n'
          end_marker = '      - name: Configure Release\n'
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          script = textwrap.dedent(workflow[start:end])
          subprocess.run(['bash', '-lc', script], check=True)
          PY
      - name: Configure and build Release
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 23 | tee issue-1185-seed-23.txt # https://github.com/FlareZ123/pokemon-sims/issues/1185
          grep -q "T5 | READY" issue-1185-seed-23.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 2 --require-ready-by 3 | tee pass-2.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 73 --require-ready-by 2 | tee pass-3.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Regenerate canonical matrix and run all tests
        run: |
          rm -f .results.lock
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results
          python scripts/update_setup_docs.py
          ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit the validated source, tests, and generated evidence
        shell: bash
        run: |
          rm -f .issue-1185-materializer.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/trace_engine_v2/part_009b1.inc tests/issue_1146_quick_ball_surplus_energy_tests.cpp tests/issue_1185_quick_ball_strict_surplus_energy_tests.cpp results docs
          if ! git diff --cached --quiet; then
            git commit -m "Fix strict-JIT surplus Energy recovery (#1185)"
            git push origin HEAD:fix/1185-strict-jit-surplus-energy
          fi
      - name: Upload matrix and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1185-push-validation-${{ github.run_attempt }}
          path: |
            issue-1185-seed-23.txt
            pass-2.txt
            pass-3.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            build/Testing
          if-no-files-found: warn
