name: Issue 1191 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run issue regression and three independent traces
        shell: bash
        run: |
          set -euo pipefail
          # Official Supporter, search, Energy, evolution, Ability, retreat, and attack procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest complete source-bounded route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 509 --require-ready-by 2 | tee issue-1191-seed-509.txt # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1191
          grep -q "Searched up to 3 cards: Regidrago VSTAR, Crispin, Latias ex" issue-1191-seed-509.txt # Steven, Crispin, Latias: https://api.pokemontcg.io/v2/cards/sm7-145 https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/sv8-76
          grep -q "T2 | READY" issue-1191-seed-509.txt # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          ! grep -q "exchanged Gladion for Oricorio" issue-1191-seed-509.txt # Gladion and Oricorio: https://api.pokemontcg.io/v2/cards/sm4-95 https://api.pokemontcg.io/v2/cards/sm2-55
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 | tee pass-1-strict-second-seed-1.txt # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 91 | tee pass-2-strict-first-seed-91.txt # DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-first --seed 173 | tee pass-3-flex-first-seed-173.txt # DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Run focused regression
        run: ./build/regidrago_unified_tests issue_1191_steven_before_oricorio_tests # Exact controls: https://github.com/FlareZ123/pokemon-sims/issues/1191
      - name: Regenerate canonical traces and matrix
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705 # Atomic baseline contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
      - name: Regenerate setup documentation
        run: python scripts/update_setup_docs.py --repo-root . # Atomic documentation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
      - name: Run complete Release suite against regenerated provenance
        run: ctest --test-dir build --parallel 4 --output-on-failure # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Record generated diff
        shell: bash
        run: git diff -- README.md docs/REPORT.md docs/TRACE_AUDIT.md results > issue-1191-generated.patch # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/results/baseline_manifest.json
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1191-validation-${{ github.run_attempt }}
          path: |
            issue-1191-seed-509.txt
            pass-*.txt
            issue-1191-generated.patch
            README.md
            docs/REPORT.md
            docs/TRACE_AUDIT.md
            results/simulation_results.csv
            results/baseline_manifest.json
            results/traces
            build/Testing
          if-no-files-found: error
