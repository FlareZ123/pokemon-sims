name: Issue 1199 Baseline Refresh

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Validate focused route and independent traces
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure -R issue_1199 # Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1199
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 341 --require-ready-by 3 | tee issue-1199-seed-341.txt # Steven: https://api.pokemontcg.io/v2/cards/sm7-145
          grep -q "T1 | PLAY SUPPORTER.*Searched the issue-1199 T3 package" issue-1199-seed-341.txt # Blender: https://api.pokemontcg.io/v2/cards/sv8-164
          ! grep -q "T1 | WONDER TAG" issue-1199-seed-341.txt # Tapu Lele-GX: https://api.pokemontcg.io/v2/cards/cel25c-60_A
          ! grep -q "T1 | STAR ALCHEMY" issue-1199-seed-341.txt # Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156
          ! grep -q "T1 | CELESTIAL ROAR" issue-1199-seed-341.txt # Regidrago V: https://api.pokemontcg.io/v2/cards/swsh12-135
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 11 --require-ready-by 3 | tee control-seed-11.txt # Merged control: https://github.com/FlareZ123/pokemon-sims/issues/1197
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 293 --require-ready-by 4 | tee control-seed-293.txt # Source-bounded control: https://github.com/FlareZ123/pokemon-sims/issues/1022
          ctest --test-dir build --parallel 4 --output-on-failure -E setup_report_contract # Baseline contract: https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md
      - name: Regenerate canonical baseline
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 100 --trials 100000 --matrix-seed 20260705 # Reproducibility contract: https://github.com/FlareZ123/pokemon-sims/blob/main/results/README.md
      - name: Update generated reports
        run: python scripts/update_setup_docs.py # Report generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
      - name: Validate refreshed full suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Official procedure: https://www.pokemon.com/us/pokemon-tcg/rules
      - name: Upload refreshed baseline
        uses: actions/upload-artifact@v4
        with:
          name: issue-1199-baseline-refresh-${{ github.run_attempt }}
          path: |
            issue-1199-seed-341.txt
            control-seed-11.txt
            control-seed-293.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            results/traces
            docs/REPORT.md
            docs/TRACE_AUDIT.md
            README.md
          if-no-files-found: error
