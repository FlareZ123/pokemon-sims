name: Issue 1250 branch patch

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/issue-1250-pokemon-communication-universe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1250-pokemon-communication-universe
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply exact anchored patch
        run: PYTHONPATH=. python tools/issue_1250_branch_patch.py
      - name: Commit source, regression, and provenance
        run: |
          rm tools/issue_1250_branch_patch.py
          rm .github/workflows/issue-1250-branch-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement Pokémon Communication connector coverage for #1250"
          git push origin HEAD:fix/issue-1250-pokemon-communication-universe
