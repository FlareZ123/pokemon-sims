name: Issue 1254 branch patch

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/issue-1254-ultra-ball-appletun'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1254-ultra-ball-appletun
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/issue_1254_branch_patch.py
      - name: Commit clean issue branch
        run: |
          rm tools/issue_1254_branch_patch.py
          rm .github/workflows/issue-1254-branch-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Include Appletun in Ultra Ball routes for #1254"
          git push origin HEAD:fix/issue-1254-ultra-ball-appletun
