name: Issue 1293 baseline refresh

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the final simulator
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Refresh source-bound baselines
        run: |
          python - <<'PY'
          import json
          import os
          import tempfile
          from pathlib import Path

          from scripts.baseline_provenance import simulator_policy_source_digest

          root = Path.cwd()
          path = root / "results" / "baseline_manifest.json"
          manifest = json.loads(path.read_text(encoding="utf-8"))
          manifest["simulator_policy_source_sha256"] = simulator_policy_source_digest(root)
          with tempfile.NamedTemporaryFile(
              mode="w", encoding="utf-8", newline="\n", dir=path.parent, delete=False
          ) as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
              handle.write("\n")
              temporary = Path(handle.name)
          os.replace(temporary, path)
          PY
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Validate generated contracts
        run: |
          python tests/setup_report_contract_tests.py
          python tests/multi_deck_report_contract_tests.py
      - name: Commit generated evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-1293-baseline-refresh.yml
          git add README.md docs results
          git commit -m "Refresh issue 1293 setup baselines"
          git push origin HEAD:${{ github.head_ref }}
