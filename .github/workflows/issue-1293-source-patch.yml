name: Issue 1293 source patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Add the Appletun Burnet bank selector
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/trace_engine_v2/part_010_fss_override.inc")
          text = path.read_text(encoding="utf-8")
          old = """  Card fss_target_after_search_started() const {\n    if (fss_should_bank_tate_for_next_turn_blender_route()) return Card::TateLiza;\n"""
          new = """  Card fss_target_after_search_started() const {\n    const bool appletun_burnet_bank = deck_seen_ && !supporter_allowed() &&\n        !state_.vstar_power_used && state_.turn < scenario_.max_turn &&\n        need_payload() && !need_regi() && !need_vstar() && !need_energy() &&\n        !need_active_vstar() && can_play_payload_this_turn() &&\n        hand_count(Card::ProfessorBurnet) == 0 &&\n        deck_count_after_search_started(Card::Appletun) > 0 &&\n        deck_count_after_search_started(Card::ProfessorBurnet) > 0;\n    // Arven has consumed this turn's Supporter play while every setup axis except\n    // the Appletun payload is complete. Star Alchemy should bank Professor Burnet\n    // for the next modeled turn, where Burnet can search and discard Appletun for\n    // Apex Dragon. This remains legal through Item lock and Rule Box Ability lock:\n    // Appletun: https://api.pokemontcg.io/v2/cards/sv8-140\n    // Arven: https://api.pokemontcg.io/v2/cards/sv1-166\n    // Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156\n    // Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26\n    // Regidrago VSTAR and Apex Dragon: https://api.pokemontcg.io/v2/cards/swsh12-136\n    // Tool, Supporter, search, and turn procedure: https://www.pokemon.com/us/pokemon-tcg/rules\n    // Forest Seal Stone ruling: https://compendium.pokegym.net/category/5-trainers/forest-seal-stone/\n    // Earliest-route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities\n    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1293\n    if (appletun_burnet_bank) return Card::ProfessorBurnet;\n\n    if (fss_should_bank_tate_for_next_turn_blender_route()) return Card::TateLiza;\n"""
          if text.count(old) != 1:
              raise SystemExit("selector anchor was not unique")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1293-patched-source
          path: src/trace_engine_v2/part_010_fss_override.inc
          if-no-files-found: error
