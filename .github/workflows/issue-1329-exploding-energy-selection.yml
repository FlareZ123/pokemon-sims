name: Issue 1329 Exploding Energy Selection

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Integrate latest main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit -X theirs origin/main

      - name: Apply production and expectation fixes
        run: |
          # Forretress ex Exploding Energy: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Core search, attachment, Knock Out, promotion, and Retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Resource-preservation policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Confirmed stale-claim bug: https://github.com/FlareZ123/pokemon-sims/issues/1329
          python scripts/apply_issue_1329_fix.py
          python scripts/apply_issue_1329_expectation_updates.py

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused exact-state regressions
        run: ctest --test-dir build -R 'issue_1329_exploding_energy_selection|forretress_ex_combo|issue_1248_latias_skyliner_forretress' --output-on-failure

      - name: Simulate-this pass 1 minimal Steven route
        shell: bash
        run: |
          set -euo pipefail
          # Forretress ex may search for up to five: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Seed contract: https://github.com/FlareZ123/pokemon-sims/issues/1329
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1329-trace-35.txt
          grep -q 'T2 | USE ABILITY |.*Exploding Energy attached 1 Basic Grass Energy' issue-1329-trace-35.txt
          grep -q 'T2 | READY |' issue-1329-trace-35.txt

      - name: Simulate-this pass 2 second minimal route
        shell: bash
        run: |
          set -euo pipefail
          # Forretress ex may select fewer than five: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Resource-preservation policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Seed contract: https://github.com/FlareZ123/pokemon-sims/issues/1329
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 424242 --require-ready-by 2 | tee issue-1329-trace-424242.txt
          grep -q 'T2 | USE ABILITY |.*Exploding Energy attached 1 Basic Grass Energy' issue-1329-trace-424242.txt
          grep -q 'T2 | READY |' issue-1329-trace-424242.txt

      - name: Simulate-this pass 3 paid Tapu retreat
        shell: bash
        run: |
          set -euo pipefail
          # Tapu Lele-GX Retreat Cost one: https://api.pokemontcg.io/v2/cards/sm2-60
          # Forretress ex distribution: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Core Retreat procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee issue-1329-trace-18.txt
          grep -q 'T2 | USE ABILITY |.*Exploding Energy attached 3 Basic Grass Energy' issue-1329-trace-18.txt
          grep -q 'T2 | RETREAT |.*Used Grass Energy attached by Exploding Energy' issue-1329-trace-18.txt
          grep -q 'T2 | READY |' issue-1329-trace-18.txt

      - name: Regenerate source-bound shell evidence
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .

      - name: Regenerate source-bound paired evidence
        run: |
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Generate run-specific T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Paired matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1329-t2-t3-matrix.csv

      - name: Configure ASan and UBSan
        run: >-
          cmake -S . -B build-sanitizers -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build sanitizer targets
        run: cmake --build build-sanitizers --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitizers --parallel 2 --output-on-failure

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1329-exploding-energy-selection
          path: |
            issue-1329-trace-*.txt
            issue-1329-t2-t3-matrix.csv
            build/Testing
            build-sanitizers/Testing
            results/baseline_manifest.json
            results/multi_deck_manifest.json
          if-no-files-found: warn

      - name: Commit validated production and evidence updates
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_forretress_ex_combo.inc tests docs results
          if ! git diff --cached --quiet; then
            git commit -m 'Select only needed Exploding Energy attachments (#1329)'
          fi
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
