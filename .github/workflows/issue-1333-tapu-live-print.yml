name: Issue 1333 Tapu Live Print

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-validated-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply validated exact-print correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          import subprocess
          from pathlib import Path

          # Pokémon TCG Live supports Sun & Moon prints while Celebrations Classic
          # Collection remains unavailable for play:
          # https://support.pokemon.com/hc/en-us/articles/6489934466708-Pok%C3%A9mon-TCG-Live-Migration-FAQ-from-the-Pok%C3%A9mon-TCG-Online
          # Exact playable Tapu Lele-GX print and Wonder Tag text:
          # https://api.pokemontcg.io/v2/cards/sm2-60
          # Validated issue and CI artifact:
          # https://github.com/FlareZ123/pokemon-sims/issues/1333
          # https://github.com/FlareZ123/pokemon-sims/actions/runs/29897422138
          repo = Path.cwd()
          old_id = "cel25c-" + "60_A"
          new_id = "sm2-60"
          support_url = (
              "https://support.pokemon.com/hc/en-us/articles/"
              "6489934466708-Pok%C3%A9mon-TCG-Live-Migration-FAQ-from-the-"
              "Pok%C3%A9mon-TCG-Online"
          )
          card_url = "https://api.pokemontcg.io/v2/cards/sm2-60"
          suffixes = {
              ".cpp", ".inc", ".py", ".md", ".txt", ".json", ".cmake",
          }
          root_files = {"CMakeLists.txt", "README.md", "SIM-PLAN.md"}

          tracked = subprocess.check_output(
              ["git", "ls-files", "-z"]
          ).decode("utf-8").split("\0")
          for relative in tracked:
              if not relative or relative.startswith(".github/"):
                  continue
              path = repo / relative
              if not path.is_file():
                  continue
              if path.suffix not in suffixes and path.name not in root_files:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              updated = text.replace(old_id, new_id)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")

          audit_path = repo / "scripts" / "audit_card_data.py"
          audit = audit_path.read_text(encoding="utf-8")
          audit_marker = "REQUESTED: dict[str, tuple[str, int]] = {"
          audit_comment = "\n".join([
              "# Pokémon TCG Live supports Sun & Moon prints while Celebrations Classic Collection",
              "# remains unavailable for play; use the original Guardians Rising print here:",
              f"# {support_url}",
              f"# {card_url}",
              "",
          ])
          if support_url not in audit:
              audit = audit.replace(audit_marker, audit_comment + audit_marker, 1)
              audit_path.write_text(audit, encoding="utf-8")

          sources_path = repo / "docs" / "RULE_SOURCES.md"
          sources = sources_path.read_text(encoding="utf-8")
          procedure = "- Core procedure reference: https://www.pokemon.com/us/pokemon-tcg/rules\n"
          availability = f"- Pokémon TCG Live print availability: {support_url}\n"
          if availability not in sources:
              sources = sources.replace(procedure, procedure + availability, 1)
              sources_path.write_text(sources, encoding="utf-8")

          cmake_path = repo / "CMakeLists.txt"
          cmake = cmake_path.read_text(encoding="utf-8")
          if "issue_1333_tapu_live_print_contract" not in cmake:
              block = "\n".join([
                  "",
                  "# The Pokémon TCG Live recipe must use the playable Guardians Rising Tapu Lele-GX",
                  "# print rather than the unavailable Celebrations Classic Collection variant:",
                  f"# {support_url}",
                  f"# {card_url}",
                  "# https://github.com/FlareZ123/pokemon-sims/issues/1333",
                  "add_test(NAME issue_1333_tapu_live_print_contract",
                  "  COMMAND ${Python3_EXECUTABLE}",
                  "    ${CMAKE_CURRENT_SOURCE_DIR}/tests/issue_1333_tapu_live_print_tests.py)",
                  "",
              ])
              cmake_path.write_text(cmake.rstrip() + block, encoding="utf-8")

          from scripts.baseline_provenance import simulator_policy_source_digest

          digest = simulator_policy_source_digest(repo)
          old_digest = None
          for relative in (
              "results/baseline_manifest.json",
              "results/multi_deck_manifest.json",
          ):
              path = repo / relative
              payload = json.loads(path.read_text(encoding="utf-8"))
              prior = payload["simulator_policy_source_sha256"]
              if old_digest is None:
                  old_digest = prior
              elif prior != old_digest:
                  raise AssertionError("Source-bound manifests disagree before update")
              payload["simulator_policy_source_sha256"] = digest
              path.write_text(
                  json.dumps(payload, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )

          if old_digest is None:
              raise AssertionError("Missing source-bound manifest digest")
          report_path = repo / "docs" / "MULTI_DECK_REPORT.md"
          report = report_path.read_text(encoding="utf-8")
          if old_digest not in report and digest not in report:
              raise AssertionError("Multi-deck report has no recognized source digest")
          report_path.write_text(report.replace(old_digest, digest), encoding="utf-8")

          if digest != "675364764ae80a7427d135a8bfdd5caa366894df262e2ce2df3672dd2091e0a3":
              raise AssertionError(f"Unexpected validated source digest: {digest}")
          PY

      - name: Run provenance contract and diff checks
        shell: bash
        run: |
          set -euo pipefail
          python tests/issue_1333_tapu_live_print_tests.py
          git diff --check
          test "$(git grep -l 'cel25c-60_A' -- src tests docs scripts data CMakeLists.txt 2>/dev/null | wc -l)" -eq 0

      - name: Commit validated fix to PR branch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Use TCG Live Tapu Lele-GX print (#1333)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
