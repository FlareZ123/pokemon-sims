name: Issue 1335 Held Payload Costed Search

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply held-payload projection fix
        run: python scripts/apply_issue_1335_fix.py

      - name: Commit production fix to PR branch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- src/trace_engine_v2/part_009a.inc src/trace_engine_v2/part_009b1.inc; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_009a.inc src/trace_engine_v2/part_009b1.inc
          git commit -m 'Preserve held payload through costed searches (#1335)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused regression
        run: ./build/regidrago_unified_tests issue_1335_quick_ball_held_payload_tests

      - name: Refresh source-bound canonical baselines
        shell: bash
        run: |
          set -euo pipefail
          python scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260705 \
            --out results/multi_deck_comparison.csv
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          from pathlib import Path

          from scripts.baseline_provenance import simulator_policy_source_digest

          root = Path('.').resolve()
          csv_path = root / 'results' / 'multi_deck_comparison.csv'
          manifest_path = root / 'results' / 'multi_deck_manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['comparison_csv_sha256'] = hashlib.sha256(csv_path.read_bytes()).hexdigest()
          manifest['simulator_policy_source_sha256'] = simulator_policy_source_digest(root)
          temporary = manifest_path.with_suffix('.json.tmp')
          temporary.write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          os.replace(temporary, manifest_path)
          PY
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Simulate-this pass 1 resource-preserving seed 107
        shell: bash
        run: |
          set -euo pipefail
          # Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Mega Dragonite ex: https://api.pokemontcg.io/v2/cards/me2pt5-152
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Resource policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1335
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 107 --require-ready-by 3 | tee issue-1335-pass-seed107.txt
          if grep -q 'T3 | DISCARD | Grass Energy (Quick Ball cost)' issue-1335-pass-seed107.txt; then
            echo 'Seed 107 still spends the redundant Quick Ball route' >&2
            exit 1
          fi
          if grep -q 'T3 | DISCARD | Grass Energy (Mysterious Treasure cost)' issue-1335-pass-seed107.txt; then
            echo 'Seed 107 still spends the symmetric redundant Treasure route' >&2
            exit 1
          fi
          grep -q 'T3 | DISCARD | Mega Dragonite ex (Mysterious Treasure cost)' issue-1335-pass-seed107.txt
          grep -q 'T3 | READY |' issue-1335-pass-seed107.txt

      - name: Simulate-this pass 2 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1335-pass-item-lock.txt
          grep -q 'T2 | READY |' issue-1335-pass-item-lock.txt

      - name: Simulate-this pass 3 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Lock policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment
          # Oricorio: https://api.pokemontcg.io/v2/cards/sm2-55
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee issue-1335-pass-rulebox-lock.txt
          grep -Eq 'T[23] \| READY \|' issue-1335-pass-rulebox-lock.txt

      - name: Generate current-run paired T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1335-matrix.csv

      - name: Configure sanitizers
        run: >-
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build sanitizers
        run: cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Package validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1335-held-payload-costed-search
          path: |
            issue-1335-pass-*.txt
            issue-1335-matrix.csv
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitize/Testing
          if-no-files-found: error

      - name: Commit refreshed baselines to PR branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize issue-1335-pass-*.txt issue-1335-matrix.csv
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs results
          git commit -m 'Refresh source-bound setup baselines (#1335)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
