name: Issue 1341 Burnet Held Payload

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Verify source fix is committed
        run: |
          python scripts/apply_issue_1341_fix.py
          git diff --exit-code -- src/trace_engine_v2/part_014b.inc

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused regression
        run: ./build/regidrago_unified_tests issue_1341_burnet_held_payload_tests

      - name: Run complete Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Simulate-this pass 1 strict JIT going first
        shell: bash
        run: |
          set -euo pipefail
          # Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1341
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 107 --require-ready-by 3 | tee issue-1341-pass-strict-first.txt
          grep -q 'T3 | READY |' issue-1341-pass-strict-first.txt

      - name: Simulate-this pass 2 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Professor Burnet remains legal under Item lock: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          # Scheduled lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Item-lock card identity: https://api.pokemontcg.io/v2/cards/me2pt5-16
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1341-pass-item-lock.txt
          grep -q 'T2 | READY |' issue-1341-pass-item-lock.txt

      - name: Simulate-this pass 3 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Lock policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment
          # Professor Burnet: https://api.pokemontcg.io/v2/cards/swsh12tg-TG26
          # Oricorio: https://api.pokemontcg.io/v2/cards/sm2-55
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee issue-1341-pass-rulebox-lock.txt
          grep -Eq 'T[23] \| READY \|' issue-1341-pass-rulebox-lock.txt

      - name: Generate paired T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1341-matrix.csv

      - name: Configure sanitizers
        run: cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON

      - name: Build sanitizers
        run: cmake --build build-sanitize --parallel 2

      - name: Run sanitizer focused regression
        run: ./build-sanitize/regidrago_unified_tests issue_1341_burnet_held_payload_tests

      - name: Package validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1341-burnet-held-payload
          path: |
            issue-1341-pass-*.txt
            issue-1341-matrix.csv
          if-no-files-found: warn
