name: Issue 1341 Regenerate Current Main Baselines

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Regenerate shell baselines
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705

      - name: Regenerate paired deck baselines
        run: python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705

      - name: Refresh generated reports
        run: |
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Validate regenerated Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Commit regenerated evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build scripts/__pycache__
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Regenerate issue 1341 baselines on current main'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
