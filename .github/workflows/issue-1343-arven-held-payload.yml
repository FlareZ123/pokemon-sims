name: Issue 1343 Arven Held Payload

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Verify confirmed source fix is committed
        run: |
          # Arven: https://api.pokemontcg.io/v2/cards/sv1-166
          # Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Ultra Ball: https://api.pokemontcg.io/v2/cards/swsh12pt5-146
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core rules: https://www.pokemon.com/us/pokemon-tcg/rules
          # Repository policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1343
          python scripts/apply_issue_1343_fix.py
          git diff --exit-code -- src/trace_engine_v2/part_012_override.inc

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused regression
        run: ./build/regidrago_unified_tests issue_1343_arven_held_payload_tests

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Simulate-this pass 1 strict JIT going second
        shell: bash
        run: |
          set -euo pipefail
          # Arven: https://api.pokemontcg.io/v2/cards/sv1-166
          # Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1343
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 2 | tee issue-1343-pass-1.txt
          grep -q 'T2 | READY |' issue-1343-pass-1.txt

      - name: Simulate-this pass 2 strict JIT going first
        shell: bash
        run: |
          set -euo pipefail
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1343
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 2 --require-ready-by 3 | tee issue-1343-pass-2.txt
          grep -q 'T3 | READY |' issue-1343-pass-2.txt

      - name: Simulate-this pass 3 matchup-flex JIT
        shell: bash
        run: |
          set -euo pipefail
          # Decision policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Issue: https://github.com/FlareZ123/pokemon-sims/issues/1343
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1343-pass-3.txt
          grep -q 'T2 | READY |' issue-1343-pass-3.txt

      - name: Generate paired T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1343-matrix.csv

      - name: Configure sanitizers
        run: cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON

      - name: Build sanitizers
        run: cmake --build build-sanitize --parallel 2

      - name: Run sanitizer focused regression
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1
        run: ./build-sanitize/regidrago_unified_tests issue_1343_arven_held_payload_tests

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1343-arven-held-payload
          path: |
            issue-1343-pass-*.txt
            issue-1343-matrix.csv
            build/Testing
          if-no-files-found: warn
