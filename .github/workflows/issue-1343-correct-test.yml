name: Issue 1343 Correct Permanent Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  correct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Commit the validated exact-state fixture
        shell: bash
        run: |
          set -euo pipefail
          # Ultra Ball requires two other cards: https://api.pokemontcg.io/v2/cards/swsh12pt5-146
          # Regidrago VSTAR identity and redundant-copy boundary: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1343
          python scripts/apply_issue_1343_probe_lifetime_fix.py
          python scripts/apply_issue_1343_probe_ultra_fix.py
          cp audit/issue_1343_arven_held_payload_probe.cpp tests/issue_1343_arven_held_payload_tests.cpp
          git add tests/issue_1343_arven_held_payload_tests.cpp
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Use validated issue 1343 exact-state fixture"
          git push origin "HEAD:${{ github.head_ref }}"
