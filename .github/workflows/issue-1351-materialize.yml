name: Issue 1351 No-Discard Steven Route

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply narrow production fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("src/trace_engine_v2/part_010_steven_crispin_override.inc")
          text = path.read_text(encoding="utf-8")

          old_admission = "\n".join([
              "  bool wonder_tag_can_bank_steven_for_known_t3_blender_route() const {",
              "    if (state_.turn != 1 || !scenario_.going_first ||",
              "        scenario_.dci != DciProfile::StrictJit ||",
              "        scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||",
          ])
          new_admission = "\n".join([
              "  bool wonder_tag_can_bank_steven_for_known_t3_blender_route() const {",
              "    // Strict JIT holds Blender for T3. No-discard-control may legally bank the",
              "    // payload with Blender on T1, then carry that completed axis into the same",
              "    // Steven VSTAR, Grass, and Latias continuation:",
              "    // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164",
              "    // No-discard-control policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment",
              "    // Regression: https://github.com/FlareZ123/pokemon-sims/issues/1351",
              "    const bool supported_payload_profile =",
              "        scenario_.dci == DciProfile::StrictJit ||",
              "        scenario_.dci == DciProfile::NoDiscardControl;",
              "    if (state_.turn != 1 || !scenario_.going_first ||",
              "        !supported_payload_profile ||",
              "        scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||",
          ])
          if text.count(old_admission) != 1:
              raise RuntimeError("Issue 1351 admission source changed unexpectedly")
          text = text.replace(old_admission, new_admission, 1)

          old_continuation = "\n".join([
              "  bool banked_steven_has_known_t3_blender_route() const {",
              "    if (state_.turn != 2 || !scenario_.going_first ||",
              "        scenario_.dci != DciProfile::StrictJit ||",
              "        scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||",
              "        !supporter_allowed() || !deck_seen_ || !state_.active ||",
              "        state_.active->card != Card::TapuLeleGX || state_.retreat_used ||",
              "        bench_space() == 0 || !ability_available_for_pokemon(Card::LatiasEx) ||",
              "        in_play(Card::LatiasEx) || hand_count(Card::StevensResolve) == 0 ||",
              "        hand_count(Card::BrilliantBlender) == 0 || !need_payload() ||",
              "        !payload_might_be_in_deck() ||",
          ])
          new_continuation = "\n".join([
              "  bool banked_steven_has_known_t3_blender_route() const {",
              "    // Strict JIT still needs the held Blender and a deck payload for T3. Under",
              "    // no-discard-control, Blender may already be spent and the public discard",
              "    // pile may already satisfy Apex Dragon before Steven resolves on T2:",
              "    // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164",
              "    // Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136",
              "    // No-discard-control policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment",
              "    // Regression: https://github.com/FlareZ123/pokemon-sims/issues/1351",
              "    const bool strict_payload_route = scenario_.dci == DciProfile::StrictJit &&",
              "        hand_count(Card::BrilliantBlender) > 0 && need_payload() &&",
              "        payload_might_be_in_deck();",
              "    const bool banked_no_control_payload =",
              "        scenario_.dci == DciProfile::NoDiscardControl && payload_ready();",
              "    if (state_.turn != 2 || !scenario_.going_first ||",
              "        (!strict_payload_route && !banked_no_control_payload) ||",
              "        scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||",
              "        !supporter_allowed() || !deck_seen_ || !state_.active ||",
              "        state_.active->card != Card::TapuLeleGX || state_.retreat_used ||",
              "        bench_space() == 0 || !ability_available_for_pokemon(Card::LatiasEx) ||",
              "        in_play(Card::LatiasEx) || hand_count(Card::StevensResolve) == 0 ||",
          ])
          if text.count(old_continuation) != 1:
              raise RuntimeError("Issue 1351 continuation source changed unexpectedly")
          path.write_text(text.replace(old_continuation, new_continuation, 1),
                          encoding="utf-8")
          PY

      - name: Configure and build Release
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Validate focused regression
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1351_no_discard_steven_route_tests
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario no-discard-control/go-first --seed 1 --require-ready-by 3 | tee issue-1351-no-control-seed-1.txt
          grep -q "T1 | WONDER TAG |.*Steven's Resolve" issue-1351-no-control-seed-1.txt
          grep -q 'T1 | PLAY ITEM |.*R-BLENDER-01' issue-1351-no-control-seed-1.txt
          grep -q 'T2 | PLAY SUPPORTER |.*Regidrago VSTAR, Grass Energy, Latias ex' issue-1351-no-control-seed-1.txt
          grep -q 'T3 | READY |' issue-1351-no-control-seed-1.txt

      - name: Three independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Original strict-JIT route: https://github.com/FlareZ123/pokemon-sims/issues/946
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 1 --require-ready-by 3 | tee issue-1351-strict-control.txt
          # Scheduled Item-lock control and official Item procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 1 --require-ready-by 2 | tee issue-1351-item-lock-control.txt
          # Rule Box Ability-lock control and Oricorio data: https://api.pokemontcg.io/v2/cards/sm2-55
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 2 | tee issue-1351-rulebox-control.txt

      - name: Run behavioral Release suite before report regeneration
        run: ctest --test-dir build --parallel 4 --output-on-failure -E 'setup_report_contract|multi_deck_report_contract'

      - name: Run sanitizer suite
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'
          cmake --build build-sanitize --parallel 2
          ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=halt_on_error=1 ctest --test-dir build-sanitize --parallel 2 --output-on-failure -E 'setup_report_contract|multi_deck_report_contract'

      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical evidence procedure: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete source-bound Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1351-validation
          path: |
            issue-1351-*.txt
            results/simulation_results.csv
            results/baseline_manifest.json
            results/multi_deck_comparison.csv
            results/multi_deck_manifest.json
            results/traces/no_discard_control_go_first_seed_1.txt
            results/multi_deck_traces/shell_no_control_go_first_seed_1.txt
          if-no-files-found: error

      - name: Commit fix and source-bound evidence
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/issue-1351-materialize.yml
          git add src/trace_engine_v2/part_010_steven_crispin_override.inc tests/issue_1351_no_discard_steven_route_tests.cpp README.md docs results
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'Fix no-discard Wonder Tag Steven route (#1351)'
          git push origin "HEAD:${{ github.head_ref }}"
