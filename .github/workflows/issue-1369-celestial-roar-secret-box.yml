name: Issue 1369 Celestial Roar Secret Box

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile current main
        shell: bash
        run: |
          set -euo pipefail
          # Current source contract: https://github.com/FlareZ123/pokemon-sims/tree/main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply confirmed source fix
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_issue_1369_fix.py

      - name: Static repository audit
        shell: bash
        run: |
          set -euo pipefail
          # Repository specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          # Secret Box route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#secret-box-and-pineco-route-policy
          # Knowledge and oracle boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          test -f src/trace_engine_v2/part_issue_1369_celestial_roar_secret_box_override.inc
          test -f tests/issue_1369_celestial_roar_secret_box_tests.cpp
          git grep -n "https://api.pokemontcg.io/v2/cards/swsh12-135" -- src/trace_engine_v2/part_issue_1369_celestial_roar_secret_box_override.inc tests/issue_1369_celestial_roar_secret_box_tests.cpp
          git grep -n "https://api.pokemontcg.io/v2/cards/sv6-163" -- src/trace_engine_v2/part_issue_1369_celestial_roar_secret_box_override.inc tests/issue_1369_celestial_roar_secret_box_tests.cpp
          git grep -n "https://github.com/FlareZ123/pokemon-sims/issues/1369" -- src tests
          python -m compileall -q scripts

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused regression
        shell: bash
        run: |
          set -o pipefail
          ./build/regidrago_unified_tests issue_1369_celestial_roar_secret_box_tests 2>&1 | tee issue-1369-focused.txt

      - name: Simulate-this pass 1 seed 40 guaranteed route
        shell: bash
        run: |
          set -euo pipefail
          # Celestial Roar: https://api.pokemontcg.io/v2/cards/swsh12-135
          # Secret Box: https://api.pokemontcg.io/v2/cards/sv6-163
          # Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1369
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 40 --require-ready-by 2 | tee issue-1369-pass-seed40.txt
          grep -F "T1 | HOLD ATTACK" issue-1369-pass-seed40.txt
          ! grep -F "T1 | ATTACK" issue-1369-pass-seed40.txt
          grep -Eq '^T2 \| READY \|' issue-1369-pass-seed40.txt

      - name: Simulate-this pass 2 seed 18 FSS route
        shell: bash
        run: |
          set -euo pipefail
          # Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156
          # Existing Secret Box policy: https://github.com/FlareZ123/pokemon-sims/issues/1118
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee issue-1369-pass-seed18.txt
          grep -F "Held Star Alchemy as the next-turn Secret Box Fire channel." issue-1369-pass-seed18.txt
          grep -Eq '^T2 \| READY \|' issue-1369-pass-seed18.txt

      - name: Simulate-this pass 3 seed 35 held-line route
        shell: bash
        run: |
          set -euo pipefail
          # Dawn: https://api.pokemontcg.io/v2/cards/me2-87
          # Forest of Vitality: https://api.pokemontcg.io/v2/cards/me1-117
          # Pineco and Forretress ex: https://api.pokemontcg.io/v2/cards/sv4pt5-1 https://api.pokemontcg.io/v2/cards/sv4pt5-2
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1369-pass-seed35.txt
          grep -F "Steven's Resolve banked: Secret Box" issue-1369-pass-seed35.txt
          grep -Eq '^T2 \| READY \|' issue-1369-pass-seed35.txt

      - name: Refresh source-bound canonical evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical evidence contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # Paired matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Generate current-run T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1369-t2-t3-matrix.csv
          test "$(wc -l < issue-1369-t2-t3-matrix.csv)" -eq 33

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee issue-1369-release-suite.txt

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1369-celestial-roar-secret-box
          path: |
            issue-1369-focused.txt
            issue-1369-pass-*.txt
            issue-1369-t2-t3-matrix.csv
            issue-1369-release-suite.txt
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitize/Testing
          if-no-files-found: error

      - name: Commit validated fix and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize issue-1369-focused.txt issue-1369-pass-*.txt issue-1369-t2-t3-matrix.csv issue-1369-release-suite.txt
          git rm .github/workflows/issue-1369-celestial-roar-secret-box.yml scripts/apply_issue_1369_fix.py
          git add src tests README.md docs results
          if git diff --cached --quiet; then
            echo 'No validated source change was produced' >&2
            exit 1
          fi
          git commit -m 'Hold Celestial Roar for guaranteed Secret Box route (#1369)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
