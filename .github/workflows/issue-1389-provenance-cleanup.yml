name: Issue 1389 Provenance Cleanup

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile current main
        shell: bash
        run: |
          set -euo pipefail
          # Current repository source: https://github.com/FlareZ123/pokemon-sims/tree/main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Rebind generated evidence to the clean source tree
        shell: bash
        run: |
          set -euo pipefail
          # Source digest contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          # Baseline contract: https://github.com/FlareZ123/pokemon-sims/blob/main/tests/setup_report_contract_tests.py
          # Paired report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/tests/multi_deck_report_contract_tests.py
          python -m scripts.apply_issue_1389_provenance_cleanup | tee issue-1389-clean-digest.txt
          digest="$(cat issue-1389-clean-digest.txt)"
          grep -Fq "\"simulator_policy_source_sha256\": \"${digest}\"" results/baseline_manifest.json
          grep -Fq "\"simulator_policy_source_sha256\": \"${digest}\"" results/multi_deck_manifest.json
          grep -Fq "Simulator policy digest: \`${digest}\`." docs/MULTI_DECK_REPORT.md

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Recheck corrected seed 35 route
        shell: bash
        run: |
          set -euo pipefail
          # Secret Box: https://api.pokemontcg.io/v2/cards/sv6-163
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
          # Forretress ex: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Official rules: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1389-clean-seed35.txt
          grep -Fq 'Earthen Vessel (Secret Box cost)' issue-1389-clean-seed35.txt
          grep -Fq 'Secret Box discarded three other cards and searched: Quick Ball, Dawn' issue-1389-clean-seed35.txt
          grep -Eq '^T2 \| READY \|' issue-1389-clean-seed35.txt

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee issue-1389-clean-release.txt

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Upload cleanup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1389-provenance-cleanup
          path: |
            issue-1389-clean-digest.txt
            issue-1389-clean-seed35.txt
            issue-1389-clean-release.txt
            build/Testing
            build-sanitize/Testing
            results/baseline_manifest.json
            results/multi_deck_manifest.json
            docs/MULTI_DECK_REPORT.md
          if-no-files-found: warn

      - name: Commit clean provenance and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize issue-1389-clean-digest.txt issue-1389-clean-seed35.txt issue-1389-clean-release.txt
          git rm .github/workflows/issue-1389-provenance-cleanup.yml scripts/apply_issue_1389_provenance_cleanup.py
          git add results/baseline_manifest.json results/multi_deck_manifest.json docs/MULTI_DECK_REPORT.md
          git commit -m 'Rebind issue 1389 evidence to clean source'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
