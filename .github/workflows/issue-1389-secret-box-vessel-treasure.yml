name: Issue 1389 Secret Box Vessel Treasure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile current main
        shell: bash
        run: |
          set -euo pipefail
          # Validate against current main: https://github.com/FlareZ123/pokemon-sims/tree/main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply confirmed source fix
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_issue_1389_fix.py

      - name: Static repository audit
        shell: bash
        run: |
          set -euo pipefail
          # Repository scope: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          # DCI, strict-JIT, and resource priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          # Lock boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          # Rules provenance: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          test -f docs/RULE_SOURCES.md
          test -f docs/RULES_TRACEABILITY.md
          test -f docs/POLICY_DECISIONS.md
          test -f docs/MODEL_ASSUMPTIONS.md
          ! git grep -nE 'TODO|FIXME|XXX' -- src tests docs README.md
          python -m compileall -q scripts

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused regression
        shell: bash
        run: |
          set -o pipefail
          ./build/regidrago_unified_tests issue_1389_secret_box_vessel_treasure_tests 2>&1 | tee issue-1389-focused.txt

      - name: Simulate-this pass 1 exact Pineco route
        shell: bash
        run: |
          set -euo pipefail
          # Secret Box: https://api.pokemontcg.io/v2/cards/sv6-163
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
          # Dawn: https://api.pokemontcg.io/v2/cards/me2-87
          # Forretress ex: https://api.pokemontcg.io/v2/cards/sv4pt5-2
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Official rules: https://www.pokemon.com/us/pokemon-tcg/rules
          # Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1389
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1389-pass-seed35.txt
          grep -Fq 'Earthen Vessel (Secret Box cost)' issue-1389-pass-seed35.txt
          grep -Fq 'Secret Box discarded three other cards and searched: Quick Ball, Dawn' issue-1389-pass-seed35.txt
          grep -Fq 'Dragapult ex (Mysterious Treasure cost)' issue-1389-pass-seed35.txt
          grep -Eq '^T2 \| READY \|' issue-1389-pass-seed35.txt

      - name: Simulate-this pass 2 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Item-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Ready-state policy: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#ready-state-and-t5-policy
          # Official rules: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1389-pass-item-lock.txt
          grep -Eq '^T2 \| READY \|' issue-1389-pass-item-lock.txt

      - name: Simulate-this pass 3 Rule Box Ability lock failure control
        shell: bash
        run: |
          set -euo pipefail
          # Rule Box Ability lock: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          # Strict-JIT payload timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 | tee issue-1389-pass-rulebox-lock.txt
          grep -Fq 'first-ready turn: not ready through T5' issue-1389-pass-rulebox-lock.txt
          grep -Fq 'T5 | SETUP FAILURE |' issue-1389-pass-rulebox-lock.txt

      - name: Simulate-this pass 4 shell strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Ready-state policy: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#ready-state-and-t5-policy
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1389-pass-shell.txt
          grep -Eq '^T[23] \| READY \|' issue-1389-pass-shell.txt

      - name: Refresh source-bound canonical evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical baseline: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # Paired matrices: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Generate current-run T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260723 --out issue-1389-t2-t3-matrix.csv
          test "$(wc -l < issue-1389-t2-t3-matrix.csv)" -eq 33

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee issue-1389-release-suite.txt

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1389-secret-box-vessel-treasure
          path: |
            issue-1389-focused.txt
            issue-1389-pass-*.txt
            issue-1389-t2-t3-matrix.csv
            issue-1389-release-suite.txt
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitize/Testing
            src/trace_engine_v2/part_issue_1118_secret_box.inc
            tests/issue_1389_secret_box_vessel_treasure_tests.cpp
          if-no-files-found: warn

      - name: Commit validated fix and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize issue-1389-focused.txt issue-1389-pass-*.txt issue-1389-t2-t3-matrix.csv issue-1389-release-suite.txt
          git rm .github/workflows/issue-1389-secret-box-vessel-treasure.yml scripts/apply_issue_1389_fix.py
          git add src tests README.md docs results
          if git diff --cached --quiet; then
            echo 'No validated source change was produced' >&2
            exit 1
          fi
          git commit -m 'Preserve Treasure over dead Vessel (#1389)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
