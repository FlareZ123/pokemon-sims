name: Issue 1392 Lusamine Chaotic Swell Unlock

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconcile current main and apply fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git merge --no-edit origin/main
          python scripts/apply_issue_1392_fix.py
      - name: Configure and build with captured diagnostics
        shell: bash
        run: |
          set -o pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release 2>&1 | tee issue-1392-build.txt
          cmake --build build --parallel 2 2>&1 | tee -a issue-1392-build.txt
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1392-build-diagnostics
          path: issue-1392-build.txt
          if-no-files-found: error
