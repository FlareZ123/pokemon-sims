name: Publish Validated Issue 1392 Fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/issue-1392-publish.yml
      - scripts/apply_issue_1392_fix.py
      - scripts/run_issue_1392_fix.py

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile current main and apply validated fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          python scripts/run_issue_1392_fix.py

      - name: Build and recheck focused behavior
        shell: bash
        run: |
          set -euo pipefail
          # Rules and card sources remain beside the production and test lines.
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1392
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1392_lusamine_chaotic_swell_tests
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 4 | tee issue-1392-seed20.txt
          grep -F "Recovered from discard: Chaotic Swell, Guzma" issue-1392-seed20.txt
          grep -F "Played Chaotic Swell, replacing the modeled Path" issue-1392-seed20.txt
          grep -F "LEGACY STAR" issue-1392-seed20.txt
          grep -E '^T4 \| READY \|' issue-1392-seed20.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 > issue-1392-shell-control.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 > issue-1392-pineco-control.txt

      - name: Regenerate source-bound evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical evidence contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # Paired evidence contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Commit validated source and evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build issue-1392-*.txt
          git add src tests README.md docs results
          if git diff --cached --quiet; then
            echo "No validated source change was produced" >&2
            exit 1
          fi
          git commit -m "Unlock Legacy Star through Lusamine (#1392)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
