name: Issue 1394 Crobat V Modeling

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  implement-and-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconcile current main
        shell: bash
        run: |
          set -euo pipefail
          # Current repository contract: https://github.com/FlareZ123/pokemon-sims/tree/main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Recover preserved Crobat implementation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          preserved=1159d360270d6b2af3ff342b23cc8edc12453e1e
          mkdir -p /tmp/issue-1394-chunks
          for name in 01 02 03 04 05; do
            curl --fail-with-body --silent --show-error --location \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/FlareZ123/pokemon-sims/contents/scripts/issue_1394_patch_chunks/${name}.b64?ref=${preserved}" \
              --output "/tmp/issue-1394-chunks/${name}.b64"
          done
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          paths = sorted(Path("/tmp/issue-1394-chunks").glob("*.b64"))
          if len(paths) != 5:
              raise RuntimeError(f"Expected 5 chunks, found {len(paths)}")

          parts = [path.read_text(encoding="ascii").strip() for path in paths]
          merged = parts[0]
          for part in parts[1:]:
              overlap = 0
              for length in range(min(len(merged), len(part)), 0, -1):
                  if merged.endswith(part[:length]):
                      overlap = length
                      break
              merged += part[overlap:]

          compressed = base64.b64decode(merged, validate=True)
          patch = gzip.decompress(compressed)
          digest = hashlib.sha256(patch).hexdigest()
          expected = "aab56d44092ecf9826836163d3bcb803ff1bb238e213618d30817a6ccfd3c4f2"
          if digest != expected:
              raise RuntimeError(f"Unexpected recovered patch digest: {digest}")
          Path("/tmp/issue-1394-crobat.patch").write_bytes(patch)
          print(f"Recovered {len(patch)} bytes with SHA-256 {digest}")
          PY

      - name: Apply Crobat V implementation
        shell: bash
        run: |
          set -euo pipefail
          # Enhancement specification: https://github.com/FlareZ123/pokemon-sims/issues/1394
          # Crobat V and Dark Asset: https://api.pokemontcg.io/v2/cards/swsh3-104
          # Official setup, Bench, and Ability procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Path to the Peak Rule Box Ability lock: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Forest Seal Stone Pokémon V holder requirement: https://api.pokemontcg.io/v2/cards/swsh12-156
          git apply --check /tmp/issue-1394-crobat.patch
          git apply --whitespace=nowarn /tmp/issue-1394-crobat.patch
          git rm -f scripts/apply_issue_1394_crobat.py
          git rm -rf scripts/issue_1394_patch_chunks

      - name: Static source and registry audit
        shell: bash
        run: |
          set -euo pipefail
          # Named-deck registry remains exactly two recipes: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#named-deck-recipes
          test -f docs/CROBAT_MODEL_REPORT.md
          test -f scripts/update_crobat_modeling_docs.py
          test -f tests/issue_1394_crobat_v_model_tests.cpp
          ! grep -q 'CrobatV' src/trace_engine_v2/part_014c.inc
          python -m compileall -q scripts

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Crobat regressions
        shell: bash
        run: |
          set -euo pipefail
          # Dark Asset timing and once-per-turn limit: https://api.pokemontcg.io/v2/cards/swsh3-104
          # Official setup and Bench procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_unified_tests issue_1394_crobat_v_model_tests
          ./build/regidrago_sim --self-test

      - name: Simulate-this pass 1 going second
        shell: bash
        run: |
          set -euo pipefail
          # Modeling-only variant contract: https://github.com/FlareZ123/pokemon-sims/issues/1394
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit/go-second --seed 3 --require-ready-by 2 | tee crobat-pass-second-seed3.txt
          grep -Eq '^T2 \| DARK ASSET \|' crobat-pass-second-seed3.txt
          grep -Eq '^T2 \| READY \|' crobat-pass-second-seed3.txt

      - name: Simulate-this pass 2 going first
        shell: bash
        run: |
          set -euo pipefail
          # Turn and evolution procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit/go-first --seed 14 --require-ready-by 2 | tee crobat-pass-first-seed14.txt
          grep -Eq '^T1 \| DARK ASSET \|' crobat-pass-first-seed14.txt
          grep -Eq '^T2 \| READY \|' crobat-pass-first-seed14.txt

      - name: Simulate-this pass 3 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Scheduled Item-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Dark Asset is an Ability rather than an Item: https://api.pokemontcg.io/v2/cards/swsh3-104
          ./build/regidrago_sim --simulate-this --model-variant crobat1-erika --scenario strict-jit-turn2-item-lock/go-second --seed 71 --require-ready-by 3 | tee crobat-pass-item-lock-seed71.txt
          grep -Eq '^T1 \| DARK ASSET \|' crobat-pass-item-lock-seed71.txt
          grep -Eq '^T3 \| READY \|' crobat-pass-item-lock-seed71.txt

      - name: Generate paired Crobat swap matrix
        shell: bash
        run: |
          set -euo pipefail
          # Modeling-only matrix contract: https://github.com/FlareZ123/pokemon-sims/issues/1394
          ./build/regidrago_sim --model-crobat --trials 100000 --seed 20260723 --out results/crobat_variant_model.csv
          test "$(wc -l < results/crobat_variant_model.csv)" -eq 209
          python scripts/update_crobat_modeling_docs.py --csv results/crobat_variant_model.csv --out docs/CROBAT_MODEL_REPORT.md

      - name: Preserve registered deck probabilities
        shell: bash
        run: |
          set -euo pipefail
          # Canonical shell and paired two-deck contracts: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md
          cp results/simulation_results.csv /tmp/simulation_results.before.csv
          cp results/multi_deck_comparison.csv /tmp/multi_deck_comparison.before.csv
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .
          cmp /tmp/simulation_results.before.csv results/simulation_results.csv
          cmp /tmp/multi_deck_comparison.before.csv results/multi_deck_comparison.csv

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee issue-1394-release-suite.txt

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1394-crobat-v-modeling
          path: |
            crobat-pass-*.txt
            issue-1394-release-suite.txt
            results/crobat_variant_model.csv
            docs/CROBAT_MODEL_REPORT.md
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitize/Testing
          if-no-files-found: error

      - name: Commit validated implementation and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize crobat-pass-*.txt issue-1394-release-suite.txt
          git rm .github/workflows/issue-1394-source-snapshot.yml
          git add README.md CMakeLists.txt src tests scripts docs results
          if git diff --cached --quiet; then
            echo 'No validated Crobat V implementation was produced' >&2
            exit 1
          fi
          git commit -m 'Model Crobat V swap variants (#1394)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
