name: Apply Issue 1403 Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-1403-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply confirmed source and regression fix
        shell: bash
        run: |
          set -euo pipefail
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1403
          # Repository policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md
          # Model assumptions: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md
          python scripts/apply_issue_1403_fix.py

      - name: Commit generated source and tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests
          if git diff --cached --quiet; then
            echo "Issue 1403 source is already applied."
            exit 0
          fi
          git commit -m "Complete seed 23 T4 Grass-Latias-Burnet route (#1403)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
