name: Refine and Validate Issue 1403

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-1403-refine-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refine:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact K1 deck-count refinement
        shell: bash
        run: |
          set -euo pipefail
          # Hidden-information contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#hidden-information-policy
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1403
          python scripts/refine_issue_1403_counts.py

      - name: Build and validate focused route
        shell: bash
        run: |
          set +e
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release > issue-1403-configure.txt 2>&1
          configure_status=$?
          cmake --build build --parallel 2 > issue-1403-build.txt 2>&1
          build_status=$?
          ./build/regidrago_unified_tests issue_1185_quick_ball_strict_surplus_energy_tests > issue-1403-focused.txt 2>&1
          focused_status=$?
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 23 --require-ready-by 4 > issue-1403-seed23.txt 2>&1
          trace_status=$?
          grep -F "T3 | STAR ALCHEMY" issue-1403-seed23.txt | grep -F "Grass Energy" > issue-1403-grep-grass.txt
          grass_status=$?
          grep -F "T3 | DISCARD" issue-1403-seed23.txt | grep -F "Tate & Liza (Quick Ball cost)" > issue-1403-grep-tate.txt
          tate_status=$?
          grep -F "T4 | PLAY SUPPORTER" issue-1403-seed23.txt | grep -F "R-BURNET-01" > issue-1403-grep-burnet.txt
          burnet_status=$?
          grep -F "T4 | READY" issue-1403-seed23.txt > issue-1403-grep-ready.txt
          ready_status=$?
          printf 'configure=%s\nbuild=%s\nfocused=%s\ntrace=%s\ngrass=%s\ntate=%s\nburnet=%s\nready=%s\n' \
            "$configure_status" "$build_status" "$focused_status" "$trace_status" \
            "$grass_status" "$tate_status" "$burnet_status" "$ready_status" \
            > issue-1403-status.txt
          cat issue-1403-focused.txt
          cat issue-1403-seed23.txt
          test "$configure_status" -eq 0 && test "$build_status" -eq 0 && \
            test "$focused_status" -eq 0 && test "$trace_status" -eq 0 && \
            test "$grass_status" -eq 0 && test "$tate_status" -eq 0 && \
            test "$burnet_status" -eq 0 && test "$ready_status" -eq 0

      - name: Upload focused evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1403-focused-evidence
          path: issue-1403-*.txt
          if-no-files-found: warn

      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical evidence: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # Paired evidence: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Commit refined source and evidence
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build issue-1403-*.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests results docs README.md
          if git diff --cached --quiet; then
            echo "Issue 1403 refinement and evidence are already current."
            exit 0
          fi
          git commit -m "Refine seed 23 K1 counts and refresh evidence (#1403)"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
