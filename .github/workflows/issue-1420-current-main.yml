name: Issue 1420 Current Main Bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-1420-current-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply-validate-publish:
    if: github.head_ref == 'fix/issue-1420-current-main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply reviewed issue 1420 patches to current main
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/issue-1420.patch.gz.b64 | gzip --decompress > /tmp/issue-1420.patch
          git apply /tmp/issue-1420.patch
          base64 --decode .github/issue-1420-refinement.patch.gz.b64 | gzip --decompress > /tmp/issue-1420-refinement.patch
          git apply /tmp/issue-1420-refinement.patch
          git restore .github/workflows/ci.yml
          git diff --check

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused policy regressions
        shell: bash
        run: |
          set -euo pipefail
          # Confirmed issue: https://github.com/FlareZ123/pokemon-sims/issues/1420
          # Steven's Resolve: https://api.pokemontcg.io/v2/cards/sm7-145
          # Crispin: https://api.pokemontcg.io/v2/cards/sv7-133
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_unified_tests issue_1420_steven_direct_treasure_tests
          ./build/regidrago_unified_tests issue_1389_secret_box_vessel_treasure_tests
          ./build/regidrago_unified_tests issue_1376_t1_pineco_before_steven_tests
          ./build/regidrago_unified_tests issue_1118_multi_deck_secret_box_tests
          ./build/regidrago_unified_tests forretress_ex_combo_tests

      - name: Run three independent simulate-this audits
        shell: bash
        run: |
          set -euo pipefail
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1420-seed-35.txt
          grep -q 'banked Crispin and Dragapult ex' issue-1420-seed-35.txt
          grep -q 'Dragapult ex (Mysterious Treasure cost)' issue-1420-seed-35.txt
          ! grep -q 'T2 | PLAY ITEM | rules: R-SECRET-BOX-01' issue-1420-seed-35.txt
          ! grep -q 'T2 | EXPLODING ENERGY' issue-1420-seed-35.txt
          ! grep -q 'T2 | EVOLVE | rules: R-FORRETRESS-01' issue-1420-seed-35.txt
          ! grep -q 'T2 | BENCH | rules: R-GAME-BENCH | Regidrago V from hand' issue-1420-seed-35.txt
          grep -q 'without advancing the Pineco line' issue-1420-seed-35.txt
          grep -q 'T2 | READY' issue-1420-seed-35.txt

          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee issue-1420-seed-18.txt
          grep -q 'Arven banked the next-turn Secret Box route' issue-1420-seed-18.txt
          grep -q 'T2 | READY' issue-1420-seed-18.txt

          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 40 --require-ready-by 2 | tee issue-1420-seed-40.txt
          grep -q 'Gladion recovered the legally known prized Secret Box' issue-1420-seed-40.txt
          grep -q 'T2 | READY' issue-1420-seed-40.txt

      - name: Regenerate current-main canonical evidence
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build --parallel 4 --output-on-failure

      - name: Publish clean current-main implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src tests docs results
          git rm .github/issue-1420.patch.gz.b64
          git rm .github/issue-1420-refinement.patch.gz.b64
          git rm .github/workflows/issue-1420-current-main.yml
          git diff --cached --check
          git commit -m 'Prefer direct T2 Treasure route over Secret Box'
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload reviewed evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-1420-current-main-${{ github.run_attempt }}
          path: |
            issue-1420-seed-*.txt
            results
            docs/MULTI_DECK_REPORT.md
            build/Testing
          if-no-files-found: warn
