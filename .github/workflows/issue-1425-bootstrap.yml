name: Issue 1425 bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish-fix:
    if: github.head_ref == 'fix/issue-1425-rulebox-late-steven'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply isolated fix and regression
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          source = Path('src/trace_engine_v2/part_010_steven_crispin_override.inc')
          text = source.read_text(encoding='utf-8')
          old = '  bool late_steven_active_vstar_crispin_treasure_route_available() const {\n    if (!deck_seen_ || state_.turn != 2 || !scenario_.going_first ||\n        scenario_.dci != DciProfile::StrictJit ||\n        scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||\n'
          new = "  bool late_steven_active_vstar_crispin_treasure_route_available() const {\n    // Path to the Peak suppresses Rule Box Pokémon Abilities only. This route uses\n    // Steven's Resolve, Crispin, Mysterious Treasure, evolution, and attachments,\n    // so Rule Box Ability lock remains legal. Item and combined locks still block\n    // the required next-turn Mysterious Treasure play:\n    // Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148\n    // Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113\n    // Repository lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock\n    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1425\n    const bool route_lock_allows_items =\n        scenario_.locks == LockMode::None ||\n        scenario_.locks == LockMode::FullRuleBoxAbility;\n    if (!deck_seen_ || state_.turn != 2 || !scenario_.going_first ||\n        scenario_.dci != DciProfile::StrictJit ||\n        !route_lock_allows_items || scenario_.max_turn < 3 ||\n"
          if text.count(old) != 1:
              raise SystemExit('Issue 1425 source anchor changed')
          source.write_text(text.replace(old, new), encoding='utf-8')
          Path('tests/issue_1425_rulebox_late_steven_tests.cpp').write_bytes(
              base64.b64decode(''))
          PY

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused regression and three simulations
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1425_rulebox_late_steven_tests
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-first --seed 44 --require-ready-by 3 | tee trace-1-issue-1425.txt
          grep -q 'Searched the late Crispin-Treasure route' trace-1-issue-1425.txt
          ! grep -q 'R-SERENA-01' trace-1-issue-1425.txt
          grep -q 'T3 | READY' trace-1-issue-1425.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 44 --require-ready-by 3 | tee trace-2-no-lock-control.txt
          grep -q 'Searched the late Crispin-Treasure route' trace-2-no-lock-control.txt
          grep -q 'T3 | READY' trace-2-no-lock-control.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee trace-3-pineco-control.txt
          grep -q 'T2 | READY' trace-3-pineco-control.txt

      - name: Regenerate source-bound matrices and reports
        shell: bash
        run: |
          set -euo pipefail
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee release-suite.txt

      - name: Publish clean branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/issue-1425-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_010_steven_crispin_override.inc tests/issue_1425_rulebox_late_steven_tests.cpp results docs .github/workflows/issue-1425-bootstrap.yml
          git commit -m 'Admit late Steven route under Rule Box lock (#1425)'
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload reviewed evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1425-bootstrap-evidence
          path: |
            trace-*.txt
            release-suite.txt
            results/multi_deck_comparison.csv
          if-no-files-found: error
