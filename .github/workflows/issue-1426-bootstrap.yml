name: Issue 1426 bootstrap

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish-fix:
    if: github.head_ref == 'fix/issue-1426-steven-treasure-grass'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply isolated source and regression
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/issue-1426.patch
          patch -p1 < /tmp/issue-1426.patch
          echo '' | base64 -d > tests/issue_1426_steven_treasure_grass_tests.cpp

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused regression and three simulations
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1426_steven_treasure_grass_tests
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 44 --require-ready-by 2 | tee trace-1-issue-1426.txt
          grep -q 'Regidrago VSTAR, Crispin, Grass Energy' trace-1-issue-1426.txt
          ! grep -q 'Regidrago VSTAR, Crispin, Brilliant Blender' trace-1-issue-1426.txt
          grep -q 'Mega Dragonite ex (Mysterious Treasure cost)' trace-1-issue-1426.txt
          grep -q 'T2 | READY' trace-1-issue-1426.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-first --seed 44 --require-ready-by 3 | tee trace-2-issue-1425-control.txt
          grep -q 'Searched the late Crispin-Treasure route' trace-2-issue-1425-control.txt
          grep -q 'T3 | READY' trace-2-issue-1425-control.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 18 --require-ready-by 2 | tee trace-3-pineco-control.txt
          grep -q 'T2 | READY' trace-3-pineco-control.txt

      - name: Regenerate source-bound matrices and reports
        shell: bash
        run: |
          set -euo pipefail
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --parallel 4 --output-on-failure 2>&1 | tee release-suite.txt

      - name: Publish clean branch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/issue-1426-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_011.inc tests/issue_1426_steven_treasure_grass_tests.cpp results docs .github/workflows/issue-1426-bootstrap.yml
          git commit -m 'Prefer Treasure and Grass over redundant Blender (#1426)'
          git push origin "HEAD:${GITHUB_HEAD_REF}"

      - name: Upload reviewed evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1426-bootstrap-evidence
          path: |
            trace-*.txt
            release-suite.txt
            results/multi_deck_comparison.csv
          if-no-files-found: error
