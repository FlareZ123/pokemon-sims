name: Issue 1460 zero-target Exploding Energy

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'fix/issue-1460-zero-target-exploding-energy-current'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply and commit confirmed production fix
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_issue_1460_fix.py
          if ! git diff --quiet -- src/trace_engine_v2/part_forretress_ex_combo.inc; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add src/trace_engine_v2/part_forretress_ex_combo.inc
            git commit -m "Resolve zero-target Exploding Energy after K0 search"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Regenerate and commit source-bound reports
        shell: bash
        run: |
          set -euo pipefail
          # Canonical report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # Paired report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .
          if ! git diff --quiet -- results docs; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add results docs
            git commit -m "Refresh source-bound reports for issue 1460"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Run focused regressions
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_unified_tests issue_1460_zero_target_exploding_energy_tests
          ./build/regidrago_unified_tests issue_1419_latias_oricorio_tests

      - name: Review three source-bound traces
        shell: bash
        run: |
          set -euo pipefail
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Core turn procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee trace-shell-strict-second.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee trace-pineco-strict-second.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 13 --require-ready-by 3 | tee trace-shell-rulebox-lock.txt

      - name: Run complete Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Configure ASan and UBSan
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build ASan and UBSan
        run: cmake --build build-sanitize --parallel 2

      - name: Run complete ASan and UBSan suite
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-sanitize --output-on-failure

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-1460-validation-final
          path: |
            trace-*.txt
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            results/baseline_manifest.json
            results/multi_deck_manifest.json
          if-no-files-found: error
