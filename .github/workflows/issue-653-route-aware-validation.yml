name: Issue 653 Route-Aware Dialga Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-653:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/653-route-aware-dialga-opening-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/653-route-aware-dialga-opening-v2
          fetch-depth: 0

      - name: Apply payable route controls
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          def atomic_write(path: Path, text: str) -> None:
              temporary = path.with_name(path.name + '.tmp-653')
              temporary.write_text(text, encoding='utf-8')
              os.replace(temporary, path)

          source = Path('src/trace_engine_v2/part_005.inc')
          text = source.read_text(encoding='utf-8')
          old = '''    const bool held_redundant_one_discard_regi_graph =
        !item_locked() && might_be_unseen(Card::RegidragoV) &&
        hand_count(Card::QuickBall) > 0 && hand_count(Card::MysteriousTreasure) > 0 &&
        payloads_in_hand > 1 && hand_count(Card::Crispin) == 1 &&
        hand_count(Card::BrilliantBlender) == 0;
'''
          new = '''    const bool held_payable_quick_ball_regi_route =
        !item_locked() && hand_count(Card::QuickBall) > 0 &&
        might_be_unseen(Card::RegidragoV) &&
        choose_discard(false, true, true, Card::QuickBall).has_value();
    const bool held_payable_treasure_regi_route =
        !item_locked() && hand_count(Card::MysteriousTreasure) > 0 &&
        might_be_unseen(Card::RegidragoV) &&
        choose_discard(false, true, true, Card::MysteriousTreasure).has_value();
    const bool held_payable_one_discard_regi_graph =
        payloads_in_hand > 1 && hand_count(Card::Crispin) == 1 &&
        hand_count(Card::BrilliantBlender) == 0 &&
        (held_payable_quick_ball_regi_route || held_payable_treasure_regi_route);
'''
          if old in text:
              text = text.replace(old, new, 1)
              text = text.replace('held_redundant_one_discard_regi_graph);',
                                  'held_payable_one_discard_regi_graph);', 1)
              text = text.replace(
                  '''    // hand retains either Tapu recovery or the reviewed redundant Quick Ball plus
    // Mysterious Treasure graph. Exactly one Crispin and no held Blender preserve
    // Wonder Tag whenever a stronger direct payload outlet already solves that axis:
''',
                  '''    // hand retains either Tapu recovery or a one-discard Regidrago route whose
    // printed cost is payable under the centralized DCI selector. Exactly one Crispin
    // and no held Blender keep this branch focused on the reviewed connector graph:
''',
                  1,
              )
          elif 'held_payable_one_discard_regi_graph' not in text:
              raise SystemExit('issue 653 predicate anchor missing')
          atomic_write(source, text)

          tests = Path('tests/opening_active_dialga_payload_tests.cpp')
          text = tests.read_text(encoding='utf-8')
          if 'test_protected_single_items_preserve_wonder_tag' not in text:
              text = text.replace(
                  'void test_opening_choice_preserves_dialga_with_direct_regi_route() {',
                  'void test_protected_single_items_preserve_wonder_tag() {',
                  1,
              )
              text = text.replace(
                  'const sim::Scenario scenario{"opening-dialga-direct-regi-route",',
                  'const sim::Scenario scenario{"opening-dialga-protected-item-costs",',
                  1,
              )
              text = text.replace(
                  '''  // Setup may choose either Basic. The held one-discard Items already expose
  // Regidrago V, Crispin covers the Supporter route, and Mega Dragonite ex provides
  // a second Dragon payload, so Tapu Lele-GX has lower marginal connector value:
''',
                  '''  // Each search Item requires another card to be discarded. Strict DCI protects
  // every other singleton and payload in this hand, so neither printed cost is
  // realistically payable and Wonder Tag remains the live connector:
''',
                  1,
              )
              text = text.replace(
                  '''  if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
      !contains(after.hand, sim::Card::DialgaGX) ||
      !contains(after.hand, sim::Card::MegaDragonite)) {
    throw std::runtime_error("Tapu Lele-GX should start when a held one-discard Item exposes Regidrago V.");
  }
''',
                  '''  if (!after.active || after.active->card != sim::Card::DialgaGX ||
      !contains(after.hand, sim::Card::TapuLeleGX) ||
      !contains(after.hand, sim::Card::MegaDragonite)) {
    throw std::runtime_error("Protected singleton hands must preserve Wonder Tag.");
  }
''',
                  1,
              )
              text = text.replace(
                  '  test_opening_choice_preserves_dialga_with_direct_regi_route();\n',
                  '  test_protected_single_items_preserve_wonder_tag();\n',
                  1,
              )

          if 'test_payable_quick_ball_regi_route_preserves_dialga' not in text:
              additions = r'''
void test_payable_quick_ball_regi_route_preserves_dialga() {
  const sim::Scenario scenario{"opening-dialga-payable-quick-ball", sim::DciProfile::StrictJit,
                               sim::LockMode::None, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{65304};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state;
  state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                sim::Card::Crispin, sim::Card::QuickBall,
                sim::Card::QuickBall, sim::Card::MegaDragonite,
                sim::Card::ChaoticSwell};
  sim::EngineTestAccess::set_state(engine, std::move(state));

  // Quick Ball requires another card. The second copy is legal low-DCI fuel, so the
  // public hand has a payable direct Regidrago V route while Dialga-GX stays protected:
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/swsh12-135
  // https://api.pokemontcg.io/v2/cards/sm5-100
  // https://api.pokemontcg.io/v2/cards/cel25c-60_A
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
  // https://github.com/FlareZ123/pokemon-sims/issues/653
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
      !contains(after.hand, sim::Card::DialgaGX)) {
    throw std::runtime_error("A payable Quick Ball route should preserve Dialga-GX.");
  }
}

void test_payable_treasure_regi_route_preserves_dialga() {
  const sim::Scenario scenario{"opening-dialga-payable-treasure", sim::DciProfile::StrictJit,
                               sim::LockMode::None, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{65305};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state;
  state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                sim::Card::Crispin, sim::Card::MysteriousTreasure,
                sim::Card::MysteriousTreasure, sim::Card::MegaDragonite,
                sim::Card::ChaoticSwell};
  sim::EngineTestAccess::set_state(engine, std::move(state));

  // Mysterious Treasure requires one discard. A second copy can pay that cost while
  // the first searches the Dragon-type Regidrago V and Dialga-GX remains protected:
  // https://api.pokemontcg.io/v2/cards/sm6-113
  // https://api.pokemontcg.io/v2/cards/swsh12-135
  // https://api.pokemontcg.io/v2/cards/sm5-100
  // https://api.pokemontcg.io/v2/cards/cel25c-60_A
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
  // https://github.com/FlareZ123/pokemon-sims/issues/653
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
      !contains(after.hand, sim::Card::DialgaGX)) {
    throw std::runtime_error("A payable Mysterious Treasure route should preserve Dialga-GX.");
  }
}

'''
              anchor = 'void test_full_item_lock_rejects_direct_regi_item_signal() {'
              if anchor not in text:
                  raise SystemExit('issue 653 test insertion anchor missing')
              text = text.replace(anchor, additions + anchor, 1)
              call = '  test_protected_single_items_preserve_wonder_tag();\n'
              if call not in text:
                  raise SystemExit('issue 653 test call anchor missing')
              text = text.replace(
                  call,
                  call + '  test_payable_quick_ball_regi_route_preserves_dialga();\n'
                         '  test_payable_treasure_regi_route_preserves_dialga();\n',
                  1,
              )
          atomic_write(tests, text)
          PY

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build all targets
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused UBSan regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_active_dialga_payload_tests.cpp -o build/opening_active_dialga_payload_tests_ubsan && ./build/opening_active_dialga_payload_tests_ubsan

      - name: Simulate pass 1
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 --require-ready-by 3 | tee issue-653-trace-1.txt
      - name: Simulate pass 2
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee issue-653-trace-2.txt
      - name: Simulate pass 3
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 --require-ready-by 3 | tee issue-653-trace-3.txt
      - name: Generate T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-653-t2-t3-matrix.csv
      - name: Archive exact source snapshot
        run: git archive --format=tar.gz -o issue-653-source.tgz HEAD

      - name: Commit validated payable-route fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc tests/opening_active_dialga_payload_tests.cpp
          if ! git diff --cached --quiet; then
            git commit -m 'Require payable one-discard routes for #653'
            git push origin HEAD:fix/653-route-aware-dialga-opening-v2
          fi

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-653-route-aware-validation
          path: |
            issue-653-trace-*.txt
            issue-653-t2-t3-matrix.csv
            issue-653-source.tgz
            build/Testing
          if-no-files-found: warn
