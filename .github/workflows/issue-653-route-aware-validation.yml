name: Issue 653 Route-Aware Dialga Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate-issue-653:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build all targets
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused UBSan regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_active_dialga_payload_tests.cpp -o build/opening_active_dialga_payload_tests_ubsan && ./build/opening_active_dialga_payload_tests_ubsan
      - name: Simulate strict JIT going first
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee issue-653-trace-strict-first-3.txt
      - name: Simulate strict JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 | tee issue-653-trace-strict-second-6.txt
      - name: Simulate matchup-flex JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee issue-653-trace-flex-second-11.txt
      - name: Generate T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-653-t2-t3-matrix.csv
      - name: Archive exact source snapshot
        run: git archive --format=tar.gz -o issue-653-source.tgz HEAD
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-653-route-aware-validation
          path: |
            issue-653-trace-*.txt
            issue-653-t2-t3-matrix.csv
            issue-653-source.tgz
            build/Testing
          if-no-files-found: warn
