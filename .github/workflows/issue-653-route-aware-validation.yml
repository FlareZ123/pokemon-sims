name: Issue 653 Route-Aware Dialga Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate-issue-653:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and policy tests
        run: cmake --build build --target regidrago_sim regidrago_policy_tests --parallel 2
      - name: Run opening-active regression suite
        # Issue evidence and repository policy: https://github.com/FlareZ123/pokemon-sims/issues/653 https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/opening_active_dialga_payload_tests.cpp -o build/opening_active_dialga_payload_tests && ./build/opening_active_dialga_payload_tests
      - name: Run policy tests
        run: ./build/regidrago_policy_tests
      - name: Simulate strict JIT going first
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee issue-653-trace-strict-first-3.txt
      - name: Simulate strict JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 | tee issue-653-trace-strict-second-6.txt
      - name: Simulate matchup-flex JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee issue-653-trace-flex-second-11.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-653-t2-t3-matrix.csv
      - name: Archive exact source snapshot
        run: tar --exclude=.git --exclude=build -czf issue-653-source.tgz .
      - name: Upload traces, matrix, and source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-653-route-aware-validation
          path: |
            issue-653-trace-*.txt
            issue-653-t2-t3-matrix.csv
            issue-653-source.tgz
          if-no-files-found: error
