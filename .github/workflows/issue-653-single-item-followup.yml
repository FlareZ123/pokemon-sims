name: Issue 653 Single Item Follow-up

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-653-followup:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/653-single-item-route-followup'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/653-single-item-route-followup
          fetch-depth: 0
      - name: Apply focused source and CTest registration
        run: python tools/apply_issue_653_followup.py
      - name: Configure and build Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused warning-clean regression
        run: c++ -std=c++20 -Wall -Wextra -Werror -Wpedantic -Wconversion -Wshadow tests/opening_dialga_single_item_route_tests.cpp -o build/issue_653_followup_tests && ./build/issue_653_followup_tests
      - name: Run focused regression under UBSan
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_dialga_single_item_route_tests.cpp -o build/issue_653_followup_ubsan && ./build/issue_653_followup_ubsan
      - name: Audit three independent simulate-this routes
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 13 --require-ready-by 2 | tee build/issue-653-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 44 --require-ready-by 2 | tee build/issue-653-trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 19 --require-ready-by 2 | tee build/issue-653-trace-3.txt
      - name: Generate canonical T2 T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-653-matrix.csv
      - name: Commit validated source and remove temporary CI
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm tools/apply_issue_653_followup.py .github/workflows/issue-653-single-item-followup.yml
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_dialga_single_item_route_tests.cpp
          git commit -m 'Accept payable single-Item Regidrago routes (#653)'
          git push origin HEAD:fix/653-single-item-route-followup
      - name: Upload issue 653 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-653-single-item-followup
          path: |
            build/issue-653-trace-1.txt
            build/issue-653-trace-2.txt
            build/issue-653-trace-3.txt
            build/issue-653-matrix.csv
            build/Testing
          if-no-files-found: warn
