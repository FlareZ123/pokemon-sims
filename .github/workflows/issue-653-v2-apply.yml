name: Apply and validate issue 653 remaining route

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/653-direct-regi-opening-route-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/653-direct-regi-opening-route-v2
          fetch-depth: 0
      - name: Apply route-aware multi-payload opening fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/trace_engine_v2/part_005.inc')
          text = source.read_text(encoding='utf-8')
          old = '''    const bool held_turo_fss_recovery_graph =
        hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;
    const bool dialga_has_route_preservation_value =
        hand_count(Card::DialgaGX) == 1 &&
        (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph);
'''
          new = '''    const bool held_turo_fss_recovery_graph =
        hand_count(Card::ProfessorTuro) > 0 && hand_count(Card::ForestSealStone) > 0;
    const bool held_one_discard_regi_route =
        !item_locked() && might_be_unseen(Card::RegidragoV) &&
        (hand_count(Card::QuickBall) > 0 || hand_count(Card::MysteriousTreasure) > 0);
    const bool held_direct_regi_and_payload_graph =
        payloads_in_hand > 1 && held_one_discard_regi_route;
    const bool dialga_has_route_preservation_value =
        hand_count(Card::DialgaGX) == 1 &&
        (dialga_is_unique_in_hand_payload || held_turo_fss_recovery_graph ||
         held_direct_regi_and_payload_graph);
'''
          if 'held_direct_regi_and_payload_graph' not in text:
              if old not in text:
                  raise SystemExit('source predicate anchor missing')
              text = text.replace(old, new, 1)

          old_comment = '''    // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
    // preserve it when Crispin already covers the Supporter connector and the public
    // hand either has no other payload or has Turo plus Forest Seal Stone redundancy:
'''
          new_comment = '''    // Dialga-GX is a modeled Apex Dragon payload. Under strict current-turn DCI,
    // preserve it when Crispin already covers the Supporter connector and the public
    // hand has either no other payload, Turo plus Forest Seal Stone redundancy, or a
    // legal one-discard Regidrago V search plus another held Dragon payload:
'''
          if old_comment in text:
              text = text.replace(old_comment, new_comment, 1)

          source_url_anchor = '''    // https://api.pokemontcg.io/v2/cards/sv4-171
    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
'''
          source_url_insert = '''    // https://api.pokemontcg.io/v2/cards/sv4-171
    // https://api.pokemontcg.io/v2/cards/swsh1-179
    // https://api.pokemontcg.io/v2/cards/sm6-113
    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
'''
          if 'https://api.pokemontcg.io/v2/cards/swsh1-179\n    // https://api.pokemontcg.io/v2/cards/sm6-113' not in text:
              if source_url_anchor not in text:
                  raise SystemExit('source URL anchor missing')
              text = text.replace(source_url_anchor, source_url_insert, 1)
          source.write_text(text, encoding='utf-8')

          test = Path('tests/opening_active_dialga_payload_tests.cpp')
          test_text = test.read_text(encoding='utf-8')
          insertion = r'''
void test_opening_choice_preserves_dialga_with_direct_regi_route() {
  const sim::Scenario scenario{"opening-dialga-direct-regi-route", sim::DciProfile::StrictJit,
                               sim::LockMode::None, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{65301};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state;
  state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                sim::Card::Crispin, sim::Card::MysteriousTreasure,
                sim::Card::QuickBall, sim::Card::MegaDragonite,
                sim::Card::ChaoticSwell};
  sim::EngineTestAccess::set_state(engine, std::move(state));

  // The one-discard search Items already expose Regidrago V while the second
  // Dragon supplies legal strict-JIT flexibility. Preserving Dialga-GX is stronger
  // than preserving a redundant Wonder Tag when Crispin is already held:
  // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
  // https://api.pokemontcg.io/v2/cards/sm5-100
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/sm6-113
  // https://api.pokemontcg.io/v2/cards/me2pt5-152
  // https://api.pokemontcg.io/v2/cards/sv7-133
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
  // https://github.com/FlareZ123/pokemon-sims/issues/653
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::TapuLeleGX ||
      !contains(after.hand, sim::Card::DialgaGX) ||
      !contains(after.hand, sim::Card::MegaDragonite)) {
    throw std::runtime_error("Tapu Lele-GX should start when a held one-discard Item exposes Regidrago V.");
  }
}

void test_full_item_lock_rejects_direct_regi_item_signal() {
  const sim::Scenario scenario{"opening-dialga-direct-regi-item-lock", sim::DciProfile::StrictJit,
                               sim::LockMode::FullItem, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{65302};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state;
  state.hand = {sim::Card::TapuLeleGX, sim::Card::DialgaGX,
                sim::Card::Crispin, sim::Card::MysteriousTreasure,
                sim::Card::QuickBall, sim::Card::MegaDragonite,
                sim::Card::ChaoticSwell};
  sim::EngineTestAccess::set_state(engine, std::move(state));

  // Full Item lock blocks Quick Ball and Mysterious Treasure, so those cards
  // cannot make Wonder Tag redundant during opening selection:
  // https://www.pokemon.com/us/pokemon-tcg/rules
  // https://api.pokemontcg.io/v2/cards/swsh1-179
  // https://api.pokemontcg.io/v2/cards/sm6-113
  // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#lock-scenarios
  // https://github.com/FlareZ123/pokemon-sims/issues/653
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::DialgaGX ||
      !contains(after.hand, sim::Card::TapuLeleGX)) {
    throw std::runtime_error("Full Item lock should retain Tapu Lele-GX as the live connector.");
  }
}
'''
          namespace_anchor = '\n}  // namespace\n\nint main() {'
          if 'test_opening_choice_preserves_dialga_with_direct_regi_route' not in test_text:
              if namespace_anchor not in test_text:
                  raise SystemExit('test namespace anchor missing')
              test_text = test_text.replace(namespace_anchor, insertion + namespace_anchor, 1)

          call_anchor = '''  test_multiple_payloads_without_recovery_graph_keep_legacy_order();
  return 0;
'''
          call_insert = '''  test_multiple_payloads_without_recovery_graph_keep_legacy_order();
  test_opening_choice_preserves_dialga_with_direct_regi_route();
  test_full_item_lock_rejects_direct_regi_item_signal();
  return 0;
'''
          if '  test_opening_choice_preserves_dialga_with_direct_regi_route();' not in test_text:
              if call_anchor not in test_text:
                  raise SystemExit('test call anchor missing')
              test_text = test_text.replace(call_anchor, call_insert, 1)
          test.write_text(test_text, encoding='utf-8')
          PY
      - name: Configure and build Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Run Release tests
        run: ctest --test-dir build --output-on-failure
      - name: Run focused issue 653 test under UBSan
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_active_dialga_payload_tests.cpp -o build/issue_653_ubsan && ./build/issue_653_ubsan
      - name: Simulate no-lock go-first
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 --require-ready-by 3 | tee build/trace_issue653_go_first.txt
      - name: Simulate no-lock go-second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 --require-ready-by 3 | tee build/trace_issue653_go_second.txt
      - name: Simulate full Item lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 2 | tee build/trace_issue653_full_item.txt
      - name: Generate full T2 T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/t2_t3_matrix.csv
      - name: Upload traces and matrix
        uses: actions/upload-artifact@v4
        with:
          name: issue-653-v2-traces-and-matrix
          path: |
            build/trace_issue653_go_first.txt
            build/trace_issue653_go_second.txt
            build/trace_issue653_full_item.txt
            build/t2_t3_matrix.csv
          if-no-files-found: error
      - name: Commit validated fix and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/issue-653-v2-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/trace_engine_v2/part_005.inc tests/opening_active_dialga_payload_tests.cpp .github/workflows/issue-653-v2-apply.yml
          git commit -m 'Complete direct Regidrago opening route preservation (#653)'
          git push origin HEAD:fix/653-direct-regi-opening-route-v2
