name: Apply and validate issue 674

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/674-oricorio-dialga-lock-routing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/674-oricorio-dialga-lock-routing
          fetch-depth: 0
      - name: Apply lock-aware opening fix and regressions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/trace_engine_v2/part_005.inc')
          text = source.read_text(encoding='utf-8')
          anchor = '''    // Oricorio's Vital Dance triggers only when it is played from hand onto the
'''
          insertion = '''    const bool oricorio_dialga_are_only_opening_basics =
        hand_count(Card::Oricorio) > 0 && hand_count(Card::DialgaGX) > 0 &&
        hand_count(Card::RegidragoV) == 0 && hand_count(Card::LatiasEx) == 0 &&
        hand_count(Card::MawileGX) == 0 && hand_count(Card::TapuLeleGX) == 0;
    const bool modeled_lock_scenario = scenario_.locks != LockMode::None;
    const bool dialga_is_redundant_payload =
        hand_count(Card::DialgaGX) == 1 && payloads_in_hand > 1;
    const bool vital_dance_has_missing_energy_type = !both_manual_energy_types_held;

    // Setup permits either opening Basic to become Active. In strict-JIT lock
    // scenarios, start a redundant Dialga-GX so Oricorio remains in hand for
    // Vital Dance while at least one GGF Energy type is missing. Path-style Rule
    // Box Ability lock does not suppress Oricorio because it has no Rule Box:
    // https://tcg.pokemon.com/assets/img/learn-to-play/getting-started/quick-start-rules/en-us/quick_start_rulebook.pdf#Set_Up_to_Play
    // https://api.pokemontcg.io/v2/cards/sm2-55
    // https://api.pokemontcg.io/v2/cards/sm5-100
    // https://api.pokemontcg.io/v2/cards/me2pt5-152
    // https://api.pokemontcg.io/v2/cards/swsh6-148
    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment
    // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
    // https://github.com/FlareZ123/pokemon-sims/issues/674
    if (oricorio_dialga_are_only_opening_basics && modeled_lock_scenario &&
        scenario_.dci == DciProfile::StrictJit && dialga_is_redundant_payload &&
        vital_dance_has_missing_energy_type && remove_one(state_.hand, Card::DialgaGX)) {
      state_.active = Pokemon{Card::DialgaGX, 0};
      outcome_.started_regi = false;
      return;
    }

'''
          if anchor not in text:
              raise SystemExit('source anchor missing')
          if 'oricorio_dialga_are_only_opening_basics' not in text:
              source.write_text(text.replace(anchor, insertion + anchor, 1), encoding='utf-8')

          test = Path('tests/opening_oricorio_dialga_lock_tests.cpp')
          test.write_text(r'''#define REGIDRAGO_SIM_NO_MAIN
#include "../src/regidrago_sim.cpp"

#include <algorithm>
#include <stdexcept>

namespace sim {

struct EngineTestAccess {
  static void set_state(Engine& engine, State state) { engine.state_ = std::move(state); }
  static const State& state(const Engine& engine) { return engine.state_; }
  static void choose_opening_active(Engine& engine) { engine.choose_opening_active(); }
};

}  // namespace sim

namespace {

bool contains(const std::vector<sim::Card>& cards, const sim::Card card) {
  return std::find(cards.begin(), cards.end(), card) != cards.end();
}

sim::State issue_674_hand() {
  sim::State state;
  state.hand = {sim::Card::QuickBall, sim::Card::TeamYellsCheer,
                sim::Card::MegaDragonite, sim::Card::DialgaGX,
                sim::Card::Oricorio, sim::Card::Powerglass,
                sim::Card::RegidragoVstar};
  return state;
}

void assert_lock_preserves_oricorio(const sim::LockMode lock, const char* label) {
  const sim::Scenario scenario{label, sim::DciProfile::StrictJit, lock, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{674};
  sim::Engine engine(scenario, recipe, rng);
  sim::EngineTestAccess::set_state(engine, issue_674_hand());

  // Oricorio is a Basic without a Rule Box. Vital Dance is available when it is
  // played from hand onto the Bench, while Mega Dragonite ex keeps a second
  // modeled Dragon payload in hand under every modeled lock state:
  // https://api.pokemontcg.io/v2/cards/sm2-55
  // https://api.pokemontcg.io/v2/cards/sm5-100
  // https://api.pokemontcg.io/v2/cards/me2pt5-152
  // https://api.pokemontcg.io/v2/cards/swsh6-148
  // https://github.com/FlareZ123/pokemon-sims/issues/674
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::DialgaGX ||
      !contains(after.hand, sim::Card::Oricorio) ||
      !contains(after.hand, sim::Card::MegaDragonite)) {
    throw std::runtime_error("Lock scenario should start redundant Dialga-GX and preserve Vital Dance.");
  }
}

void test_all_modeled_locks_preserve_oricorio() {
  assert_lock_preserves_oricorio(sim::LockMode::TurnTwoItem, "issue-674-turn-two-item");
  assert_lock_preserves_oricorio(sim::LockMode::FullItem, "issue-674-full-item");
  assert_lock_preserves_oricorio(sim::LockMode::FullRuleBoxAbility, "issue-674-rulebox");
  assert_lock_preserves_oricorio(sim::LockMode::FullCombined, "issue-674-combined");
}

void test_no_lock_remains_in_issue_663_scope() {
  const sim::Scenario scenario{"issue-674-no-lock-control", sim::DciProfile::StrictJit,
                               sim::LockMode::None, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{67401};
  sim::Engine engine(scenario, recipe, rng);
  sim::EngineTestAccess::set_state(engine, issue_674_hand());
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::Oricorio ||
      !contains(after.hand, sim::Card::DialgaGX)) {
    throw std::runtime_error("No-lock behavior belongs to issue 663 and must remain unchanged here.");
  }
}

void test_unique_dialga_payload_stays_protected() {
  const sim::Scenario scenario{"issue-674-unique-payload-control", sim::DciProfile::StrictJit,
                               sim::LockMode::FullItem, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{67402};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state = issue_674_hand();
  state.hand.erase(std::remove(state.hand.begin(), state.hand.end(), sim::Card::MegaDragonite),
                   state.hand.end());
  sim::EngineTestAccess::set_state(engine, std::move(state));
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::Oricorio ||
      !contains(after.hand, sim::Card::DialgaGX)) {
    throw std::runtime_error("The unique strict-JIT payload must remain in hand.");
  }
}

void test_complete_energy_hand_does_not_spend_payload() {
  const sim::Scenario scenario{"issue-674-energy-complete-control", sim::DciProfile::StrictJit,
                               sim::LockMode::FullRuleBoxAbility, false, 4};
  const sim::DeckRecipe recipe = sim::baseline_recipe();
  std::mt19937_64 rng{67403};
  sim::Engine engine(scenario, recipe, rng);
  sim::State state = issue_674_hand();
  state.hand.push_back(sim::Card::Grass);
  state.hand.push_back(sim::Card::Fire);
  sim::EngineTestAccess::set_state(engine, std::move(state));
  sim::EngineTestAccess::choose_opening_active(engine);
  const sim::State& after = sim::EngineTestAccess::state(engine);
  if (!after.active || after.active->card != sim::Card::Oricorio ||
      !contains(after.hand, sim::Card::DialgaGX)) {
    throw std::runtime_error("A hand already holding both Energy types should preserve Dialga-GX.");
  }
}

}  // namespace

int main() {
  test_all_modeled_locks_preserve_oricorio();
  test_no_lock_remains_in_issue_663_scope();
  test_unique_dialga_payload_stays_protected();
  test_complete_energy_hand_does_not_spend_payload();
  return 0;
}
''', encoding='utf-8')

          cmake = Path('CMakeLists.txt')
          cmake_text = cmake.read_text(encoding='utf-8')
          target_anchor = '''add_executable(regidrago_opening_dialga_payload_tests tests/opening_active_dialga_payload_tests.cpp)
target_compile_options(regidrago_opening_dialga_payload_tests PRIVATE -Wall -Wextra -Wpedantic -Wconversion -Wshadow)
'''
          target_insert = target_anchor + '''
add_executable(regidrago_opening_oricorio_dialga_lock_tests tests/opening_oricorio_dialga_lock_tests.cpp)
target_compile_options(regidrago_opening_oricorio_dialga_lock_tests PRIVATE -Wall -Wextra -Wpedantic -Wconversion -Wshadow)
'''
          if 'regidrago_opening_oricorio_dialga_lock_tests' not in cmake_text:
              if target_anchor not in cmake_text:
                  raise SystemExit('CMake target anchor missing')
              cmake_text = cmake_text.replace(target_anchor, target_insert, 1)
          test_anchor = 'add_test(NAME regidrago_opening_dialga_payload COMMAND regidrago_opening_dialga_payload_tests)\n'
          test_insert = test_anchor + 'add_test(NAME regidrago_opening_oricorio_dialga_lock COMMAND regidrago_opening_oricorio_dialga_lock_tests)\n'
          if 'NAME regidrago_opening_oricorio_dialga_lock ' not in cmake_text:
              if test_anchor not in cmake_text:
                  raise SystemExit('CMake test anchor missing')
              cmake_text = cmake_text.replace(test_anchor, test_insert, 1)
          cmake.write_text(cmake_text, encoding='utf-8')
          PY
      - name: Configure and build Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Run Release tests
        run: ctest --test-dir build --output-on-failure
      - name: Run issue 674 regression under UBSan
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_oricorio_dialga_lock_tests.cpp -o build/issue_674_ubsan && ./build/issue_674_ubsan
      - name: Simulate turn-two Item lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee build/trace_turn2_item_lock.txt
      - name: Simulate Rule Box Ability lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee build/trace_rulebox_lock.txt
      - name: Simulate full Item lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 2 | tee build/trace_full_item_lock.txt
      - name: Generate full T2 T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/t2_t3_matrix.csv
      - name: Commit validated fix and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/issue-674-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_lock_tests.cpp .github/workflows/issue-674-apply.yml
          git commit -m 'Fix lock-aware Oricorio-Dialga opening selection (#674)'
          git push origin HEAD:fix/674-oricorio-dialga-lock-routing
      - name: Upload issue 674 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-674-validation
          path: |
            build/trace_turn2_item_lock.txt
            build/trace_rulebox_lock.txt
            build/trace_full_item_lock.txt
            build/t2_t3_matrix.csv
            build/Testing
          if-no-files-found: warn
