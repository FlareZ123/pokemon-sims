name: Issue 674 Merge Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/674-vital-dance-lock-openings-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/674-vital-dance-lock-openings-v2
          fetch-depth: 0

      - name: Reconcile latest main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply permanent fix
        run: python tools/apply_issue_674.py

      - name: Build and run Release suite
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ctest --test-dir build --output-on-failure

      - name: Run focused UBSan regression
        run: |
          cmake -S . -B build-ubsan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=undefined -fno-omit-frame-pointer'
          cmake --build build-ubsan --target regidrago_opening_oricorio_dialga_lock_route_tests --parallel 2
          ctest --test-dir build-ubsan -R regidrago_opening_oricorio_dialga_lock_route --output-on-failure

      - name: Run three perfect-play traces
        run: |
          mkdir -p build/issue-674-merge
          # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 2 | tee build/issue-674-merge/strict_first_seed_6.txt
          # Timing specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#strict-jit-definition
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee build/issue-674-merge/flex_second_seed_3.txt
          # DCI specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 2 | tee build/issue-674-merge/no_control_first_seed_6.txt

      - name: Generate current-main matrix
        run: |
          # Probability specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-674-merge/t2_t3_matrix.csv
          cat build/issue-674-merge/t2_t3_matrix.csv

      - name: Commit permanent files
        run: |
          git rm tools/apply_issue_674.py .github/workflows/issue-674-merge-gate.yml
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_lock_route_tests.cpp
          git commit -m 'Preserve Vital Dance in modeled lock openings (#674)'
          git push origin HEAD:fix/674-vital-dance-lock-openings-v2

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-674-merge-gate
          path: |
            build/issue-674-merge
            build/Testing
            build-ubsan/Testing
          if-no-files-found: warn
