name: Issue 678 T2 T3 Matrix

on:
  pull_request:
    branches: [main]
    paths:
      - src/trace_engine_v2/part_005.inc
      - tests/opening_tapu_oricorio_tests.cpp
      - .github/workflows/issue-678-matrix.yml

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2 --target regidrago_sim
      # Fixed-seed aggregate command and scenario contract:
      # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
      # https://github.com/FlareZ123/pokemon-sims/issues/678
      - name: Run 100000-trial matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-678-matrix.csv
      - name: Upload matrix
        uses: actions/upload-artifact@v4
        with:
          name: issue-678-t2-t3-matrix
          path: issue-678-matrix.csv
          if-no-files-found: error
