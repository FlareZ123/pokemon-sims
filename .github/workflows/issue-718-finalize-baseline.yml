name: Finalize issue 718 baseline

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Normalize reviewed source formatting
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/trace_engine_v2/part_006.inc")
          text = path.read_text(encoding="utf-8")
          old = '''  bool has_live_blender_payload_line() const {
            // A strict-JIT Blender route is live only when its one-use deck discard can
            // accompany a current-turn Regidrago VSTAR card route. Higher-level Supporter,
            // switching, and attachment selectors must use the same boundary as the action:
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#strict-jit-definition
            // https://github.com/FlareZ123/pokemon-sims/issues/718
            return !item_locked() && hand_count(Card::BrilliantBlender) > 0 &&
                   can_play_payload_this_turn() && payload_might_be_in_deck() &&
                   blender_vstar_card_axis_can_finish_this_turn();
          }
          '''
          start = text.index("  bool has_live_blender_payload_line() const {")
          end = text.index("  bool can_spend_redundant_payload_for_locked_vstar_search() const {", start)
          text = text[:start] + old + "\n" + text[end:]
          path.write_text(text, encoding="utf-8")
          PY
      - name: Build Release simulator and tests
        run: |
          cmake -S . -B build-finalize -DCMAKE_BUILD_TYPE=Release
          cmake --build build-finalize --parallel 2
      - name: Regenerate canonical traces and 100000-trial matrix
        run: |
          python scripts/regenerate_setup_baselines.py \
            --exe build-finalize/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Validate finalized baseline and full Release suite
        run: |
          python tests/setup_report_contract_tests.py
          ctest --test-dir build-finalize --output-on-failure --parallel 2
      - name: Commit generated baseline
        run: |
          rm .github/workflows/issue-718-finalize-baseline.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Regenerate setup baseline for Blender VSTAR-axis fix"
          git push origin HEAD:${{ github.head_ref }}
