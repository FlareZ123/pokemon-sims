name: Restore unrelated tracked file

on:
  pull_request:

permissions:
  contents: write

jobs:
  restore:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Restore exact main-branch file
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/__pycache__/baseline_provenance.cpython-312.pyc
          rm .github/workflows/issue-718-restore-tracked.yml
      - name: Commit restoration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Restore unrelated tracked cache file"
          git push origin HEAD:${{ github.head_ref }}
