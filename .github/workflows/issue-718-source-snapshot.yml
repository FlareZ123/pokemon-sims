name: Issue 718 source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Package exact PR head
        run: tar --exclude=.git --exclude=issue-718-source-snapshot.tar.gz -czf issue-718-source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: issue-718-source-${{ github.event.pull_request.head.sha }}
          path: issue-718-source-snapshot.tar.gz
          if-no-files-found: error
