name: Apply issue 718 validated patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply locally validated source and contract updates
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_string: str, old: str, new: str) -> None:
              path = Path(path_string)
              text = path.read_text(encoding="utf-8")
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding="utf-8")
                  return
              if new not in text:
                  raise RuntimeError(f"Expected source block missing from {path}")

          replace_once(
              "src/trace_engine_v2/part_006.inc",
              '''  bool has_live_blender_payload_line() const {
            // Brilliant Blender searches and discards cards from deck: https://api.pokemontcg.io/v2/cards/sv8-164
            return !item_locked() && hand_count(Card::BrilliantBlender) > 0 && can_play_payload_this_turn() &&
                   payload_might_be_in_deck();
          }
          ''',
              '''  bool has_live_blender_payload_line() const {
            // A strict-JIT Blender route is live only when its one-use deck discard can
            // accompany a current-turn Regidrago VSTAR card route. Higher-level Supporter,
            // switching, and attachment selectors must use the same boundary as the action:
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#strict-jit-definition
            // https://github.com/FlareZ123/pokemon-sims/issues/718
            return !item_locked() && hand_count(Card::BrilliantBlender) > 0 &&
                   can_play_payload_this_turn() && payload_might_be_in_deck() &&
                   blender_vstar_card_axis_can_finish_this_turn();
          }
          ''')

          replace_once(
              "src/trace_engine_v2/part_blender_vstar_axis_override.inc",
              "  bool blender_vstar_card_axis_can_finish_this_turn() {",
              "  bool blender_vstar_card_axis_can_finish_this_turn() const {")

          replace_once(
              "tests/known_dead_payload_tests.cpp",
              '''  state.hand = {sim::Card::BrilliantBlender};
            state.deck = {sim::Card::MegaDragonite};
            sim::EngineTestAccess::set_state(fixture.engine, std::move(state));

            // A prior-turn Regidrago V may evolve during the current turn, so the narrow
            // VSTAR-existence gate must preserve the live same-turn Blender payload route:
            // https://www.pokemon.com/us/pokemon-tcg/rules
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://github.com/FlareZ123/pokemon-sims/issues/721
          ''',
              '''  state.hand = {sim::Card::BrilliantBlender, sim::Card::RegidragoVstar};
            state.deck = {sim::Card::MegaDragonite};
            sim::EngineTestAccess::set_state(fixture.engine, std::move(state));

            // A prior-turn Regidrago V plus the held Regidrago VSTAR card completes the
            // current-turn evolution axis, so the #721 existence control remains live after
            // #718 adds the separate card-access boundary:
            // https://www.pokemon.com/us/pokemon-tcg/rules
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://github.com/FlareZ123/pokemon-sims/issues/721
            // https://github.com/FlareZ123/pokemon-sims/issues/718
          ''')
          replace_once(
              "tests/known_dead_payload_tests.cpp",
              "A prior-turn Regidrago V must keep the strict-JIT payload route live.",
              "A prior-turn Regidrago V with its held VSTAR card must keep the strict-JIT payload route live.")

          replace_once(
              "tests/opening_bench_tapu_route_tests.cpp",
              "void test_seed_one_downstream_policy_regression() {",
              "void test_seed_one_downstream_policy_characterization() {")
          replace_once(
              "tests/opening_bench_tapu_route_tests.cpp",
              '''  // Matched seed 1 holds the shuffled 53-card remainder, six Prize cards, and all
            // downstream choices constant. The hidden continuation now reaches T3 while Tapu
            // remains in hand and T4 after setup placement. Setup-Benching cannot trigger Wonder
            // Tag, so this deterministic contract records both outcomes without requiring the
            // slower historical branch or changing the public-state opening selector:
          ''',
              '''  // Matched seed 1 holds the shuffled 53-card remainder, six Prize cards, and all
            // downstream choices constant. Holding Tapu reaches T3 through Wonder Tag. After
            // #718 removes the invalid early Blender spend, the setup-Benched route has no live
            // VSTAR-card connector and remains unready through the T4 fixture deadline. Issue
            // #932 owns the distinct opening-selector correction:
          ''')
          replace_once(
              "tests/opening_bench_tapu_route_tests.cpp",
              '''  // https://github.com/FlareZ123/pokemon-sims/issues/885
            const sim::TrialOutcome held_tapu = run_seed_one_conditioned_policy(false);
            const sim::TrialOutcome setup_benched_tapu = run_seed_one_conditioned_policy(true);
            if (held_tapu.first_ready_turn != 3 || setup_benched_tapu.first_ready_turn != 4) {
              throw std::runtime_error(
                  "Matched seed 1 should reach T3 with held Tapu and T4 with setup-Benched Tapu.");
            }
          ''',
              '''  // https://github.com/FlareZ123/pokemon-sims/issues/885
            // https://github.com/FlareZ123/pokemon-sims/issues/718
            // https://github.com/FlareZ123/pokemon-sims/issues/932
            const sim::TrialOutcome held_tapu = run_seed_one_conditioned_policy(false);
            const sim::TrialOutcome setup_benched_tapu = run_seed_one_conditioned_policy(true);
            if (held_tapu.first_ready_turn != 3 || setup_benched_tapu.first_ready_turn != 0) {
              throw std::runtime_error(
                  "Matched seed 1 should reach T3 with held Tapu and remain unready through T4 after setup placement.");
            }
          ''')
          replace_once(
              "tests/opening_bench_tapu_route_tests.cpp",
              "  test_seed_one_downstream_policy_regression();",
              "  test_seed_one_downstream_policy_characterization();")

          replace_once(
              "CMakeLists.txt",
              "add_test(NAME trace_strict_first_t4 COMMAND regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4)\n",
              '''add_test(NAME trace_strict_first_t4 COMMAND regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4)
          # A prior-turn GGF Regidrago V must hold the one-use Blender until the VSTAR
          # card and Active-position axes can complete, producing the verified T4 route:
          # https://api.pokemontcg.io/v2/cards/sv8-164
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://github.com/FlareZ123/pokemon-sims/issues/718
          add_test(NAME trace_issue_718_strict_first_seed1 COMMAND regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 1 --require-ready-by 4)
          ''')

          Path(".github/workflows/issue-718-source-snapshot.yml").unlink()
          PY
      - name: Commit validated patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete Blender VSTAR-axis regression coverage"
          git push origin HEAD:${{ github.head_ref }}
