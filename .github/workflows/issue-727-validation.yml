name: Issue 727 Validation

on:
  pull_request:
    branches: [main]

jobs:
  simulate-and-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2
      - name: Validate focused Forest Seal Stone trace regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/fss_hold_trace_requires_tool_tests.cpp -o build/fss_hold_trace_requires_tool_tests && ./build/fss_hold_trace_requires_tool_tests
      - name: Run four independent simulate-this traces
        run: |
          mkdir -p validation
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 > validation/simulate-this-seed-6.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 20 > validation/simulate-this-seed-20.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 29 > validation/simulate-this-seed-29.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 42 > validation/simulate-this-seed-42.txt
      - name: Generate 100000-trial setup matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out validation/t2_t3_matrix.csv
      - name: Upload traces and matrix
        uses: actions/upload-artifact@v4
        with:
          name: issue-727-validation
          path: validation
          if-no-files-found: error
