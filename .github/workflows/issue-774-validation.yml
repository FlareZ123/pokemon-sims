name: Issue 774 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-774:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/774-steven-crispin-turn2-lock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/774-steven-crispin-turn2-lock
          fetch-depth: 0
      - name: Apply composition and CTest registration
        run: python tools/apply_issue_774.py
      - name: Configure and build Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused policy regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/steven_crispin_turn2_item_lock_tests.cpp -o build/issue_774_tests && ./build/issue_774_tests
      - name: Run focused regression under UBSan
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/steven_crispin_turn2_item_lock_tests.cpp -o build/issue_774_ubsan && ./build/issue_774_ubsan
      - name: Audit exact faster trace
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee build/issue-774-seed-2.txt
      - name: Audit two control traces
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 --require-ready-by 3 | tee build/issue-774-control-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee build/issue-774-control-2.txt
      - name: Generate T2 T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-774-matrix.csv
      - name: Commit validated source and remove temporary CI
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm tools/apply_issue_774.py .github/workflows/issue-774-validation.yml
          git add CMakeLists.txt src/regidrago_sim.cpp src/trace_engine_v2/part_010_steven_crispin_override.inc tests/steven_crispin_turn2_item_lock_tests.cpp
          git commit -m 'Prefer Crispin over Steven for live turn-two lock route (#774)'
          git push origin HEAD:fix/774-steven-crispin-turn2-lock
      - name: Upload issue 774 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-774-validation
          path: |
            build/issue-774-seed-2.txt
            build/issue-774-control-1.txt
            build/issue-774-control-2.txt
            build/issue-774-matrix.csv
            build/Testing
          if-no-files-found: warn
