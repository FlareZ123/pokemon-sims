name: Issue 788 Current Main

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/788-dialga-opening-payable-search'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/788-dialga-opening-payable-search
          fetch-depth: 0
      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build Release
        shell: bash
        run: |
          mkdir -p issue-788-audit
          set +e
          cmake --build build --parallel 2 > issue-788-audit/build.log 2>&1
          status=$?
          cat issue-788-audit/build.log
          exit "$status"
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused Werror and UBSan regressions
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/opening_active_dialga_payload_tests.cpp -o build/issue-788-focused
          ./build/issue-788-focused
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_active_dialga_payload_tests.cpp -o build/issue-788-ubsan
          ./build/issue-788-ubsan
      - name: Run three simulator audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-788-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee issue-788-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 | tee issue-788-audit/trace-3.txt
      - name: Generate matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-788-audit/t2_t3_matrix.csv
      - name: Finalize validated branch
        run: |
          git rm .github/workflows/issue-788-current-main.yml
          git commit -m 'Validate payable Dialga opening routes on current main (#788)'
          git push origin HEAD:fix/788-dialga-opening-payable-search
          git archive --format=zip HEAD -o issue-788-audit/source.zip
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-788-current-main
          path: issue-788-audit
          if-no-files-found: warn
