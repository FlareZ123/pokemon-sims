name: Issue 792 V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-792-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/792-current-v3'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/792-current-v3
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git rev-parse origin/main > /tmp/issue-792-baseline-sha
          git merge --no-edit origin/main
          mkdir -p issue-792-audit

      - name: Build and record exact current-main baseline
        shell: bash
        run: |
          baseline_sha="$(cat /tmp/issue-792-baseline-sha)"
          git worktree add /tmp/issue-792-baseline "$baseline_sha"
          cmake -S /tmp/issue-792-baseline -B /tmp/issue-792-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-792-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-792-baseline-build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-792-audit/baseline-ctest.xml" 2>&1 | tee issue-792-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-792-audit/baseline-ctest.status
          exit 0

      - name: Apply current-main composition
        run: python tools/apply_issue_792_unified.py

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Release and UBSan checks
        shell: bash
        run: |
          ctest --test-dir build --output-on-failure -R '^regidrago_opening_oricorio_dialga_(no_lock|payability)_tests$'
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-focused
          ./build/issue-792-focused
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=undefined -fno-omit-frame-pointer \
            tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-ubsan
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 ./build/issue-792-ubsan

      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          # Source-bound generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          python3 scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
          python3 tests/setup_report_contract_tests.py
          python3 tests/update_setup_docs_tests.py
          cp results/simulation_results.csv issue-792-audit/t2_t3_matrix.csv
          cp results/baseline_manifest.json issue-792-audit/baseline_manifest.json

      - name: Record patched full suite
        shell: bash
        run: |
          set +e
          ctest --test-dir build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-792-audit/patched-ctest.xml" 2>&1 | tee issue-792-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-792-audit/patched-ctest.status
          exit 0

      - name: Require exact current-main failure parity
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              return sorted(
                  case.attrib.get('name', '<unnamed>')
                  for case in root.iter('testcase')
                  if case.find('failure') is not None or case.find('error') is not None
              )

          baseline = failures('issue-792-audit/baseline-ctest.xml')
          patched = failures('issue-792-audit/patched-ctest.xml')
          Path('issue-792-audit/baseline-failures.json').write_text(json.dumps(baseline, indent=2) + '\n', encoding='utf-8')
          Path('issue-792-audit/patched-failures.json').write_text(json.dumps(patched, indent=2) + '\n', encoding='utf-8')
          if patched != baseline:
              raise SystemExit(f'Issue 792 changed an unrelated full-suite failure set. baseline={baseline} patched={patched}')
          print(f'Current-main failure parity confirmed: {baseline}')
          PY

      - name: Run three traces
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-792-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee issue-792-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee issue-792-audit/trace-3.txt

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$(cat /tmp/issue-792-baseline-sha)" ]; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Finalize permanent fix
        shell: bash
        run: |
          rm -f .update-setup-docs.lock .results.lock
          git rm tools/apply_issue_792_v3.py tools/apply_issue_792_unified.py .github/workflows/issue-792-v3.yml
          git add src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_no_lock_tests.cpp tests/opening_oricorio_dialga_payability_tests.cpp \
            README.md docs/REPORT.md docs/TRACE_AUDIT.md results/baseline_manifest.json results/simulation_results.csv
          git add -A results/traces
          git commit -m 'Require payable no-lock Oricorio-Dialga routes (#792)'
          git push origin HEAD:fix/792-current-v3
          git archive --format=zip HEAD -o issue-792-audit/source.zip

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-792-v3
          path: issue-792-audit
          if-no-files-found: warn
