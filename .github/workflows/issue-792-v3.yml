name: Issue 792 V3

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.ref == 'fix/792-current-v3'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/792-current-v3
          fetch-depth: 0
      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
      - name: Apply current-main composition
        run: python tools/apply_issue_792_v3.py
      - name: Configure and build Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Run full suite and focused checks
        run: |
          ctest --test-dir build --output-on-failure
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-focused
          ./build/issue-792-focused
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-ubsan
          ./build/issue-792-ubsan
      - name: Run three traces and matrix
        run: |
          mkdir -p issue-792-audit
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-792-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee issue-792-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 | tee issue-792-audit/trace-3.txt
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-792-audit/t2_t3_matrix.csv
      - name: Finalize permanent fix
        run: |
          git rm tools/apply_issue_792_v3.py .github/workflows/issue-792-v3.yml
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_no_lock_tests.cpp tests/opening_oricorio_dialga_payability_tests.cpp
          git commit -m 'Require payable no-lock Oricorio-Dialga routes (#792)'
          git push origin HEAD:fix/792-current-v3
          git archive --format=zip HEAD -o issue-792-audit/source.zip
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-792-v3
          path: issue-792-audit
          if-no-files-found: warn
