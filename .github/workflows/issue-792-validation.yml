name: Issue 792 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-792:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/792-payable-oricorio-dialga-route'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/792-payable-oricorio-dialga-route
          fetch-depth: 0
      - name: Reconcile current main
        run: |
          git fetch origin main
          git merge --no-edit origin/main
      - name: Apply final source and registrations
        run: python tools/apply_issue_792.py
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build all targets
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused warning-clean regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-focused && ./build/issue-792-focused
      - name: Run focused UBSan regression
        run: c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/opening_oricorio_dialga_payability_tests.cpp -o build/issue-792-ubsan && ./build/issue-792-ubsan
      - name: Run three independent simulator audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 --require-ready-by 2 | tee build/issue-792-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee build/issue-792-trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee build/issue-792-trace-3.txt
      - name: Generate T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-792-matrix.csv
      - name: Commit validated source and remove temporary files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm tools/apply_issue_792.py .github/workflows/issue-792-validation.yml
          git add CMakeLists.txt src/trace_engine_v2/part_005.inc tests/opening_oricorio_dialga_no_lock_tests.cpp tests/opening_oricorio_dialga_payability_tests.cpp
          git commit -m 'Require payable opening search Items for Oricorio-Dialga (#792)'
          git push origin HEAD:fix/792-payable-oricorio-dialga-route
          git archive --format=zip HEAD -o build/issue-792-source.zip
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-792-validation
          path: |
            build/issue-792-trace-1.txt
            build/issue-792-trace-2.txt
            build/issue-792-trace-3.txt
            build/issue-792-matrix.csv
            build/issue-792-source.zip
            build/Testing
          if-no-files-found: warn
