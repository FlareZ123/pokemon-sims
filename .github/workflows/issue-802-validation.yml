name: Issue 802 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-802:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/802-active-tapu-paid-retreat'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/802-active-tapu-paid-retreat
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply final source and test registration
        run: python tools/apply_issue_802.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Release simulator
        run: cmake --build build --target regidrago_sim --parallel 2

      - name: Run focused Release regression
        run: ctest --test-dir build -R regidrago_active_tapu_paid_retreat --output-on-failure

      - name: Configure UBSan
        run: cmake -S . -B build-ubsan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=undefined -fno-omit-frame-pointer'

      - name: Build UBSan simulator
        run: cmake --build build-ubsan --target regidrago_sim --parallel 2

      - name: Run focused UBSan regression
        run: ctest --test-dir build-ubsan -R regidrago_active_tapu_paid_retreat --output-on-failure

      - name: Run three independent simulator audits
        run: |
          mkdir -p build/issue-802-audit
          # Exact regression: https://github.com/FlareZ123/pokemon-sims/issues/802
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 1 --require-ready-by 4 | tee build/issue-802-audit/no_control_first_seed_1.txt
          # Readable trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 4 | tee build/issue-802-audit/strict_first_seed_6.txt
          # DCI profile specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee build/issue-802-audit/flex_second_seed_3.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-802-audit/t2_t3_matrix.csv
          cat build/issue-802-audit/t2_t3_matrix.csv

      - name: Commit validated source and remove temporary files
        run: |
          git rm tools/apply_issue_802.py .github/workflows/issue-802-validation.yml
          git add CMakeLists.txt src/trace_engine_v2/part_014c_latias_bench_override.inc tests/check_active_tapu_paid_retreat.cmake
          git commit -m 'Pay Tapu Lele-GX retreat into a ready VSTAR (#802)'
          git push origin HEAD:fix/802-active-tapu-paid-retreat
          git archive --format=zip HEAD -o build/issue-802-audit/source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-802-validation
          path: |
            build/issue-802-audit
            build/Testing
            build-ubsan/Testing
          if-no-files-found: warn
