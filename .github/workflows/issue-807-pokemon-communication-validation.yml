name: Issue 807 Pokémon Communication Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Configure Release build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 2

      - name: Run focused duplicate Tapu regression
        run: ./build/regidrago_pokemon_communication_duplicate_tapu_tests

      - name: Run full CTest suite
        run: ctest --test-dir build --output-on-failure

      - name: Run three independent readable simulations
        shell: bash
        run: |
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
          mkdir -p issue-807-output
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee issue-807-output/strict-jit-go-second-seed-6.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-807-output/matchup-flex-go-second-seed-3.txt
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee issue-807-output/no-discard-control-go-first-seed-6.txt

      - name: Generate 100,000-trial T2/T3 matrix
        run: |
          # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          # Pokémon Communication: https://api.pokemontcg.io/v2/cards/sm9-152
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-807-output/setup-matrix.csv
          cat issue-807-output/setup-matrix.csv

      - name: Upload traces and matrix
        uses: actions/upload-artifact@v4
        with:
          name: issue-807-pokemon-communication-validation
          path: issue-807-output
          if-no-files-found: error
