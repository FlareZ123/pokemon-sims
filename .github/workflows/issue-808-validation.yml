name: Issue 808 Pokémon Communication Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-808-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-issue-808:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/808-pokemon-communication-post-exchange-targets'
    runs-on: ubuntu-24.04
    timeout-minutes: 55

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/808-pokemon-communication-post-exchange-targets
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply exact-state fix and regressions
        run: python tools/apply_issue_808.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run focused Pokémon Communication suite
        run: |
          ./build/regidrago_pokemon_communication_tests
          ./build/regidrago_pokemon_communication_post_exchange_target_tests

      - name: Configure ASan and UBSan
        run: >
          cmake -S . -B build-sanitize -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build ASan and UBSan
        run: cmake --build build-sanitize --parallel 2

      - name: Run full ASan and UBSan suite
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-sanitize --output-on-failure

      - name: Simulate-this pass 1
        run: |
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee build/issue-808-trace-1.txt

      - name: Simulate-this pass 2
        run: |
          # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee build/issue-808-trace-2.txt

      - name: Simulate-this pass 3
        run: |
          # Resource priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee build/issue-808-trace-3.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-808-matrix.csv

      - name: Commit validated source
        run: |
          git rm tools/apply_issue_808.py .github/workflows/issue-808-validation.yml
          git add CMakeLists.txt src/trace_engine_v2/part_pokemon_communication.inc tests/pokemon_communication_post_exchange_target_tests.cpp
          git commit -m "Fix Pokémon Communication post-exchange target preflight (#808)"
          git archive --format=zip --output=build/issue-808-source.zip HEAD
          git push origin HEAD:fix/808-pokemon-communication-post-exchange-targets

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-808-validation
          path: |
            build/issue-808-trace-1.txt
            build/issue-808-trace-2.txt
            build/issue-808-trace-3.txt
            build/issue-808-matrix.csv
            build/issue-808-source.zip
            build/Testing
            build-sanitize/Testing
          if-no-files-found: warn
