name: Issue 808 Pokémon Communication Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-808:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/808-pokemon-communication-post-exchange-deck'
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/808-pokemon-communication-post-exchange-deck
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply exact-zone fix and regressions
        run: python tools/apply_issue_808.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: cmake --build build --parallel 2

      - name: Run complete Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run focused warning-clean regressions
        run: |
          c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/pokemon_communication_tests.cpp -o build/issue-808-focused
          ./build/issue-808-focused
          ./build/regidrago_pokemon_communication_duplicate_tapu_tests

      - name: Run focused UBSan regression
        run: |
          c++ -std=c++20 -O0 -g0 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=undefined -fno-omit-frame-pointer tests/pokemon_communication_tests.cpp -o build/issue-808-ubsan
          ./build/issue-808-ubsan

      - name: Run three independent simulator audits
        run: |
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-ready objective: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scope
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee build/issue-808-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee build/issue-808-trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 3 | tee build/issue-808-trace-3.txt

      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-808-matrix.csv

      - name: Commit validated permanent source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm tools/apply_issue_808.py .github/workflows/issue-808-validation.yml
          git add src/trace_engine_v2/part_pokemon_communication.inc tests/pokemon_communication_tests.cpp
          git commit -m 'Use exact post-Communication deck for payload routes (#808)'
          git push origin HEAD:fix/808-pokemon-communication-post-exchange-deck
          git archive --format=zip HEAD -o build/issue-808-source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-808-pokemon-communication-validation
          path: |
            build/issue-808-trace-1.txt
            build/issue-808-trace-2.txt
            build/issue-808-trace-3.txt
            build/issue-808-matrix.csv
            build/issue-808-source.zip
            build/Testing
          if-no-files-found: warn
