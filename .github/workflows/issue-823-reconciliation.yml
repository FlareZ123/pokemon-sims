name: Issue 823 Reconciliation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-issue-823:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/823-pokemon-communication-recovery-zones'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/823-pokemon-communication-recovery-zones
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply zone-exact recovery fix
        run: python tools/apply_issue_823.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused Release regressions
        run: ctest --test-dir build -R 'regidrago_pokemon_communication(_recovery_zones)?$' --output-on-failure

      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Configure UBSan
        run: cmake -S . -B build-ubsan -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=undefined -fno-omit-frame-pointer'

      - name: Build focused UBSan regression
        run: cmake --build build-ubsan --target regidrago_pokemon_communication_recovery_zone_tests --parallel 2

      - name: Run focused UBSan regression
        run: ctest --test-dir build-ubsan -R regidrago_pokemon_communication_recovery_zones --output-on-failure

      - name: Run three independent simulator audits
        run: |
          mkdir -p build/issue-823-audit
          # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 4 | tee build/issue-823-audit/strict_first_seed_6.txt
          # Matchup-flex trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#strict-jit-definition
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 3 | tee build/issue-823-audit/flex_second_seed_3.txt
          # Recovery route stress under no-discard-control: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee build/issue-823-audit/no_control_first_seed_6.txt

      - name: Generate canonical setup matrix
        run: |
          # Fixed-seed probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/issue-823-audit/t2_t3_matrix.csv
          cat build/issue-823-audit/t2_t3_matrix.csv

      - name: Commit validated permanent change
        run: |
          git rm tools/apply_issue_823.py .github/workflows/issue-823-reconciliation.yml
          git add CMakeLists.txt src/trace_engine_v2/part_pokemon_communication.inc tests/pokemon_communication_recovery_zone_tests.cpp
          git commit -m 'Move recovered Pokémon between simulated zones (#823)'
          git push origin HEAD:fix/823-pokemon-communication-recovery-zones
          git archive --format=zip HEAD -o build/issue-823-audit/source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-823-reconciliation
          path: |
            build/issue-823-audit
            build/Testing
            build-ubsan/Testing
          if-no-files-found: warn
