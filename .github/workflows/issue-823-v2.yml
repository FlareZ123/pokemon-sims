name: Issue 823 V2

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/823-recovery-zones-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/823-recovery-zones-v2
          fetch-depth: 0
      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
      - name: Apply current-main composition
        run: python tools/apply_issue_823_v2.py
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build Release
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Run focused UBSan
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/pokemon_communication_recovery_zone_tests.cpp -o build/issue-823-focused
          ./build/issue-823-focused
      - name: Run three simulator audits
        run: |
          mkdir -p issue-823-audit
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 4 | tee issue-823-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 3 | tee issue-823-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee issue-823-audit/trace-3.txt
      - name: Generate matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-823-audit/t2_t3_matrix.csv
      - name: Commit permanent fix
        run: |
          git rm tools/apply_issue_823_v2.py .github/workflows/issue-823-v2.yml
          git add CMakeLists.txt src/trace_engine_v2/part_pokemon_communication.inc tests/pokemon_communication_recovery_zone_tests.cpp
          git commit -m 'Move recovered Pokémon between simulated zones (#823)'
          git push origin HEAD:fix/823-recovery-zones-v2
          git archive --format=zip HEAD -o issue-823-audit/source.zip
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-823-v2
          path: issue-823-audit
          if-no-files-found: warn
