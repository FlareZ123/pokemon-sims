name: Issue 837 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/837-roseanne-pcomm-zones'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/837-roseanne-pcomm-zones
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply issue 837 fix
        run: python tools/apply_issue_837.py

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --parallel 2

      - name: Run focused regression
        run: ./build/regidrago_roseanne_pokemon_communication_zone_tests

      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Run focused UBSan
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/roseanne_pokemon_communication_zone_tests.cpp -o build/issue-837-focused
          ./build/issue-837-focused

      - name: Run three simulator audits
        run: |
          mkdir -p issue-837-audit
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 4 | tee issue-837-audit/trace-1-strict-first.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-837-audit/trace-2-flex-second.txt
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee issue-837-audit/trace-3-control-first.txt

      - name: Generate canonical matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-837-audit/t2_t3_matrix.csv

      - name: Commit permanent fix
        run: |
          git rm tools/apply_issue_837.py .github/workflows/issue-837-validation.yml
          git add CMakeLists.txt src/trace_engine_v2/part_roseanne_multimode_override.inc tests/roseanne_pokemon_communication_zone_tests.cpp
          git commit -m 'Move Roseanne recovery cards between simulated zones (#837)'
          git push origin HEAD:fix/837-roseanne-pcomm-zones
          git archive --format=zip HEAD -o issue-837-audit/source.zip

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-837-validation
          path: issue-837-audit
          if-no-files-found: warn
