name: Issue 852 Unified Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/852-erika-discard-tables'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/852-erika-discard-tables
          fetch-depth: 0

      - name: Reconcile current main
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Apply permanent selector and fixture changes
        run: python tools/apply_issue_852.py

      - name: Configure and build patched Release
        run: |
          mkdir -p issue-852-audit
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused unified regressions
        run: |
          ctest --test-dir build --output-on-failure -R '^regidrago_(erika_discard_tables|gladion_unpayable_search)$' | tee issue-852-audit/focused-release.log

      - name: Run focused warning-clean UBSan regression
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/erika_discard_tables_tests.cpp -o build/issue-852-focused
          ./build/issue-852-focused | tee issue-852-audit/focused-ubsan.log

      - name: Run patched full Release suite
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee issue-852-audit/ctest-patched.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > issue-852-audit/ctest-patched.status
          exit "$status"

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee issue-852-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 | tee issue-852-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee issue-852-audit/trace-3.txt

      - name: Generate canonical matrix
        run: |
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-852-audit/t2_t3_matrix.csv

      - name: Reproduce current-main baseline suite
        continue-on-error: true
        shell: bash
        run: |
          git checkout origin/main -- src/trace_engine_v2/part_006.inc src/trace_engine_v2/part_012.inc tests/gladion_unpayable_search_tests.cpp
          mv tests/erika_discard_tables_tests.cpp issue-852-audit/erika_discard_tables_tests.cpp
          cmake -S . -B build-baseline -DCMAKE_BUILD_TYPE=Release
          cmake --build build-baseline --parallel 2
          set +e
          set -o pipefail
          ctest --test-dir build-baseline --output-on-failure 2>&1 | tee issue-852-audit/ctest-baseline.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > issue-852-audit/ctest-baseline.status
          mv issue-852-audit/erika_discard_tables_tests.cpp tests/erika_discard_tables_tests.cpp
          python tools/apply_issue_852.py
          exit "$status"

      - name: Verify identical failure set
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def failures(path: str) -> set[str]:
              result: set[str] = set()
              for line in Path(path).read_text(encoding="utf-8").splitlines():
                  match = re.match(r"\s*\d+\s+-\s+(\S+)\s+\(", line)
                  if match:
                      result.add(match.group(1))
              return result

          patched = failures("issue-852-audit/ctest-patched.log")
          baseline = failures("issue-852-audit/ctest-baseline.log")
          if patched != baseline:
              raise SystemExit(f"patched={sorted(patched)} baseline={sorted(baseline)}")
          print(f"identical baseline failure set: {sorted(patched)}")
          PY

      - name: Finalize permanent branch
        run: |
          git rm tools/apply_issue_852.py .github/workflows/issue-852-unified-validation.yml
          git add src/trace_engine_v2/part_006.inc src/trace_engine_v2/part_012.inc tests/erika_discard_tables_tests.cpp tests/gladion_unpayable_search_tests.cpp
          git commit -m "Replace stale Mawile discard tables with Erika (#852)"
          git push origin HEAD:fix/852-erika-discard-tables
          git archive --format=zip HEAD -o issue-852-audit/source.zip

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-852-unified-validation
          path: issue-852-audit
          if-no-files-found: error
