name: Issue 855 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/855-erika-gladion-fallback'
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/855-erika-gladion-fallback
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          mkdir -p issue-855-audit

      - name: Configure baseline Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build baseline repository
        run: cmake --build build --parallel 2

      - name: Record current-main baseline suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee issue-855-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-855-audit/baseline-ctest-status.txt
          exit 0

      - name: Apply permanent issue fix
        run: python3 scripts/apply_issue_855.py

      - name: Archive exact patched source
        shell: bash
        run: tar --exclude=.git --exclude=build --exclude=issue-855-audit -czf issue-855-audit/source.tar.gz .

      - name: Build patched repository
        run: cmake --build build --parallel 2

      - name: Run focused regression
        run: ./build/regidrago_gladion_erika_low_impact_tests

      - name: Run warning-clean UBSan regression
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=undefined -fno-omit-frame-pointer \
            tests/gladion_erika_low_impact_tests.cpp -o build/issue-855-focused
          ./build/issue-855-focused

      - name: Record patched full Release suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee issue-855-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-855-audit/patched-ctest-status.txt
          exit 0

      - name: Prove no full-suite regression
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          def failures(path: str) -> list[str]:
              text = Path(path).read_text(encoding="utf-8")
              marker = "The following tests FAILED:"
              if marker not in text:
                  return []
              section = text.split(marker, 1)[1]
              return sorted(re.findall(r"^\s*\d+ - ([^ ]+) \(", section, re.MULTILINE))

          baseline = failures("issue-855-audit/baseline-ctest.log")
          patched = failures("issue-855-audit/patched-ctest.log")
          print(f"baseline failures: {baseline}")
          print(f"patched failures: {patched}")
          if patched != baseline:
              raise SystemExit("Issue 855 changed the current-main CTest failure set.")
          PY

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Readable trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Earliest-ready policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 \
            | tee issue-855-audit/trace-1-matchup-flex-second-seed-3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 3 \
            | tee issue-855-audit/trace-2-strict-first-seed-6.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 2 \
            | tee issue-855-audit/trace-3-rulebox-second-seed-20.txt

      - name: Generate canonical T2 and T3 matrix
        shell: bash
        run: |
          # Probability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means
          # Aggregate command: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-855-audit/t2_t3_matrix.csv
          cat issue-855-audit/t2_t3_matrix.csv

      - name: Commit permanent validated files
        shell: bash
        run: |
          rm -f .issue-855.lock
          rm -f .github/workflows/issue-855-validation.yml scripts/apply_issue_855.py
          git add CMakeLists.txt src/trace_engine_v2/part_012.inc tests/gladion_erika_low_impact_tests.cpp
          git add -u .github/workflows/issue-855-validation.yml scripts/apply_issue_855.py
          if git diff --cached --quiet; then
            echo "No permanent changes to commit."
          else
            git commit -m "Use Erika in Gladion low-impact fallback (#855)"
            git push origin HEAD:fix/855-erika-gladion-fallback
          fi

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-855-validation
          path: issue-855-audit
          if-no-files-found: error
