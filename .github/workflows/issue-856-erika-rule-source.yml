name: Issue 856 Erika Rule Source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-856-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/856-erika-rule-source-registry'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/856-erika-rule-source-registry
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rev-parse HEAD > /tmp/issue-856-baseline-sha
          mkdir -p issue-856-audit

      - name: Apply isolated source-registry fix
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import fcntl
          import os
          import tempfile
          from pathlib import Path
          from typing import Callable

          erika_url = "https://api.pokemontcg.io/v2/cards/sv3pt5-160"
          issue_url = "https://github.com/FlareZ123/pokemon-sims/issues/856"

          def atomic_transform(path: Path, transform: Callable[[str], str]) -> None:
              with path.open("r+", encoding="utf-8") as locked:
                  fcntl.flock(locked.fileno(), fcntl.LOCK_EX)
                  original = locked.read()
                  updated = transform(original)
                  if updated == original:
                      return
                  with tempfile.NamedTemporaryFile(
                      "w", encoding="utf-8", dir=path.parent, delete=False
                  ) as temporary:
                      temporary.write(updated)
                      temporary.flush()
                      os.fsync(temporary.fileno())
                      temporary_path = Path(temporary.name)
                  os.replace(temporary_path, path)

          def replace_once(path: Path, old: str, new: str) -> None:
              def transform(text: str) -> str:
                  if new in text:
                      return text
                  if text.count(old) != 1:
                      raise SystemExit(f"Unable to locate unique insertion point in {path}")
                  return text.replace(old, new, 1)
              atomic_transform(path, transform)

          wrapper = Path("src/regidrago_sim.cpp")
          replace_once(
              wrapper,
              "// Latias ex: https://api.pokemontcg.io/v2/cards/sv8-76\n"
              "// Hisuian Heavy Ball: https://api.pokemontcg.io/v2/cards/swsh10-146\n",
              "// Latias ex: https://api.pokemontcg.io/v2/cards/sv8-76\n"
              f"// Erika's Invitation: {erika_url}\n"
              f"// Confirmed source-registry fix: {issue_url}\n"
              "// Hisuian Heavy Ball: https://api.pokemontcg.io/v2/cards/swsh10-146\n",
          )

          rule_sources = Path("docs/RULE_SOURCES.md")
          replace_once(
              rule_sources,
              "| Latias ex — Skyliner | https://api.pokemontcg.io/v2/cards/sv8-76 |\n"
              "| Hisuian Heavy Ball | https://api.pokemontcg.io/v2/cards/swsh10-146 |\n",
              "| Latias ex — Skyliner | https://api.pokemontcg.io/v2/cards/sv8-76 |\n"
              f"| Erika's Invitation — opponent-dependent effect is deliberately inert in the single-player model | {erika_url} |\n"
              "| Hisuian Heavy Ball | https://api.pokemontcg.io/v2/cards/swsh10-146 |\n",
          )

          contract = Path("tests/card_audit_contract_tests.py")
          def update_contract(text: str) -> str:
              if "ERIKA_SOURCE_URL" in text:
                  return text
              replacements = (
                  (
                      'DOC_PATH = REPO_ROOT / "docs" / "CARD_AUDIT.md"\n',
                      'DOC_PATH = REPO_ROOT / "docs" / "CARD_AUDIT.md"\n'
                      'RULE_SOURCES_PATH = REPO_ROOT / "docs" / "RULE_SOURCES.md"\n'
                      'SOURCE_WRAPPER_PATH = REPO_ROOT / "src" / "regidrago_sim.cpp"\n',
                  ),
                  (
                      'ARCHIVE_SHA256 = "3444c74e47cdb92d83ba760e9eeefa8bbaedd9d7f396068c0e1ed390a686af08"\n',
                      'ARCHIVE_SHA256 = "3444c74e47cdb92d83ba760e9eeefa8bbaedd9d7f396068c0e1ed390a686af08"\n'
                      f'ERIKA_SOURCE_URL = "{erika_url}"\n',
                  ),
                  (
                      '    documented = DOC_PATH.read_text(encoding="utf-8")\n\n',
                      '    documented = DOC_PATH.read_text(encoding="utf-8")\n'
                      '    rule_sources = RULE_SOURCES_PATH.read_text(encoding="utf-8")\n'
                      '    source_wrapper = SOURCE_WRAPPER_PATH.read_text(encoding="utf-8")\n\n'
                      "    # Erika's printed opponent-hand condition is the source for its deliberately inert\n"
                      "    # single-player treatment. Keep that exact print in both declared registries:\n"
                      f"    # {erika_url}\n"
                      f"    # {issue_url}\n"
                      '    for registry_name, registry in (("docs/RULE_SOURCES.md", rule_sources),\n'
                      '                                     ("src/regidrago_sim.cpp", source_wrapper)):\n'
                      '        if ERIKA_SOURCE_URL not in registry:\n'
                      '            raise AssertionError(f"{registry_name} must register Erika\'s Invitation exact print.")\n\n',
                  ),
              )
              updated = text
              for old, new in replacements:
                  if updated.count(old) != 1:
                      raise SystemExit(f"Unable to locate unique contract insertion point: {old!r}")
                  updated = updated.replace(old, new, 1)
              return updated
          atomic_transform(contract, update_contract)
          PY

      - name: Validate card-audit contracts
        shell: bash
        run: |
          set -o pipefail
          python -m py_compile tests/card_audit_contract_tests.py 2>&1 | tee issue-856-audit/py-compile.log
          python tests/card_audit_contract_tests.py 2>&1 | tee issue-856-audit/card-audit-contract.log
          python tests/card_audit_category_contract_tests.py 2>&1 | tee issue-856-audit/card-audit-category-contract.log

      - name: Verify direct source registration
        shell: bash
        run: |
          test "$(grep -c 'https://api.pokemontcg.io/v2/cards/sv3pt5-160' src/regidrago_sim.cpp)" -eq 1
          test "$(grep -c 'https://api.pokemontcg.io/v2/cards/sv3pt5-160' docs/RULE_SOURCES.md)" -eq 1
          test "$(grep -c 'ERIKA_SOURCE_URL = \"https://api.pokemontcg.io/v2/cards/sv3pt5-160\"' tests/card_audit_contract_tests.py)" -eq 1

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          bash .github/scripts/capture-build.sh build build.log

      - name: Record patched full Release suite
        shell: bash
        run: |
          set +e
          ctest --test-dir build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-856-audit/patched-ctest.xml" 2>&1 | tee issue-856-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-856-audit/patched-ctest.status
          exit 0

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 --require-ready-by 3 | tee issue-856-audit/strict_go_second_seed_3.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-856-audit/flex_go_second_seed_3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee issue-856-audit/item_lock_go_second_seed_2.txt

      - name: Regenerate source-bound setup baseline and matrix
        shell: bash
        run: |
          # Source-bound generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          # Baseline issue: https://github.com/FlareZ123/pokemon-sims/issues/642
          python3 scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
          python3 tests/setup_report_contract_tests.py 2>&1 | tee issue-856-audit/setup-report-contract.log
          python3 tests/update_setup_docs_tests.py 2>&1 | tee issue-856-audit/setup-docs-contract.log
          cp results/simulation_results.csv issue-856-audit/t2_t3_matrix.csv
          cp results/baseline_manifest.json issue-856-audit/baseline_manifest.json
          cat results/simulation_results.csv

      - name: Build and test exact current-main baseline
        shell: bash
        run: |
          baseline_sha="$(cat /tmp/issue-856-baseline-sha)"
          git worktree add /tmp/issue-856-baseline "$baseline_sha"
          cmake -S /tmp/issue-856-baseline -B /tmp/issue-856-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-856-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-856-baseline-build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-856-audit/baseline-ctest.xml" 2>&1 | tee issue-856-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-856-audit/baseline-ctest.status
          exit 0

      - name: Require exact current-main failure parity
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              return sorted(
                  case.attrib.get("name", "<unnamed>")
                  for case in root.iter("testcase")
                  if case.find("failure") is not None or case.find("error") is not None
              )

          baseline = failures("issue-856-audit/baseline-ctest.xml")
          patched = failures("issue-856-audit/patched-ctest.xml")
          Path("issue-856-audit/baseline-failures.json").write_text(json.dumps(baseline, indent=2) + "\n", encoding="utf-8")
          Path("issue-856-audit/patched-failures.json").write_text(json.dumps(patched, indent=2) + "\n", encoding="utf-8")
          if patched != baseline:
              raise SystemExit(f"Issue 856 changed the current-main failure set. baseline={baseline} patched={patched}")
          print(f"Current-main failure parity confirmed: {baseline}")
          PY

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main "$(cat /tmp/issue-856-baseline-sha)"; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Commit validated fix and remove temporary files
        shell: bash
        run: |
          rm -f .update-setup-docs.lock .results.lock
          git rm .github/workflows/issue-856-erika-rule-source.yml .issue-856-rerun
          git add src/regidrago_sim.cpp docs/RULE_SOURCES.md tests/card_audit_contract_tests.py \
            README.md docs/REPORT.md docs/TRACE_AUDIT.md \
            results/baseline_manifest.json results/simulation_results.csv
          git add -A results/traces
          git commit -m "Register Erika rule source and contract (#856)"
          git push origin HEAD:fix/856-erika-rule-source-registry
          git archive --format=zip HEAD -o issue-856-audit/issue-856-source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-856-erika-rule-source
          path: |
            issue-856-audit
            build/Testing
            build.log
          if-no-files-found: warn
