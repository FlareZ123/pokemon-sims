name: Issue 869 Sanitizer Diagnostic

on:
  pull_request:
    branches: [main]

concurrency:
  group: issue-869-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/869-late-steven-t3-compression'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/869-late-steven-t3-compression
          fetch-depth: 0
      - name: Reconcile and apply
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          mkdir -p issue-869-diagnostic
          python scripts/apply_issue_869_unified.py
          python scripts/fix_issue_869_active_turn.py
          python scripts/fix_issue_869_generated_test.py
      - name: Run ASan and UBSan fixture
        shell: bash
        run: |
          set +e
          c++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/late_steven_t3_compression_tests.cpp -o issue-869-diagnostic/focused-sanitized
          compile_status=$?
          printf '%s\n' "$compile_status" > issue-869-diagnostic/compile.status
          if [ "$compile_status" -eq 0 ]; then
            ASAN_OPTIONS=detect_leaks=1:abort_on_error=0 UBSAN_OPTIONS=halt_on_error=0:print_stacktrace=1 \
              ./issue-869-diagnostic/focused-sanitized > issue-869-diagnostic/sanitizer.log 2>&1
            printf '%s\n' "$?" > issue-869-diagnostic/run.status
          fi
          cat issue-869-diagnostic/sanitizer.log 2>/dev/null || true
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-869-sanitizer-diagnostic
          path: issue-869-diagnostic
          if-no-files-found: error
