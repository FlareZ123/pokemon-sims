name: Issue 869 Final Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-869-final-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/869-late-steven-t3-compression'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/869-late-steven-t3-compression
          fetch-depth: 0

      - name: Reconcile exact current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git rev-parse origin/main > /tmp/issue-869-baseline-sha
          git merge --no-edit origin/main
          mkdir -p issue-869-audit

      - name: Build and record exact current-main baseline
        shell: bash
        run: |
          git worktree add /tmp/issue-869-baseline "$(cat /tmp/issue-869-baseline-sha)"
          cmake -S /tmp/issue-869-baseline -B /tmp/issue-869-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-869-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-869-baseline-build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-869-audit/baseline-ctest.xml" \
            2>&1 | tee issue-869-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-869-audit/baseline-ctest.status
          exit 0

      - name: Apply permanent issue fix
        run: |
          python scripts/apply_issue_869_unified.py
          python scripts/fix_issue_869_active_turn.py
          python scripts/fix_issue_869_payload_outlet.py
          python scripts/fix_issue_869_generated_test.py

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Release and sanitizer regressions
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            tests/late_steven_t3_compression_tests.cpp -o build/issue-869-focused-release
          ./build/issue-869-focused-release 2>&1 | tee issue-869-audit/focused-release.log
          ctest --test-dir build --output-on-failure -R '^regidrago_late_steven_t3_compression_tests$' \
            2>&1 | tee issue-869-audit/focused-unified.log
          c++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/late_steven_t3_compression_tests.cpp -o build/issue-869-focused-sanitized
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            ./build/issue-869-focused-sanitized 2>&1 | tee issue-869-audit/focused-sanitized.log

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 --require-ready-by 3 | tee issue-869-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee issue-869-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee issue-869-audit/trace-3.txt

      - name: Regenerate source-bound setup evidence and matrix
        shell: bash
        run: |
          # Source-bound generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          python3 scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
          python3 tests/setup_report_contract_tests.py
          python3 tests/update_setup_docs_tests.py
          cp results/simulation_results.csv issue-869-audit/t2_t3_matrix.csv
          cp results/baseline_manifest.json issue-869-audit/baseline_manifest.json

      - name: Record patched full suite
        shell: bash
        run: |
          set +e
          ctest --test-dir build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-869-audit/patched-ctest.xml" \
            2>&1 | tee issue-869-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-869-audit/patched-ctest.status
          exit 0

      - name: Require exact current-main failure parity
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              return sorted(
                  case.attrib.get('name', '<unnamed>')
                  for case in root.iter('testcase')
                  if case.find('failure') is not None or case.find('error') is not None
              )

          baseline = failures('issue-869-audit/baseline-ctest.xml')
          patched = failures('issue-869-audit/patched-ctest.xml')
          Path('issue-869-audit/baseline-failures.json').write_text(json.dumps(baseline, indent=2) + '\n', encoding='utf-8')
          Path('issue-869-audit/patched-failures.json').write_text(json.dumps(patched, indent=2) + '\n', encoding='utf-8')
          if patched != baseline:
              raise SystemExit(f'Issue 869 changed the full-suite failure set. baseline={baseline} patched={patched}')
          print(f'Current-main failure parity confirmed: {baseline}')
          PY

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if [ "$(git rev-parse origin/main)" != "$(cat /tmp/issue-869-baseline-sha)" ]; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Finalize permanent branch
        shell: bash
        run: |
          rm -f .update-setup-docs.lock .results.lock
          git rm \
            .github/workflows/issue-869-validation.yml \
            .github/workflows/issue-869-diagnostic.yml \
            .github/workflows/issue-869-final.yml \
            scripts/apply_issue_869.py \
            scripts/apply_issue_869_unified.py \
            scripts/fix_issue_869_active_turn.py \
            scripts/fix_issue_869_payload_outlet.py \
            scripts/fix_issue_869_generated_test.py
          git add \
            src/trace_engine_v2/part_010_late_steven_override.inc \
            src/trace_engine_v2/part_tate_blender_attachment_override.inc \
            src/trace_engine_v2/part_010_steven_crispin_override.inc \
            src/trace_engine_v2/part_014c_latias_bench_override.inc \
            src/trace_engine_v2/part_011.inc \
            tests/late_steven_t3_compression_tests.cpp \
            README.md docs/REPORT.md docs/TRACE_AUDIT.md \
            results/baseline_manifest.json results/simulation_results.csv
          git add -A results/traces
          git commit -m 'Use late Steven for the known T3 compression route (#869)'
          git push origin HEAD:fix/869-late-steven-t3-compression
          git archive --format=zip HEAD -o issue-869-audit/source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-869-final
          path: issue-869-audit
          if-no-files-found: error
