name: Issue 869 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-869-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/869-late-steven-t3-compression'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/869-late-steven-t3-compression
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rev-parse HEAD > /tmp/issue-869-baseline-sha
          mkdir -p issue-869-audit

      - name: Apply permanent source changes
        run: |
          python scripts/apply_issue_869_unified.py
          python scripts/fix_issue_869_active_turn.py
          python scripts/fix_issue_869_generated_test.py

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          bash .github/scripts/capture-build.sh build build.log

      - name: Run focused Release regression
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            tests/late_steven_t3_compression_tests.cpp -o build/issue-869-focused-release
          ./build/issue-869-focused-release 2>&1 | tee issue-869-audit/focused-release.log
          ctest --test-dir build --output-on-failure -R '^regidrago_late_steven_t3_compression_tests$' \
            2>&1 | tee issue-869-audit/focused-unified.log

      - name: Capture patched full-suite result
        shell: bash
        run: |
          set +e
          ctest --test-dir build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-869-audit/patched-ctest.xml" 2>&1 | tee issue-869-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-869-audit/patched-ctest.status
          exit 0

      - name: Run focused warning-clean UBSan regression
        shell: bash
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=undefined -fno-omit-frame-pointer \
            tests/late_steven_t3_compression_tests.cpp -o build/issue-869-focused
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            ./build/issue-869-focused 2>&1 | tee issue-869-audit/focused-ubsan.log

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 --require-ready-by 3 | tee issue-869-audit/trace-1-matchup-flex-seed-11.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee issue-869-audit/trace-2-turn2-item-lock-seed-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee issue-869-audit/trace-3-strict-go-first-seed-2.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-869-audit/t2_t3_matrix.csv

      - name: Build and test exact current-main baseline
        shell: bash
        run: |
          baseline_sha="$(cat /tmp/issue-869-baseline-sha)"
          git worktree add /tmp/issue-869-baseline "$baseline_sha"
          cmake -S /tmp/issue-869-baseline -B /tmp/issue-869-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-869-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-869-baseline-build --output-on-failure --output-junit "$GITHUB_WORKSPACE/issue-869-audit/baseline-ctest.xml" 2>&1 | tee issue-869-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-869-audit/baseline-ctest.status
          exit 0

      - name: Require no new full-suite failures
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              result = []
              for case in root.iter('testcase'):
                  if case.find('failure') is not None or case.find('error') is not None:
                      result.append(case.attrib.get('name', '<unnamed>'))
              return sorted(result)

          baseline = failures('issue-869-audit/baseline-ctest.xml')
          patched = failures('issue-869-audit/patched-ctest.xml')
          Path('issue-869-audit/baseline-failures.json').write_text(json.dumps(baseline, indent=2) + '\n', encoding='utf-8')
          Path('issue-869-audit/patched-failures.json').write_text(json.dumps(patched, indent=2) + '\n', encoding='utf-8')
          if patched != baseline:
              raise SystemExit(f'Full-suite failure set changed. baseline={baseline}, patched={patched}')
          print(f'Baseline parity confirmed with {len(baseline)} pre-existing failing tests.')
          PY

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main "$(cat /tmp/issue-869-baseline-sha)"; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Finalize permanent branch
        shell: bash
        run: |
          git rm .github/workflows/issue-869-validation.yml \
            scripts/apply_issue_869.py \
            scripts/apply_issue_869_unified.py \
            scripts/fix_issue_869_active_turn.py \
            scripts/fix_issue_869_generated_test.py
          git add \
            src/trace_engine_v2/part_010_late_steven_override.inc \
            src/trace_engine_v2/part_tate_blender_attachment_override.inc \
            src/trace_engine_v2/part_010_steven_crispin_override.inc \
            src/trace_engine_v2/part_014c_latias_bench_override.inc \
            src/trace_engine_v2/part_011.inc \
            tests/late_steven_t3_compression_tests.cpp
          git commit -m 'Use late Steven for the known T3 compression route (#869)'
          git push origin HEAD:fix/869-late-steven-t3-compression
          git archive --format=zip HEAD -o issue-869-audit/issue-869-source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-869-validation
          path: |
            issue-869-audit
            build/Testing
            build.log
          if-no-files-found: warn
