name: Issue 874 Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/874-k1-ultra-target'
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/874-k1-ultra-target
          fetch-depth: 0

      - name: Reconcile current main for validation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Release regressions
        shell: bash
        run: |
          mkdir -p issue-874-audit
          set -o pipefail
          ./build/regidrago_ultra_ball_redundant_cost_tests 2>&1 | tee issue-874-audit/ultra-ball-release.log
          ./build/regidrago_evolution_incense_payload_tests 2>&1 | tee issue-874-audit/evolution-incense-release.log

      - name: Run focused warning-clean UBSan regressions
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/ultra_ball_redundant_cost_tests.cpp -o build/issue-874-ultra-ball
          ./build/issue-874-ultra-ball 2>&1 | tee issue-874-audit/ultra-ball-ubsan.log
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=undefined -fno-omit-frame-pointer tests/evolution_incense_payload_tests.cpp -o build/issue-874-evolution-incense
          ./build/issue-874-evolution-incense 2>&1 | tee issue-874-audit/evolution-incense-ubsan.log

      - name: Run patched full Release suite
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure 2>&1 | tee issue-874-audit/ctest-patched.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > issue-874-audit/ctest-patched.status
          exit "$status"

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Optimal-play policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee issue-874-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 | tee issue-874-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee issue-874-audit/trace-3.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-874-audit/t2_t3_matrix.csv

      - name: Reproduce current-main baseline suite
        continue-on-error: true
        shell: bash
        run: |
          git checkout origin/main -- src/trace_engine_v2/part_k0_ultra_ball_target_override.inc
          cmake -S . -B build-baseline -DCMAKE_BUILD_TYPE=Release
          cmake --build build-baseline --parallel 2
          set +e
          set -o pipefail
          ctest --test-dir build-baseline --output-on-failure 2>&1 | tee issue-874-audit/ctest-baseline.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > issue-874-audit/ctest-baseline.status
          exit "$status"

      - name: Verify exact repaired failure set
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def failures(path: str) -> set[str]:
              found: set[str] = set()
              for line in Path(path).read_text(encoding="utf-8").splitlines():
                  match = re.match(r"\s*\d+\s+-\s+(\S+)\s+\(", line)
                  if match:
                      found.add(match.group(1))
              return found

          patched = failures("issue-874-audit/ctest-patched.log")
          baseline = failures("issue-874-audit/ctest-baseline.log")
          expected_repaired = {
              "regidrago_evolution_incense_payload",
              "regidrago_ultra_ball_redundant_cost",
          }
          if baseline - patched != expected_repaired or patched - baseline:
              raise SystemExit(
                  "issue 874 changed an unexpected full-suite failure set: "
                  f"patched={sorted(patched)} baseline={sorted(baseline)}"
              )
          print(f"repaired exact failures: {sorted(expected_repaired)}")
          print(f"unchanged remaining failures: {sorted(patched)}")
          PY

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-874-validation
          path: issue-874-audit
          if-no-files-found: error
