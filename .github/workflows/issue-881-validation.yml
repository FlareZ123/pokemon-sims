name: Issue 881 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-881-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/881-erika-deck-thinning'
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/881-erika-deck-thinning
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          mkdir -p issue-881-audit
          git rev-parse HEAD > /tmp/issue-881-baseline-sha

      - name: Configure and build current-main baseline
        run: |
          cmake -S . -B build-baseline -DCMAKE_BUILD_TYPE=Release
          cmake --build build-baseline --parallel 2

      - name: Record current-main baseline suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build-baseline --output-on-failure --output-junit issue-881-audit/baseline-ctest.xml 2>&1 | tee issue-881-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-881-audit/baseline-ctest.status
          exit 0

      - name: Apply permanent issue fix
        run: python3 scripts/apply_issue_881.py

      - name: Archive exact patched source
        shell: bash
        run: tar --exclude=.git --exclude=build --exclude=build-baseline --exclude=issue-881-audit -czf issue-881-audit/source.tar.gz .

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Release regression
        run: ./build/regidrago_erika_deck_thinning_tests

      - name: Run warning-clean UBSan regression
        run: |
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=undefined -fno-omit-frame-pointer \
            tests/erika_deck_thinning_tests.cpp -o build/issue-881-focused
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 ./build/issue-881-focused

      - name: Record patched full Release suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure --output-junit issue-881-audit/patched-ctest.xml 2>&1 | tee issue-881-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-881-audit/patched-ctest.status
          exit 0

      - name: Prove no full-suite regression
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              return sorted(
                  case.attrib.get("name", "<unnamed>")
                  for case in root.iter("testcase")
                  if case.find("failure") is not None or case.find("error") is not None
              )

          baseline = failures("issue-881-audit/baseline-ctest.xml")
          patched = failures("issue-881-audit/patched-ctest.xml")
          Path("issue-881-audit/baseline-failures.json").write_text(
              json.dumps(baseline, indent=2) + "\n", encoding="utf-8"
          )
          Path("issue-881-audit/patched-failures.json").write_text(
              json.dumps(patched, indent=2) + "\n", encoding="utf-8"
          )
          print(f"baseline failures: {baseline}")
          print(f"patched failures: {patched}")
          if patched != baseline:
              raise SystemExit("Issue 881 changed the current-main CTest failure set.")
          PY

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 1 --require-ready-by 4 \
            | tee issue-881-audit/trace-1-no-discard-first-seed-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 \
            | tee issue-881-audit/trace-2-matchup-flex-second-seed-3.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 \
            | tee issue-881-audit/trace-3-rulebox-second-seed-20.txt

      - name: Regenerate source-bound setup baseline
        shell: bash
        run: |
          # Source-bound generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          # Baseline issue: https://github.com/FlareZ123/pokemon-sims/issues/642
          python3 scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
          python3 tests/setup_report_contract_tests.py
          python3 tests/update_setup_docs_tests.py
          cp results/simulation_results.csv issue-881-audit/t2_t3_matrix.csv
          cp results/baseline_manifest.json issue-881-audit/baseline_manifest.json
          cat results/simulation_results.csv

      - name: Require validation base is still current main
        shell: bash
        run: |
          # Prevent a source-bound matrix from landing after a newer simulator merge:
          # https://github.com/FlareZ123/pokemon-sims/issues/880
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main "$(cat /tmp/issue-881-baseline-sha)"; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Commit permanent validated files
        shell: bash
        run: |
          rm -f .issue-881.lock .update-setup-docs.lock .results.lock .issue-881-rerun
          rm -f .github/workflows/issue-881-validation.yml scripts/apply_issue_881.py
          git add CMakeLists.txt \
            src/trace_engine_v2/part_010_blender_thinning_override.inc \
            src/trace_engine_v2/part_011_burnet_thinning_override.inc \
            tests/erika_deck_thinning_tests.cpp \
            README.md docs/REPORT.md docs/TRACE_AUDIT.md \
            results/baseline_manifest.json results/simulation_results.csv
          git add -A results/traces
          git add -u .github/workflows/issue-881-validation.yml scripts/apply_issue_881.py .issue-881-rerun
          if git diff --cached --quiet; then
            echo "No permanent changes to commit."
          else
            git commit -m "Thin Erika with Blender and Burnet (#881)"
            git push origin HEAD:fix/881-erika-deck-thinning
          fi

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-881-validation
          path: issue-881-audit
          if-no-files-found: error
