name: Issue 882 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-882-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/882-serena-zero-draw'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/882-serena-zero-draw
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rev-parse HEAD > /tmp/issue-882-baseline-sha
          mkdir -p issue-882-audit

      - name: Build and record exact current-main baseline
        shell: bash
        run: |
          baseline_sha="$(cat /tmp/issue-882-baseline-sha)"
          git worktree add /tmp/issue-882-baseline "$baseline_sha"
          cmake -S /tmp/issue-882-baseline -B /tmp/issue-882-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-882-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-882-baseline-build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-882-audit/baseline-ctest.xml" \
            2>&1 | tee issue-882-audit/ctest-baseline.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-882-audit/ctest-baseline.status
          exit 0

      - name: Apply Serena policy fix
        run: python tools/apply_issue_882_unified.py

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused Release regression
        shell: bash
        run: |
          set -o pipefail
          ctest --test-dir build --output-on-failure -R '^regidrago_serena_zero_draw_tests$' \
            2>&1 | tee issue-882-audit/focused-release.log

      - name: Run focused warning-clean UBSan regression
        shell: bash
        run: |
          set -o pipefail
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=undefined -fno-omit-frame-pointer \
            tests/serena_zero_draw_tests.cpp -o build/issue-882-focused
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            ./build/issue-882-focused 2>&1 | tee issue-882-audit/focused-ubsan.log

      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          # Source-bound generator: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # Provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/baseline_provenance.py
          python3 scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python3 scripts/update_setup_docs.py --repo-root .
          python3 tests/setup_report_contract_tests.py
          python3 tests/update_setup_docs_tests.py
          cp results/simulation_results.csv issue-882-audit/t2_t3_matrix.csv
          cp results/baseline_manifest.json issue-882-audit/baseline_manifest.json

      - name: Record patched full Release suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          ctest --test-dir build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-882-audit/patched-ctest.xml" \
            2>&1 | tee issue-882-audit/ctest-patched.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-882-audit/ctest-patched.status
          exit 0

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Optimal-play policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee issue-882-audit/trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 | tee issue-882-audit/trace-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit-combined-lock/go-second --seed 11 | tee issue-882-audit/trace-3.txt

      - name: Verify combined-lock trace preserves zero-draw resources
        run: |
          if grep -q "Dipplin TWM 127 (Serena chosen discard)" issue-882-audit/trace-3.txt; then
            echo "Serena still spent Dipplin for a zero-draw fallback" >&2
            exit 1
          fi

      - name: Verify no new full-suite failures
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              return sorted(
                  case.attrib.get("name", "<unnamed>")
                  for case in root.iter("testcase")
                  if case.find("failure") is not None or case.find("error") is not None
              )

          patched = failures("issue-882-audit/patched-ctest.xml")
          baseline = failures("issue-882-audit/baseline-ctest.xml")
          Path("issue-882-audit/patched-failures.json").write_text(json.dumps(patched, indent=2) + "\n", encoding="utf-8")
          Path("issue-882-audit/baseline-failures.json").write_text(json.dumps(baseline, indent=2) + "\n", encoding="utf-8")
          if patched != baseline:
              raise SystemExit(f"issue 882 changed the full-suite failure set: patched={patched} baseline={baseline}")
          print(f"identical failure set: {patched}")
          PY

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main "$(cat /tmp/issue-882-baseline-sha)"; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Finalize permanent branch
        shell: bash
        run: |
          rm -f .issue-882.lock .update-setup-docs.lock .results.lock
          git rm tools/apply_issue_882.py tools/apply_issue_882_unified.py .github/workflows/issue-882-validation.yml
          git add src/trace_engine_v2/part_012.inc src/trace_engine_v2/part_013.inc src/trace_engine_v2/part_014b.inc tests/serena_zero_draw_tests.cpp \
            README.md docs/REPORT.md docs/TRACE_AUDIT.md results/baseline_manifest.json results/simulation_results.csv
          git add -A results/traces
          git commit -m "Reject dominated zero-draw Serena fallback (#882)"
          git push origin HEAD:fix/882-serena-zero-draw
          git archive --format=zip HEAD -o issue-882-audit/source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-882-validation
          path: issue-882-audit
          if-no-files-found: error
