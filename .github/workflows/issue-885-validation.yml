name: Issue 885 Opening Tapu Contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: issue-885-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/885-opening-tapu-contract'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out issue branch
        uses: actions/checkout@v4
        with:
          ref: fix/885-opening-tapu-contract
          fetch-depth: 0

      - name: Reconcile current main
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rev-parse HEAD > /tmp/issue-885-baseline-sha

      - name: Apply isolated contract change
        run: python scripts/apply_issue_885.py

      - name: Run focused Release and sanitizer contracts
        shell: bash
        run: |
          mkdir -p issue-885-audit
          g++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            tests/opening_bench_tapu_route_tests.cpp -o issue-885-audit/opening-bench-tapu
          ./issue-885-audit/opening-bench-tapu | tee issue-885-audit/focused-release.log
          g++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror \
            -fsanitize=address,undefined -fno-omit-frame-pointer \
            tests/opening_bench_tapu_route_tests.cpp -o issue-885-audit/opening-bench-tapu-sanitized
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
            ./issue-885-audit/opening-bench-tapu-sanitized | tee issue-885-audit/focused-sanitized.log

      - name: Configure and build patched Release
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          bash .github/scripts/capture-build.sh build build.log

      - name: Capture patched full suite
        shell: bash
        run: |
          set +e
          ctest --test-dir build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-885-audit/patched-ctest.xml" \
            2>&1 | tee issue-885-audit/patched-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-885-audit/patched-ctest.status
          exit 0

      - name: Run three independent simulate-this passes
        shell: bash
        run: |
          set -o pipefail
          # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          # Decision priorities: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 --require-ready-by 2 | tee issue-885-audit/trace-1-turn2-item-lock-seed-2.txt
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 --require-ready-by 4 | tee issue-885-audit/trace-2-strict-go-first-seed-2.txt
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 6 --require-ready-by 4 | tee issue-885-audit/trace-3-no-control-go-first-seed-6.txt

      - name: Generate canonical T2 and T3 matrix
        run: |
          # Aggregate specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          ./build/regidrago_sim --trials 100000 --seed 20260705 --out issue-885-audit/t2_t3_matrix.csv

      - name: Build and test exact current-main baseline
        shell: bash
        run: |
          baseline_sha="$(cat /tmp/issue-885-baseline-sha)"
          git worktree add /tmp/issue-885-baseline "$baseline_sha"
          cmake -S /tmp/issue-885-baseline -B /tmp/issue-885-baseline-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/issue-885-baseline-build --parallel 2
          set +e
          ctest --test-dir /tmp/issue-885-baseline-build --output-on-failure \
            --output-junit "$GITHUB_WORKSPACE/issue-885-audit/baseline-ctest.xml" \
            2>&1 | tee issue-885-audit/baseline-ctest.log
          printf '%s\n' "${PIPESTATUS[0]}" > issue-885-audit/baseline-ctest.status
          exit 0

      - name: Require only the owned regression to disappear
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import xml.etree.ElementTree as ET

          def failures(path: str) -> list[str]:
              root = ET.parse(path).getroot()
              result = []
              for case in root.iter('testcase'):
                  if case.find('failure') is not None or case.find('error') is not None:
                      result.append(case.attrib.get('name', '<unnamed>'))
              return sorted(result)

          baseline = failures('issue-885-audit/baseline-ctest.xml')
          patched = failures('issue-885-audit/patched-ctest.xml')
          owned = 'regidrago_opening_bench_tapu_route'
          expected = sorted(name for name in baseline if name != owned)
          Path('issue-885-audit/baseline-failures.json').write_text(json.dumps(baseline, indent=2) + '\n', encoding='utf-8')
          Path('issue-885-audit/patched-failures.json').write_text(json.dumps(patched, indent=2) + '\n', encoding='utf-8')
          if owned not in baseline:
              raise SystemExit(f'Current main no longer contains the owned failing regression: {owned}')
          if patched != expected:
              raise SystemExit(f'Unexpected full-suite delta. expected={expected}, patched={patched}')
          print(f'Only the owned failure was removed: {owned}.')
          PY

      - name: Require validation base is still current main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main "$(cat /tmp/issue-885-baseline-sha)"; then
            echo "main advanced during validation; rerun against the new head."
            exit 1
          fi

      - name: Finalize permanent branch
        shell: bash
        run: |
          git rm .github/workflows/issue-885-validation.yml scripts/apply_issue_885.py
          git add tests/opening_bench_tapu_route_tests.cpp
          git commit -m "Update matched opening Tapu contract (#885)"
          git push origin HEAD:fix/885-opening-tapu-contract
          git archive --format=zip HEAD -o issue-885-audit/issue-885-source.zip

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-885-validation
          path: |
            issue-885-audit
            build/Testing
            build.log
          if-no-files-found: warn
