name: Regenerate issue 942 baselines

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.head_ref == 'bug/942-redundant-burnet-direct-item'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and run focused regression
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests wonder_tag_redundant_burnet_tests
      - name: Regenerate source-bound baselines
        run: |
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Validate the complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit generated evidence
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          rm .github/workflows/issue-942-regenerate.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Regenerate setup baselines for issue 942"
          git push origin "HEAD:${HEAD_REF}"
