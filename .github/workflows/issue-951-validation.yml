name: Issue 951 Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-1050:
    if: github.head_ref == 'bug/1050-dynamic-dead-role-dci'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply final-Energy exception at the active Arven gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('src/trace_engine_v2/part_012_override.inc')
          text = source.read_text(encoding='utf-8')
          old = '    const bool can_pay_search_cost = is_legal_cost_available(can_play_payload_this_turn(), true);\n'
          new = '''    const bool final_energy_vessel_dead_role_cost =
              scenario_.dci == DciProfile::NoDiscardControl &&
              !state_.manual_energy_used && state_.active &&
              state_.active->card == Card::RegidragoVstar && !need_payload() &&
              grass_needed() + fire_needed() == 1 &&
              ((grass_needed() == 1 && might_be_unseen(Card::Grass)) ||
               (fire_needed() == 1 && might_be_unseen(Card::Fire))) &&
              (hand_count(Card::QuickBall) > 0 ||
               hand_count(Card::StevensResolve) > 0 ||
               hand_count(Card::LatiasEx) > 0 ||
               hand_count(Card::Gladion) > 0);
          // This wrapper is the active Arven admission boundary. Earthen Vessel
          // enters hand only after Arven resolves, so project that post-search hand
          // and admit one dynamically dead setup role as its legal discard cost:
          // Arven: https://api.pokemontcg.io/v2/cards/sv1-166
          // Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
          // Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
          // Steven's Resolve: https://api.pokemontcg.io/v2/cards/sm7-145
          // Latias ex: https://api.pokemontcg.io/v2/cards/sv8-76
          // Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
          // Manual attachment: https://www.pokemon.com/us/pokemon-tcg/rules
          // Dynamic DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
          // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1050
          const bool can_pay_search_cost =
              is_legal_cost_available(can_play_payload_this_turn(), true) ||
              final_energy_vessel_dead_role_cost;
'''
          if text.count(old) != 1:
              raise SystemExit(f'active Arven cost anchor count: {text.count(old)}')
          source.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/patch-1050-active-arven.yml').unlink(missing_ok=True)
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git checkout origin/main -- .github/workflows/issue-951-validation.yml
          git add -A
          git diff --cached --check
          git commit -m "Admit final-Energy Vessel at active Arven gate (#1050)"
          git push origin HEAD:${{ github.head_ref }}

  validate:
    if: github.head_ref != 'bug/1050-dynamic-dead-role-dci'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        run: cmake --build build --parallel 2
      - name: Regenerate source-bound setup baseline
        # Canonical generator and fixed-seed aggregate specification:
        # https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
        # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
      - name: Regenerate setup reports
        # Generated-doc contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
        run: python scripts/update_setup_docs.py --repo-root .
      - name: Run repository tests against regenerated baseline
        run: ctest --test-dir build --output-on-failure
      - name: Trace Treasure Energy-window reproduction
        # Treasure, GGF, turn sequence, strict-JIT policy, and issue:
        # https://api.pokemontcg.io/v2/cards/sm6-113
        # https://api.pokemontcg.io/v2/cards/swsh12-136
        # https://www.pokemon.com/us/pokemon-tcg/rules
        # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
        # https://github.com/FlareZ123/pokemon-sims/issues/951
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-first --seed 13 --require-ready-by 3 | tee issue-951-trace.txt
      - name: Trace strict baseline control
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee strict-control-trace.txt
      - name: Trace matchup-flex baseline control
        # DCI policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee flex-control-trace.txt
      - name: Upload regenerated baseline and trace evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-951-validation
          path: |
            issue-951-trace.txt
            strict-control-trace.txt
            flex-control-trace.txt
            results/baseline_manifest.json
            results/simulation_results.csv
            results/traces
            docs/REPORT.md
            docs/TRACE_AUDIT.md
            README.md
          if-no-files-found: error
