name: Issue 976 Baseline Export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build Release simulator
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
      - name: Regenerate source-bound baseline
        run: |
          # Canonical repository generator and fixed-seed specification:
          # https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          python scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Validate regenerated contract
        run: ctest --test-dir build -R setup_report_contract --output-on-failure
      - name: Upload generated baseline
        uses: actions/upload-artifact@v4
        with:
          name: issue-976-baseline
          path: |
            results
            docs/REPORT.md
          if-no-files-found: error
