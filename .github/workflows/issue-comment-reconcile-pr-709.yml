name: Reconcile PR 709 from command

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  reconcile:
    if: startsWith(github.event.head_commit.message, 'Trigger PR 709 reconciliation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/701-pokemon-communication
          fetch-depth: 0
      - name: Execute reconciliation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/reconcile-pokemon-communication.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          end = next(i for i in range(start, len(lines)) if lines[i].startswith('      - name: Remove one-shot workflow'))
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/reconcile.sh').write_text(script)
          PY
          bash /tmp/reconcile.sh
      - name: Remove temporary feature workflows
        run: |
          git rm -f .github/workflows/merge-pokemon-communication-main.yml || true
          git rm -f .github/workflows/reconcile-pokemon-communication.yml || true
          git rm -f .github/workflows/run-reconcile-pokemon-communication.yml || true
          git rm -f .github/workflows/temp-reconcile-pr-709.yml || true
          git rm -f .github/workflows/issue-comment-reconcile-pr-709.yml || true
          git commit --amend --no-edit
      - name: Validate reconciled branch
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j2
          ctest --test-dir build --output-on-failure
          ./build/regidrago_sim --self-test
      - name: Push reconciled branch
        run: git push origin HEAD:feature/701-pokemon-communication
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main-clean
      - name: Clean main workflow
        working-directory: main-clean
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm -f .github/workflows/temp-reconcile-pr-709.yml || true
          git rm -f .github/workflows/issue-comment-reconcile-pr-709.yml || true
          git commit -m 'Remove temporary PR 709 workflows' || exit 0
          git push origin HEAD:main
