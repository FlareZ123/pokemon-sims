name: Clean Issue 1096 Recovery Artifacts

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'enhancement/1096-dawn-forest-vitality'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove generated recovery outputs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitizers scripts/__pycache__
          rm -f .github/workflows/issue1096-cleanup.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Remove issue 1096 recovery build artifacts'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
