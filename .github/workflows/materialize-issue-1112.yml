name: Materialize issue 1112 fix

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/1112-late-steven-burnet'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply locally validated issue 1112 patch
        run: |
          cat .github/materializers/issue-1112.part1 .github/materializers/issue-1112.part2 .github/materializers/issue-1112.part3 .github/materializers/issue-1112.part4 | base64 --decode > /tmp/issue-1112.patch
          git apply --index /tmp/issue-1112.patch
          git rm .github/workflows/materialize-issue-1112.yml .github/materializers/issue-1112.part1 .github/materializers/issue-1112.part2 .github/materializers/issue-1112.part3 .github/materializers/issue-1112.part4
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Fix late Steven Burnet route (#1112)"
          git push origin HEAD:${{ github.head_ref }}
