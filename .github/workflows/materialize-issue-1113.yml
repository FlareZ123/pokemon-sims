name: Materialize issue 1113 fix

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/1113-late-steven-blender-energy'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply locally validated issue 1113 patch
        run: |
          cat .github/materializers/issue-1113.part1 .github/materializers/issue-1113.part2 .github/materializers/issue-1113.part3 .github/materializers/issue-1113.part4 .github/materializers/issue-1113.part5 | base64 --decode > /tmp/issue-1113.patch
          git apply --index /tmp/issue-1113.patch
          git rm .github/workflows/materialize-issue-1113.yml .github/materializers/issue-1113.part1 .github/materializers/issue-1113.part2 .github/materializers/issue-1113.part3 .github/materializers/issue-1113.part4 .github/materializers/issue-1113.part5
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Fix K0 late Steven Blender energy route (#1113)"
          git push origin HEAD:${{ github.head_ref }}
