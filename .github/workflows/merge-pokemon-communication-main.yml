name: Merge Pokémon Communication with main

on:
  pull_request:
    branches: [main]
    types: [edited]

permissions:
  contents: write

jobs:
  merge-validate-push:
    if: github.event.pull_request.head.ref == 'feature/701-pokemon-communication'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/701-pokemon-communication
          fetch-depth: 0
      - name: Merge current main
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit -X ours origin/main
      - name: Validate K0 target accounting
        run: |
          set -euxo pipefail
          mkdir -p build-merge-check
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/k0_ultra_ball_target_tests.cpp -o build-merge-check/k0_ultra_ball_target_tests
          ./build-merge-check/k0_ultra_ball_target_tests
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/k0_mysterious_treasure_target_tests.cpp -o build-merge-check/k0_mysterious_treasure_target_tests
          ./build-merge-check/k0_mysterious_treasure_target_tests
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/k0_quick_ball_target_tests.cpp -o build-merge-check/k0_quick_ball_target_tests
          ./build-merge-check/k0_quick_ball_target_tests
      - name: Validate Pokémon Communication
        run: |
          set -euxo pipefail
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/pokemon_communication_tests.cpp -o build-merge-check/pokemon_communication_tests
          ./build-merge-check/pokemon_communication_tests
      - name: Build and test
        run: |
          set -euxo pipefail
          cmake -S . -B build-merge -DCMAKE_BUILD_TYPE=Release
          cmake --build build-merge --parallel 2
          ctest --test-dir build-merge --output-on-failure
      - name: Remove temporary workflow and push
        run: |
          set -euxo pipefail
          rm .github/workflows/merge-pokemon-communication-main.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:feature/701-pokemon-communication
