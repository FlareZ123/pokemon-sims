name: Opening Bench Tapu

on:
  pull_request:
    branches: [main]
    paths:
      - src/trace_engine_v2/part_005.inc
      - tests/opening_bench_tapu_route_tests.cpp
      - .github/workflows/opening-bench-tapu.yml
  push:
    branches: [main]
    paths:
      - src/trace_engine_v2/part_005.inc
      - tests/opening_bench_tapu_route_tests.cpp
      - .github/workflows/opening-bench-tapu.yml

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Release fixture
        run: |
          g++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror tests/opening_bench_tapu_route_tests.cpp -o opening-bench-tapu
          ./opening-bench-tapu
      - name: Address and undefined behavior sanitizer fixture
        run: |
          g++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -Werror -fsanitize=address,undefined -fno-omit-frame-pointer tests/opening_bench_tapu_route_tests.cpp -o opening-bench-tapu-sanitized
          ASAN_OPTIONS=detect_leaks=1 ./opening-bench-tapu-sanitized
