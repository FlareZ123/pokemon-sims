name: Patch issue 1049 outermost Tapu gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'bug/1049-prefer-steven-over-duplicate-crispin'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply the active outermost Steven route gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          tapu = Path('src/trace_engine_v2/part_tapu_tate_switch_override.inc')
          text = tapu.read_text(encoding='utf-8')
          pattern = re.compile(
              r'(bool held_banked_steven_has_known_t3_active_regi_route\(\) const \{\s*'
              r'if \(state_\.turn != 1.*?'
              r'hand_count\(Card::StevensResolve\) == 0 \|\|\s*)'
              r'hand_count\(Card::Grass\) == 0 \|\| hand_count\(Card::Fire\) == 0 \|\|',
              re.DOTALL,
          )
          replacement = (
              r'\1'
              r'!((!state_.manual_energy_used && hand_count(Card::Grass) >= 2 && '
              r'hand_count(Card::Fire) > 0) ||\n'
              r'        (state_.manual_energy_used && hand_count(Card::Grass) > 0 && '
              r'hand_count(Card::Fire) > 0)) ||'
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Energy-package replacement count: {count}')
          tapu.write_text(text, encoding='utf-8')

          outer = Path('src/trace_engine_v2/part_issue_991_wonder_tag_burnet_legacy_star_override.inc')
          text = outer.read_text(encoding='utf-8')
          anchor = '  bool bench_tapu_if_useful() {\n'
          gate = '''  bool bench_tapu_if_useful() {
              if (held_banked_steven_has_known_t3_active_regi_route()) {
                // The first Wonder Tag already banked Steven and the public Energy
                // package covers all three manual attachments. Preserve the second
                // Tapu Lele-GX, its Bench slot, and Wonder Tag instead of fetching a
                // redundant Crispin:
                // Tapu Lele-GX: https://api.pokemontcg.io/v2/cards/cel25c-60_A
                // Steven's Resolve: https://api.pokemontcg.io/v2/cards/sm7-145
                // Crispin: https://api.pokemontcg.io/v2/cards/sv7-133
                // Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
                // Oricorio: https://api.pokemontcg.io/v2/cards/sm2-55
                // Turn procedure: https://www.pokemon.com/us/pokemon-tcg/rules
                // Earliest-ready policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
                // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1049
                trace_tapu_hold_once(
                    "issue-1049-banked-steven-route",
                    "R-TAPU-01; R-STEVEN-01; P-CONNECTOR-01; P-KNOWLEDGE-01",
                    "Retained the second Tapu because banked Steven and the public Energy package already complete the deterministic T3 route.");
                return false;
              }
          '''
          if text.count(anchor) != 1:
              raise SystemExit(f'outer Tapu anchor count: {text.count(anchor)}')
          outer.write_text(text.replace(anchor, gate, 1), encoding='utf-8')

          Path('.github/workflows/patch-1049-outermost.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Apply Steven hold at outermost Tapu gate (#1049)"
          git push origin HEAD:${{ github.head_ref }}
