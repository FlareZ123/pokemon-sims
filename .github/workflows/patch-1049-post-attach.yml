name: Patch issue 1049 post-attachment hold

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'bug/1049-prefer-steven-over-duplicate-crispin'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply post-attachment Steven route correction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('src/trace_engine_v2/part_tapu_tate_switch_override.inc')
          text = source.read_text(encoding='utf-8')
          function_pattern = re.compile(
              r'(bool held_banked_steven_has_known_t3_active_regi_route\(\) const \{.*?'
              r'!deck_seen_ \|\| )state_\.manual_energy_used( \|\| !state_\.active \|\|.*?'
              r'hand_count\(Card::StevensResolve\) == 0 \|\|\s*)'
              r'hand_count\(Card::Grass\) < 2( \|\| hand_count\(Card::Fire\) == 0 \|\|)',
              re.DOTALL,
          )
          text, count = function_pattern.subn(
              r'\1!state_.manual_energy_used\2hand_count(Card::Grass) == 0\3',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'post-attachment route replacement count: {count}')
          old_comment = (
              '  // The held Steven package already has every public Energy needed for\n'
              '  // T1, T2, and T3 manual attachments. A second Tapu and Wonder Tag for\n'
          )
          new_comment = (
              '  // After the T1 Grass attachment, the held Steven package still has\n'
              '  // one Grass and one Fire for the T2 and T3 manual attachments. A\n'
              '  // second Tapu and Wonder Tag for\n'
          )
          if text.count(old_comment) != 1:
              raise SystemExit(f'post-attachment comment anchor count: {text.count(old_comment)}')
          text = text.replace(old_comment, new_comment, 1)
          source.write_text(text, encoding='utf-8')
          Path('.github/workflows/patch-1049-post-attach.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Hold second Tapu after T1 Energy attachment (#1049)"
          git push origin HEAD:${{ github.head_ref }}
