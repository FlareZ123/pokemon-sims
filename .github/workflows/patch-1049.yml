name: Patch issue 1049

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'bug/1049-prefer-steven-over-duplicate-crispin'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply reviewed issue 1049 patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import textwrap

          tapu = Path('src/trace_engine_v2/part_tapu_tate_switch_override.inc')
          text = tapu.read_text(encoding='utf-8')
          anchor = '  bool future_turn_wonder_tag_route_has_live_target() {\n'
          helpers = '''  bool wonder_tag_can_bank_steven_for_known_t3_active_regi_route() const {
              if (state_.turn != 1 || !scenario_.going_first ||
                  scenario_.dci != DciProfile::MatchupFlexJit ||
                  scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||
                  !deck_seen_ || state_.manual_energy_used || !state_.active ||
                  state_.active->card != Card::RegidragoV ||
                  hand_count(Card::StevensResolve) > 0 ||
                  hand_count(Card::EarthenVessel) == 0 ||
                  hand_count(Card::Oricorio) == 0 || bench_space() <= 0 ||
                  !ability_available_for_pokemon(Card::Oricorio) ||
                  !need_vstar() || !need_energy() || !need_payload() ||
                  !payload_might_be_in_deck() ||
                  !choose_discard(false, true, true, Card::EarthenVessel).has_value()) {
                return false;
              }

              // Wonder Tag has established K1. Earthen Vessel and Vital Dance each
              // supply Grass plus Fire, leaving two Grass and one Fire for the three
              // manual attachments. Steven can therefore reserve Regidrago VSTAR and
              // Brilliant Blender for a deterministic T3 Active-Regidrago route:
              // Tapu Lele-GX: https://api.pokemontcg.io/v2/cards/cel25c-60_A
              // Steven's Resolve: https://api.pokemontcg.io/v2/cards/sm7-145
              // Earthen Vessel: https://api.pokemontcg.io/v2/cards/sv4-163
              // Oricorio: https://api.pokemontcg.io/v2/cards/sm2-55
              // Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
              // Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
              // Turn and attachment procedure: https://www.pokemon.com/us/pokemon-tcg/rules
              // Earliest-ready policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
              // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1049
              return deck_count_after_search_started(Card::StevensResolve) > 0 &&
                  deck_count_after_search_started(Card::Grass) >= 2 &&
                  deck_count_after_search_started(Card::Fire) >= 2 &&
                  deck_count_after_search_started(Card::RegidragoVstar) > 0 &&
                  deck_count_after_search_started(Card::BrilliantBlender) > 0;
            }

            bool held_banked_steven_has_known_t3_active_regi_route() const {
              if (state_.turn != 1 || !scenario_.going_first ||
                  scenario_.dci != DciProfile::MatchupFlexJit ||
                  scenario_.locks != LockMode::None || scenario_.max_turn < 3 ||
                  !deck_seen_ || state_.manual_energy_used || !state_.active ||
                  state_.active->card != Card::RegidragoV ||
                  hand_count(Card::StevensResolve) == 0 ||
                  hand_count(Card::Grass) < 2 || hand_count(Card::Fire) == 0 ||
                  !need_vstar() || !need_energy() || !need_payload() ||
                  !payload_might_be_in_deck()) {
                return false;
              }

              // The held Steven package already has every public Energy needed for
              // T1, T2, and T3 manual attachments. A second Tapu and Wonder Tag for
              // Crispin spend a Bench slot and one-shot Ability without advancing the
              // earliest deterministic route:
              // https://api.pokemontcg.io/v2/cards/cel25c-60_A
              // https://api.pokemontcg.io/v2/cards/sm7-145
              // https://api.pokemontcg.io/v2/cards/sv7-133
              // https://www.pokemon.com/us/pokemon-tcg/rules
              // https://github.com/FlareZ123/pokemon-sims/issues/1049
              return deck_count_after_search_started(Card::RegidragoVstar) > 0 &&
                  deck_count_after_search_started(Card::BrilliantBlender) > 0;
            }

          '''
          if text.count(anchor) != 1:
              raise SystemExit(f'issue 1049 Tapu helper anchor count: {text.count(anchor)}')
          text = text.replace(anchor, helpers + anchor, 1)

          needs_anchor = '''    if (wonder_tag_crispin_is_redundant_with_held_complete_route()) {
                return false;
              }

          '''
          needs_insert = '''    if (held_banked_steven_has_known_t3_active_regi_route()) {
                return false;
              }

              if (wonder_tag_crispin_is_redundant_with_held_complete_route()) {
                return false;
              }

          '''
          if text.count(needs_anchor) != 1:
              raise SystemExit(f'issue 1049 Tapu suppression anchor count: {text.count(needs_anchor)}')
          tapu.write_text(text.replace(needs_anchor, needs_insert, 1), encoding='utf-8')

          steven = Path('src/trace_engine_v2/part_010_steven_crispin_override.inc')
          text = steven.read_text(encoding='utf-8')
          choose_anchor = '''  Card choose_supporter_after_search_started() {
              if (wonder_tag_can_bank_steven_for_known_t4_fss_route()) {
          '''
          choose_insert = '''  Card choose_supporter_after_search_started() {
              if (wonder_tag_can_bank_steven_for_known_t3_active_regi_route()) {
                // Prefer the complete Steven package over Crispin, which powers the
                // Basic but leaves both Evolution and strict-JIT payload unresolved:
                // https://api.pokemontcg.io/v2/cards/cel25c-60_A
                // https://api.pokemontcg.io/v2/cards/sm7-145
                // https://api.pokemontcg.io/v2/cards/sv7-133
                // https://github.com/FlareZ123/pokemon-sims/issues/1049
                return Card::StevensResolve;
              }
              if (wonder_tag_can_bank_steven_for_known_t4_fss_route()) {
          '''
          if text.count(choose_anchor) != 1:
              raise SystemExit(f'issue 1049 Steven selector anchor count: {text.count(choose_anchor)}')
          text = text.replace(choose_anchor, choose_insert, 1)

          should_anchor = '''        banked_steven_has_known_t3_blender_route() ||
              late_steven_has_active_regidrago_t3_blender_route() ||
          '''
          should_insert = '''        banked_steven_has_known_t3_blender_route() ||
              (state_.turn == 2 && scenario_.going_first &&
               scenario_.dci == DciProfile::MatchupFlexJit &&
               scenario_.locks == LockMode::None && supporter_allowed() &&
               state_.active && state_.active->card == Card::RegidragoV &&
               state_.active->entered_turn < state_.turn &&
               hand_count(Card::StevensResolve) > 0 && need_vstar() &&
               need_payload() && payload_might_be_in_deck() &&
               deck_count_after_search_started(Card::RegidragoVstar) > 0 &&
               deck_count_after_search_started(Card::BrilliantBlender) > 0 &&
               ((grass_needed() == 1 && fire_needed() == 0 && hand_count(Card::Grass) > 0) ||
                (grass_needed() == 0 && fire_needed() == 1 && hand_count(Card::Fire) > 0))) ||
              late_steven_has_active_regidrago_t3_blender_route() ||
          '''
          if text.count(should_anchor) != 1:
              raise SystemExit(f'issue 1049 Steven play anchor count: {text.count(should_anchor)}')
          steven.write_text(text.replace(should_anchor, should_insert, 1), encoding='utf-8')

          test = Path('tests/issue_1049_active_regi_steven_route_tests.cpp')
          test.write_text(textwrap.dedent('''
          #define REGIDRAGO_SIM_NO_MAIN
          #include "../src/regidrago_sim.cpp"

          #include <algorithm>
          #include <stdexcept>
          #include <string>

          namespace sim { struct EngineTestAccess {}; }

          int main() {
            const auto scenario = sim::scenario_by_label("matchup-flex-jit/go-first");
            if (!scenario) throw std::runtime_error("Missing matchup-flex-jit/go-first scenario");
            sim::DeckRecipe recipe{sim::baseline_recipe()};
            std::mt19937_64 rng{9};
            sim::TraceLog trace{true, {}};
            sim::Engine engine(*scenario, recipe, rng, &trace);
            const sim::Outcome outcome = engine.run();

            const int wonder_tags = static_cast<int>(std::count_if(
                trace.lines.begin(), trace.lines.end(), [](const std::string& line) {
                  return line.find("T1 | WONDER TAG") != std::string::npos;
                }));
            const bool selected_steven = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T1 | WONDER TAG") != std::string::npos &&
                         line.find("Steven's Resolve") != std::string::npos;
                });
            const bool played_steven = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T2 | PLAY SUPPORTER") != std::string::npos &&
                         line.find("R-STEVEN-01") != std::string::npos;
                });
            const bool ready_t3 = outcome.first_ready_turn == 3 &&
                std::any_of(trace.lines.begin(), trace.lines.end(),
                    [](const std::string& line) {
                      return line.find("T3 | READY") != std::string::npos;
                    });

            // One Wonder Tag banks Steven. Earthen Vessel and Vital Dance provide the
            // three manual attachments, while Steven reserves evolution and Blender.
            // A second Wonder Tag for Crispin is therefore a weaker consumed connector:
            // https://api.pokemontcg.io/v2/cards/cel25c-60_A
            // https://api.pokemontcg.io/v2/cards/sm7-145
            // https://api.pokemontcg.io/v2/cards/sv4-163
            // https://api.pokemontcg.io/v2/cards/sm2-55
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://api.pokemontcg.io/v2/cards/sv8-164
            // https://www.pokemon.com/us/pokemon-tcg/rules
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // https://github.com/FlareZ123/pokemon-sims/issues/1049
            if (wonder_tags != 1 || !selected_steven || !played_steven || !ready_t3) {
              throw std::runtime_error("Seed 9 still misses the deterministic Steven T3 route");
            }
            return 0;
          }
          ''').lstrip(), encoding='utf-8')

          Path('.github/workflows/patch-1049.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Prefer Steven active-Regidrago T3 route (#1049)"
          git push origin HEAD:${{ github.head_ref }}
