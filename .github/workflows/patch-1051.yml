name: Patch issue 1051

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'bug/1051-hold-one-type-crispin-duplicate'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply reviewed issue 1051 patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          source = Path('src/trace_engine_v2/part_issue_991_wonder_tag_burnet_legacy_star_override.inc')
          text = source.read_text(encoding='utf-8')

          text, guard_count = re.subn(
              r'(?m)^(\s*)!need_energy\(\) \|\| !crispin_can_advance_energy_axis\(\) \|\|\n\1!prizes_known\(\)\) \{',
              r'\1!need_energy() || !prizes_known()) {',
              text,
              count=1,
          )
          if guard_count != 1:
              raise SystemExit(f'issue 1051 guard replacement count: {guard_count}')

          energy_pattern = re.compile(
              r'(?m)^(\s*)const bool grass_available = deck_count_after_search_started\(Card::Grass\) > 0;\n'
              r'\1const bool fire_available = deck_count_after_search_started\(Card::Fire\) > 0;\n'
              r'\1if \(grass_available && fire_available\) \{'
          )
          energy_replacement = (
              r'\1const bool grass_available = deck_count_after_search_started(Card::Grass) > 0;\n'
              r'\1const bool fire_available = deck_count_after_search_started(Card::Fire) > 0;\n'
              r'\1const bool needed_energy_searchable =\n'
              r'\1    (grass_needed() > 0 && grass_available) ||\n'
              r'\1    (fire_needed() > 0 && fire_available);\n'
              r'\1if (!needed_energy_searchable) return false;\n'
              r'\1if (grass_available && fire_available) {'
          )
          text, energy_count = energy_pattern.subn(energy_replacement, text, count=1)
          if energy_count != 1:
              raise SystemExit(f'issue 1051 energy replacement count: {energy_count}')

          issue_anchor = '    // Confirmed bug: https://github.com/FlareZ123/pokemon-sims/issues/1038\n'
          issue_replacement = (
              '    // One-type search-to-hand plus manual attachment:\n'
              '    // https://github.com/FlareZ123/pokemon-sims/issues/1051\n'
              '    // Confirmed original duplicate route:\n'
              '    // https://github.com/FlareZ123/pokemon-sims/issues/1038\n'
          )
          if text.count(issue_anchor) != 1:
              raise SystemExit(f'issue 1051 URL anchor count: {text.count(issue_anchor)}')
          text = text.replace(issue_anchor, issue_replacement, 1)
          source.write_text(text, encoding='utf-8')

          test = Path('tests/issue_1051_one_type_crispin_wonder_tag_tests.cpp')
          test.write_text(textwrap.dedent(r'''\
          #define REGIDRAGO_SIM_NO_MAIN
          #include "../src/regidrago_sim.cpp"

          #include <algorithm>
          #include <stdexcept>
          #include <string>

          namespace sim { struct EngineTestAccess {}; }

          int main() {
            const auto scenario = sim::scenario_by_label("strict-jit-turn2-item-lock/go-second");
            if (!scenario) {
              throw std::runtime_error("Missing strict-jit-turn2-item-lock/go-second scenario");
            }
            sim::DeckRecipe recipe{sim::baseline_recipe()};
            std::mt19937_64 rng{57};
            sim::TraceLog trace{true, {}};
            sim::Engine engine(*scenario, recipe, rng, &trace);
            engine.run();

            const bool held_on_t4 = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T4 | HOLD TAPU LELE-GX") != std::string::npos &&
                         line.find("held Crispin") != std::string::npos;
                });
            const bool duplicate_t4_crispin = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T4 | WONDER TAG") != std::string::npos &&
                         line.find("Crispin") != std::string::npos;
                });
            const bool played_held_crispin = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T5 | PLAY SUPPORTER") != std::string::npos &&
                         line.find("Only one Basic Energy type was searchable") != std::string::npos;
                });
            const bool manual_grass = std::any_of(trace.lines.begin(), trace.lines.end(),
                [](const std::string& line) {
                  return line.find("T5 | ATTACH") != std::string::npos &&
                         line.find("Grass Energy manually to Regidrago VSTAR") != std::string::npos;
                });

            // Crispin may search up to two Basic Energy of different types. When only
            // one needed type remains, that card goes to hand and the still-unused
            // manual attachment advances GGF. A second Wonder Tag for the same held
            // Supporter therefore has no marginal route:
            // https://api.pokemontcg.io/v2/cards/sv7-133
            // https://api.pokemontcg.io/v2/cards/cel25c-60_A
            // https://api.pokemontcg.io/v2/cards/swsh12-136
            // https://www.pokemon.com/us/pokemon-tcg/rules
            // https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
            // https://github.com/FlareZ123/pokemon-sims/issues/1051
            if (!held_on_t4 || duplicate_t4_crispin || !played_held_crispin ||
                !manual_grass) {
              throw std::runtime_error(
                  "Seed 57 still spent Wonder Tag for a duplicate one-type Crispin route");
            }
            return 0;
          }
          '''), encoding='utf-8')

          Path('.github/workflows/patch-1051.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Fix one-type duplicate Crispin route (#1051)"
          git push origin HEAD:${{ github.head_ref }}
