name: PR 1339 Held Blender Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-and-finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply confirmed source fix
        run: python scripts/apply_issue_1339_reclaim.py

      - name: Verify source-bound rule references
        shell: bash
        run: |
          set -euo pipefail
          # Brilliant Blender: https://api.pokemontcg.io/v2/cards/sv8-164
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Core procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Repository resource priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Confirmed stale-claim issue: https://github.com/FlareZ123/pokemon-sims/issues/1339
          grep -q 'pokemon-sims/issues/1339' src/trace_engine_v2/part_010_blender_thinning_override.inc
          python -m compileall -q scripts

      - name: Configure and build Release
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2

      - name: Run focused exact-state regression
        run: ./build/regidrago_unified_tests issue_1339_blender_held_payload_tests

      - name: Simulate-this pass 1 strict JIT
        shell: bash
        run: |
          set -euo pipefail
          # Regidrago VSTAR and same-turn payload requirement:
          # https://api.pokemontcg.io/v2/cards/swsh12-136
          # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 107 --require-ready-by 3 | tee issue-1339-trace-strict.txt
          grep -Eq '^T3 \| READY \|' issue-1339-trace-strict.txt

      - name: Simulate-this pass 2 scheduled Item lock
        shell: bash
        run: |
          set -euo pipefail
          # Item-lock scenario contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          # Core Item procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-turn2-item-lock/go-second --seed 25 --require-ready-by 2 | tee issue-1339-trace-item-lock.txt
          grep -Eq '^T2 \| READY \|' issue-1339-trace-item-lock.txt

      - name: Simulate-this pass 3 Rule Box Ability lock
        shell: bash
        run: |
          set -euo pipefail
          # Path to the Peak: https://api.pokemontcg.io/v2/cards/swsh6-148
          # Field Blower: https://api.pokemontcg.io/v2/cards/sm2-125
          # Lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee issue-1339-trace-rulebox-lock.txt
          grep -Eq '^T[23] \| READY \|' issue-1339-trace-rulebox-lock.txt

      - name: Regenerate source-bound setup evidence
        shell: bash
        run: |
          set -euo pipefail
          # Canonical and paired matrix contracts:
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
          # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_multi_deck_docs.py --repo-root .

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure

      - name: Generate current-run T2 and T3 matrix
        shell: bash
        run: |
          set -euo pipefail
          # Matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-paired-two-deck-matrices
          ./build/regidrago_sim --all-decks --trials 100000 --seed 20260722 --out issue-1339-t2-t3-matrix.csv
          test "$(wc -l < issue-1339-t2-t3-matrix.csv)" -eq 33

      - name: Configure and build sanitizers
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-sanitize -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-sanitize --parallel 2

      - name: Run complete sanitizer suite
        env:
          ASAN_OPTIONS: detect_stack_use_after_return=1:detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build-sanitize --parallel 2 --output-on-failure

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: issue-1339-held-blender-reclaim
          path: |
            issue-1339-trace-*.txt
            issue-1339-t2-t3-matrix.csv
            results/simulation_results.csv
            results/multi_deck_comparison.csv
            build/Testing
            build-sanitize/Testing
          if-no-files-found: error

      - name: Commit validated fix and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build build-sanitize issue-1339-trace-*.txt issue-1339-t2-t3-matrix.csv
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/pr-1339-validation.yml scripts/apply_issue_1339_reclaim.py
          git add src tests README.md docs results
          git commit -m 'Preserve held payload through Brilliant Blender (#1339)'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
