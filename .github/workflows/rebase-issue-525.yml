name: Refresh issue 525 onto main

on:
  push:
    branches:
      - fix/525-legacy-star-vessel-fixture

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/525-legacy-star-vessel-fixture
          fetch-depth: 0
      - name: Merge current main and remove helper
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/rebase-issue-525.yml
          git add .github/workflows/rebase-issue-525.yml
          git commit -m "chore: remove issue 525 refresh helper"
          git push origin HEAD:fix/525-legacy-star-vessel-fixture
