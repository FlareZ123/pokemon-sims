name: Recover issue 1118 source bundle

on:
  push:
    branches: [tmp/1118-blob-recovery]
  pull_request:
    branches: [main, tmp/1118-blob-recovery]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Export PR 1119 payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/issue-1118-payload"
          git fetch --no-tags --depth=1 origin enhancement/1118-multi-deck-secret-box
          git show FETCH_HEAD:.issue1118/payload.00 > "$RUNNER_TEMP/issue-1118-payload/payload.00"
          sha256sum "$RUNNER_TEMP/issue-1118-payload/payload.00" | tee "$RUNNER_TEMP/issue-1118-payload/SHA256SUMS.txt"
          wc -c "$RUNNER_TEMP/issue-1118-payload/payload.00" | tee "$RUNNER_TEMP/issue-1118-payload/SIZE.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1118-pr-payload
          path: ${{ runner.temp }}/issue-1118-payload
          if-no-files-found: error
