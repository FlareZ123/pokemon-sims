name: Recover issue 1118 source bundle

on:
  push:
    branches: [tmp/1118-blob-recovery]
  pull_request:
    branches: [main, tmp/1118-blob-recovery]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Export raw recovery shards
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/recovery-shards"
          cp part0.bin part1.bin part2.bin "$RUNNER_TEMP/recovery-shards/"
          sha256sum part0.bin part1.bin part2.bin | tee "$RUNNER_TEMP/recovery-shards/SHA256SUMS.txt"
          wc -c part0.bin part1.bin part2.bin | tee "$RUNNER_TEMP/recovery-shards/SIZES.txt"
          file part0.bin part1.bin part2.bin | tee "$RUNNER_TEMP/recovery-shards/FILE_TYPES.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-1118-raw-recovery-shards
          path: ${{ runner.temp }}/recovery-shards
          if-no-files-found: error
