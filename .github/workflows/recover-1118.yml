name: Recover issue 1118 source bundle

on:
  push:
    branches: [tmp/1118-blob-recovery]
  pull_request:
    branches: [main, tmp/1118-blob-recovery]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Recover and verify PR 1119 payload
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin enhancement/1118-multi-deck-secret-box
          git show FETCH_HEAD:.issue1118/payload.00 > "$RUNNER_TEMP/payload.00"
          base64 --decode "$RUNNER_TEMP/payload.00" > "$RUNNER_TEMP/recovered-1118.tar.gz"
          tar -tzf "$RUNNER_TEMP/recovered-1118.tar.gz" > "$RUNNER_TEMP/recovered-1118-files.txt"
          test -s "$RUNNER_TEMP/recovered-1118-files.txt"
          sha256sum "$RUNNER_TEMP/recovered-1118.tar.gz" | tee "$RUNNER_TEMP/recovered-1118.sha256"
          wc -c "$RUNNER_TEMP/payload.00" "$RUNNER_TEMP/recovered-1118.tar.gz"
          wc -l "$RUNNER_TEMP/recovered-1118-files.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: recovered-1118-source
          path: |
            ${{ runner.temp }}/recovered-1118.tar.gz
            ${{ runner.temp }}/recovered-1118.sha256
            ${{ runner.temp }}/recovered-1118-files.txt
          if-no-files-found: error
