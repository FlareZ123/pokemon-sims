name: Refresh issue 1118 on latest main

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    timeout-minutes: 30
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: enhancement/1118-multi-deck-secret-box
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Detect refresh marker
        id: refresh
        shell: bash
        run: |
          if test -f .issue1118-refresh; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Merge current main
        if: ${{ steps.refresh.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
      - name: Configure Release
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator and tests
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: cmake --build build --parallel 2
      - name: Regenerate canonical shell evidence
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
      - name: Regenerate paired named-deck evidence
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: python scripts/generate_multi_deck_comparison.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
      - name: Update generated reports
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: |
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Run complete Release suite
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: ctest --test-dir build --parallel 4 --output-on-failure
      - name: Commit refreshed evidence
        if: ${{ steps.refresh.outputs.present == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build
          rm -f .issue1118-refresh
          git add -A
          git commit -m "Refresh issue 1118 evidence on current main"
      - name: Push refreshed issue 1118 branch
        if: ${{ steps.refresh.outputs.present == 'true' }}
        run: git push origin HEAD:enhancement/1118-multi-deck-secret-box
