name: Refresh issue 642 baseline from current main

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'fix/642-baseline-provenance'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Merge current main and regenerate baseline
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge origin/main --no-edit
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target regidrago_sim --parallel 2
          python scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python tests/setup_report_contract_tests.py
          rm .github/workflows/refresh-642-from-main.yml
          git add results docs README.md .github/workflows/refresh-642-from-main.yml
          git commit -m "Refresh baseline after Star Alchemy policy merge (#642)"
          git push origin HEAD:${{ github.head_ref }}
