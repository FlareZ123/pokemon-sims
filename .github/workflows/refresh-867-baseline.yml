name: Refresh issue 867 baseline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  baseline:
    if: github.head_ref == 'fix/867-steven-projected-axes-v2'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build exact branch simulator
        run: |
          cmake -S . -B build-baseline -DCMAKE_BUILD_TYPE=Release
          cmake --build build-baseline --parallel 2
      - name: Regenerate canonical baseline
        run: |
          python scripts/regenerate_setup_baselines.py \
            --exe build-baseline/regidrago_sim \
            --out-dir generated-baselines \
            --trials 100000 \
            --matrix-seed 20260705
          rm -rf results/traces
          cp generated-baselines/baseline_manifest.json results/baseline_manifest.json
          cp generated-baselines/simulation_results.csv results/simulation_results.csv
          cp -R generated-baselines/traces results/traces
          python scripts/update_setup_docs.py --repo-root .
      - name: Stage generated evidence
        run: |
          mkdir -p generated-evidence/results generated-evidence/docs
          cp results/baseline_manifest.json generated-evidence/results/
          cp results/simulation_results.csv generated-evidence/results/
          cp -R results/traces generated-evidence/results/traces
          cp docs/REPORT.md generated-evidence/docs/
          cp docs/TRACE_AUDIT.md generated-evidence/docs/
          cp README.md generated-evidence/
      - uses: actions/upload-artifact@v4
        with:
          name: issue-867-generated-baseline
          path: generated-evidence
          if-no-files-found: error
