name: Refresh issue 1145 baseline

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'fix/issue-1145-direct-treasure-latias'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Build exact PR simulator
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          cmake --build build --parallel 2 # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Regenerate source-bound evidence
        run: |
          python3 scripts/regenerate_setup_baselines.py --exe build/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705 # Canonical matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
          python3 scripts/update_setup_docs.py --repo-root . # Generated report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/tests/setup_report_contract_tests.py
      - name: Commit generated evidence
        run: |
          rm .github/workflows/refresh-issue-1145-baseline.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add results docs/REPORT.md .github/workflows/refresh-issue-1145-baseline.yml
          git commit -m "Refresh issue 1145 source-bound setup evidence"
          git push origin HEAD:${{ github.head_ref }}
