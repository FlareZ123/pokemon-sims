name: Refresh issue 1259 evidence

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: refresh-issue-1259-evidence
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1259-gladion-appletun-v2
          fetch-depth: 0
      - name: Merge current main
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
      - name: Build and run focused regression
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1259_gladion_appletun_tests
      - name: Run three simulate-this audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1259-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1259-trace-2.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1259-trace-3.txt
      - name: Regenerate source-bound matrices
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Commit refreshed evidence
        run: |
          git add docs results
          git diff --cached --check
          git commit -m "Refresh issue 1259 source-bound evidence"
          git pull --rebase origin fix/issue-1259-gladion-appletun-v2
          git push origin HEAD:fix/issue-1259-gladion-appletun-v2
