name: Refresh issue 1301 evidence

on:
  push:
    branches: [fix/issue-1301-mawile-retreat]

permissions:
  contents: write

concurrency:
  group: refresh-issue-1301-evidence
  cancel-in-progress: false

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1301-mawile-retreat
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and validate focused fix
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1249_retreat_metadata_tests
      - name: Run three independent simulate-this audits
        run: |
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 --require-ready-by 3 | tee issue-1301-trace-1.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 3 --require-ready-by 2 | tee issue-1301-trace-2.txt
          ./build/regidrago_sim --simulate-this --deck regidrago-pineco --scenario strict-jit/go-second --seed 35 --require-ready-by 2 | tee issue-1301-trace-3.txt
      - name: Regenerate source-bound matrices and reports
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
      - name: Verify complete Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Commit refreshed evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/refresh-issue-1301-evidence.yml
          git add results docs
          git add -u .github/workflows/refresh-issue-1301-evidence.yml
          git diff --cached --check
          git commit -m 'Refresh Mawile retreat validation evidence'
          git push origin HEAD:fix/issue-1301-mawile-retreat
