name: Regenerate issue 1117 baseline

on:
  push:
    branches: [bug/1117-held-burnet-before-steven-agent]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1117-held-burnet-before-steven-agent
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build simulator
        run: |
          cmake -S . -B build-agent -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-agent --target regidrago_sim --parallel 2
      - name: Regenerate source-bound baseline
        run: |
          python scripts/regenerate_setup_baselines.py --exe build-agent/regidrago_sim --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Commit generated evidence
        run: |
          rm .github/workflows/regenerate-1117-baseline.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Regenerate issue 1117 setup baseline"
          git push origin HEAD:bug/1117-held-burnet-before-steven-agent
