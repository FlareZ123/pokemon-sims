name: Regenerate final issue 1110 baseline

on:
  push:
    branches: [bug/1110-tate-yields-to-burnet-agent]

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: bug/1110-tate-yields-to-burnet-agent
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build exact narrowed source
        run: |
          cmake -S . -B "$RUNNER_TEMP/build-agent" -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build "$RUNNER_TEMP/build-agent" --target regidrago_sim regidrago_unified_tests --parallel 2
          "$RUNNER_TEMP/build-agent/regidrago_unified_tests" issue_1110_tate_yields_to_burnet_tests
          "$RUNNER_TEMP/build-agent/regidrago_unified_tests" issue_990_fss_observable_complete_route_tests
      - name: Regenerate source-bound evidence
        run: |
          python scripts/regenerate_setup_baselines.py --exe "$RUNNER_TEMP/build-agent/regidrago_sim" --out-dir results --max-seed 5000 --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Commit exact generated files
        run: |
          rm .github/workflows/regenerate-issue-1110-final.yml
          rm -rf scripts/__pycache__
          rm -f results/.simulation_results.csv.*.tmp.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Regenerate narrowed issue 1110 baseline"
          git push origin HEAD:bug/1110-tate-yields-to-burnet-agent
