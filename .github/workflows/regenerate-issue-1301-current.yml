name: Regenerate current issue 1301 evidence

on:
  push:
    branches: [fix/issue-1301-mawile-retreat]

permissions:
  contents: write

concurrency:
  group: regenerate-current-issue-1301
  cancel-in-progress: true

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1301-mawile-retreat
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build and run focused regression
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2
          ./build/regidrago_unified_tests issue_1249_retreat_metadata_tests
      - name: Regenerate source-bound evidence
        run: |
          python scripts/regenerate_setup_baselines.py --exe ./build/regidrago_sim --out-dir results --max-seed 20 --trials 100000 --matrix-seed 20260705
          python scripts/generate_multi_deck_comparison.py --exe ./build/regidrago_sim --out-dir results --trials 100000 --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
          python scripts/update_multi_deck_docs.py --repo-root .
          find results -name '.*.tmp.lock' -delete
          test -z "$(find results -name '.*.tmp.lock' -print -quit)"
      - name: Commit validated evidence
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/workflows/regenerate-issue-1301-current.yml
          git add docs results
          git add -u .github/workflows/regenerate-issue-1301-current.yml
          git diff --cached --check
          git commit -m 'Regenerate current issue 1301 evidence'
          git push origin HEAD:fix/issue-1301-mawile-retreat
