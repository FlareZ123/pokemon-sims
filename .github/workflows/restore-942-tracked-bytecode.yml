name: Restore issue 942 tracked baseline file

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  restore:
    if: github.head_ref == 'bug/942-redundant-burnet-direct-item'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Restore tracked main file and commit
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git checkout origin/main -- scripts/__pycache__/baseline_provenance.cpython-312.pyc
          rm .github/workflows/restore-942-tracked-bytecode.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Restore tracked baseline provenance bytecode"
          git push origin "HEAD:${HEAD_REF}"
