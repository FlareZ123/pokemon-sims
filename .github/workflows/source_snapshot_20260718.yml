name: Temporary Source Snapshot 20260718

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Package complete checkout
        run: tar --exclude=.git -czf /tmp/source-snapshot.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot-20260718
          path: /tmp/source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
