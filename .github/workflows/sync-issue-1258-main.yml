name: Synchronize issue 1258 with main

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1258-late-steven-appletun
          fetch-depth: 0
      - name: Merge current main and remove workflow
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
          rm .github/workflows/sync-issue-1258-main.yml
          git add -A
          git diff --cached --check
          git commit -m "Synchronize issue 1258 with current main"
          git push origin HEAD:fix/issue-1258-late-steven-appletun
