name: Sync final main for issue 1050

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'bug/1050-dynamic-dead-role-dci'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Merge current main and remove sync workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          git rm .github/workflows/sync-main-1050-final.yml
          git commit -m "Remove final issue 1050 sync workflow"
          git push origin HEAD:${{ github.head_ref }}
