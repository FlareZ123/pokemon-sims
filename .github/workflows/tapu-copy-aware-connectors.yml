name: Tapu Copy-Aware Connectors

on:
  pull_request:
    branches: [main]

jobs:
  validate-tapu-copy-aware-connectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2 --target regidrago_sim
      - name: Run focused Release regression
        # Wonder Tag, Quick Ball, fixed-list policy, and issue evidence: https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/swsh1-179 https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#knowledge-states https://github.com/FlareZ123/pokemon-sims/issues/746
        run: c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tests/tapu_copy_aware_connector_tests.cpp -o build/tapu_copy_aware_connector_tests && ./build/tapu_copy_aware_connector_tests
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: c++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow -fsanitize=address,undefined -fno-omit-frame-pointer tests/tapu_copy_aware_connector_tests.cpp -o build/tapu_copy_aware_connector_tests_san && ./build/tapu_copy_aware_connector_tests_san
      - name: Trace strict JIT going first
        # Readable trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 --require-ready-by 3 | tee tapu-copy-trace-strict-first-seed-6.txt
      - name: Trace strict JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 6 --require-ready-by 3 | tee tapu-copy-trace-strict-second-seed-6.txt
      - name: Trace Rule Box lock going second
        # Lock contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee tapu-copy-trace-rulebox-second-seed-20.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out tapu-copy-t2-t3-matrix.csv
      - name: Upload trace and matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tapu-copy-aware-validation
          path: |
            tapu-copy-trace-*.txt
            tapu-copy-t2-t3-matrix.csv
          if-no-files-found: error
