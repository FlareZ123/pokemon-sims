name: Temporary Baseline Digest

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Record simulator policy digest
        run: >-
          python -c "from pathlib import Path; from scripts.baseline_provenance import simulator_policy_source_digest; print(simulator_policy_source_digest(Path('.').resolve()))"
          > simulator-policy-digest.txt
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: temporary-baseline-digest
          path: simulator-policy-digest.txt
