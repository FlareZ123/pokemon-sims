name: Current main three trace validation

on:
  pull_request:
    types: [edited, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  trace-and-matrix:
    if: github.event.pull_request.number == 772
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Record validated source
        run: mkdir -p build && git rev-parse HEAD | tee build/validated_sha.txt
      - name: Configure and build Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure
      - name: Simulate strict JIT going first
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 --require-ready-by 3 | tee build/trace_1_strict_jit_go_first.txt
      - name: Simulate strict JIT going second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 3 --require-ready-by 3 | tee build/trace_2_strict_jit_go_second.txt
      - name: Simulate Rule Box Ability lock going second
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 --require-ready-by 3 | tee build/trace_3_rulebox_lock_go_second.txt
      - name: Generate fixed-seed T2 T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/t2_t3_matrix.csv
      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: current-main-three-trace-validation
          path: |
            build/validated_sha.txt
            build/trace_1_strict_jit_go_first.txt
            build/trace_2_strict_jit_go_second.txt
            build/trace_3_rulebox_lock_go_second.txt
            build/t2_t3_matrix.csv
            build/Testing
          if-no-files-found: error
