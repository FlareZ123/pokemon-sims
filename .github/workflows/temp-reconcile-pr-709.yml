name: Temporary PR 709 Reconciliation

on:
  pull_request_target:
    types: [edited]
    branches: [main]
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  reconcile:
    if: github.event.pull_request.number == 709 || github.event.issue.number == 709
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/701-pokemon-communication
          fetch-depth: 0
      - name: Execute targeted reconciliation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/reconcile-pokemon-communication.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          end = next(i for i in range(start, len(lines)) if lines[i].startswith('      - name: Remove one-shot workflow'))
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/reconcile.sh').write_text(script)
          PY
          bash /tmp/reconcile.sh
      - name: Remove temporary workflows from feature branch
        run: |
          git rm .github/workflows/reconcile-pokemon-communication.yml
          git rm .github/workflows/run-reconcile-pokemon-communication.yml
          git rm -f .github/workflows/merge-pokemon-communication-main.yml || true
          git rm -f .github/workflows/temp-reconcile-pr-709.yml || true
          git commit -m 'Remove temporary Pokémon Communication workflows'
      - name: Build and test
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j2
          ctest --test-dir build --output-on-failure
          ./build/regidrago_sim --self-test
      - name: Push reconciled feature branch
        run: git push origin HEAD:feature/701-pokemon-communication
      - name: Check out main for cleanup
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main-clean
      - name: Remove temporary workflow from main
        working-directory: main-clean
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/temp-reconcile-pr-709.yml
          git commit -m 'Remove temporary PR 709 reconciliation workflow'
          git push origin HEAD:main
