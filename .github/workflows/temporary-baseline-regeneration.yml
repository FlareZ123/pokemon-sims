name: Temporary Baseline Regeneration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --target regidrago_sim --parallel 2
      - name: Regenerate deterministic setup evidence
        run: |
          python scripts/regenerate_setup_baselines.py \
            --exe build/regidrago_sim \
            --out-dir results \
            --max-seed 5000 \
            --trials 100000 \
            --matrix-seed 20260705
          python scripts/update_setup_docs.py --repo-root .
      - name: Upload regenerated evidence
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-setup-evidence
          path: |
            results/simulation_results.csv
            results/baseline_manifest.json
            results/traces
            docs/REPORT.md
          if-no-files-found: error
