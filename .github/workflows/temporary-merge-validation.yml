name: Temporary Merge Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read

jobs:
  validate-merge:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.head.ref == 'fix/780-gladion-revealed-axis' ||
       github.event.pull_request.head.ref == 'fix/781-arven-complementary-latias-route')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build all targets
        run: cmake --build build --parallel 2
      - name: Run full Release suite
        run: ctest --test-dir build --output-on-failure

      - name: Simulate pass 1
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 3 | tee trace-1.txt
      - name: Simulate pass 2
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 2 | tee trace-2.txt
      - name: Simulate pass 3
        run: ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 11 | tee trace-3.txt
      - name: Generate T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out t2-t3-matrix.csv
      - name: Archive exact merge source
        run: git archive --format=tar.gz -o source.tgz HEAD

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-validation-${{ github.event.pull_request.number }}-${{ github.run_attempt }}
          path: |
            trace-*.txt
            t2-t3-matrix.csv
            source.tgz
            build/Testing
          if-no-files-found: warn
