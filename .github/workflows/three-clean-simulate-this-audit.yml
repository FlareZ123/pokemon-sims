name: Three Clean Simulate-This Audit

on:
  pull_request:
    branches: [main]

jobs:
  audit-three-traces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build simulator
        run: cmake --build build --parallel 2
      - name: Audit strict JIT going first
        # Documented trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 6 | tee audit-trace-strict-first-seed-6.txt
      - name: Audit Rule Box lock going second
        # Scenario semantics: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#rule-box-ability-lock
        run: ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 20 | tee audit-trace-rulebox-second-seed-20.txt
      - name: Audit no-discard-control going first
        # DCI profile contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation
        run: ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-first --seed 2 | tee audit-trace-no-control-first-seed-2.txt
      - name: Generate T2 and T3 matrix
        # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out audit-t2-t3-matrix.csv
      - name: Upload audit outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: three-clean-simulate-this-audit
          path: |
            audit-trace-*.txt
            audit-t2-t3-matrix.csv
          if-no-files-found: error
