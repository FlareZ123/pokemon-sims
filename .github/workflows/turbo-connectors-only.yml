name: Turbo Connectors Only

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  corrected-connector-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile connector-only optimizer
        run: g++ -std=c++20 -O3 -Wall -Wextra -Wpedantic -Wconversion -Wshadow tools/turbo_connector_only_search.cpp -o turbo_connector_only_search
      - name: Search three-swap connector packages
        run: ./turbo_connector_only_search 5 1000 16 3 > connector-only-discovery.csv
      - name: Verify no protected card was changed
        run: |
          if grep -E 'Dialga-GX|Mawile-GX|Guzma|Team Yell|Roseanne|Field Blower|Chaotic Swell|Regidrago VSTAR|Dragapult ex|Mega Dragonite' connector-only-discovery.csv; then
            echo 'A protected discrete-value card appeared in a candidate delta.'
            exit 1
          fi
      - name: Upload corrected discovery matrix
        uses: actions/upload-artifact@v4
        with:
          name: connector-only-discovery
          path: connector-only-discovery.csv
          if-no-files-found: error
