name: Turbo Setup Search

on:
  pull_request:
    branches: [main]

jobs:
  snapshot-and-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export exact merge-ref source
        run: tar --exclude=.git -czf /tmp/turbo-source-snapshot.tar.gz .
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: turbo-source-snapshot
          path: /tmp/turbo-source-snapshot.tar.gz
          if-no-files-found: error
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel 2
      - name: Validate baseline simulator
        run: ctest --test-dir build --output-on-failure
      - name: Generate current 100,000-trial baseline
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out build/turbo_baseline.csv
      - name: Upload baseline matrix
        uses: actions/upload-artifact@v4
        with:
          name: turbo-baseline-matrix
          path: build/turbo_baseline.csv
          if-no-files-found: error

  removal-sensitivity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        start: [0, 6, 12, 18, 24, 30]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build sensitivity executable
        run: cmake --build build --target turbo_sensitivity --parallel 2
      - name: Run matched-seed removal sensitivity shard
        run: ./build/turbo_sensitivity 250 20260716 ${{ matrix.start }} $(( ${{ matrix.start }} + 6 )) > sensitivity-${{ matrix.start }}.csv
      - name: Upload sensitivity shard
        uses: actions/upload-artifact@v4
        with:
          name: turbo-sensitivity-${{ matrix.start }}
          path: sensitivity-${{ matrix.start }}.csv
          if-no-files-found: error
