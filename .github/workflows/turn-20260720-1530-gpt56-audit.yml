name: Turn 20260720 1530 GPT56 Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Repository build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2 # Repository test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run four independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Turn, Trainer, search, discard, evolution, attachment, Ability, attack, and Prize procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest deterministic route and strict-JIT policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 5 | tee pass-1-strict-jit-go-second-seed-5.txt # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 41 | tee pass-2-full-item-lock-go-second-seed-41.txt # Item-lock specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#full-item-lock
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 19 | tee pass-3-no-discard-control-go-second-seed-19.txt # DCI/JIT specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 1 | tee pass-4-strict-jit-go-first-seed-1.txt # Earliest complete route policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 7 | tee claimed-issue-1174-seed-7.txt # Active claimed bug, audit only: https://github.com/FlareZ123/pokemon-sims/issues/1174
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Repository validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Build with broad compiler warnings
        shell: bash
        run: |
          set -o pipefail
          cmake -S . -B build-warnings -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS='-Wall -Wextra -Wpedantic' 2>&1 | tee warning-configure.txt # Fully modeled source scope: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#fully-modeled-parts
          cmake --build build-warnings --parallel 2 2>&1 | tee warning-build.txt # Rules traceability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260720-1530-gpt56-t2-t3-matrix.csv # Canonical aggregate command: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
      - name: Validate uploaded card corpus against repository identities
        run: python3 scripts/audit_card_data.py --data-root external/pokemon-tcg-data/cards/en # Card audit specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_REVERIFICATION.md
        continue-on-error: true
      - name: Export exact tested source and static inventory
        shell: bash
        run: |
          git rev-parse HEAD > tested-head.txt # Traceability specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Auditable source snapshot: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
          find src tests docs data scripts -type f -print | sort > source-inventory.txt # Repository modeled scope: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#scope
          grep -RInE 'TODO|FIXME|HACK|XXX|future.*draw|hidden.*order|prize|discard|lock|Supporter|Item|Quick Ball|Steven|Celestial Roar|Mysterious Treasure|Gladion' src tests docs data scripts > static-risk-scan.txt || true # Hidden-state and action-selection constraints: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#policy-versus-future-card-oracle
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260720-1530-gpt56-audit-${{ github.run_attempt }}
          path: |
            pass-*.txt
            claimed-issue-*.txt
            turn-20260720-1530-gpt56-t2-t3-matrix.csv
            warning-*.txt
            tested-head.txt
            tested-source.tar.gz
            source-inventory.txt
            static-risk-scan.txt
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: error
