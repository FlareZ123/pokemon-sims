name: Turn 20260720 1828 GPT56 Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2 # Validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run four independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Official turn, Trainer, search, discard, evolution, attachment, Ability, attack, retreat, and Prize procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest deterministic route, DCI/JIT, lock handling, and hidden-information policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#scenario-lock-treatment https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#hidden-information-policy
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 | tee pass-1-strict-jit-go-second-seed-1.txt # Trace interface: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 91 | tee pass-2-strict-jit-go-first-seed-91.txt # Strict-JIT timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-first --seed 173 | tee pass-3-matchup-flex-go-first-seed-173.txt # Matchup-flex timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 509 | tee pass-4-no-discard-control-go-second-seed-509.txt # No-discard-control timing: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
      - name: Reproduce currently claimed reports without changing ownership
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 7 | tee issue-1174-seed-7.txt # Claimed report: https://github.com/FlareZ123/pokemon-sims/issues/1174
          grep -q "T3 | ATTACK |.*Celestial Roar" issue-1174-seed-7.txt # Celestial Roar: https://api.pokemontcg.io/v2/cards/swsh12-135
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 23 | tee issue-1185-seed-23.txt # Claimed report: https://github.com/FlareZ123/pokemon-sims/issues/1185
          grep -q "T5 | PLAY SUPPORTER |.*Tate & Liza" issue-1185-seed-23.txt # Tate & Liza: https://api.pokemontcg.io/v2/cards/sm7-148
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 101 | tee issue-1186-seed-101.txt # Claimed report: https://github.com/FlareZ123/pokemon-sims/issues/1186
          grep -q "T2 | PLAY SUPPORTER |.*Gladion" issue-1186-seed-101.txt # Gladion: https://api.pokemontcg.io/v2/cards/sm4-95
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260720-1828-gpt56-t2-t3-matrix.csv # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
      - name: Build with broad compiler warnings
        shell: bash
        run: |
          set -o pipefail
          cmake -S . -B build-warnings -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS='-Wall -Wextra -Wpedantic' 2>&1 | tee warning-configure.txt # Modeled source scope: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#fully-modeled-parts
          cmake --build build-warnings --parallel 2 2>&1 | tee warning-build.txt # Rules traceability: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
      - name: Export exact tested source and static inventory
        shell: bash
        run: |
          git rev-parse HEAD > tested-head.txt # Source traceability: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Auditable source snapshot: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
          find src tests docs data scripts -type f -print | sort > source-inventory.txt # Repository scope: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#scope
          grep -RInE 'TODO|FIXME|HACK|XXX|future.*draw|hidden.*order|Prize|discard|lock|Supporter|Item|Quick Ball|Steven|Celestial Roar|Mysterious Treasure|Gladion|Tate|Burnet|Latias' src tests docs data scripts > static-risk-scan.txt || true # Hidden-state boundary: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#policy-versus-future-card-oracle
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260720-1828-gpt56-audit-${{ github.run_attempt }}
          path: |
            pass-*.txt
            issue-*.txt
            turn-20260720-1828-gpt56-t2-t3-matrix.csv
            warning-*.txt
            tested-head.txt
            tested-source.tar.gz
            source-inventory.txt
            static-risk-scan.txt
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: error
