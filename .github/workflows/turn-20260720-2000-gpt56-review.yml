name: Turn 20260720 2000 GPT56 Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run six independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Official turn, Trainer, search, discard, evolution, attachment, Ability, attack, retreat, and Prize procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest deterministic route, strict-JIT, DCI, and hidden-information policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#hidden-information-policy
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 11 | tee pass-1-strict-jit-go-second-seed-11.txt # Trace contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 293 | tee pass-2-strict-jit-go-first-seed-293.txt # Source-bound route: https://github.com/FlareZ123/pokemon-sims/issues/1022
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-first --seed 47 | tee pass-3-matchup-flex-go-first-seed-47.txt # JIT policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 341 | tee pass-4-no-discard-control-go-second-seed-341.txt # No-discard-control policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-second --seed 25 | tee pass-5-turn2-item-lock-go-second-seed-25.txt # Mysterious Treasure and Quick Ball are Items: https://api.pokemontcg.io/v2/cards/sm6-113 https://api.pokemontcg.io/v2/cards/swsh1-179
          ./build/regidrago_sim --simulate-this --scenario strict-jit-combined-lock/go-first --seed 37 | tee pass-6-combined-lock-go-first-seed-37.txt # Combined lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#combined-lock
      - name: Reproduce current owned and confirmation-pending bugs
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 7 | tee issue-1174-seed-7.txt # Owned issue: https://github.com/FlareZ123/pokemon-sims/issues/1174
          grep -q "T3 | ATTACK |.*Celestial Roar" issue-1174-seed-7.txt # Celestial Roar: https://api.pokemontcg.io/v2/cards/swsh12-135
          cat > issue-1195-probe.cpp <<'CPP'
          #define REGIDRAGO_SIM_NO_MAIN
          #include "src/regidrago_sim.cpp"
          #include <iostream>
          #include <random>
          #include <utility>
          namespace sim {
          struct EngineTestAccess {
            static void set_state(Engine& engine, State state) {
              engine.state_ = std::move(state);
              engine.deck_seen_ = true;
            }
            static bool route(const Engine& engine) {
              return engine.wonder_tag_can_bank_steven_for_known_t4_fss_route();
            }
            static bool lock_active(const Engine& engine) {
              return engine.rule_box_abilities_locked();
            }
          };
          }
          int main() {
            const sim::Scenario scenario{"issue-1195-probe", sim::DciProfile::StrictJit,
                                         sim::LockMode::FullRuleBoxAbility, true, 5};
            std::mt19937_64 rng{1195};
            const sim::DeckRecipe recipe = sim::baseline_recipe();
            sim::Engine engine(scenario, recipe, rng);
            sim::State state;
            state.turn = 1;
            state.path_lock_removed = true;
            state.active = sim::Pokemon{sim::Card::Oricorio, 1};
            state.bench = {sim::Pokemon{sim::Card::TapuLeleGX, 1}};
            state.hand = {sim::Card::Arven, sim::Card::BrilliantBlender,
                          sim::Card::MegaDragonite, sim::Card::Grass};
            state.deck = {sim::Card::StevensResolve, sim::Card::RegidragoV,
                          sim::Card::Crispin, sim::Card::Grass, sim::Card::Fire,
                          sim::Card::ForestSealStone, sim::Card::RegidragoVstar,
                          sim::Card::MysteriousTreasure};
            sim::EngineTestAccess::set_state(engine, std::move(state));
            std::cout << "rule_box_lock_active=" << sim::EngineTestAccess::lock_active(engine) << '\n';
            std::cout << "route_admitted=" << sim::EngineTestAccess::route(engine) << '\n';
          }
          CPP
          g++ -std=c++20 -O0 issue-1195-probe.cpp -o issue-1195-probe # Current-state lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_003.inc#L157-L165
          ./issue-1195-probe | tee issue-1195-probe.txt # Confirmation-pending issue: https://github.com/FlareZ123/pokemon-sims/issues/1195
          grep -q "rule_box_lock_active=0" issue-1195-probe.txt # Field Blower and Path: https://api.pokemontcg.io/v2/cards/sm2-125 https://api.pokemontcg.io/v2/cards/swsh6-148
          grep -q "route_admitted=0" issue-1195-probe.txt # Stale route gate: https://github.com/FlareZ123/pokemon-sims/blob/main/src/trace_engine_v2/part_010_steven_crispin_override.inc#L3-L18
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Repository validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260720-2000-gpt56-t2-t3-matrix.csv # Aggregate contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
      - name: Build broad-warning configuration
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-warnings -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS='-Wall -Wextra -Wpedantic -Wconversion -Wshadow' 2>&1 | tee warning-configure.txt # Warning policy: https://github.com/FlareZ123/pokemon-sims/blob/main/CMakeLists.txt#L10-L16
          cmake --build build-warnings --parallel 2 2>&1 | tee warning-build.txt # Traceability requirement: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
      - name: Export exact tested source and static inventory
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt # Source traceability: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Auditable source snapshot: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
          find src tests docs data scripts -type f -print | sort > source-inventory.txt # Modeled scope: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#scope
          grep -RInE 'TODO|FIXME|HACK|XXX|future.*draw|hidden.*order|prize|discard|lock|Supporter|Item|Quick Ball|Steven|Celestial Roar|Mysterious Treasure|Gladion|Tate|Burnet|Latias|retreat|evolv' src tests docs data scripts > static-risk-scan.txt || true # Hidden-state and policy boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#policy-versus-future-card-oracle
      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260720-2000-gpt56-review-${{ github.run_attempt }}
          path: |
            pass-*.txt
            issue-*.txt
            turn-20260720-2000-gpt56-t2-t3-matrix.csv
            warning-*.txt
            tested-head.txt
            tested-source.tar.gz
            source-inventory.txt
            static-risk-scan.txt
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: error
