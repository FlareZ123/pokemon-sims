name: Turn 20260720 Full Review Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and unified tests
        run: cmake --build build --parallel 2 # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Run three certified simulate-this passes, debug scans, and open-bug reproductions
        shell: bash
        run: |
          set -euo pipefail
          # Core turn, Supporter, Bench, Ability, retreat, search, discard, and attachment procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Repository trace contract and scenario semantics: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 | tee certified-pass-1-strict-jit-go-second-seed-1.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 2 | tee certified-pass-2-strict-jit-go-first-seed-2.txt # https://github.com/FlareZ123/pokemon-sims/issues/919
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 3 | tee certified-pass-3-full-item-lock-go-second-seed-3.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 11 | tee debug-pass-1-strict-jit-go-second-seed-11.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 29 | tee debug-pass-2-strict-jit-go-first-seed-29.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 47 | tee debug-pass-3-full-item-lock-go-second-seed-47.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-first --seed 16189 | tee issue-1126-seed-16189.txt # https://github.com/FlareZ123/pokemon-sims/issues/1126
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 31 | tee issue-1130-seed-31.txt # https://github.com/FlareZ123/pokemon-sims/issues/1130
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260720-t2-t3-matrix.csv # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-aggregate-smoke-test
      - name: Export exact tested source
        shell: bash
        run: |
          git rev-parse HEAD > turn-20260720-tested-head.txt # https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=turn-20260720-source.tar.gz HEAD # https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260720-full-review-${{ github.run_attempt }}
          path: |
            certified-pass-*.txt
            debug-pass-*.txt
            issue-1126-seed-16189.txt
            issue-1130-seed-31.txt
            turn-20260720-t2-t3-matrix.csv
            turn-20260720-tested-head.txt
            turn-20260720-source.tar.gz
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: error
