name: Turn 20260721 0113 GPT56 Debug Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  debug-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Repository build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand

      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Repository exact-state test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests

      - name: Run three independent perfect-play traces and defect controls
        shell: bash
        run: |
          set -euo pipefail
          # Official turn, Trainer, search, discard, Bench, Ability, attachment, evolution, VSTAR Power, retreat, and Prize procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest deterministic route, K0/K1 knowledge, DCI, UDP-like protection, strict-JIT timing, and lock boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#knowledge-states https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#lock-model
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 1 | tee pass-1-strict-jit-go-second-seed-1.txt # Heavy Ball, Tapu Lele-GX, Steven, Crispin, Latias, Blender, Regidrago: https://api.pokemontcg.io/v2/cards/swsh10-146 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/sm7-145 https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/sv8-76 https://api.pokemontcg.io/v2/cards/sv8-164 https://api.pokemontcg.io/v2/cards/swsh12-135 https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 4 | tee pass-2-strict-jit-go-first-seed-4.txt # Treasure, Gladion, Vessel, Blender, Regidrago: https://api.pokemontcg.io/v2/cards/sm6-113 https://api.pokemontcg.io/v2/cards/sm4-95 https://api.pokemontcg.io/v2/cards/sv4-163 https://api.pokemontcg.io/v2/cards/sv8-164 https://api.pokemontcg.io/v2/cards/swsh12-135 https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-first --seed 6 | tee pass-3-matchup-flex-go-first-seed-6.txt # Quick Ball, Tapu Lele-GX, Crispin, Latias, Legacy Star: https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/sv8-76 https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 12 | tee control-issue-1223-seed-12.txt # Newly filed Steven target defect: https://github.com/FlareZ123/pokemon-sims/issues/1223 https://api.pokemontcg.io/v2/cards/sm7-145 https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --scenario no-discard-control/go-second --seed 10 | tee control-issue-1220-seed-10.txt # Confirmation-pending Quick Ball-Tapu-Arven route: https://github.com/FlareZ123/pokemon-sims/issues/1220 https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/sv1-166 https://api.pokemontcg.io/v2/cards/sm6-113
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 123 | tee control-issue-1221-seed-123.txt # Confirmation-pending Burnet-Treasure route: https://github.com/FlareZ123/pokemon-sims/issues/1221 https://api.pokemontcg.io/v2/cards/swsh12tg-TG26 https://api.pokemontcg.io/v2/cards/sm6-113 https://api.pokemontcg.io/v2/cards/swsh12-136

      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Complete validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-exact-state-policy-tests

      - name: Run repository static-risk scan
        shell: bash
        run: |
          set -euo pipefail
          grep -RInE 'TODO|FIXME|HACK|XXX' src tests docs README.md > static-risk-markers.txt || true # Repository-wide source and documentation review scope: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          grep -RIn 'https://' src tests docs README.md > direct-source-url-inventory.txt # Direct source traceability contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md

      - name: Generate canonical T2 and T3 probability matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260721-0113-gpt56-t2-t3-matrix.csv # Probability semantics and fixed-seed contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#what-the-probability-means

      - name: Export exact tested source
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt # Source provenance contract: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Auditable source snapshot: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status

      - name: Upload debug-review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260721-0113-gpt56-debug-review-${{ github.run_attempt }}
          path: |
            pass-*.txt
            control-*.txt
            static-risk-markers.txt
            direct-source-url-inventory.txt
            turn-20260721-0113-gpt56-t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
            build/Testing
          if-no-files-found: error
