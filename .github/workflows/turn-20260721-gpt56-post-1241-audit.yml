name: Turn 20260721 GPT56 Post-1241 Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Repository build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Repository test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-tests
      - name: Run three independent simulate-this perfect-play audits
        shell: bash
        run: |
          set -euo pipefail
          # Official setup, turn, Trainer, search, discard, attachment, evolution, Ability, Retreat, and VSTAR Power procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest legal ready-state objective, strict-JIT payload timing, DCI, and hidden-information boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#dci-implementation https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#policy-versus-future-card-oracle

          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 307 | tee pass-1-fixed-1236-seed-307.txt # Confirmed route and cards: https://github.com/FlareZ123/pokemon-sims/issues/1236 https://github.com/FlareZ123/pokemon-sims/pull/1241 https://api.pokemontcg.io/v2/cards/sv4-163 https://api.pokemontcg.io/v2/cards/sm6-113 https://api.pokemontcg.io/v2/cards/sm7-145 https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/sv8-164
          grep -F 'Seed: 307 | first-ready turn: 2 | setup result: success' pass-1-fixed-1236-seed-307.txt
          vessel_line="$(grep -n -m1 'Earthen Vessel cost' pass-1-fixed-1236-seed-307.txt | cut -d: -f1)"
          treasure_line="$(grep -n -m1 'Mysterious Treasure cost' pass-1-fixed-1236-seed-307.txt | cut -d: -f1)"
          attach_line="$(grep -n -m1 'Grass Energy manually' pass-1-fixed-1236-seed-307.txt | cut -d: -f1)"
          supporter_line="$(grep -n -m1 'PLAY SUPPORTER.*R-STEVEN-01' pass-1-fixed-1236-seed-307.txt | cut -d: -f1)"
          test "$vessel_line" -lt "$treasure_line"
          test "$attach_line" -lt "$supporter_line"
          grep -F 'T2 | READY' pass-1-fixed-1236-seed-307.txt

          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 137 | tee pass-2-strict-go-first-seed-137.txt # Regidrago V/VSTAR, Tapu Lele-GX, Crispin, and Brilliant Blender route: https://api.pokemontcg.io/v2/cards/swsh12-135 https://api.pokemontcg.io/v2/cards/swsh12-136 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/sv7-133 https://api.pokemontcg.io/v2/cards/sv8-164
          grep -F 'Seed: 137 | first-ready turn: 2 | setup result: success' pass-2-strict-go-first-seed-137.txt
          grep -F 'T1 | ATTACH' pass-2-strict-go-first-seed-137.txt
          grep -F 'T2 | READY' pass-2-strict-go-first-seed-137.txt

          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 12 | tee pass-3-full-item-lock-seed-12.txt # Full Item-lock model, Steven, Professor Burnet, and Forest Seal Stone: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#full-item-lock https://api.pokemontcg.io/v2/cards/sm7-145 https://api.pokemontcg.io/v2/cards/swsh6-169 https://api.pokemontcg.io/v2/cards/swsh12-156
          grep -F 'Seed: 12 | first-ready turn: 3 | setup result: success' pass-3-full-item-lock-seed-12.txt
          ! grep -F 'PLAY ITEM' pass-3-full-item-lock-seed-12.txt
          grep -F 'T3 | READY' pass-3-full-item-lock-seed-12.txt
      - name: Recheck fresh owned bugs and source traceability
        shell: bash
        run: |
          set -euo pipefail
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 211 | tee owned-1235-seed-211.txt # Active owned bug and cards: https://github.com/FlareZ123/pokemon-sims/issues/1235 https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/sm2-55 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://api.pokemontcg.io/v2/cards/sv7-133
          grep -F 'Seed: 211 | first-ready turn: 3 | setup result: success' owned-1235-seed-211.txt
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-first --seed 47 | tee owned-1205-seed-47.txt # Active owned bug and DCI cards: https://github.com/FlareZ123/pokemon-sims/issues/1205 https://api.pokemontcg.io/v2/cards/sm6-113 https://api.pokemontcg.io/v2/cards/sv4-171 https://api.pokemontcg.io/v2/cards/sm5-100 https://api.pokemontcg.io/v2/cards/sv6-130
          grep -F 'Seed: 47 | first-ready turn: not ready through T5 | setup result: failure' owned-1205-seed-47.txt
          grep -F 'https://api.pokemontcg.io/v2/cards/sv4-163' src/trace_engine_v2/part_issue_1209_treasure_tapu_crispin_override.inc
          grep -F 'https://www.pokemon.com/us/pokemon-tcg/rules' src/trace_engine_v2/part_issue_1209_treasure_tapu_crispin_override.inc
          grep -F 'https://github.com/FlareZ123/pokemon-sims/issues/1236' src/trace_engine_v2/part_issue_1209_treasure_tapu_crispin_override.inc
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Repository validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-tests
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260721-gpt56-post-1241-t2-t3-matrix.csv # Aggregate simulation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
      - name: Verify canonical matrix and generated reports
        shell: bash
        run: |
          set -euo pipefail
          cmp turn-20260721-gpt56-post-1241-t2-t3-matrix.csv results/simulation_results.csv # Source-bound matrix contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/regenerate_setup_baselines.py
          python tests/setup_report_contract_tests.py # Generated report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_setup_docs.py
          python tests/multi_deck_report_contract_tests.py # Paired report contract: https://github.com/FlareZ123/pokemon-sims/blob/main/scripts/update_multi_deck_docs.py
      - name: Export tested source and artifacts
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt # Source traceability specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Audit snapshot specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260721-gpt56-post-1241-audit-${{ github.run_attempt }}
          path: |
            pass-*.txt
            owned-*.txt
            turn-20260721-gpt56-post-1241-t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
            build/regidrago_sim
            build/regidrago_unified_tests
            build/Testing
          if-no-files-found: error
