name: Turn 20260721 GPT56 Thinking Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Configure Release
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release # Repository build contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-one-readable-hand
      - name: Build simulator and tests
        run: cmake --build build --parallel 2 # Repository test contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-tests
      - name: Run six independent simulate-this passes
        shell: bash
        run: |
          set -euo pipefail
          # Official turn, Trainer, search, discard, Bench, attachment, evolution, Ability, VSTAR Power, and promotion procedures: https://www.pokemon.com/us/pokemon-tcg/rules
          # Earliest deterministic route, DCI, connector preservation, and JIT payload policy: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#dcijit-treatment
          # Hidden-information and lock boundaries: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#policy-versus-future-card-oracle https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#lock-model
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-first --seed 137 | tee pass-1-strict-go-first-137.txt # Regidrago V/VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-135 https://api.pokemontcg.io/v2/cards/swsh12-136
          ./build/regidrago_sim --simulate-this --scenario strict-jit-turn2-item-lock/go-first --seed 401 | tee pass-2-turn2-item-lock-401.txt # Item-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#turn-2-item-lock
          ./build/regidrago_sim --simulate-this --scenario strict-jit-full-item-lock/go-second --seed 12 | tee pass-3-full-item-lock-12.txt # Full Item-lock model: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/MODEL_ASSUMPTIONS.md#full-item-lock
          ./build/regidrago_sim --simulate-this --scenario strict-jit/go-second --seed 211 | tee issue-1235-seed-211.txt # Quick Ball, Oricorio, Tapu Lele-GX, and issue: https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/sm2-55 https://api.pokemontcg.io/v2/cards/cel25c-60_A https://github.com/FlareZ123/pokemon-sims/issues/1235
          ./build/regidrago_sim --simulate-this --scenario matchup-flex-jit/go-second --seed 307 | tee issue-1236-seed-307.txt # Earthen Vessel, Steven, and issue: https://api.pokemontcg.io/v2/cards/sv4-163 https://api.pokemontcg.io/v2/cards/sm7-145 https://github.com/FlareZ123/pokemon-sims/issues/1236
          ./build/regidrago_sim --simulate-this --scenario strict-jit-rulebox-ability-lock/go-second --seed 503 | tee issue-1237-seed-503.txt # Quick Ball, Dialga-GX, Earthen Vessel, and issue: https://api.pokemontcg.io/v2/cards/swsh1-179 https://api.pokemontcg.io/v2/cards/sm5-100 https://api.pokemontcg.io/v2/cards/sv4-163 https://github.com/FlareZ123/pokemon-sims/issues/1237
      - name: Run complete Release suite
        run: ctest --test-dir build --parallel 4 --output-on-failure # Repository validation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#run-tests
      - name: Generate canonical T2 and T3 matrix
        run: ./build/regidrago_sim --trials 100000 --seed 20260705 --out turn-20260721-gpt56-thinking-t2-t3-matrix.csv # Aggregate simulation contract: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#generate-the-canonical-shell-baseline
      - name: Export tested source and artifacts
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > tested-head.txt # Source traceability specification: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/RULES_TRACEABILITY.md
          git archive --format=tar.gz --output=tested-source.tar.gz HEAD # Audit snapshot specification: https://github.com/FlareZ123/pokemon-sims/blob/main/README.md#audit-status
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turn-20260721-gpt56-thinking-audit-${{ github.run_attempt }}
          path: |
            pass-*.txt
            issue-*.txt
            turn-20260721-gpt56-thinking-t2-t3-matrix.csv
            tested-head.txt
            tested-source.tar.gz
            build/Testing
          if-no-files-found: error
