name: Update issue 1258 provenance

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-1258-late-steven-appletun-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Replace exact policy digest
        run: |
          python - <<'PY'
          from pathlib import Path

          old = "93378ab97e657557b78df741d7ffb71a1c3389bfd47629767ddec23d47be303c"
          new = "32d68bbe9105bc9a9b9ea0ed64239a30b401c42347d7c2951fd231c771707bab"
          paths = [
              Path("results/baseline_manifest.json"),
              Path("results/multi_deck_manifest.json"),
              Path("docs/MULTI_DECK_REPORT.md"),
          ]
          for path in paths:
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"Expected one stale digest in {path}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit provenance refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/baseline_manifest.json results/multi_deck_manifest.json docs/MULTI_DECK_REPORT.md
          git diff --cached --check
          git commit -m "Refresh issue 1258 source provenance"
          git push origin HEAD:fix/issue-1258-late-steven-appletun-v2
