name: Validate issue 511 focused

on:
  pull_request:
    paths:
      - '.github/workflows/validate-issue-511-focused.yml'
      - 'src/trace_engine_v2/part_tate_blender_tate_override.inc'
      - 'tests/tate_switch_blender_payload_tests.cpp'

jobs:
  focused-release-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select the two issue 511 controls
        shell: python
        run: |
          from pathlib import Path
          import re
          path = Path('tests/tate_switch_blender_payload_tests.cpp')
          source = path.read_text()
          replacement = '''int main() {
            test_tate_draw_refreshes_an_empty_deck_when_search_item_cannot_follow();
            test_tate_preserves_one_card_deck_for_live_payload_search();
            return 0;
          }
          '''
          updated, count = re.subn(r'int main\(\) \{.*?\n\}', replacement, source, count=1, flags=re.S)
          if count != 1:
            raise SystemExit('main replacement failed')
          path.write_text(updated)
      - name: Release control run
        run: |
          cmake -S . -B build-focus -DCMAKE_BUILD_TYPE=Release
          cmake --build build-focus --target regidrago_tate_switch_blender_tests -j2
          ./build-focus/regidrago_tate_switch_blender_tests
      - name: AddressSanitizer and UBSan control run
        run: |
          cmake -S . -B build-focus-sanitizers -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'
          cmake --build build-focus-sanitizers --target regidrago_tate_switch_blender_tests -j2
          ASAN_OPTIONS=detect_leaks=1 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 ./build-focus-sanitizers/regidrago_tate_switch_blender_tests
