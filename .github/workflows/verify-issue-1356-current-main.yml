name: Verify Issue 1356 Current Main

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out PR merge source
        uses: actions/checkout@v4

      - name: Build current source
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 2 --target regidrago_sim

      - name: Reproduce issue 1356 seed 107
        shell: bash
        run: |
          set -euo pipefail
          # Arven: https://api.pokemontcg.io/v2/cards/sv1-166
          # Mysterious Treasure: https://api.pokemontcg.io/v2/cards/sm6-113
          # Forest Seal Stone: https://api.pokemontcg.io/v2/cards/swsh12-156
          # Quick Ball: https://api.pokemontcg.io/v2/cards/swsh1-179
          # Oricorio: https://api.pokemontcg.io/v2/cards/sm2-55
          # Regidrago VSTAR: https://api.pokemontcg.io/v2/cards/swsh12-136
          # Official turn and Trainer procedure: https://www.pokemon.com/us/pokemon-tcg/rules
          # Repository resource priority: https://github.com/FlareZ123/pokemon-sims/blob/main/docs/POLICY_DECISIONS.md#decision-priorities
          # Bug report: https://github.com/FlareZ123/pokemon-sims/issues/1356
          ./build/regidrago_sim --simulate-this --deck regidrago-shell --scenario strict-jit/go-first --seed 107 --require-ready-by 3 | tee issue-1356-current-main.txt
          grep -Eq '^T3 \| READY \|' issue-1356-current-main.txt

      - name: Upload exact trace
        uses: actions/upload-artifact@v4
        with:
          name: issue-1356-current-main-trace
          path: issue-1356-current-main.txt
          if-no-files-found: error
