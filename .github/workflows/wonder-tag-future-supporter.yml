name: Wonder Tag Future Supporter

on:
  pull_request:
    branches: [main]

jobs:
  focused-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile focused Release regression
        run: >-
          c++ -std=c++20 -O2 -Wall -Wextra -Wpedantic -Wconversion -Wshadow
          tests/wonder_tag_future_supporter_tests.cpp
          -o wonder_tag_future_supporter_tests
      - name: Run focused Release regression
        run: ./wonder_tag_future_supporter_tests

  focused-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile focused ASan and UBSan regression
        run: >-
          c++ -std=c++20 -O1 -g -Wall -Wextra -Wpedantic -Wconversion -Wshadow
          -fsanitize=address,undefined -fno-omit-frame-pointer
          tests/wonder_tag_future_supporter_tests.cpp
          -o wonder_tag_future_supporter_tests_san
      - name: Run focused ASan and UBSan regression
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ./wonder_tag_future_supporter_tests_san
