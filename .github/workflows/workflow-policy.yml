name: Workflow Policy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Read-only validation is sufficient for this repository contract:
# https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
permissions:
  contents: read

jobs:
  reject-obsolete-issue-workflows:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enforce permanent workflow allowlist
        # Completed issue workflows must not run on unrelated pull requests:
        # https://github.com/FlareZ123/pokemon-sims/issues/1360
        # Pull-request event behavior:
        # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request
        run: python scripts/check_issue_workflow_policy.py
